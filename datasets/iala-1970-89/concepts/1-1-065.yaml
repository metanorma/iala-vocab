id: 1-1-065-eng
termid: 1-1-065
language_code: eng
terms:
- type: expression
  designation: Safety
  normative_status: preferred
definition:
- content: Condition at which, even under the possible effect of hazards, defects
    or stresses, the intended purpose of an installation (equipment) or of a process
    is guaranteed to the necessary extent.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
