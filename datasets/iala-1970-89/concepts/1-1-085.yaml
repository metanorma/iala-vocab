id: 1-1-085-eng
termid: 1-1-085
data:
  language_code: eng
terms:
- type: expression
  designation: Emergency apparatus
  normative_status: preferred
definition:
- content: Apparatus brought into service in emergency when the normal service equipment
    and possibly also the stand-by equipment has failed. It often provides a greatly
    reduced service in comparison with the normal service equipment.
