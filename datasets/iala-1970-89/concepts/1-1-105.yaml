id: 1-1-105-eng
termid: 1-1-105
language_code: eng
terms:
- type: expression
  designation: Monochromatic radiation
  normative_status: preferred
definition:
- content: |-
    Radiation characterized by a single frequency. By extension, radiation of a very small range of frequency or wave-length, which can be described by stating a single frequency or wave-length.



    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
