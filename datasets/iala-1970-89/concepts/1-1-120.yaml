id: 1-1-120-eng
termid: 1-1-120
language_code: eng
terms:
- type: expression
  designation: Radiant energy
  normative_status: preferred
definition:
- content: |-
    Energy emitted, transferred or received as radiation.


    Symbol Qe


    Unit joule (J)


    1 J = 1 watt-second (W.s)


    1 J = 107erg



    Reference: C.I.E.(modified)



    Note: This quantity may be expressed in terms of the radiant flux (Fe) and the time of radiation (dt) by Qe = ?Fe .dt
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
