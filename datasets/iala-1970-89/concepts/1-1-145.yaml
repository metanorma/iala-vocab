id: 1-1-145-eng
termid: 1-1-145
language_code: eng
terms:
- type: expression
  designation: Radiant exposure
  normative_status: preferred
definition:
- content: |-
    Radiant exposure (at a point of a surface)


    The product of an irradiance (Ee) and its duration (dt).


    Symbol He He = ?Ee.dt


    Unit joule per square metre (J/m2)



    Note: 1 Equivalent definition Surface density of the radiant energy received.



    Note: 2 Formerly irradiation in English and irradiation in French.



    Reference: C.I.E. (modified)



    Note: 3 For further definitions see C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
