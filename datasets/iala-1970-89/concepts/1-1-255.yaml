id: 1-1-255-eng
termid: 1-1-255
language_code: eng
terms:
- type: expression
  designation: Wave surface
  normative_status: preferred
definition:
- content: |-
    Surface produced by a progressive wave in space, containing points of equal phase of the oscillation.


    For maritime use this term is also applied to the surface of the sea with waves.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
