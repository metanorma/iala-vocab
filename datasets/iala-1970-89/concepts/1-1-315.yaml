id: 1-1-315-eng
termid: 1-1-315
language_code: eng
terms:
- type: expression
  designation: Total amplitude of oscillation
  normative_status: preferred
definition:
- content: |-
    Total amplitude of oscillation (of a periodic quantity)


    The difference between the maximum and the minimum value of the quantity during one period.



    Note: In the case of sinusoidal oscillation usually called double amplitude.



    Reference: I.E.C. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
