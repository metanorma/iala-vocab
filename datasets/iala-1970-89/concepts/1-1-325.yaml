id: 1-1-325-eng
termid: 1-1-325
language_code: eng
terms:
- type: expression
  designation: Fundamental frequency
  normative_status: preferred
definition:
- content: |-
    Fundamental frequency (of a periodic quantity)


    In general, the lowest frequency obtained by a frequency analysis of the wave form of the periodic quantity. It is the frequency of a sinusoidal quantity having the same period.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
