id: 1-1-330-eng
termid: 1-1-330
language_code: eng
terms:
- type: expression
  designation: Free oscillation
  normative_status: preferred
definition:
- content: |-
    The oscillation of a system in the absence of any exterior force.



    Reference: I.E.C.



    Note: Free oscillations of a mechanical system are usually called natural vibrations of the system.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
