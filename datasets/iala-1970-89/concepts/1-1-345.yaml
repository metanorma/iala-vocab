id: 1-1-345-eng
termid: 1-1-345
language_code: eng
terms:
- type: expression
  designation: Interference
  normative_status: preferred
definition:
- content: Phenomenon which is produced by overlapping of waves. Depending on the
    frequency, the phase and the direction of propagation, this may result in an increase,
    a decrease or extinction of the energy.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
