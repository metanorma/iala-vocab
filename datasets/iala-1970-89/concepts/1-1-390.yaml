id: 1-1-390-eng
termid: 1-1-390
language_code: eng
terms:
- type: expression
  designation: Record
  normative_status: preferred
definition:
- content: |-
    Alternative term: Recording


    Material (e.g. paper-roll, disc, magnetic tape or wire) in which recorded information is stored and from which it can be reproduced as required.



    Note: Usually a suitable apparatus is necessary for reproduction.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
