id: 1-2-015-eng
termid: 1-2-015
language_code: eng
terms:
- type: expression
  designation: Pilotage
  normative_status: preferred
definition:
- content: |-
    Alternative term: Pilotage service


    The provision of a service of specially qualified men possessing detailed local knowledge, who assist the masters of vessels to navigate them in particular areas.



    Note: In Britain and the U.S.A. the word "pilotage" is also loosely used for piloting.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
