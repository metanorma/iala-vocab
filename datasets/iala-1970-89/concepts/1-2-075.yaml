id: 1-2-075-eng
termid: 1-2-075
language_code: eng
terms:
- type: expression
  designation: Position line
  normative_status: preferred
definition:
- content: |-
    Alternative term: Line of position


    A line (geometrical locus), defined by a constant measured value, on which a vessel may be identified on the basis of a measurement.



    Note: There are terrestrial, astronomical and radio position lines.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
