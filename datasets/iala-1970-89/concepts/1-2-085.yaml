id: 1-2-085-eng
termid: 1-2-085
language_code: eng
terms:
- type: expression
  designation: Circle of uncertainty
  normative_status: preferred
definition:
- content: A circle having as its centre a position and as its radius the maximum
    probable error that is found in determining the position.
