id: 1-2-090-eng
termid: 1-2-090
data:
  language_code: eng
  terms:
  - type: expression
    designation: Nautical mile
    normative_status: preferred
  definition:
  - content: The international nautical mile is 1852 m (or 6076 feet) (International
      agreement at the I.H.B. Conference of 1929).
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  - type: authoritative
    origin:
      ref:
        source: I.H.B
  annotations:
  - content: Unit of linear measure chiefly used at sea. It is approximately one minute
      of latitude.
  - content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Nautical_mile
