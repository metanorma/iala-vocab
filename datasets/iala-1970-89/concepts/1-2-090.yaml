id: 1-2-090-eng
termid: 1-2-090
language_code: eng
terms:
- type: expression
  designation: Nautical mile
  normative_status: preferred
definition:
- content: |-
    Unit of linear measure chiefly used at sea. It is approximately one minute of latitude.


    The international nautical mile is 1852 m (or 6076 feet) (International agreement at the I.H.B. Conference of 1929).



    Reference: I.H.B.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
