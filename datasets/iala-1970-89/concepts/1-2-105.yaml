id: 1-2-105-eng
termid: 1-2-105
language_code: eng
terms:
- type: expression
  designation: Celestial horizon
  normative_status: preferred
definition:
- content: |-
    Alternative term: Rational horizon


    The great circle on the celestial sphere, every point of which is 90 degrees from the observer's zenith. This circle encloses the horizontal plane through the observer and divides the celestial sphere into two hemispheres.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
