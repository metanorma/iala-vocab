id: 1-2-110-eng
termid: 1-2-110
language_code: eng
terms:
- type: expression
  designation: Sea horizon
  normative_status: preferred
definition:
- content: The small circle on the earth's surface at which the sea and sky appear
    to meet, forming the field of view. As a result of the curvature of the earth
    and of atmospheric refraction of light, the observer can see more than half the
    celestial sphere. The visible horizon therefore lies below the celestial horizon.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
