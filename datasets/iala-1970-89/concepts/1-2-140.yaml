language_code: eng
terms:
- type: expression
  designation: Main channel
  normative_status: preferred
definition:
- content: That channel, of a number of alternative channels, which due to natural
    conditions or by declaration of the responsible authority is used by the majority
    of important shipping.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
