id: 1-2-150-eng
termid: 1-2-150
language_code: eng
terms:
- type: expression
  designation: Junction
  normative_status: preferred
definition:
- content: The point at which two channels meet, when viewed from a vessel approaching
    from the open sea or in the same direction as the main stream of flood tide or
    in the direction established by the appropriate authority.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
