id: 1-2-180-eng
termid: 1-2-180
language_code: eng
terms:
- type: expression
  designation: Estuary
  normative_status: preferred
definition:
- content: Inlet of the sea as it is formed by the mouth of one or more rivers and
    in which the tide usually flows.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
