id: 1-2-210-eng
termid: 1-2-210
language_code: eng
terms:
- type: expression
  designation: Rock
  normative_status: preferred
definition:
- content: |-
    Alternative term: Rocks


    An isolated rocky formation or a single large stone, usually one constituting a danger to navigation.



    Note: In French such a formation when totally submerged is called a roche.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
