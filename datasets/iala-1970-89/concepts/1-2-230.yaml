language_code: eng
terms:
- type: expression
  designation: Middle grounds
  normative_status: preferred
definition:
- content: |-
    Island or shoal which divides a fairway into two shipping channels; these subsequently join again into a single channel.



    Reference: I.H.B. (modified)
