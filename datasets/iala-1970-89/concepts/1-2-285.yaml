id: 1-2-285-eng
termid: 1-2-285
language_code: eng
terms:
- type: expression
  designation: Landing stage
  normative_status: preferred
definition:
- content: |-
    Platform attached to the land to permit passage of passengers and freight traffic to and from a ship. In some cases the outer end of the landing stage is floating on a pontoon.



    Note: In German the term Anleger is also used for a landing stage.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
