id: 1-2-295-eng
termid: 1-2-295
language_code: eng
terms:
- type: expression
  designation: Wet Dock
  normative_status: preferred
definition:
- content: |-
    (Wet) Dock


    Harbour or basin which is closed against the tidal range and which provides cargo-handling facilities for ships.



    Note: In the U.S.A. the space between two piers which is not closed against the tidal range is also called a dock.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
