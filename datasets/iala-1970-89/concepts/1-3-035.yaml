id: 1-3-035-eng
termid: 1-3-035
language_code: eng
terms:
- type: expression
  designation: Tidal range
  normative_status: preferred
definition:
- content: |-
    Alternative term: Tidal amplitude


    Difference between the heights of the sea at high tide and the following low tide, or at low tide and the following high tide.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
