id: 1-3-040-eng
termid: 1-3-040
language_code: eng
terms:
- type: expression
  designation: Stand
  normative_status: preferred
definition:
- content: Period of time during which the sea level is momentarily nearly stationary
    between a rising and falling tide or between a falling and rising tide.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
