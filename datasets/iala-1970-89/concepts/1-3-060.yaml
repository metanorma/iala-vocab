id: 1-3-060-eng
termid: 1-3-060
language_code: eng
terms:
- type: expression
  designation: Swell
  normative_status: preferred
definition:
- content: |-
    Oscillatory movement of the sea caused generally by winds at a distance or by winds that existed before the time of observation.



    Note: In French an oscillation of the swell is called a lame.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
