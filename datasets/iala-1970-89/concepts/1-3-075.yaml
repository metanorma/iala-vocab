id: 1-3-075-eng
termid: 1-3-075
language_code: eng
terms:
- type: expression
  designation: Scotch mist
  normative_status: preferred
definition:
- content: |-
    Alternative term: Fine drizzle


    Fairly even precipitation of extremely numerous very small droplets of water, which almost appear to be suspended in the air, and which may reduce the meteorological visibility.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
