id: 2-1-025-eng
termid: 2-1-025
language_code: eng
terms:
- type: expression
  designation: Quantity of Light
  normative_status: preferred
definition:
- content: |-
    The product of luminous flux (F) and its duration (dt).


    Symbol: Q Q = ? F.dt


    Unit: lumen-second (lm.s), lumen-hour (lm.h)


    Reference: C.I.E. (modified)
