id: 2-1-050-eng
termid: 2-1-050
language_code: eng
terms:
- type: expression
  designation: Candela per Square Metre
  normative_status: preferred
definition:
- content: |-
    The SI Unit: of luminance.


    Symbol: cd/m2



    Note: This unit is sometimes called Nit. Symbol: nt


    Other metric units stilb (sb), apostilb (asb), lambert (L)


    Non-metric Unit: foot lambert (fL)


    1 cd/m2 = 10-4 stilb = p apostilb = p.10-4 lambert = footlambert


    Reference: C.I.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
