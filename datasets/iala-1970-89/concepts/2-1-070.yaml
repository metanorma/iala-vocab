id: 2-1-070-eng
termid: 2-1-070
language_code: eng
terms:
- type: expression
  designation: Light Exposure
  normative_status: preferred
definition:
- content: |-
    The product of an illuminance (E) and its duration (dt).


    Symbol: H H = ?E.dt


    Unit: lux-second (lx.s)



    Note 1: Formerly Quantity of Illumination and, in French, Quantite d'Eclairement.



    Note 2: Equivalent definition Surface density of the quantity of light received.



    Reference: C.I.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
