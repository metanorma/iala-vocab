id: 2-1-075-eng
termid: 2-1-075
data:
  language_code: eng
  terms:
  - type: expression
    designation: Luminous Exitance
    normative_status: preferred
  - type: expression
    designation: Luminous Exitance (at a point of a surface)
    normative_status: admitted
  - type: symbol
    designation: stem:[M]
    normative_status: preferred
  definition:
  - content: The quotient of the luminous flux (dF), leaving an element of the surface
      containing the point, by the area (dA) of that element.
  notes:
  - content: Formerly Luminous Emittance and, in French, Emittance Lumineuse.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  - type: authoritative
    origin:
      ref:
        source: C.I.E
    modification: modified from source
  annotations:
  - content: Unit lumen per square metre (lm/m2)
