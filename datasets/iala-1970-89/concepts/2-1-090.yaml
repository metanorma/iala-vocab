id: 2-1-090-eng
termid: 2-1-090
language_code: eng
terms:
- type: expression
  designation: Luminous fan beam
  normative_status: preferred
definition:
- content: |-
    (Luminous) Fan Beam


    A beam in which the light is concentrated in and about a single plane, usually horizontal.


    The angular spread in the plane of concentration may cover either 360 degrees or a smaller angle.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
