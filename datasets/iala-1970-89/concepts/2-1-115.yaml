id: 2-1-115-eng
termid: 2-1-115
language_code: eng
terms:
- type: expression
  designation: Image
  normative_status: preferred
definition:
- content: The representation of any illuminated object, resulting from the convergence
    or divergence of light rays emanating from that object, when they have been refracted
    or reflected by optical apparatus.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
