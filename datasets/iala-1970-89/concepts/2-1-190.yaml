id: 2-1-190-eng
termid: 2-1-190
language_code: eng
terms:
- type: expression
  designation: Internal Transmittance
  normative_status: preferred
definition:
- content: |-
    Internal Transmittance (of a homogeneous non-diffusing plate)


    The ratio of the luminous flux (F2) reaching the exit surface of the plate to the flux (F1) which leaves the entry surface.


    Symbol: Ti


    Reference: C.I.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
