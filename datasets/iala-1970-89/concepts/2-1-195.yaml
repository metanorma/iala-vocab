id: 2-1-195-eng
termid: 2-1-195
language_code: eng
terms:
- type: expression
  designation: Transmissivity
  normative_status: preferred
definition:
- content: |-
    Transmissivity (of an absorbing material)


    The internal transmittance of a layer of the material such that the path of the radiation is of Unit: length, and under conditions in which the boundary of the material has no influence.


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
