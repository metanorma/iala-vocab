  - type: expression
    designation: Internal Absorptance (of a homogeneous non-diffusing plate)
    normative_status: admitted
  - type: symbol
    designation: stem:[ai]
    normative_status: preferred
  definition:
  - content: |-
      The ratio of the luminous flux absorbed between the entry and exit surfaces of the plate, to the flux which leaves the entry surface.

      ai + Ti = 1
