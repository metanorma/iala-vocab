id: 2-1-215-eng
termid: 2-1-215
language_code: eng
terms:
- type: expression
  designation: Linear Absorption Coefficient
  normative_status: preferred
definition:
- content: |-
    Linear Absorption Coefficient (of an absorbing medium)


    The quotient of the internal absorptance of a path element traversed by the radiation, by the length (dl) of this element.


    Symbol: a


    Unit: m-1


    Reference: C.I.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
