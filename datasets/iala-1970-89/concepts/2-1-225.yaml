id: 2-1-225-eng
termid: 2-1-225
language_code: eng
terms:
- type: expression
  designation: Uniform Diffuser
  normative_status: preferred
definition:
- content: |-
    A diffuser for which the luminance is the same in all directions irrespective of the direction of incidence of the light.


    Transmission L = E T/p


    Reflection L = E p/p


    Reference: C.I.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
