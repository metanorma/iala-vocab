id: 2-1-230-eng
termid: 2-1-230
data:
  language_code: eng
terms:
- type: expression
  designation: Diffusion Factor
  normative_status: preferred
- type: expression
  designation: Diffusion Factor (of a diffusing surface, by reflection or by transmission)
  normative_status: admitted
- type: symbol
  designation: stem:[s]
  normative_status: preferred
definition:
- content: The ratio of the mean of the values of luminance measured at 20 and 70
    degrees to the luminance measured at 5 degrees from the normal, when the surface
    considered is illuminated normally.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E. (extract)
notes:
- content: The diffusion factor is intended to give an indication of the spatial distribution
    of the diffused flux. It is equal to 1 for every uniform diffuser, whatever the
    value of the diffuse reflectance.
- content: 'The full text of the Reference: C.I.E. definition explains the limitations
    within which this form of definition can be applied.'
