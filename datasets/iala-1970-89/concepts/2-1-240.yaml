id: 2-1-240-eng
termid: 2-1-240
data:
  language_code: eng
  terms:
  - type: expression
    designation: Refractive Index
    normative_status: preferred
  - type: expression
    designation: Refractive Index (of a medium)
    normative_status: admitted
  - type: symbol
    designation: stem:[n]
    normative_status: preferred
  definition:
  - content: Ratio of the velocity of light in vacuum to the velocity of light in
      the medium.
  notes:
  - content: This index is equal to the ratio of the sines of the angles of incidence
      (?1) and refraction (?2) when a ray crosses the surface separating vacuum and
      medium.
