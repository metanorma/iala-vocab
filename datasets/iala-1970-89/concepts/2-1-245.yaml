id: 2-1-245-eng
termid: 2-1-245
language_code: eng
terms:
- type: expression
  designation: Geographical Range (Superseded)
  normative_status: preferred
definition:
- content: |-
    Superseded by new definition from Guideline G1065



    2-1-245


    The maximum distance at which light from a light or other aid to navigation can reach an observer, as limited only by the curvature of the earth and refraction in the atmosphere and by the heights of the observer and of the light or aid.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
