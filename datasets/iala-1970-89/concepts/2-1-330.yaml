id: 2-1-330-eng
termid: 2-1-330
language_code: eng
terms:
- type: expression
  designation: Photopic Vision
  normative_status: preferred
definition:
- content: |-
    Vision by the normal eye when adapted to levels of luminance of at least several candelas per square metre.



    Note: The cone receptors of the retina are considered to be the principal active elements under these conditions, and the spectrum appears coloured.


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
