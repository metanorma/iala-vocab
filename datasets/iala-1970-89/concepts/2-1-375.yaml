id: 2-1-375-eng
termid: 2-1-375
language_code: eng
terms:
- type: expression
  designation: Retina
  normative_status: preferred
definition:
- content: |-
    A membrane at the back of the eye which is sensitive to light stimuli and composed of photoreceptors, properly so called (cones and rods), and of nerve cells which transmit to the optic nerve the stimulation of the receptor elements.


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
