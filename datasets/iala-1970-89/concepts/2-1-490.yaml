notes:
- content: A surface colour is considered to be "white" if its spectral luminance
    factor is approximately independent of wavelength and exceeds a value of about
    0.7.
- content: These terms, when applied to colours of signal lights or to colour filters
    or surface colours (in the latter two cases for a specified or assumed reference
    illuminant), are defined by specifications of chromaticity limits established
    by various organisations.
