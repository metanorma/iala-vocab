id: 2-1-495-eng
termid: 2-1-495
language_code: eng
terms:
- type: expression
  designation: Distribution Temperature
  normative_status: preferred
definition:
- content: |-
    The temperature of the full radiator for which the ordinates of the spectral distribution curve of its radiance are proportional, or approximately so, in the visible region, to those of the distribution curve of the radiation considered.


    Unit: kelvin (K)



    Note: Both radiations will necessarily have the same, or nearly the same, chromaticity.


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
