id: 2-1-510-eng
termid: 2-1-510
language_code: eng
terms:
- type: expression
  designation: Thermal Radiation
  normative_status: preferred
definition:
- content: |-
    Process of emission in which the radiant energy originates in the thermal agitation of the particles of matter (atoms, molecules, ions).


    Note: The terms "thermal radiation" and, in German Temperaturstrahlung apply not only to the process of emission, but also to the radiation itself.


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
