id: 2-2-000-eng
termid: 2-2-000
language_code: eng
terms:
- type: expression
  designation: Optic
  normative_status: preferred
definition:
- content: |-
    An assembly of optically refracting or reflecting elements (or both) and their supporting frames.


    Through the agency of these elements, rays emitted by a light source are deflected into new directions as required.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
