id: 2-2-025-eng
termid: 2-2-025
language_code: eng
terms:
- type: expression
  designation: Ring
  normative_status: preferred
definition:
- content: |-
    A transparent optical element, usually of glass or plastic, in the form of an annulus or annular segment, having a prismatic section in sense 2 of 2-2-020. There are both dioptric (2-2-060) and catadioptric (2-2-070) rings, usually forming part of an optical panel or a drum lens.


    (Figs. 10 and 16)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
