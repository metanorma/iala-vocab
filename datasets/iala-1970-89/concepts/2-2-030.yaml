id: 2-2-030-eng
termid: 2-2-030
language_code: eng
terms:
- type: expression
  designation: Mirror
  normative_status: preferred
definition:
- content: A reflector, usually of polished or plated metal or silvered glass, having
    the property that most of the luminous flux incident on it is deflected into new
    directions by regular reflection.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
