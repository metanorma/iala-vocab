id: 2-2-045-eng
termid: 2-2-045
language_code: eng
terms:
- type: expression
  designation: Spherical Reflector
  normative_status: preferred
definition:
- content: |-
    Alternative term: Spherical Mirror


    A type of mirror the reflecting surface of which is a portion of a sphere. Light rays emitted by a point source placed at the centre of the sphere are returned through the centre. Such mirrors are usually used as reinforcing mirrors.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
