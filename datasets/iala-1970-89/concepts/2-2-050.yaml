  designation: Frame (of an optic)
  normative_status: preferred
definition:
- content: |-
    Alternative term: Framework (of an optic)


    A rigid structure, usually of metal, in which the refracting and reflecting elements of an optic are mounted. (Figs. 10 and 16b)
