language_code: eng
terms:
- type: expression
  designation: Dioptric
  normative_status: preferred
definition:
- content: The property of those optical elements which alter the direction of a light
    ray from its original direction by refraction only. (Figs. 10, 11a and 16)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
