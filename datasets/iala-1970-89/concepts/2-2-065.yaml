id: 2-2-065-eng
termid: 2-2-065
language_code: eng
terms:
- type: expression
  designation: Catoptric
  normative_status: preferred
definition:
- content: The property of those optical elements which alter the direction of a light
    ray from its original direction by reflection only. (Figs, 11b and 13)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
