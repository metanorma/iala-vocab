id: 2-2-075-eng
termid: 2-2-075
data:
  language_code: eng
  terms:
  - type: expression
    designation: Bullseye
    normative_status: preferred
  definition:
  - content: |-
      A circular lens (in sense 1 of 2-2-010), or part thereof, usually plano-convex or double convex in section, the optical axis {{2-2-110, Optical Axis}} of which coincides with the optical axis of the prismatic lens of which it forms a part.

