id: 2-2-140-eng
termid: 2-2-140
language_code: eng
terms:
- type: expression
  designation: Fresnel Lens
  normative_status: preferred
definition:
- content: A prismatic lens obtained by the rotation of a Fresnel profile about the
    optical axis of the lens (Fresnel Panel), or about a vertical axis (Fresnel Drum
    Lens).
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
