id: 2-2-145-eng
termid: 2-2-145
language_code: eng
terms:
- type: expression
  designation: Equi-Angular Profile
  normative_status: preferred
definition:
- content: A stepped profile such that a light ray emitted from the focus and passing
    through a portion of the profile exhibits equal angles of incidence and emergence.
    This produces minimum dispersion.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
