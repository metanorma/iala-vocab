id: 2-2-205-eng
termid: 2-2-205
language_code: eng
terms:
- type: expression
  designation: Neutral Filter
  normative_status: preferred
definition:
- content: |-
    Alternative term: Neutral Density Filter, Neutral Grey Filter


    A non-selective filter, usually of glass or plastic.



    Note: Such filters produce no change (or very little change) in the colour of the transmitted light.
sources:
- type: authoritative
  origin:
