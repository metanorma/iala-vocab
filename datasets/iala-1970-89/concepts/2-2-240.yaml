id: 2-2-240-eng
termid: 2-2-240
language_code: eng
terms:
- type: expression
  designation: Moulded Glass (or plastic)
  normative_status: preferred
definition:
- content: |-
    Alternative term: Pressed Glass (or plastic)


    Glass (or plastic) formed into the shape required for optical purposes by allowing it to solidify from the molten state in a suitably shaped mould.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
