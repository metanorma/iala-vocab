id: 2-2-245-eng
termid: 2-2-245
language_code: eng
terms:
- type: expression
  designation: Ground and Polished Glass
  normative_status: preferred
definition:
- content: |-
    Alternative term: Cut Glass


    Glass formed, after solidification, into the shape required for optical purposes by cutting roughly to shape initially and subsequently shaping accurately by grinding and polishing, using abrasive powders at first coarse and becoming successively finer.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
