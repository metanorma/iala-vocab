id: 2-2-255-eng
termid: 2-2-255
language_code: eng
terms:
- type: expression
  designation: Flashed Glass
  normative_status: preferred
definition:
- content: |-
    Glass composed of at least two different layers, generally one of transparent glass and one of opal, opalescent or coloured glass.


    Reference: C.I.E.



    Note: In lighthouse practice, the use of flashed glass is confined to coloured glass.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
