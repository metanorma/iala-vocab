id: 2-3-005-eng
termid: 2-3-005
language_code: eng
terms:
- type: expression
  designation: Secondary Light Source
  normative_status: preferred
definition:
- content: |-
    A surface or object which is not self-emitting but receives light and returns it, at least in part, by reflection or transmission.


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
