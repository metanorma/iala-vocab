id: 2-3-065-eng
termid: 2-3-065
language_code: eng
terms:
- type: expression
  designation: Chimney
  normative_status: preferred
definition:
- content: A glass envelope surrounding the flame of an oil lamp, and having special
    shape, in order to improve the luminous efficacy and to avoid flickering of the
    flame.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
