id: 2-3-090-eng
termid: 2-3-090
language_code: eng
terms:
- type: expression
  designation: Filament
  normative_status: preferred
definition:
- content: |-
    A threadlike conductor, usually of tungsten (or of carbon), which is heated to incandescence by the passage of an electric current.






    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
