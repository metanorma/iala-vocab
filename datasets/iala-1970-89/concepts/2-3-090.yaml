id: 2-3-090-spa
termid: 2-3-090
language_code: spa
terms:
- type: expression
  designation: Filament/es
  normative_status: preferred
definition:
- content: |-
    Filamento



    Conductor similar a un hilo, generalmente de tungsteno (o de carbono), que se calienta hasta la incandescencia por el paso de una corriente eléctrica.







    Referencia: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
