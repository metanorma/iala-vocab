id: 2-3-125-eng
termid: 2-3-125
language_code: eng
terms:
- type: expression
  designation: Pin Cap (G.B.)
  normative_status: preferred
definition:
- content: |-
    A cap (types F, G) which has one or more pins for fixing it in the lampholder.






    Reference: C.I.E.



    Note 1: For particular numbers of pins, terms such as Three-Pin Cap are employed.



    Note 2: In the U.S.A., a lamp having a cap with two pins is called a Bi-Post Lamp.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
