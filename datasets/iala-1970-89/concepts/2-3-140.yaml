  designation: Miniature Cap
  normative_status: preferred
definition:
- content: A lamp cap of small dimensions, e.g. a miniature Edison screw cap (type
    E14), pygmy (type E10) etc. C.I.E
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
