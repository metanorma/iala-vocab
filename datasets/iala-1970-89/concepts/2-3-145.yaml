id: 2-3-145-eng
termid: 2-3-145
language_code: eng
terms:
- type: expression
  designation: Lampholder
  normative_status: preferred
definition:
- content: |-
    Alternative term: Socket


    A device into which the cap of a lamp is inserted, for holding it in position and usually connecting it with the electric supply.



    Note 1: In English, when the context is clear, the abbreviation Holder is commonly used.



    Note 2: See Note: to 2-3-110.



    Reference: C.I.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
