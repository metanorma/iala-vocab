id: 2-3-165-eng
termid: 2-3-165
language_code: eng
terms:
- type: expression
  designation: Rough Service Lamp
  normative_status: preferred
definition:
- content: |-
    An incandescent lamp so constructed as to withstand mechanical shocks and vibrations.



    Note: In the U.S.A., Vibration Service Incandescent Lamp designates a lamp to withstand vibrations while burning.


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
