id: 2-3-215-eng
termid: 2-3-215
data:
  language_code: eng
terms:
- type: expression
  designation: Hollow truncated cone filament
  normative_status: preferred
definition:
- content: |-
    A filament (usually of multi-vee formation) in the form of a hollow truncated cone, generated around the axis of the lamp.

    ![Ch2_Fig30.jpg](/iala-vocab/images/iala/Ch2_Fig30.jpg)

    In the latter case, the French term is Grille Tronconique Incomplete or Filament Tronconique Incomplet and the English term is"Bunch filament" {{2-3-220, Bunch Filament (G.B.)}}.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The filament may be fully closed in plan, or may embrace an arc of less
    than 360 degrees.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Hollow_truncated_cone_filament
