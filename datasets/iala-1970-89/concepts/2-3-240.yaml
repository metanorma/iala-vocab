id: 2-3-240-eng
termid: 2-3-240
language_code: eng
terms:
- type: expression
  designation: Metallised Lamp
  normative_status: preferred
definition:
- content: |-
    A lamp in which part of the bulb is coated internally or externally with a metallic film to form a reflecting surface so that the light is sent in particular directions.


    Reference: C.I.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
