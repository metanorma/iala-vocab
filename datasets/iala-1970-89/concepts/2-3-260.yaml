id: 2-3-260-eng
termid: 2-3-260
data:
  language_code: eng
terms:
- type: expression
  designation: Standard Lamp
  normative_status: preferred
definition:
- content: |-
    (Photometric) Standard Lamp

    A lamp which has been calibrated to give a known value of luminous flux, colour temperature, or luminous intensity in a specified direction, under specified conditions of operation. Such lamps are used as standards in photometric measurements.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: 'Standard lamps include both Secondary Standards and Working Standards
    as well as the Primary Standard. For definitions of these, see Reference: C.I.E.'
