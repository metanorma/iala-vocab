id: 2-3-285-eng
termid: 2-3-285
language_code: eng
terms:
- type: expression
  designation: Luminescence
  normative_status: preferred
definition:
- content: |-
    Phenomenon of the emission, by matter, of electromagnetic radiation which for certain wavelengths or restricted regions of the spectrum is in excess of that due to the thermal radiation from the material at the same temperature. The radiation is characteristic of the particular material.



    Note: In lighting this term is generally restricted to the emission of radiation in the visible or near visible spectrum.


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
