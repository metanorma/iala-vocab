id: 2-3-295-eng
termid: 2-3-295
language_code: eng
terms:
- type: expression
  designation: Photoluminescence
  normative_status: preferred
definition:
- content: |-
    Luminescence caused by visible, infra-red or ultra-violet radiation. The emitted radiation is of longer wavelength than the exciting radiation.


    Reference: C.I.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
