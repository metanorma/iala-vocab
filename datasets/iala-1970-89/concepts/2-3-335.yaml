id: 2-3-335-eng
termid: 2-3-335
language_code: eng
terms:
- type: expression
  designation: Tubular Discharge Lamp
  normative_status: preferred
definition:
- content: |-
    A discharge lamp of tubular form either straight or curved.



    Note: In German usage, such a discharge lamp is called Leuchtroehre if it contains no luminescent material and operates at high voltage (up to about 6,000 volts).


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
