termid: 2-3-335
data:
  language_code: eng
  terms:
  - type: expression
    designation: Tubular Discharge Lamp
    normative_status: preferred
  definition:
  - content: A discharge lamp of tubular form either straight or curved.
  notes:
  - content: In German usage, such a discharge lamp is called Leuchtroehre if it contains
      no luminescent material and operates at high voltage (up to about 6,000 volts).
