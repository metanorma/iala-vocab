id: 2-3-340-eng
termid: 2-3-340
language_code: eng
terms:
- type: expression
  designation: Fluorescent Lamp
  normative_status: preferred
definition:
- content: |-
    Alternative term: Fluorescent Tube


    A discharge lamp in which most of the light is emitted by a layer of fluorescent material excited by the ultraviolet radiation from the discharge.



    Note: The terms Tube Fluorescent in French, and, in German, Leuchtstoffsroehre and Fluoreszenzroehre are also used, particularly in the case of cold cathode fluorescent lamps.


    Reference: C.I.E. (modified)
sources:
- type: authoritative
  origin:
