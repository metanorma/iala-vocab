id: 2-3-345-eng
termid: 2-3-345
language_code: eng
terms:
- type: expression
  designation: Gaseous Discharge Lamp
  normative_status: preferred
definition:
- content: |-
    A discharge lamp in which the discharge takes place in a gas. Examples are Xenon Lamp, Neon Lamp.



    Note: The term Neon Tube is sometimes wrongly used to denote any such tubular discharge lamp.


    Reference: C.I.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
