id: 2-3-350-eng
termid: 2-3-350
language_code: eng
terms:
- type: expression
  designation: Metal Vapour Lamp
  normative_status: preferred
definition:
- content: "A discharge lamp in which the light is mainly produced in a metallic vapour.
    \n\n\nExamples are Mercury (Vapour) Lamp, Sodium (Vapour) Lamp.\n\n\nReference:
    C.I.E."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
