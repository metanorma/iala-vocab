id: 2-3-355-eng
termid: 2-3-355
language_code: eng
terms:
- type: expression
  designation: Low Pressure Sodium (Vapour) Lamp
  normative_status: preferred
definition:
- content: |-
    A sodium vapour lamp in which the partial pressure of the vapour during operation is not above a few newtons per square metre.


    Reference: C.I.E.
