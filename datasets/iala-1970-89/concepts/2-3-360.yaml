id: 2-3-360-eng
termid: 2-3-360
language_code: eng
terms:
- type: expression
  designation: High Pressure Sodium (Vapour) Lamp
  normative_status: preferred
definition:
- content: |-
    A sodium vapour lamp in which the partial pressure of the vapour during operation is of the order of 104newtons per square metre (0.1 atmosphere).


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
