id: 2-3-385-eng
termid: 2-3-385
language_code: eng
terms:
- type: expression
  designation: Arc (Discharge)
  normative_status: preferred
definition:
- content: |-
    A luminous discharge of electricity across a gas, characterised by a large current and a low voltage gradient, often accompanied by partial volatilisation of the electrodes.


    Reference: I.E.C.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
