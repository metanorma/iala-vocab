id: 2-3-400-eng
termid: 2-3-400
language_code: eng
terms:
- type: expression
  designation: Carbon Arc Lamp
  normative_status: preferred
definition:
- content: |-
    A low current density arc lamp with carbon electrodes not containing any other material.



    Note: In Germany, the term Kohlebogenlampe covers all arc lamps with carbon electrodes of any composition.


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
