  designation: Flame Arc Lamp
  normative_status: preferred
definition:
- content: High current density arc lamp with carbon electrodes containing other substances
    which, volatilizing in the flame, contribute to the radiation so that the spectral
    distribution is altered or the luminous efficacy improved.
