id: 2-3-415-eng
termid: 2-3-415
language_code: eng
terms:
- type: expression
  designation: High Pressure Arc Discharge Lamp
  normative_status: preferred
definition:
- content: An arc lamp in which the discharge takes place in a gas or vapour at a
    pressure above atmospheric. Almost all the emitted light originates from the arc
    itself.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
