id: 2-3-420-eng
termid: 2-3-420
data:
  language_code: eng
terms:
- type: expression
  designation: Short-Arc Lamp
  normative_status: preferred
definition:
- content: |-
    A discharge lamp in which the distance between the electrodes is small (of the order 1 to 10mm).

    Short-arc lamps are also called Compact-Source Arc Discharge Lamps and are particularly suitable as a light source in optical apparatus for the production of narrow beams.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
  modification: modified from source
notes:
- content: This type of lamp (mercury or xenon for example) is generally of a high
    or extra high pressure.
