id: 2-3-430-eng
termid: 2-3-430
language_code: eng
terms:
- type: expression
  designation: Halide Lamp
  normative_status: preferred
definition:
- content: |-
    A discharge lamp in which light is produced by the radiation from a mixture of a metallic vapour (for example, mercury) and the products of the dissociation of halides (for example, halides of thallium, indium or sodium).


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
