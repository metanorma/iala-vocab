id: 2-3-440-eng
termid: 2-3-440
language_code: eng
terms:
- type: expression
  designation: Life (of a lamp)
  normative_status: preferred
definition:
- content: |-
    The time during which a lamp has been operated before becoming useless or considered as such according to certain specifications.



    Note: The life of a lamp is generally expressed in hours.


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
