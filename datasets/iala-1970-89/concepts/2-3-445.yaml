terms:
- type: expression
  designation: Useful Life (of a lamp)/es
  normative_status: preferred
definition:
- content: |-
    Vida útil (de una lámpara)



    El tiempo durante el cual el flujo luminoso emitido por la lámpara excede una proporción especificada de su valor inicial.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
