id: 2-3-445-eng
termid: 2-3-445
language_code: eng
terms:
- type: expression
  designation: Useful Life (of a lamp)
  normative_status: preferred
definition:
- content: The length of time during which the luminous flux emitted by the lamp exceeds
    a specified proportion of its initial value.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
