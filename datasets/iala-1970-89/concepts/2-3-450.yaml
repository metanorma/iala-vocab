id: 2-3-450-eng
termid: 2-3-450
language_code: eng
terms:
- type: expression
  designation: Rated Life (of a lamp)
  normative_status: preferred
definition:
- content: |-
    Alternative term: Expected Life (of a lamp)


    A predicted value for the life of a given type of lamp, obtained by statistical methods based on the life tests.



    Note: The term Average Life is sometimes loosely used for "rated life".
sources:
- type: authoritative
  origin:
