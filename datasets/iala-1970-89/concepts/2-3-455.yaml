id: 2-3-455-eng
termid: 2-3-455
language_code: eng
terms:
- type: expression
  designation: Life Test
  normative_status: preferred
definition:
- content: |-
    A test in which lamps are operated under specified conditions for a specified time or to the end of life and during which photometric measurements may be made at specified intervals.


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
