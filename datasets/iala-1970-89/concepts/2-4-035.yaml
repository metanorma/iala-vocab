id: 2-4-035-eng
termid: 2-4-035
language_code: eng
terms:
- type: expression
  designation: Optic rotation mechanism
  normative_status: preferred
definition:
- content: |-
    No English Term


    The mechanism which rotates the optic or revolving screen in a flashing or occulting light.



    Note: The terms Lens Clock and, in French, Machine de Rotation a Poids refer to such a mechanism when driven by a falling weight.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
