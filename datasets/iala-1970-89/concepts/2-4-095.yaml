id: 2-4-095-eng
termid: 2-4-095
language_code: eng
terms:
- type: expression
  designation: Lamp Changer
  normative_status: preferred
definition:
- content: |-
    Alternative term: Lamp Exchanger (G.B.)


    A mechanism, usually operated automatically, which replaces one lamp by another in service in a light.


    Most usually this is done when the first lamp has failed in service.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
