id: 2-4-095-spa
termid: 2-4-095
language_code: spa
terms:
- type: expression
  designation: Lamp Changer/es
  normative_status: preferred
definition:
- content: |-
    Cambiador de lámpara



    Término alternativo: Cambia-lámpara (G.B.)





    Mecanismo generalmente automático que reemplaza una lámpara por otra en servicio en una luz.


    Normalmente esto ocurre cuando falla la primera lámpara en servicio.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
