id: 2-4-100-eng
termid: 2-4-100
language_code: eng
terms:
- type: expression
  designation: Flasher
  normative_status: preferred
definition:
- content: |-
    A device which, in a rhythmic light, interrupts the supply of energy (in the form of fuel or electric current) to a light source, according to the character of the light.



    Note: A flasher is a form of coder.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
---
id: 2-4-100-spa
termid: 2-4-100
language_code: spa
terms:
- type: expression
  designation: Flasher/es
  normative_status: preferred
definition:
- content: |-
    Destellador



    Dispositivo que en una luz rítmica, interrumpe el suministro de energía (en forma de combustible o corriente eléctrica) de la fuente luminosa de acuerdo con su característica.





    Nota: Un destellador es en cierto modo un codificador.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
