id: 2-4-110-eng
termid: 2-4-110
language_code: eng
terms:
- type: expression
  designation: Occulting Hood
  normative_status: preferred
definition:
- content: |-
    (Occulting) Hood


    An opaque cover brought down over the light source in an optical apparatus to obscure it for a short period.


    Most commonly used in occulting lights and in signalling projectors.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
