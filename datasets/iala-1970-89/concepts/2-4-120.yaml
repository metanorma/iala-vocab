id: 2-4-120-eng
termid: 2-4-120
language_code: eng
terms:
- type: expression
  designation: Revolving Screen
  normative_status: preferred
definition:
- content: An opaque screen, usually of cylindrical form with apertures revolving
    about a vertical axis in such a way as to interrupt the light from a luminous
    source in an optic, and so to produce a desired rhythmic light.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
