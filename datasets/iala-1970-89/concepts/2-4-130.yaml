id: 2-4-130-eng
termid: 2-4-130
language_code: eng
terms:
- type: expression
  designation: Cut-off screen
  normative_status: preferred
definition:
- content: |-
    No English Term


    An opaque screen covering part of a lantern, or placed outside the lantern, so as to provide a sharp cut-off to a beam in a sector light and to reduce the angle of uncertainty.



    Note: This is a particular form of "cut screen".
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
