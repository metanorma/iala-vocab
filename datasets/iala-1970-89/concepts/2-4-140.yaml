id: 2-4-140-eng
termid: 2-4-140
language_code: eng
terms:
- type: expression
  designation: Radial Screens
  normative_status: preferred
definition:
- content: Opaque screens placed along lines radiating from the source or from a panel
    in an optical apparatus, especially to reduce stray light.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
