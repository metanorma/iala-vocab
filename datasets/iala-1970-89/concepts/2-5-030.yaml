  designation: Unwatched Light
  normative_status: preferred
definition:
- content: |-
    Alternative term: Unmanned Light (U.S.A.)


    A light which is operated automatically and may be maintained in service automatically for extended periods of time, but with routine visits for maintenance purposes.
