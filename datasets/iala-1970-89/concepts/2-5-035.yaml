id: 2-5-035-eng
termid: 2-5-035
language_code: eng
terms:
- type: expression
  designation: Remotely Controlled Light
  normative_status: preferred
definition:
- content: A light which is operated by personnel at a considerable distance from
    the light, through the intermediary of electrical or radio links or both.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
