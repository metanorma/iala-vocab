id: 2-5-075-eng
termid: 2-5-075
language_code: eng
terms:
- type: expression
  designation: Emergency Light
  normative_status: preferred
definition:
- content: |-
    A light put into service in emergency when the permanent or stand-by light has failed.


    It often provides a reduced service in comparison with the permanent light.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
