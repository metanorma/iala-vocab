id: 2-5-085-eng
termid: 2-5-085
language_code: eng
terms:
- type: expression
  designation: Standby Lamp
  normative_status: preferred
definition:
- content: A lamp brought into service in the event of failure of the lamp in regular
    service. It may often be brought into service automatically.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
