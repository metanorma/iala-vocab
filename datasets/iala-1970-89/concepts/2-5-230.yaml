id: 2-5-230-eng
termid: 2-5-230
language_code: eng
terms:
- type: expression
  designation: Angle of Uncertainty
  normative_status: preferred
definition:
- content: the angle of uncertainty is the region where the colour and/or the flash
    rhythm change and where the resulting colour of the light is mixed/affected by
    two colours, or showing fading intensity due to a blanking screen.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
