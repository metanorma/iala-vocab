id: 2-6-020-eng
termid: 2-6-020
data:
  language_code: eng
terms:
- type: expression
  designation: Coastal Mark
  normative_status: preferred
definition:
- content: |-
    Coastal Aid

    A mark placed on the coast to assist coastal navigation. Particularly used with reference to marks placed on a long straight coastline devoid of many natural landmarks.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: In French, a lighted coastal mark is called Feu de Jalonnement {{2-5-055,
    Lighted coastal mark}}.
