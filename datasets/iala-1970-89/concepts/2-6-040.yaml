id: 2-6-040-eng
termid: 2-6-040
language_code: eng
terms:
- type: expression
  designation: Pole Beacon
  normative_status: preferred
definition:
- content: |-
    A vertical spar fixed in the ground or in the sea-bed or a river bed to show as a navigation mark.






    Note: Sometimes called a Spindle or a Single-Pile Beacon in the U.S.A.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
