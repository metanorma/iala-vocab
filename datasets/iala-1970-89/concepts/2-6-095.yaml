id: 2-6-095-eng
termid: 2-6-095
language_code: eng
terms:
- type: expression
  designation: Landfall Mark (or Buoy)
  normative_status: preferred
definition:
- content: |-
    The first mark (or buoy) seen by an observer approaching the land from the open sea.


    It usually serves to indicate the seaward approach to a harbour, river or estuary.






    Note: In the U.S.A. this is also sometimes called a Sea-Buoy.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
