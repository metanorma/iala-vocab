id: 2-6-145-eng
termid: 2-6-145
language_code: eng
terms:
- type: expression
  designation: Two buoys mored not abreast in a channel
  normative_status: preferred
definition:
- content: |-
    No English Term (2009: Staggered buoys)


    Term applied to buoys moored on either hand of the path of shipping in a channel, such that port hand and starboard hand buoys are not abreast but occur alternately at nearly equal intervals of distance. (Fig. 55b)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
