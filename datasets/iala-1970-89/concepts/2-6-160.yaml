id: 2-6-160-eng
termid: 2-6-160
language_code: eng
terms:
- type: expression
  designation: Tide Signals
  normative_status: preferred
definition:
- content: |-
    Signals showing to navigators the state or change of the tide according to a prearranged code, or by direct display on a scale.



    Note: The German term Wasserstandanzeiger is also used for similar signals in non-tidal waters.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
