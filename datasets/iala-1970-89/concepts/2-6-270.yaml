id: 2-6-270-eng
termid: 2-6-270
language_code: eng
terms:
- type: expression
  designation: Retro-Reflector
  normative_status: preferred
definition:
- content: |-
    Alternative term: Reflex Reflector


    A device intended to produce reflex reflection (2-1-155), at least for a limited range of angles of incidence of a light beam.


    It may comprise one or more retro-reflecting optical units, for example, corner reflectors or special lens units of glass or plastic. Such devices may be installed generally on unlighted buoys or other navigational aids to increase the range at which they may be seen at night.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
