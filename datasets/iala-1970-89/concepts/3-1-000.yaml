id: 3-1-000-eng
termid: 3-1-000
language_code: eng
terms:
- type: expression
  designation: Sound
  normative_status: preferred
definition:
- content: |-
    1. The sensation of hearing excited by an acoustic oscillation.


    2. An acoustic oscillation of such a character as to be capable of exciting the sensation of hearing.



    Reference: I.E.C.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
