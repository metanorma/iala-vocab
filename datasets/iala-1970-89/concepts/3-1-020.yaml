id: 3-1-020-eng
termid: 3-1-020
language_code: eng
terms:
- type: expression
  designation: Acoustic noise
  normative_status: preferred
definition:
- content: |-
    1. Any disagreeable or undesired sound.


    2. A class of sounds, generally of a random nature, which do not exhibit clearly defined frequency components.



    Reference: I.E.C.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
