id: 3-1-025-eng
termid: 3-1-025
language_code: eng
terms:
- type: expression
  designation: Sound signal
  normative_status: preferred
definition:
- content: |-
    a devise which transmits sound, intended to provide information to mariners during periods of restricted visibility.



    Note: The term "Sound signal" is frequently used to describe the apparatus generating the sound. This use is deprecated.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
