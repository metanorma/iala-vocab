id: 3-1-085-eng
termid: 3-1-085
language_code: eng
terms:
- type: expression
  designation: Volume velocity
  normative_status: preferred
definition:
- content: |-
    Volume velocity (across a surface element)


    The product of the area of the surface element and the component of the sound particle velocity perpendicular to the surface.



    Reference: I.E.C.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
