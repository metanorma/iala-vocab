id: 3-1-095-eng
termid: 3-1-095
language_code: eng
terms:
- type: expression
  designation: Instantaneous sound power per unit area
  normative_status: preferred
definition:
- content: |-
    Instantaneous sound energy flux per unit area


    The quotient of the instantaneous sound power transmitted across a surface element and the area of the surface element.



    Reference: I.E.C. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
