id: 3-1-110-eng
termid: 3-1-110
language_code: eng
terms:
- type: expression
  designation: Sound power level
  normative_status: preferred
definition:
- content: |-
    Sound power level (of a sound source, in decibels)


    Ten times the logarithm to the base 10 of the ratio of the sound power radiated by the source to the reference sound power (1 picowatt or 10-12 watt).
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
