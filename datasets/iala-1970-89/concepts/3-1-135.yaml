id: 3-1-135-eng
termid: 3-1-135
language_code: eng
terms:
- type: expression
  designation: Principal axis
  normative_status: preferred
definition:
- content: "Principal axis (of a sound source or receiver) \n\n\nGenerally the axis
    of structural symmetry or the direction of maximum emission or response. \n\n\nReference
    direction serving as an origin for angular co-ordinates used in describing the
    directional characteristics of the sound source or receiver.\n\n\n\nReference:
    I.E.C. (modified)"
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
