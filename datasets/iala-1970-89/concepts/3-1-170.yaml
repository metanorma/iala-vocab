id: 3-1-170-eng
termid: 3-1-170
language_code: eng
terms:
- type: expression
  designation: Pitch
  normative_status: preferred
definition:
- content: "That attribute of the auditory sensation in terms of which sounds may
    be ordered on a scale extending from low to high. \n\n\nPitch depends primarily
    upon the frequency of the sound stimulus, but it also depends upon the sound pressure
    and waveform of the stimulus.\n\n\nReference: ANSI"
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
