id: 3-1-175-eng
termid: 3-1-175
language_code: eng
terms:
- type: expression
  designation: Timbre
  normative_status: preferred
definition:
- content: |-
    That subjective quality of a sound which enables a listener to judge that two sounds having the same loudness and pitch are dissimilar.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
