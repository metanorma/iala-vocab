id: 3-1-180-eng
termid: 3-1-180
language_code: eng
terms:
- type: expression
  designation: Loudness
  normative_status: preferred
definition:
- content: |-
    The attribute of intensity of an auditory sensation in terms of which sounds may be ordered on a scale extending from soft to loud.



    Note: The unit of loudness is the Sone.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
