id: 3-1-190-eng
termid: 3-1-190
language_code: eng
terms:
- type: expression
  designation: Loudness level
  normative_status: preferred
definition:
- content: |-
    Alternative term: Equivalent loudness


    The loudness level of a sound is the sound pressure level of a standard pure tone (1000 Hz) which, according to the median value of judgements of normal observers, is assessed as being equally loud with the sound.



    Note: The unit of loudness level is the Phon.


    Reference: C.E.F.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
