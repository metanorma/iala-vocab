id: 3-1-240-eng
termid: 3-1-240
language_code: eng
terms:
- type: expression
  designation: Excess attenuation
  normative_status: preferred
definition:
- content: The difference between the total reduction in sound pressure level during
    the propagation of a sound and that due to the spherical divergence loss.
