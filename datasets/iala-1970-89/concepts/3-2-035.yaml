  designation: Sound emitter - Electrodynamic
  normative_status: preferred
definition:
- content: |-
    Electrodynamic (sound) emitter


    A (sound) emitter which depends for its operation on the motion of a conductor, joined to a diaphragm and carrying a varying current, n a steady magnetic field.
