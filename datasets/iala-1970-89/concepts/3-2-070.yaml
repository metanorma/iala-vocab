id: 3-2-070-eng
termid: 3-2-070
language_code: eng
terms:
- type: expression
  designation: Siren
  normative_status: preferred
definition:
- content: a deep sounding warning in which the sound is produced by the passage of
    air across slits or holes in a rotating disc, in which the membrane is activated
    electrically
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
