id: 3-2-105-eng
termid: 3-2-105
language_code: eng
terms:
- type: expression
  designation: Horn
  normative_status: preferred
definition:
- content: |-
    Alternative term: Trumpet


    A flared tube designed to match the acoustic impedance to the impedance of the atmosphere; it can behave as a resonator and can influence the directivity; the narrow end is called the throat and the large end the mouth.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
