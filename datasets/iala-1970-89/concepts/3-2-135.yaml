id: 3-2-135-eng
termid: 3-2-135
language_code: eng
terms:
- type: expression
  designation: Diaphone - Cylinder
  normative_status: preferred
definition:
- content: |-
    Cylinder (of a diaphone)


    The fixed part of the modulator in which one part of the double piston slides; the modulation of the air is obtained by action of the slots on the two parts of the modulator moving in and out of concidence.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
