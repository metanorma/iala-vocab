id: 3-2-155-eng
termid: 3-2-155
language_code: eng
terms:
- type: expression
  designation: Diaphragm
  normative_status: preferred
definition:
- content: |-
    Diaphragm (in a compressed-air diaphragm horn)


    A flexible disc supported at its periphery which constitutes the moving part of the valve which admits compressed air to the throat of the horn.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
