id: 3-2-180-eng
termid: 3-2-180
language_code: eng
terms:
- type: expression
  designation: Sound emitter - Diaphragm
  normative_status: preferred
definition:
- content: "Diaphragm (in an electrodynamic or electromagnetic sound emitter) \n\n\nThat
    part of the emitter which forms the principal sound radiating or receiving element;
    it usually consists of a rigid or semirigid membrane specially adapted to respond
    to or to generate sound."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
