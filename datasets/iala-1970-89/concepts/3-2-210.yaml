id: 3-2-210-eng
termid: 3-2-210
language_code: eng
terms:
- type: expression
  designation: Re-entrant horn
  normative_status: preferred
definition:
- content: A horn which is shortened by causing the sound to pass through coaxial
    channels successively in forward and backward directions one or more times.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
