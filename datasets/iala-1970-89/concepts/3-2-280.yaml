id: 3-2-280-eng
termid: 3-2-280
language_code: eng
terms:
- type: expression
  designation: Tapper
  normative_status: preferred
definition:
- content: |-
    Tapper (U.S.A.)


    A heavy pendulum suspended outside a bell which sets the bell in vibration by striking it.



    Note: A tapper is a form of hammer (3-2-285).
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
