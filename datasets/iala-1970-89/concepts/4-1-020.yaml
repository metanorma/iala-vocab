language_code: eng
terms:
- type: expression
  designation: Radio receiver
  normative_status: preferred
definition:
- content: |-
    A device connected to an antenna or other receptor of radio signals in order to make available in some desired form the required information content of the signals.


    Reference: B.S. (modified)
