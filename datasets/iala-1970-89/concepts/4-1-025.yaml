id: 4-1-025-eng
termid: 4-1-025
language_code: eng
terms:
- type: expression
  designation: Station
  normative_status: preferred
definition:
- content: |-
    One or more transmitters or receivers, or a combination of transmitters and receivers, including the accessory equipment necessary at one location, for carrying on a radiocommunication service. Each station is classified by the service in which it operates permanently or temporarily.


    Reference: I.T.U. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
