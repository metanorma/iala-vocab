id: 4-1-040-eng
termid: 4-1-040
language_code: eng
terms:
- type: expression
  designation: Reference frequency
  normative_status: preferred
definition:
- content: |-
    A frequency having a fixed and specified position with respect to the assigned frequency. The displacement of this frequency, with respect to the assigned frequency, has the same absolute value and sign that the displacement of the characteristic frequency has with respect to the centre of the frequency band occupied by the emission.


    Reference: I.T.U.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
