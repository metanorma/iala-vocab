id: 4-1-055-eng
termid: 4-1-055
language_code: eng
terms:
- type: expression
  designation: Assigned frequency band
  normative_status: preferred
definition:
- content: The frequency band the centre of which coincides with the frequency assigned
    to the station and the width of which equals the necessary bandwidth plus twice
    the absolute value of the frequency tolerance.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
