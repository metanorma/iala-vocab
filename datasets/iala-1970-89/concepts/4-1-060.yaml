id: 4-1-060-eng
termid: 4-1-060
language_code: eng
terms:
- type: expression
  designation: Occupied bandwidth
  normative_status: preferred
definition:
- content: |-
    The frequency bandwidth such that, below its lower and above its upper frequency limits, the mean powers radiated are each equal to 0.5% of the total mean power radiated by a given emission. In some cases, for example multi-channel frequency-division systems, the percentage of 0.5% may lead to certain difficulties in the practical application of the definitions of occupied and necessary bandwidth; in such cases a different percentage may prove useful.


    Reference: I.T.U.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
