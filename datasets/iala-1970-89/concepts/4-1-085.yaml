id: 4-1-085-eng
termid: 4-1-085
language_code: eng
terms:
- type: expression
  designation: Peak envelope power
  normative_status: preferred
definition:
- content: |-
    (of a radio transmitter)


    The average power supplied to the antenna transmission line by a transmitter during one radio frequency cycle at the highest crest of the modulation envelope, taken under conditions of normal operation.


    Reference: I.T.U.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
