id: 4-1-090-eng
termid: 4-1-090
data:
  language_code: eng
terms:
- type: expression
  designation: Mean power
  normative_status: preferred
- type: expression
  designation: Mean power (of a radio transmitter)
  normative_status: admitted
definition:
- content: The power supplied to the antenna transmission line by a transmitter during
    normal operation, averaged over a time sufficiently long compared with the period
    of the lowest frequency encountered in the modulation. A time of 1/10 second during
    which the mean power is greatest will be selected normally.
