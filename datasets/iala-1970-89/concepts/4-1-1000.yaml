id: 4-1-1000-eng
termid: 4-1-1000
language_code: eng
terms:
- type: expression
  designation: Tropospheric radio duct
  normative_status: preferred
definition:
- content: |-
    A quasi-horizontal layer in the troposphere between the boundaries of which radio energy of a sufficiently high frequency is substantially confined and propagated with abnormally low attenuation.


    Reference: C.C.I.R.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
