id: 4-1-1065-eng
termid: 4-1-1065
language_code: eng
terms:
- type: expression
  designation: Intensity modulation
  normative_status: preferred
definition:
- content: A presentation employed in certain types of cathode ray tube displays by
    which the luminance of the trace is a function of the amplitude of the applied
    signal.
