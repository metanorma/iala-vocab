id: 4-1-185-eng
termid: 4-1-185
language_code: eng
terms:
- type: expression
  designation: Skywave correction
  normative_status: preferred
definition:
- content: |-
    A correction for skywave propagation errors applied to measured position data.


    The amount of the correction is established on the basis of an assumed position and an average ionosphere height.


    Reference: I.R.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
