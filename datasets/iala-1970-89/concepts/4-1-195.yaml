id: 4-1-195-eng
termid: 4-1-195
language_code: eng
terms:
- type: expression
  designation: Jitter
  normative_status: preferred
definition:
- content: |-
    Small rapid variations in a waveform due to mechanical disturbances or to changes in the supply voltages, in the characteristics of components, or in faulty adjustment etc.


    Reference: I.R.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
