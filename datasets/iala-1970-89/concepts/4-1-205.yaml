id: 4-1-205-eng
termid: 4-1-205
language_code: eng
terms:
- type: expression
  designation: Pulse rise time
  normative_status: preferred
definition:
- content: |-
    The interval between the instants at which the instantaneous amplitude of a pulse first reaches specified lower and upper limits, namely 10% and 90% of the peak pulse amplitude unless otherwise stated.


    Reference: B.S. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
