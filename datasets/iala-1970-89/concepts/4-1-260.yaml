id: 4-1-260-eng
termid: 4-1-260
language_code: eng
terms:
- type: expression
  designation: Effective length
  normative_status: preferred
definition:
- content: |-
    For a simple antenna, the quotient of the open circuit voltage delivered by the antenna, and the field strength, the antenna being oriented to give maximum response.


    Reference: B.S. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
