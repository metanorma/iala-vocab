id: 4-1-265-eng
termid: 4-1-265
data:
  language_code: eng
  terms:
  - type: expression
    designation: Antenna radiation resistance
    normative_status: preferred
  definition:
  - content: For any given reference point on the antenna, the power radiated by the
      antenna divided by the mean square value of the current at the reference point.
  notes:
  - content: The reference point is usually the feed point or a current antinode.
      It should always be specified.
