id: 4-1-275-eng
termid: 4-1-275
language_code: eng
terms:
- type: expression
  designation: Radiation field
  normative_status: preferred
definition:
- content: |-
    The part of the field of an antenna which is associated with an average outward flow of energy.



    Note: In the absence of absorption the field varies in this region inversely as the distance from the antenna.


    Reference: B.S. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
