id: 4-1-280-eng
termid: 4-1-280
language_code: eng
terms:
- type: expression
  designation: Induction field
  normative_status: preferred
definition:
- content: |-
    That part of the field of an antenna which is associated with a pulsation of energy to and fro between the antenna and the medium.



    Note: The induction field extends theoretically over the whole of space, but is negligible compared with the radiation field except in the neighbourhood of the antenna.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
