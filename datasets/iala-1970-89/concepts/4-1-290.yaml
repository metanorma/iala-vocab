id: 4-1-290-eng
termid: 4-1-290
language_code: eng
terms:
- type: expression
  designation: Electric field strength
  normative_status: preferred
definition:
- content: |-
    Electric field intensity (deprecated)


    The magnitude of the electric field vector. The term usually refers to the root-mean-square value of the field.



    Note: This term is sometimes called Electric field intensity but such use of the word intensity is deprecated in favour of Field strength since intensity connotes power in optics and radiation.


    Reference: I.R.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
