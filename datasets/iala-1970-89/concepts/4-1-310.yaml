id: 4-1-310-eng
termid: 4-1-310
language_code: eng
terms:
- type: expression
  designation: Fresnel region
  normative_status: preferred
definition:
- content: |-
    For a transmitting antenna system, the region near the antenna system where the wavelets arriving from the various parts of the system cannot be considered to follow parallel paths.


    Reference: B.S. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
