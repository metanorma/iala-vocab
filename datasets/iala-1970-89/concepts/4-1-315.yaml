id: 4-1-315-eng
termid: 4-1-315
language_code: eng
terms:
- type: expression
  designation: Aperture
  normative_status: preferred
definition:
- content: |-
    Aperture (of a directional antenna)


    That portion of a plane surface near the antenna, perpendicular to the direction of maximum radiation, through which the major part of the radiation passes.


    Reference: I.R.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
