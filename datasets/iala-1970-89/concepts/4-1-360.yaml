language_code: eng
terms:
- type: expression
  designation: Gain function
  normative_status: preferred
definition:
- content: |-
    Gain function (G.B.)


    Directive gain (U.S.A.)


    For a given direction, 4PI times the ratio of the radiation intensity in that direction to the total power radiated by the antenna.


    Reference: I.R.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
