id: 4-1-515-eng
termid: 4-1-515
data:
  language_code: eng
  terms:
  - type: expression
    designation: Yagi antenna
    normative_status: preferred
  definition:
  - content: An antenna comprising one primary or fed element and two or more secondary
      or parasitic elements lying parallel to it in a single plane so as to constitute
      an end fire array. The usual arrangement of secondary elements consists of one
      reflector and one or more directors.
