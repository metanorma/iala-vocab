id: 4-1-530-eng
termid: 4-1-530
language_code: eng
terms:
- type: expression
  designation: Waveguide
  normative_status: preferred
definition:
- content: |-
    A system consisting of


    a. a metal tube


    b. a dielectric rod or tube, or


    c. a single wire


    for the transmission of electromagnetic energy by a wave not of TEM type.


    Reference: D.I.N. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
