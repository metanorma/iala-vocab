id: 4-1-560-eng
termid: 4-1-560
language_code: eng
terms:
- type: expression
  designation: Parabolic antenna
  normative_status: preferred
definition:
- content: |-
    An antenna comprising a reflector whose shape is that of a paraboloid of revolution or a parabolic cylinder, and a feed usually situated approximately at the focus of the reflector (if of the first type) or on the focal line of the reflector (if of the second type).


    Reference: B.S. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
