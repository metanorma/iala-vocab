id: 4-1-570-eng
termid: 4-1-570
language_code: eng
terms:
- type: expression
  designation: Vertex plate
  normative_status: preferred
definition:
- content: |-
    Vertex plate (of a reflector)


    A plate placed near the vertex of a reflector to prevent undesired reflection back to the primary radiator.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
