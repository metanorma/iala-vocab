id: 4-1-590-eng
termid: 4-1-590
language_code: eng
terms:
- type: expression
  designation: Radio Lens
  normative_status: preferred
definition:
- content: |-
    Lens (in radio)


    A structure substantially transparent to radio waves but which inserts a non-uniform phase delay over the cross-section of an aperture so as to effect a convergence (or divergence) of the radio wave. Such structures may employ dielectric or metallic configurations.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
