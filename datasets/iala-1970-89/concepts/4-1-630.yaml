  designation: Tank circuit (G.B.)
  normative_status: preferred
definition:
- content: |-
    Tank circuit (G.B.)


    The tuned circuit in the anode circuit of the final stage of a transmitter which supplies the radio-frequency energy to the antenna or antenna feeder.


    Reference: B.S. (modified)
