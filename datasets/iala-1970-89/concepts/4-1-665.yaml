id: 4-1-665-eng
termid: 4-1-665
language_code: eng
terms:
- type: expression
  designation: Transmitter load
  normative_status: preferred
definition:
- content: |-
    Load (of a radio transmitter)


    Output load (of a radio transmitter)


    The output termination into which the radio energy from the transmitter flows.



    Note: This may be an antenna, a feeder system, or, for test purposes, an artificial antenna.
