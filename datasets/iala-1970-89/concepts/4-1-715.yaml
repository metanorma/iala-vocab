id: 4-1-715-eng
termid: 4-1-715
language_code: eng
terms:
- type: expression
  designation: Beat frequency oscillator
  normative_status: preferred
definition:
- content: |-
    Acronym: B.F.O.


    In superheterodyne reception, the adjustable oscillator which, when heterodyned with the output of the final intermediate frequency stage, serves to translate an A-1 signal to the audio frequency range.
sources:
- type: authoritative
  origin:
