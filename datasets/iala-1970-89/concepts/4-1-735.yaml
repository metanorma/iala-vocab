id: 4-1-735-eng
termid: 4-1-735
language_code: eng
terms:
- type: expression
  designation: Selectivity
  normative_status: preferred
definition:
- content: |-
    The ability of a receiver to discriminate, by frequency dependent selection, between a desired signal and co-existent undesired signals at other frequencies.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
