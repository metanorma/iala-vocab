id: 4-1-775-eng
termid: 4-1-775
data:
  language_code: eng
terms:
- type: expression
  designation: Automatic gain control
  normative_status: preferred
definition:
- content: |-
    Acronym: A.G.C.

    Automatic volume control (deprecated)

    Circuits incorporated in the receiver and actuated by the received signal, which cause the gain of the receiver to vary substantially inversely as the magnitude of the radio-frequency input so as to maintain the output level substantially constant for a given modulation factor.
