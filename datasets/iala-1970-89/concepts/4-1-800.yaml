id: 4-1-800-eng
termid: 4-1-800
language_code: eng
terms:
- type: expression
  designation: Detector (U.S.A.)
  normative_status: preferred
definition:
- content: |-
    1. A device to effect the process of detection.


    2. A mixer in a superheterodyne receiver.



    Note: In definition 2, the device is often referred to as a First detector and the device is not used for detection as defined above.


    Reference: I.R.E.
