id: 4-1-810-eng
termid: 4-1-810
language_code: eng
terms:
- type: expression
  designation: Square law detector
  normative_status: preferred
definition:
- content: A detector which demodulates small signals and whose output voltage is
    substantially proportional to the square of the voltage of the modulated input
    wave.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
