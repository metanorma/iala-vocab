id: 4-1-820-eng
termid: 4-1-820
data:
  language_code: eng
  terms:
  - type: expression
    designation: Electromagnetic waves
    normative_status: preferred
  definition:
  - content: The waves which occur in the natural process by which electric and magnetic
      effects are propagated. Electromagnetic waves are known as Hertzian waves, infra-red
      rays, light, ultra-violet rays, X-rays, etc., depending on their frequencies.
