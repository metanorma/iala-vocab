id: 4-1-890-eng
termid: 4-1-890
language_code: eng
terms:
- type: expression
  designation: Modified refractive index
  normative_status: preferred
definition:
- content: |-
    For a given height above sea level the sum of the refractive index of the air at this height and the ratio of the height to the radius of the earth.


    Reference: C.C.I.R.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
