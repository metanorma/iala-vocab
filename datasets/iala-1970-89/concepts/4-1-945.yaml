id: 4-1-945-eng
termid: 4-1-945
language_code: eng
terms:
- type: expression
  designation: Radio horizon
  normative_status: preferred
definition:
- content: |-
    The locus of points at which direct rays from the antenna become tangential to the earth's surface, taking into account the curvature due to refraction.


    Reference: C.C.I.R.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
