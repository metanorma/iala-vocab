id: 4-1-975-eng
termid: 4-1-975
language_code: eng
terms:
- type: expression
  designation: Surface wave
  normative_status: preferred
definition:
- content: A wave which is propagated along the boundary between two media in a manner
    determined by the properties of the two media in the vicinity of the boundary.
