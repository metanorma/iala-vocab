id: 4-2-020-eng
termid: 4-2-020
language_code: eng
terms:
- type: expression
  designation: Identification signal
  normative_status: preferred
definition:
- content: A letter or group of letters in morse code or some other combination of
    dots or dashes or both introduced into the transmission to identify the beacon.
    In some cases two tones are employed.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
