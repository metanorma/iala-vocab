id: 4-2-070-eng
termid: 4-2-070
language_code: eng
terms:
- type: expression
  designation: Adcock direction finder
  normative_status: preferred
definition:
- content: |-
    A form of spaced antenna direction finder for bearing determination embodying one or more pairs of spaced vertical antennas, the members of each pair being differentially interconnected by transmission line.



    Note: The object of the design is to minimise response of the system to the horizontally polarised component of the electric field.


    Reference: B.S. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
