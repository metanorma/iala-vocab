id: 4-2-105-eng
termid: 4-2-105
language_code: eng
terms:
- type: expression
  designation: Spaced antenna direction finder
  normative_status: preferred
definition:
- content: |-
    A direction finder whose action depends on the comparison of signals received by two or more similar antennas with their centres separated in space.


    Reference: B.S. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
