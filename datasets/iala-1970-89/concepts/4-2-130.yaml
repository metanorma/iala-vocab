id: 4-2-130-eng
termid: 4-2-130
language_code: eng
terms:
- type: expression
  designation: Direction finding site
  normative_status: preferred
definition:
- content: |-
    Acronym: D.F. site


    The environment, within some specified boundary, of a direction finder.



    Note: The boundary is often taken as a circle with a radius expressed in wavelengths.


    Reference: B.S.
