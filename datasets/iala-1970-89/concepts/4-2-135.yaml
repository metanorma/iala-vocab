language_code: eng
terms:
- type: expression
  designation: Spacing (Antenna)
  normative_status: preferred
definition:
- content: |-
    (Antenna) Spacing


    The distance between the centres of a specified pair of antennas in a spaced antenna direction finder; often expressed in terms of the wavelength in use.


    Reference: B.S. (modified)
