id: 4-2-160-eng
termid: 4-2-160
language_code: eng
terms:
- type: expression
  designation: Radiogoniometer
  normative_status: preferred
definition:
- content: |-
    An instrument which, when coupled to a suitable fixed antenna system, enables the bearing of incident waves to be determined by rotation of a movable part.



    Note: Two types of radiogoniometer are used, either capacitive or inductive.


    Reference: B.S. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
