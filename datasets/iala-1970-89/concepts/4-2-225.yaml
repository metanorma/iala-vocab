id: 4-2-225-eng
termid: 4-2-225
language_code: eng
terms:
- type: expression
  designation: Bad-bearing sector
  normative_status: preferred
definition:
- content: |-
    A sector relative to a given direction-finding station or radio beacon station within which bearings are known to be liable to serious errors of unknown magnitude.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
