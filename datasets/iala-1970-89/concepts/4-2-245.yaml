id: 4-2-245-eng
termid: 4-2-245
language_code: eng
terms:
- type: expression
  designation: Error curve
  normative_status: preferred
definition:
- content: |-
    Error curve (of a direction finder)


    A curve applicable to a particular direction finder and which shows the installation errors as a function of some specified variable.



    Note: Use is commonly made of a family of such error curves as a function of true bearing with frequency as the parameter.
sources:
- type: authoritative
  origin:
