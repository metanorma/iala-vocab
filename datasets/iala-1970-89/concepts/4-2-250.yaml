id: 4-2-250-eng
termid: 4-2-250
language_code: eng
terms:
- type: expression
  designation: Correction curve
  normative_status: preferred
definition:
- content: |-
    Correction curve (of a direction finder)


    A curve applicable to a particular direction finder and which shows the correction required to      the observed bearings, as a function of that bearing and the frequency to eliminate the systematic installation errors.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
