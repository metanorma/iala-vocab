id: 4-2-295-eng
termid: 4-2-295
language_code: eng
terms:
- type: expression
  designation: Field alignment error
  normative_status: preferred
definition:
- content: |-
    A form of site error caused by the direction finder antenna system not being mounted on the fore and aft line of the ship or caused by asymmetry in the structure of the vessel.


    Reference: B.S. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
