id: 4-2-305-eng
termid: 4-2-305
data:
  language_code: eng
terms:
- type: expression
  designation: Lateral deviation
  normative_status: preferred
definition:
- content: The deviation of a ray from the great circle plane containing the point
    of observation and the transmitter.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: Such deviation can occur, for example, as a result of reflection from a
    tilted ionospheric layer, by reflection from a mountain or cliff or by coastal
    refraction.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Lateral_deviation
