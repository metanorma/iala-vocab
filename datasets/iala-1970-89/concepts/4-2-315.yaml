  designation: Loop alignment error
  normative_status: preferred
definition:
- content: |-
    Inaccurate alignment of the loop antenna system with respect to the datum line. Usually in ships, inaccurate alignment with respect to fore and aft line.


    Reference: B.S. (modified)
