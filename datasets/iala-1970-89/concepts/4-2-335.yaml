id: 4-2-335-eng
termid: 4-2-335
language_code: eng
terms:
- type: expression
  designation: Re-radiation error
  normative_status: preferred
definition:
- content: |-
    A form of site error caused by re-radiation from adjacent conducting objects and from loops formed by those objects.



    Note: This error is allowed for in calibration, provided the calibration takes account of frequency.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
