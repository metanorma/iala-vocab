id: 4-2-360-eng
termid: 4-2-360
language_code: eng
terms:
- type: expression
  designation: Standard wave error
  normative_status: preferred
definition:
- content: |-
    The total polarization error produced by a plane wave incident at an angle of elevation of 45 degrees  and having equal vertically and horizontally polarized components.



    Note: As a criterion of performance the term is not appropriate to direction finders employing elevated antenna systems.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
