id: 4-2-365-eng
termid: 4-2-365
language_code: eng
terms:
- type: expression
  designation: Wave interference error
  normative_status: preferred
definition:
- content: |-
    Wave interference error (in bearing)


    Heiligtag effect (deprecated)


    An error arising from the simultaneous reception of two or more waves arriving in different directions from a single transmitter.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
