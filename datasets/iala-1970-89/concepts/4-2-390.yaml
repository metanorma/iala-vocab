id: 4-2-390-eng
termid: 4-2-390
language_code: eng
terms:
- type: expression
  designation: Screened loop antenna
  normative_status: preferred
definition:
- content: |-
    Alternative term: Shielded loop antenna


    A loop antenna, whose wire is surrounded by a concentric electrostatic shield which completely encloses the loop except for a small gap.


    Reference: B.S. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
