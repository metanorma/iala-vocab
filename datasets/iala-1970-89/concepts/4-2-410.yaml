id: 4-2-410-eng
termid: 4-2-410
language_code: eng
terms:
- type: expression
  designation: Antenna matching unit
  normative_status: preferred
definition:
- content: A unit in the form of an impedance transforming network, to enable the
    antenna impedance to be matched to the characteristic impedance of the transmission
    line.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
