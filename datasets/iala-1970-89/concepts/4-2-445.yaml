id: 4-2-445-eng
termid: 4-2-445
language_code: eng
terms:
- type: expression
  designation: Radiation monitor
  normative_status: preferred
definition:
- content: A form of radio receiver generally used in the remote (radiated) field
    of the transmitter, which is used to give a warning in the event of a significant
    change in radiated power.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
