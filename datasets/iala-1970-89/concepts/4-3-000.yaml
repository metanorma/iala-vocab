id: 4-3-000-eng
termid: 4-3-000
language_code: eng
terms:
- type: expression
  designation: Radar
  normative_status: preferred
definition:
- content: |-
    A radio determination system which measures distance and usually direction by a comparison of reference signals with the radio signals reflected or retransmitted from the object whose position is to be determined.


    Reference: I.T.U. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
