id: 4-3-005-eng
termid: 4-3-005
language_code: eng
terms:
- type: expression
  designation: Primary radar
  normative_status: preferred
definition:
- content: |-
    The detection of objects and the determination of their distance and speed by measuring the transit time, phase or frequency of the re-radiated electromagnetic waves. In most cases also the horizontal angle of radiation is measured.


    Reference: N.T.G. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
