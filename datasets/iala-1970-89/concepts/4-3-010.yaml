id: 4-3-010-eng
termid: 4-3-010
data:
  language_code: eng
  terms:
  - type: expression
    designation: Secondary radar
    normative_status: preferred
  definition:
  - content: Radar in which the target is fitted with a transponder {{4-3-420, Transponder}}
      to re-transmit automatically on the same frequency as the interrogating frequency,
      or a different frequency. The response may be coded or delayed by a known duration
      (or both) to provide identification, and to allow the range to be measured.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
