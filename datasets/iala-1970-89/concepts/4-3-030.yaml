id: 4-3-030-eng
termid: 4-3-030
language_code: eng
terms:
- type: expression
  designation: Frequency-modulated radar
  normative_status: preferred
definition:
- content: |-
    Alternative term: F.M. radar


    A form of radar in which the radiated wave is frequency modulated, and the frequency of an echo is compared with the frequency of the transmitted wave at the instant of reception, thus enabling range to be measured.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
