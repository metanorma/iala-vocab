id: 4-3-035-eng
termid: 4-3-035
language_code: eng
terms:
- type: expression
  designation: Moving target indication
  normative_status: preferred
definition:
- content: |-
    Acronym: M.T.I.


    A form of presentation in radar whereby means are provided for partially or wholly suppressing the appearance of stationary objects on the display.


    Reference: B.S. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
