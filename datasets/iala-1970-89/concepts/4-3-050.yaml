language_code: eng
terms:
- type: expression
  designation: Scan
  normative_status: preferred
definition:
- content: "Scan (of a radar antenna)\n\n\nThe systematic variation of the beam direction
    for search.\n\n\n\nNote: In marine applications scanning usually takes place continuously
    through 360 degrees \n\n\nReference: B.S. (modified)"
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
