id: 4-3-075-eng
termid: 4-3-075
language_code: eng
terms:
- type: expression
  designation: Target trail
  normative_status: preferred
definition:
- content: |-
    Target tail


    The display of diminishing luminance seen to follow a target on a P.P.I. which results from afterglow and the progress of the target between successive scans of the radar.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
