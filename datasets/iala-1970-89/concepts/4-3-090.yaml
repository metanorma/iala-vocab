id: 4-3-090-eng
termid: 4-3-090
language_code: eng
terms:
- type: expression
  designation: A-display
  normative_status: preferred
definition:
- content: "Alternative terms: A-scan, A-scope, Range amplitude display (G.B.)\n\n\nA
    display in which the targets appear as vertical deflections from a line representing
    a time base. \n\n\nThe target range is indicated by the horizontal distance of
    the deflection from one end of the time base.\n\n\nThe amplitude of the vertical
    deflection is a function of the signal intensity.\n\n\nReference: I.R.E. (modified)"
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
