id: 4-3-130-eng
termid: 4-3-130
language_code: eng
terms:
- type: expression
  designation: Sector display
  normative_status: preferred
definition:
- content: "A display used with a radar set, the aerial of which is continuously rotating.
    \n\n\nThe screen, of the long persistence type, is excited only while the beam
    of the aerial system is within a narrow sector which can be selected at will.\n\n\n\nNote:
    A sector display can be used in conjunction with either an A-scan display or a
    P.P.I."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
