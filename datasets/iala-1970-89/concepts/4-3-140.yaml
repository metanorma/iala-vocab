id: 4-3-140-eng
termid: 4-3-140
language_code: eng
terms:
- type: expression
  designation: Azimuth-stabilised P.P.I.
  normative_status: preferred
definition:
- content: |-
    A plan-position indicator in which the true north on the display remains fixed in spite of the movement of the ship.



    Note: The term is extended to stabilisation with respect to magnetic north.


    Reference: B.S. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
