id: 4-3-155-eng
termid: 4-3-155
language_code: eng
terms:
- type: expression
  designation: Shadow region
  normative_status: preferred
definition:
- content: |-
    Alternative term: Blind sector


    The region from which, under normal propagation conditions, the received field strength is so reduced by some obstruction that effective radar detection of objects in this region is improbable.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
