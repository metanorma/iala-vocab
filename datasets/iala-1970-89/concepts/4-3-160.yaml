definition:
- content: "R.F. head (in a radar set) \n\n\nA term used to refer loosely to the assemblage
    of radar frequency components, sometimes including the antenna system and usually
    including the head amplifier.\n\n\nReference: B.S. (modified)"
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
