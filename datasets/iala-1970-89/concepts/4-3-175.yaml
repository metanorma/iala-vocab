id: 4-3-175-eng
termid: 4-3-175
language_code: eng
terms:
- type: expression
  designation: Ring time
  normative_status: preferred
definition:
- content: |-
    The time, reckoned from the end of a pulse transmitted by a radar set, during which the energy being returned by an echo box remains above that value required to produce a visible signal on the display.


    Reference: I.R.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
