id: 4-3-190-eng
termid: 4-3-190
language_code: eng
terms:
- type: expression
  designation: TR switch
  normative_status: preferred
definition:
- content: |-
    Alternative term: TR box


    A switch, frequently of the gas discharge type, employed when a common transmitting and receiving antenna is used, which automatically decouples the receiver from the antenna during the transmission period.


    Reference: I.R.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
