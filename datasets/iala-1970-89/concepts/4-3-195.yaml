id: 4-3-195-eng
termid: 4-3-195
language_code: eng
terms:
- type: expression
  designation: TR cell
  normative_status: preferred
definition:
- content: |-
    Alternative term: TR tube


    A gas filled switching tube, employed when a common transmitter and receiver antenna is used which automatically decouples the receiver from the antenna during the transmission period.


    Reference: N.T.G. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
