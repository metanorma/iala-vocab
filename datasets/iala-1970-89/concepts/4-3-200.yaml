id: 4-3-200-eng
termid: 4-3-200
language_code: eng
terms:
- type: expression
  designation: TB cell
  normative_status: preferred
definition:
- content: |-
    Alternative term: ATR tube


    A gas filled switching tube employed when a common transmitter and receiver antenna is used which automatically decouples the transmitter during the intervals for pulse reception.


    Reference: N.T.G. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
