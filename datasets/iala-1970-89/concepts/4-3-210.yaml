id: 4-3-210-eng
termid: 4-3-210
language_code: eng
terms:
- type: expression
  designation: Radar echo
  normative_status: preferred
definition:
- content: |-
    (Radar) Echo


    1. The portion of energy of the transmitted pulse which is reflected to a receiver.


    2. The effect of 1 on a radar display.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
