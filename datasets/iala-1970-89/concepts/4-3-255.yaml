id: 4-3-255-eng
termid: 4-3-255
language_code: eng
terms:
- type: expression
  designation: Distance resolution
  normative_status: preferred
definition:
- content: |-
    Alternative term: Range resolution


    The ability of a radar to differentiate targets solely by distance measurement. Distance resolution is generally expressed as the minimum radial distance by which targets must be spaced to be separately distinguishable.


    Reference: I.R.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
