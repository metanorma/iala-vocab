  designation: Paint
  normative_status: preferred
definition:
- content: |-
    Paint (on a P.P.I.)


    (Verb) To leave a picture on a long persistence screen by the effect of signals on the moving time base.


    (Noun) The picture remaining.


    Reference: B.S.
