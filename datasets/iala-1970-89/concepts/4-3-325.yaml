terms:
- type: expression
  designation: Range marker
  normative_status: preferred
definition:
- content: "A visual indication on a radar display for measuring the range or for
    calibrating the time-base. \nNote: Range markers may be either fixed or continuously
    variable.\n\n\nReference: B.S. (modified)"
