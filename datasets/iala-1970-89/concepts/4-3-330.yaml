id: 4-3-330-eng
termid: 4-3-330
language_code: eng
terms:
- type: expression
  designation: Range rings
  normative_status: preferred
definition:
- content: A visual presentation on a radar display, appearing as a set of concentric
    circles, centred on own ship's position and spaced by equal increments in range.
