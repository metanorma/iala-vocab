id: 4-3-335-eng
termid: 4-3-335
language_code: eng
terms:
- type: expression
  designation: Strobe pulse
  normative_status: preferred
definition:
- content: |-
    A pulse of duration less than the period of a recurrent phenomenon, used for scrutinizing a particular epoch of that phenomenon.



    Note: In radar, a strobe pulse is sometimes made to follow automatically the echo from a moving object.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
