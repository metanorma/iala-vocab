id: 4-3-380-eng
termid: 4-3-380
language_code: eng
terms:
- type: expression
  designation: Modulator
  normative_status: preferred
definition:
- content: |-
    In pulse radar, a device for generating a succession of short pulses of energy which cause a transmitter valve to oscillate during each pulse.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
