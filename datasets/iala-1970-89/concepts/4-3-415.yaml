id: 4-3-415-eng
termid: 4-3-415
language_code: eng
terms:
- type: expression
  designation: Radar beacon
  normative_status: preferred
definition:
- content: |-
    A device whose radiations enable a craft to determine its own direction or position relative to the beacon by means of its own radar equipment.


    Reference: B.S.
