id: 4-3-470-eng
termid: 4-3-470
language_code: eng
terms:
- type: expression
  designation: Transponder dead time
  normative_status: preferred
definition:
- content: |-
    Dead time (of a transponder)


    The minimum interval of time following an interrogating pulse during which a transponder is incapable of further response.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
