id: 4-3-485-eng
termid: 4-3-485
language_code: eng
terms:
- type: expression
  designation: Ring around
  normative_status: preferred
definition:
- content: |-
    Ring around (in secondary radar)


    1. The undesired triggering of a transponder by its own transmitter.


    2. The triggering of a transponder at all bearings causing a ring presentation on a P.P.I.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
