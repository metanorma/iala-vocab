id: 4-3-525-eng
termid: 4-3-525
language_code: eng
terms:
- type: expression
  designation: Radar reflector
  normative_status: preferred
definition:
- content: A device specially arranged to have the property of reflecting incident
    electromagnetic energy parallel to the direction of incidence to enhance the radar
    response.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
