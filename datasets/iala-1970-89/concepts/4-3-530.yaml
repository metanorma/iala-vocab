id: 4-3-530-eng
termid: 4-3-530
language_code: eng
terms:
- type: expression
  designation: Corner reflector
  normative_status: preferred
definition:
- content: |-
    Alternative term: Trihedral reflector


    A reflector, consisting of three flat conducting surfaces intersecting mutually at right angles, which reflects the greater part of the incident waves parallel to their direction of incidence.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
