id: 4-3-555-eng
termid: 4-3-555
language_code: eng
terms:
- type: expression
  designation: Pentagonal cluster
  normative_status: preferred
definition:
- content: An arrangement of five corner reflectors, mounted so as to give their maximum
    response in a horizontal direction, and equally spaced on the circumference of
    a circle. The azimuthal response is substantially uniform.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
