id: 4-3-565-eng
termid: 4-3-565
language_code: eng
terms:
- type: expression
  designation: Display factor
  normative_status: preferred
definition:
- content: "The display factor is that factor which is introduced into the calculation
    of ranges of radar reflectors, to allow for the fact that the signal must exceed
    the noise level by a certain minimum value before the signal is visible on the
    P.P.I. \n\n\nThe factor includes such variables as brightness setting of the cathode
    ray tube, the receiver gain level, intensity of ambient lighting and the adaptation
    of the operator to ambient lighting conditions."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
