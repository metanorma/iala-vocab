id: 4-4-000-eng
termid: 4-4-000
language_code: eng
terms:
- type: expression
  designation: Base line
  normative_status: preferred
definition:
- content: |-
    The line joining the two points between which electrical phase or time is compared in determining navigational co-ordinates. (For two ground stations this will be the line joining the two stations.)


    Reference: I.R.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
