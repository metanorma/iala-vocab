id: 4-4-040-eng
termid: 4-4-040
language_code: eng
terms:
- type: expression
  designation: Lane
  normative_status: preferred
definition:
- content: In any CW phase comparison system, the distance between successive equiphase
    lines, taken as 0 degrees -360 degrees , in a system of hyperbolic or circular
    co-ordinates.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
