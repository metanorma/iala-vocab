id: 4-4-060-eng
termid: 4-4-060
language_code: eng
terms:
- type: expression
  designation: Loran C
  normative_status: preferred
definition:
- content: |-
    A system operating on the assigned frequency of 100 kHz and having a groundwave range of nominally 1500 miles over sea water or land.


    Very high accuracy is obtained by comparing the phase of the cycles comprising the pulses of the paired stations.


    The occupied bandwidth is 20 kHz.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
