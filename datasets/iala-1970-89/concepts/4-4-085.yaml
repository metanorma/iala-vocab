id: 4-4-085-eng
termid: 4-4-085
language_code: eng
terms:
- type: expression
  designation: Loran Envelope match
  normative_status: preferred
definition:
- content: |-
    Envelope match (in Loran)


    The comparison, in time difference, between the leading edges of the demodulated and filtered pulses from a master and a slave station.


    The pulses are superimposed and matched manually or automatically.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
