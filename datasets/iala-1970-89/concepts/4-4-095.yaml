  designation: Loran Specific repetition rate
  normative_status: preferred
definition:
- content: |-
    Specific repetition rate (in Loran)


    One of a set of closely spaced repetition rates derived from the basic rate and associated with a specific set of synchronised stations.


    Reference: I.R.E.
