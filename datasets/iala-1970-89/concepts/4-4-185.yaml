id: 4-4-185-eng
termid: 4-4-185
language_code: eng
terms:
- type: expression
  designation: Decca Lane slip
  normative_status: preferred
definition:
- content: |-
    Lane slip (in Decca)


    A fault due to temporary loss of signal, etc., whereby the Decometer, while reading correctly on its fraction pointer, reads incorrectly on its lane pointer.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
