  designation: Decca Lane identification
  normative_status: preferred
definition:
- content: |-
    Lane identification (in Decca)


    The automatic system, incorporated in the Decca navigator system, to identify the particular lane in a pattern in which the craft is situated.


    Reference: B.S.
