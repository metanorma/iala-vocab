id: 4-4-235-eng
termid: 4-4-235
language_code: eng
terms:
- type: expression
  designation: Electrical centre
  normative_status: preferred
definition:
- content: |-
    Electrical centre (of a ship)


    The reference point on the vessel which is determined for each individual navigational system.


    It is used to measure distance and is determined by calibration at a known range on a number of different headings.
sources:
- type: authoritative
  origin:
