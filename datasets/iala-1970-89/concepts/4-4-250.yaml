id: 4-4-250-eng
termid: 4-4-250
language_code: eng
terms:
- type: expression
  designation: Omega Commutation
  normative_status: preferred
definition:
- content: |-
    Commutation (in Omega)


    A method by means of which the transmissions from a number of stations are time shared on the same frequency.


    The commutation may be carried out either mechanically or electronically.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
