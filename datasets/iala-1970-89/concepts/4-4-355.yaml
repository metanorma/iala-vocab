id: 4-4-355-eng
termid: 4-4-355
language_code: eng
terms:
- type: expression
  designation: Toran Reference transmitter
  normative_status: preferred
definition:
- content: |-
    Reference transmitter (in Toran)


    A fixed transmitter associated with a compensating receiver and modulated by the low frequency beat frequency output of the receiver, which is used to transmit to the mobile station the phase reference.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
