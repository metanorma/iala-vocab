id: 5-1-010-eng
termid: 5-1-010
language_code: eng
terms:
- type: expression
  designation: Failure rate
  normative_status: preferred
definition:
- content: The number of failures of an item per unit time. When the failure rate
    is constant, it is the reciprocal of the mean time between failures.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
