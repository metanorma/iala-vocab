id: 5-1-020-eng
termid: 5-1-020
data:
  language_code: eng
terms:
- type: expression
  designation: Maintainability
  normative_status: preferred
definition:
- content: The probability that a failure will be repaired within a specified time
    after the failure occurs. This is determined over a given period of time when
    maintenance of the item is performed in accordance with the prescribed procedures
    and resources.
