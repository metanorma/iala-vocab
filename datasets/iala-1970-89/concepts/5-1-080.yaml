id: 5-1-080-eng
termid: 5-1-080
language_code: eng
terms:
- type: expression
  designation: Rating
  normative_status: preferred
definition:
- content: The limiting values of some parameter describing an item which should not
    be exceeded under specified conditions and between which, if it is operating as
    specified, it will give stated performance.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
