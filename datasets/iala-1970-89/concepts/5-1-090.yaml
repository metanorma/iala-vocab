id: 5-1-090-eng
termid: 5-1-090
language_code: eng
terms:
- type: expression
  designation: Parallel redundancy
  normative_status: preferred
definition:
- content: |-
    Alternative term: Active redundancy


    Redundancy in which the different means work together to perform the task, one of the means being capable of producing the results alone if the other fails.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
