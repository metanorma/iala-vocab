id: 5-1-095-eng
termid: 5-1-095
language_code: eng
terms:
- type: expression
  designation: Standby redundancy
  normative_status: preferred
definition:
- content: |-
    Redundancy wherein the alternative means of performing the function is inoperative until needed and is switched on upon failure of the primary means of performing the function.


    Reference: I.E.E.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
