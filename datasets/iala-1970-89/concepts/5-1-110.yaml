id: 5-1-110-eng
termid: 5-1-110
language_code: eng
terms:
- type: expression
  designation: Debugging
  normative_status: preferred
definition:
- content: The operation of an equipment or complex item prior to use, to detect and
    replace parts that are defective or expected to fail and to correct errors in
    fabrication or assembly.
