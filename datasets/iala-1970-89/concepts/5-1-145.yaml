id: 5-1-145-eng
termid: 5-1-145
language_code: eng
terms:
- type: expression
  designation: Confidence level
  normative_status: preferred
definition:
- content: |-
    The probability that a given statement is correct or the probability that a stated confidence interval (numerical range) includes an unknown.


    Note:: When this probability is expressed as a percentage, it is called confidence factor.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
