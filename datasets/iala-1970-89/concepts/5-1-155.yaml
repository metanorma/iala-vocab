id: 5-1-155-eng
termid: 5-1-155
language_code: eng
terms:
- type: expression
  designation: Go-no-go testing
  normative_status: preferred
definition:
- content: A testing technique which indicates if a system is or is not functioning
    within acceptable tolerances. No measure of performance is given and no degradation
    of operating characteristics can be measured.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
