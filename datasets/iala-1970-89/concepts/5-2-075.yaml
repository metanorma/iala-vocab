id: 5-2-075-eng
termid: 5-2-075
language_code: eng
terms:
- type: expression
  designation: Closed loop control system
  normative_status: preferred
definition:
- content: |-
    A control system in which the objective is that the controlled quantity attain a desired performance and be then measured and compared with a standard representing that performance.


    Note:: Any deviation from the standard is fed back into the control system in such a sense


    that it will reduce the deviation of the controlled quantity from the standard.


    Reference: I.E.E.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
