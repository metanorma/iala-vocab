definition:
- content: "Alternative term: Feedback loop\n\n\nA group of circuits including at
    least one forward path and one feedback path which make up a closed loop in a
    block diagram. \n\n\n\n\n\nFigure 2 - Block diagram of automatic control system
    (5-2-045) incorporating a closed loop (5-2-080)\n\n\nReference: I.E.C. (modified)"
