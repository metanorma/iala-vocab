id: 5-2-100-eng
termid: 5-2-100
language_code: eng
terms:
- type: expression
  designation: Sampled-data control system
  normative_status: preferred
definition:
- content: |-
    A system that operates with sampled data.


    Note:: Sampling control, as a part of the system, uses intermittently observed values of the feedback signal or the actuating signal.


    Reference: I.E.E.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
