definition:
- content: |-
    An input variable established by means external to and independent of the automatic control system which is intended to determine the value of the controlled variable.





    Figure 2 - Block diagram of automatic control system (5-2-045) incorporating a closed loop (5-2-080)


    Reference: ANSI (modified)


    Note:: The French word "commande" is generally used to mean control.
