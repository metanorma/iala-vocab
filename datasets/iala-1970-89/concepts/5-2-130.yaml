language_code: eng
terms:
- type: expression
  designation: Input variable
  normative_status: preferred
definition:
- content: |-
    For each element of a control system, a physical quantity the variation of which has an influence on the output as a result of functioning of the element.


    Reference: I.E.C. (modified)
