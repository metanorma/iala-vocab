terms:
- type: expression
  designation: Feedback signal
  normative_status: preferred
definition:
- content: |-
    Alternative term: Return signal


    In a closed loop, the signal resulting from an input signal and transmitted by the loop and


    intended to be algebraically added to the input signal.





    Figure 2 - Block diagram of automatic control system (5-2-045) incorporating a closed loop (5-2-080)


    Reference: ANSI (modified)
