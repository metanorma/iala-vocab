id: 5-2-210-eng
termid: 5-2-210
language_code: eng
terms:
- type: expression
  designation: Loop transfer function
  normative_status: preferred
definition:
- content: |-
    For a closed loop system, the function obtained by taking the ratio of the Laplace transform of the return signal to the Laplace transform of its actuating signal.


    Reference: ANSI (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
