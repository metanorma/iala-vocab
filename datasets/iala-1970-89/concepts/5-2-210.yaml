id: 5-2-210-eng
termid: 5-2-210
data:
  language_code: eng
terms:
- type: expression
  designation: Loop transfer function
  normative_status: preferred
definition:
- content: For a closed loop system, the function obtained by taking the ratio of
    the Laplace transform of the return signal to the Laplace transform of its actuating
    signal.
