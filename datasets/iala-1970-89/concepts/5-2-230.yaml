terms:
- type: expression
  designation: Final value
  normative_status: preferred
definition:
- content: "The value of the controlled variable actually achieved in the steady state
    and with the control system in equilibrium. \n\n\n\n\n\nFigure 3 - Typical time
    response of a system to a step increase of input.\n\n\nReference: I.E.C."
