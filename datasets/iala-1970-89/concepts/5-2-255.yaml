id: 5-2-255-eng
termid: 5-2-255
language_code: eng
terms:
- type: expression
  designation: Dead time (2)
  normative_status: preferred
definition:
- content: "The time interval between a change in the input variable and the initiation
    of the corresponding change in the output variable. \n\n\n\n\n\nFigure 3 - Typical
    time response of a system to a step increase of input.\n\n\nReference: I.E.C."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
