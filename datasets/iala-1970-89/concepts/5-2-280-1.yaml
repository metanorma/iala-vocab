id: 5-2-280-1-eng
termid: 5-2-280-1
language_code: eng
terms:
- type: expression
  designation: Response time
  normative_status: preferred
definition:
- content: "The time interval between the beginning of a sustained disturbance and
    the instant when the resulting change in the output signal reaches a specified
    fraction of its final steady-state value, either before overshoot or in the absence
    of overshoot.  \n\n\n\n\n\nFigure 3 - Typical time response of a system to a step
    increase of input.\n\n\nReference: I.E.C."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
