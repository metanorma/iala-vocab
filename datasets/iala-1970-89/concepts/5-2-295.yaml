id: 5-2-295-eng
termid: 5-2-295
language_code: eng
terms:
- type: expression
  designation: Integral action
  normative_status: preferred
definition:
- content: |-
    Control action in which the output is proportional to the time integral of the input, i.e. the rate of change of output is proportional to the input.


    Reference: ANSI
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
