id: 5-2-335-eng
termid: 5-2-335
language_code: eng
terms:
- type: expression
  designation: Saturation
  normative_status: preferred
definition:
- content: |-
    The condition where the output retains a fixed value (upper or lower limit) when the input assumes any value above an upper or below a lower limit.


    Reference: I.E.C.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
