id: 5-2-355-eng
termid: 5-2-355
language_code: eng
terms:
- type: expression
  designation: Block diagram
  normative_status: preferred
definition:
- content: |-
    A simplified form of drawing intended to show the basic functioning of a system; it represents by means of symbols or simplified illustrations an installation or part thereof together with the relationship between its components without necessarily representing all physical links.


    Reference: I.E.C.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
