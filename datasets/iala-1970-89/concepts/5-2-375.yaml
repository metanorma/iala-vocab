id: 5-2-375-eng
termid: 5-2-375
language_code: eng
terms:
- type: expression
  designation: Stability
  normative_status: preferred
definition:
- content: |-
    The property of a feedback control system or element such that its output is asymptotic, i.e., the output will ultimately attain a steady state within the linear range and without continuing external stimuli.


    Reference: ANSI (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
