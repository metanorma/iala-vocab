id: 5-2-395-eng
termid: 5-2-395
language_code: eng
terms:
- type: expression
  designation: Servo mechanism
  normative_status: preferred
definition:
- content: |-
    A feedback control system in which one or more of the system signals represent mechanical motion.


    Note:: It should be noted that servomechanism and feedback regulator are not mutually exclusive terms. Their application to a particular system will depend upon the method of operation of that system.


    Reference: I.R.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
