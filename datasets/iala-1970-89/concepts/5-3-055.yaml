id: 5-3-055-eng
termid: 5-3-055
language_code: eng
terms:
- type: expression
  designation: Keying
  normative_status: preferred
definition:
- content: The forming of signals (such as those employed in a telegraph transmission)
    by the modulation of a direct current or other carrier between discrete values
    of some characteristic.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
