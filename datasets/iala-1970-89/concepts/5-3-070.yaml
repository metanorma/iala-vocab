id: 5-3-070-eng
termid: 5-3-070
language_code: eng
terms:
- type: expression
  designation: Pulse time modulation (PTM)
  normative_status: preferred
definition:
- content: |-
    Modulation in which the time of occurrence of some characteristic of a pulse carrier is varied from the unmodulated value.



    Note: This is a general term which includes several forms of modulation such as pulse duration, pulse position and pulse interval modulation.


    Reference: I.E.C. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
