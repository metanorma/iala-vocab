id: 5-3-070-eng
termid: 5-3-070
data:
  language_code: eng
terms:
- type: expression
  designation: Pulse time modulation (PTM)
  normative_status: preferred
definition:
- content: Modulation in which the time of occurrence of some characteristic of a
    pulse carrier is varied from the unmodulated value.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: I.E.C
  modification: modified from source
notes:
- content: This is a general term which includes several forms of modulation such
    as pulse duration, pulse position and pulse interval modulation.
