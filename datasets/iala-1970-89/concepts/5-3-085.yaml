id: 5-3-085-eng
termid: 5-3-085
language_code: eng
terms:
- type: expression
  designation: Pulse frequency modulation
  normative_status: preferred
definition:
- content: |-
    A form of pulse time modulation in which the pulse repetition rate is the characteristic varied. A precise term for pulse frequency modulation would be pulse repetition rate modulation.


    Reference: I.R.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
