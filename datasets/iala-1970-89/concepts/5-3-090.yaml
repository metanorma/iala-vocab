id: 5-3-090-eng
termid: 5-3-090
language_code: eng
terms:
- type: expression
  designation: Single sideband transmission (SSB)
  normative_status: preferred
definition:
- content: |-
    The method of operation in which either the upper or lower sideband (as produced by the process of modulation) is transmitted.



    Note: In practice the carrier is often partially or wholly suppressed.


    Reference: I.E.C. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
