id: 5-3-090-eng
termid: 5-3-090
data:
  language_code: eng
  terms:
  - type: expression
    designation: Single sideband transmission (SSB)
    normative_status: preferred
  definition:
  - content: The method of operation in which either the upper or lower sideband (as
      produced by the process of modulation) is transmitted.
  notes:
  - content: In practice the carrier is often partially or wholly suppressed.
