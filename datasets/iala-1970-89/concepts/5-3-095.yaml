id: 5-3-095-eng
termid: 5-3-095
language_code: eng
terms:
- type: expression
  designation: Double sideband transmission (DSB)
  normative_status: preferred
definition:
- content: |-
    That method of operation in which both bands of frequency, produced by the process of modulation, are transmitted equally.


    Reference: I.E.C. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
