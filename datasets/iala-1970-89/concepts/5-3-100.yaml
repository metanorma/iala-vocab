id: 5-3-100-eng
termid: 5-3-100
language_code: eng
terms:
- type: expression
  designation: Time division multiplex (TDM)
  normative_status: preferred
definition:
- content: |-
    Alternative term: Time sharing


    A device or process for the transmission of two or more signals over a common path by using successive time intervals for the different signals.


    Reference: I.R.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
