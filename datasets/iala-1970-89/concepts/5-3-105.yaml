id: 5-3-105-eng
termid: 5-3-105
language_code: eng
terms:
- type: expression
  designation: Frequency division multiplex (FDM)
  normative_status: preferred
definition:
- content: |-
    A system in which the band of frequencies which may be transmitted on a common transmission path is divided into narrower bands, each used for a separate channel.


    Reference: I.E.C. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
