terms:
- type: expression
  designation: Pulse tilt
  normative_status: preferred
definition:
- content: |-
    A distortion in an otherwise essentially flat-topped rectangular pulse characterized by either a decline or a rise of the pulse top.


    Reference: I.R.E.
