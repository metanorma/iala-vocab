id: 5-3-150-eng
termid: 5-3-150
language_code: eng
terms:
- type: expression
  designation: Peak pulse power (carrier frequency)
  normative_status: preferred
definition:
- content: |-
    The power averaged over that carrier frequency cycle which occurs at the maximum of the pulse of power (usually one-half of the maximum instantaneous power).


    Reference: I.R.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
