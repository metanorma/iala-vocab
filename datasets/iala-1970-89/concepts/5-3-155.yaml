id: 5-3-155-eng
termid: 5-3-155
data:
  language_code: eng
terms:
- type: expression
  designation: Baseband
  normative_status: preferred
definition:
- content: The band of frequencies which is modulated onto or from the carrier in
    a wideband radio relay system and which is occupied by television, multichannel
    telephony, telegraphy, or similar signals and any pilot or other associated signals.
