id: 5-3-155-eng
termid: 5-3-155
language_code: eng
terms:
- type: expression
  designation: Baseband
  normative_status: preferred
definition:
- content: |-
    The band of frequencies which is modulated onto or from the carrier in a wideband radio relay system and which is occupied by television, multichannel telephony, telegraphy, or similar signals and any pilot or other associated signals.


    Reference: I.E.C.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
