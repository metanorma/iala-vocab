id: 5-3-175-eng
termid: 5-3-175
language_code: eng
terms:
- type: expression
  designation: Vestigial sideband
  normative_status: preferred
definition:
- content: |-
    A sideband in which some of the spectral components, in general those corresponding to the highest frequency in the modulating signals, are greatly attenuated.


    Reference: I.E.C.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
