id: 5-3-180-eng
termid: 5-3-180
language_code: eng
terms:
- type: expression
  designation: Frequency deviation
  normative_status: preferred
definition:
- content: |-
    In angle modulation, the peak amount by which the instantaneous frequency of a sine-wave carrier is caused to depart from the carrier frequency.


    Reference: I.E.C.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
