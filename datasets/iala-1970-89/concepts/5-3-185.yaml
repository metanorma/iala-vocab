terms:
- type: expression
  designation: Deviation ratio
  normative_status: preferred
definition:
- content: |-
    In a frequency modulation system, the ratio of maximum frequency deviation to the maximum modulating frequency of the system under specified conditions.


    Reference: I.E.C.
