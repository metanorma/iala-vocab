id: 5-3-200-eng
termid: 5-3-200
data:
  language_code: eng
terms:
- type: expression
  designation: Detection (2)
  normative_status: preferred
definition:
- content: The process of extracting information from an electromagnetic wave.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: I.E.C
  modification: modified from source
notes:
- content: Often an asymmetrical conducting device is used.
- content: The use of the term for the action of a frequency changer is deprecated.
- content: Where there was no original modulating signal the use of the term "demodulation
    "as an alternative for "detection" is deprecated.
- content: In other languages there are more specific terms. There is no general French
    equival ent. The term "detection" is used when the electromagnetic wave is an
    amplitude modulated oscillation. The term "discrimination" is used when the electromagnetic
    wave is a frequency or phase modulated oscillation.
