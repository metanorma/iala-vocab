id: 5-3-225-eng
termid: 5-3-225
language_code: eng
terms:
- type: expression
  designation: Peak envelope power (2)
  normative_status: preferred
definition:
- content: |-
    The average power supplied to the antenna transmission line by a transmitter during one radio frequency cycle at the highest crest of the modulation envelope taken under conditions of normal operation.


    Reference: C.C.I.R.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
