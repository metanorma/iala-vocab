id: 5-3-250-eng
termid: 5-3-250
language_code: eng
terms:
- type: expression
  designation: Suppressed carrier
  normative_status: preferred
definition:
- content: |-
    Carrier restricted to a power level more than 32 dB below the peak envelope power and preferably 40 dB or more below the peak envelope power.


    Reference: C.C.I.R.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
