id: 5-3-285-eng
termid: 5-3-285
language_code: eng
terms:
- type: expression
  designation: Instantaneous frequency
  normative_status: preferred
definition:
- content: |-
    Of an oscillation (not necessarily sinusoidal), the rate of change of phase, expressed in radians per second, divided by 2n.


    Reference: I.E.C.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
