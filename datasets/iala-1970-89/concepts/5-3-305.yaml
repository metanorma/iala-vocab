id: 5-3-305-eng
termid: 5-3-305
language_code: eng
terms:
- type: expression
  designation: Expansion
  normative_status: preferred
definition:
- content: |-
    The automatic increase, according to a specified law, of the variation of the mean level of a signal, for example in order to restore the original form of a signal after it has been subjected to a compression.


    Reference: I.E.C.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
