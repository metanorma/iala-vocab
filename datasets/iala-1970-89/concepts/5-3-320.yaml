id: 5-3-320-eng
termid: 5-3-320
language_code: eng
terms:
- type: expression
  designation: Half-duplex (circuit)
  normative_status: preferred
definition:
- content: |-
    Alternative term: Semi-duplex


    The operation of a circuit designed for duplex operation, but which, on account of the nature of the terminal equipment, can be operated in one direction only at a time.


    Reference: I.E.C. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
