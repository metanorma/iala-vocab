id: 5-3-330-eng
termid: 5-3-330
language_code: eng
terms:
- type: expression
  designation: Algorithm
  normative_status: preferred
definition:
- content: |-
    A prescribed set of well defined rules or processes for the solution of a problem in a finite number of successive steps.


    For example, a full statement of an arithmetic procedure for evaluating sine(x) to a stated precision.
sources:
- type: authoritative
  origin:
