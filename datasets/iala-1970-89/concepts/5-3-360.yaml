id: 5-3-360-eng
termid: 5-3-360
language_code: eng
terms:
- type: expression
  designation: Analogue signal
  normative_status: preferred
definition:
- content: |-
    A signal in which the physical quantity used for transmission varies in an unquantized way according to the value of a physical quantity of the same or different nature.


    Reference: I.E.C. (extract)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
