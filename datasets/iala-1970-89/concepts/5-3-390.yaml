id: 5-3-390-eng
termid: 5-3-390
language_code: eng
terms:
- type: expression
  designation: Binary digit
  normative_status: preferred
definition:
- content: |-
    One of the two digits in the representation of data in binary notation, i.e. 0 or 1, A or Z, on or off, etc.



    Note: The abbreviated form of binary digit is bit.


    Reference: I.E.C. (modified)
