id: 5-3-410-eng
termid: 5-3-410
language_code: eng
terms:
- type: expression
  designation: Parity code
  normative_status: preferred
definition:
- content: An error-detecting or error-correcting code in which each array of bits
    comprises a number, either always even or always odd, of bits of the same type.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
