id: 5-3-435-eng
termid: 5-3-435
language_code: eng
terms:
- type: expression
  designation: Error-detecting code
  normative_status: preferred
definition:
- content: |-
    A code in which each data signal conforms to specific rules of construction, so that departures from this construction in the received signals can be automatically detected.


    Reference: I.E.C. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
