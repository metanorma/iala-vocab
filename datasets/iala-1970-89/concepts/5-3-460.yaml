id: 5-3-460-eng
termid: 5-3-460
language_code: eng
terms:
- type: expression
  designation: Crosstalk
  normative_status: preferred
definition:
- content: |-
    The unwanted transfer of energy transferred from one circuit, called the "disturbing" circuit, to another circuit, called the "disturbed" circuit.


    Reference: I.E.C.
