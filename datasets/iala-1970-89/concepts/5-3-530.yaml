id: 5-3-530-eng
termid: 5-3-530
language_code: eng
terms:
- type: expression
  designation: Quantization
  normative_status: preferred
definition:
- content: |-
    A process in which the range of values of a variable is divided into a finite number of smaller subranges, each of which is represented by an assigned or "quantized" value within the subrange.


    Reference: I.E.C. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
