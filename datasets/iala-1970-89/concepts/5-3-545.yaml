language_code: eng
terms:
- type: expression
  designation: Sampling (of a signal)
  normative_status: preferred
definition:
- content: |-
    A process in which a continuous signal is approximately represented by a series of discrete values, usually regularly spaced.


    Reference: I.E.C. (modified)
