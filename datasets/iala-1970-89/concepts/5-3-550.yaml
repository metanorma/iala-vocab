id: 5-3-550-eng
termid: 5-3-550
language_code: eng
terms:
- type: expression
  designation: Random access
  normative_status: preferred
definition:
- content: |-
    Obtaining data from storage or placing data into storage where the time required for such access is independent of the location of the data most recently obtained or placed in storage.


    Reference: ANSI (modified)
