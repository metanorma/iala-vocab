id: 5-3-560-eng
termid: 5-3-560
language_code: eng
terms:
- type: expression
  designation: Real time processing
  normative_status: preferred
definition:
- content: |-
    The performance of a computation during the time that the related physical process actually transpires in order that the results of the computation can be used in guiding the physical process.


    Reference: ANSI (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
