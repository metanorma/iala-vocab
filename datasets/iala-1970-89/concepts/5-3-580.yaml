id: 5-3-580-eng
termid: 5-3-580
language_code: eng
terms:
- type: expression
  designation: Computer Programme (G.B.)
  normative_status: preferred
definition:
- content: |-
    (Computer) Programme (G.B.)


    A set of instructions in the proper form to cause a computer to perform any desired computation



    Note: When the computation is a repetitive task, e.g., sine(x), it is called a routine.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
