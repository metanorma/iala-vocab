terms:
- type: expression
  designation: Serial operation
  normative_status: preferred
definition:
- content: |-
    The time-sequential processing of individual parts of a whole, such as the bits of a character or the characters of a group, using the same facilities for successive parts.


    Reference: ANSI (modified)
