terms:
- type: expression
  designation: Buffer
  normative_status: preferred
definition:
- content: |-
    (Storage) Buffer


    A storage device used to compensate for a difference in rate of flow of data or time of occurrence of events when transferring data from one device to another.


    Reference: ANSI (modified)
