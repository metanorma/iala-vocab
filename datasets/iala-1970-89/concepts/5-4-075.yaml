id: 5-4-075-eng
termid: 5-4-075
language_code: eng
terms:
- type: expression
  designation: Matrix
  normative_status: preferred
definition:
- content: |-
    A logic network the configuration of which is an array of intersections of its input-output leads, with elements connected at some of these intersections. The network usually functions as an encoder or decoder.


    Reference: I.E.E.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
