id: 5-4-135-eng
termid: 5-4-135
data:
  language_code: eng
terms:
- type: expression
  designation: Velodyne integrator
  normative_status: preferred
definition:
- content: A servo mechanism usually employing a d.c. split field motor and tacho-generator
    on the same shaft, in which it is intended that the speed of rotation be maintained
    proportional to an input voltage. The total number of revolutions of the output
    shaft is an approximate measure of the time-integral of the input voltage.
