id: 5-4-155-eng
termid: 5-4-155
data:
  language_code: eng
  terms:
  - type: expression
    designation: Synchro
    normative_status: preferred
  definition:
  - content: A transforming apparatus in the form of an induction voltage regulator.
      Its stator has one or more windings, either primary or secondary. Its rotor
      has one or more windings, either secondary or primary. A synchro is used either
      as a direct transmitter or as a signal receiver (which defines an angular position)
      or as a comparator for two signals each of which represents an angular position.
