id: 5-4-180-eng
termid: 5-4-180
language_code: eng
terms:
- type: expression
  designation: Two-step relay
  normative_status: preferred
definition:
- content: |-
    A relay with two groups of contact springs, one group only of which is operated by a specified magnetic flux and both groups by a greater magnetic flux.


    Reference: I.E.C. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
