id: 5-4-230-eng
termid: 5-4-230
language_code: eng
terms:
- type: expression
  designation: Synchronous motor
  normative_status: preferred
definition:
- content: An a.c. motor whose average speed of normal operation is exactly proportional
    to the frequency of the a.c. supply.
