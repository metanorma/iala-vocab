definition:
- content: |-
    Alternative term: Variac(R) (U.S.A.)


    A precision type toroidally wound auto-transformer provided with one or more adjustable sliders.



    Note: IPOT is an acronym for inductive potential divider.


    Reference: B.S. (modified)
