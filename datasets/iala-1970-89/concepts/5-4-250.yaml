id: 5-4-250-eng
termid: 5-4-250
language_code: eng
terms:
- type: expression
  designation: Four-wire repeater
  normative_status: preferred
definition:
- content: |-
    A repeater for use in a four-wire or four-wire type circuit in which there are two amplifiers, one amplifying the signals in one channel and the other amplifying the signals in the other channel of the circuit.


    Reference: I.E.C. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
