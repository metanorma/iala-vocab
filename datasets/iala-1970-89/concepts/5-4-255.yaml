  - type: expression
    designation: Sender (U.S.A.)
    normative_status: admitted
  definition:
  - content: In automatic telephony, a device accessible to a number of input circuits
      which accepts and stores information relating to a called number or service.
      It is therefore capable of controlling the setting up of a part of or all of
      the wanted connections.
