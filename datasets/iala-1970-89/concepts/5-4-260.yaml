id: 5-4-260-eng
termid: 5-4-260
language_code: eng
terms:
- type: expression
  designation: KeySender
  normative_status: preferred
definition:
- content: |-
    (Key) Sender


    In automatic telephony, a device which accepts and stores groups of coded pulses and which thereafter controls the setting up of a call. For a key sender, the pulses are produced by the depression of digit keys.


    Reference: B.S. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
