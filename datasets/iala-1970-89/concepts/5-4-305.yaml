id: 5-4-305-eng
termid: 5-4-305
language_code: eng
terms:
- type: expression
  designation: Dashpot
  normative_status: preferred
definition:
- content: A device consisting of two elements, normally a piston and a cylinder,
    the relative motion of which is opposed by fluidic friction and which is used
    for damping or to provide forces proportional to the rate of movement of the piston.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
