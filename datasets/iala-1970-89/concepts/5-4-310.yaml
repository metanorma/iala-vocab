id: 5-4-310-eng
termid: 5-4-310
language_code: eng
terms:
- type: expression
  designation: Resonant reed (2)
  normative_status: preferred
definition:
- content: An electro-mechanical device consisting of a thin ferrous metal cantilever
    vane which vibrates at the frequency of its mechanical resonance, if the frequency
    of the a.c. magnetic field in which it is immersed is the same as the mechanical
    resonance frequency.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
