id: 5-4-315-eng
termid: 5-4-315
language_code: eng
terms:
- type: expression
  designation: Resonant reed filter
  normative_status: preferred
definition:
- content: A resonant reed operated as a switch which will be actuated only at the
    mechanical resonance frequency of the reed, usually in the audio frequency range.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
