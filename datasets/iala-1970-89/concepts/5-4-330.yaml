id: 5-4-330-eng
termid: 5-4-330
language_code: eng
terms:
- type: expression
  designation: Rotation monitor
  normative_status: preferred
definition:
- content: |-
    A device which will give an alarm condition if prescribed limits for rotation are exceeded.


    Note: In the U.K. a pyropress switch is a type of rotation monitor.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
