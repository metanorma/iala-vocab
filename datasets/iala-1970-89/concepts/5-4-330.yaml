data:
  language_code: eng
  terms:
  - type: expression
    designation: Rotation monitor
    normative_status: preferred
  definition:
  - content: A device which will give an alarm condition if prescribed limits for
      rotation are exceeded.
  notes:
  - content: In the U.K. a pyropress switch is a type of rotation monitor.
