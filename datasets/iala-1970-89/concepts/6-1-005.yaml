id: 6-1-005-eng
termid: 6-1-005
language_code: eng
terms:
- type: expression
  designation: Mains supply
  normative_status: preferred
definition:
- content: An electric supply obtained from a central generating system provided by
    a national or regional organisation. The supply is distributed over a large area
    to many points of utilisation.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
