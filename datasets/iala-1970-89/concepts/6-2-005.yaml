id: 6-2-005-eng
termid: 6-2-005
language_code: eng
terms:
- type: expression
  designation: External combustion engine
  normative_status: preferred
definition:
- content: An engine in which the working medium serves the purpose of heat transfer
    only, and is enclosed within a sealed circuit. The heat is supplied by an external
    source using any convenient fuel. Steam engines and Stirling engines are external
    combustion engines.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
