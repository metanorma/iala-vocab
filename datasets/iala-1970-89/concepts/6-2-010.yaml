id: 6-2-010-eng
termid: 6-2-010
language_code: eng
terms:
- type: expression
  designation: Reciprocating engine
  normative_status: preferred
definition:
- content: An engine which employs a piston working in a cylinder, the piston being
    caused to execute reciprocating motion by the periodic pressure of the working
    fluid.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
