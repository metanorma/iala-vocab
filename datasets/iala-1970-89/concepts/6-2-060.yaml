id: 6-2-060-eng
termid: 6-2-060
language_code: eng
terms:
- type: expression
  designation: Air-cooled engine
  normative_status: preferred
definition:
- content: An engine cooled by air blowing across cooling fins formed externally to
    each cylinder block. The air flow may be enhanced by a fan.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
