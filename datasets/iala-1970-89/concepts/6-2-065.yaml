id: 6-2-065-eng
termid: 6-2-065
language_code: eng
terms:
- type: expression
  designation: Water-cooled engine
  normative_status: preferred
definition:
- content: An engine cooled by the circulation of water through the cylinder block.
    The water transfers heat to a radiator, and the dissipation of the heat may be
    assisted by forced-air cooling of the radiator.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
