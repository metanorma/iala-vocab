id: 6-2-075-eng
termid: 6-2-075
language_code: eng
terms:
- type: expression
  designation: Cylinder block
  normative_status: preferred
definition:
- content: The engine casting that comprises or contains the cylinders. It may be
    fitted with heat-radiating devices or pipes through which coolant can flow.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
