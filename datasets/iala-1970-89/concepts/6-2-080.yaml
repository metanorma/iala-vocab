id: 6-2-080-eng
termid: 6-2-080
language_code: eng
terms:
- type: expression
  designation: Cylinder head
  normative_status: preferred
definition:
- content: |-
    The casting that closes the top of the cylinder block.



    Note: In a four-stroke engine, the cylinder head carries the inlet and outlet valves.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
