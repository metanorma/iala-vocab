id: 6-2-095-eng
termid: 6-2-095
language_code: eng
terms:
- type: expression
  designation: Piston ring
  normative_status: preferred
definition:
- content: |-
    A ring of rectangular section fitted in a circumferential groove in a piston and springing against the cylinder wall to prevent leakage.


    It is cut through at one point of the circumference to create springiness and to allow for fitting,
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
