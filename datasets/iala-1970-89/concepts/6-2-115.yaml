id: 6-2-115-eng
termid: 6-2-115
language_code: eng
terms:
- type: expression
  designation: Crankcase
  normative_status: preferred
definition:
- content: |-
    A casing that encloses the crankshaft and connecting rods in some types of reciprocating engines or air-compressors,


    It is usually filled with lubricating oil.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
