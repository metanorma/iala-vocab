id: 6-2-170-eng
termid: 6-2-170
language_code: eng
terms:
- type: expression
  designation: Distributor
  normative_status: preferred
definition:
- content: Rotary device, driven from the camshaft of an internal combustion engine,
    that interrupts the direct current in the primary winding of the induction coil
    and transmits high voltages in correct sequence to the spark plugs.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
