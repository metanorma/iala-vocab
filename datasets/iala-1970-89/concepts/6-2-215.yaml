id: 6-2-215-eng
termid: 6-2-215
language_code: eng
terms:
- type: expression
  designation: Knocking (in a petrol engine)
  normative_status: preferred
definition:
- content: |-
    Alternative term: Detonation


    The spontaneous combustion of part of the fuel-air mixture in the combustion-chamber. This effect produces a knocking noise.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
