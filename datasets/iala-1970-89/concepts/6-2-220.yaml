id: 6-2-220-eng
termid: 6-2-220
language_code: eng
terms:
- type: expression
  designation: Pre-ignition
  normative_status: preferred
definition:
- content: Undesirable self-ignition of the mixture inside the cylinder of an engine
    before the occurrence of the spark. This may be due to excessive temperatures
    of parts of the surface of the combustion chamber or the exhaust valve head, or
    of carbon deposits within the chamber.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
