id: 6-2-225-eng
termid: 6-2-225
language_code: eng
terms:
- type: expression
  designation: Octane number (of petrol)
  normative_status: preferred
definition:
- content: A number indicating the capacity of petrol to avoid knocking. Petrol intended
    for use in an engine of high compression ratio must have a high octane number.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
