id: 6-2-245-eng
termid: 6-2-245
language_code: eng
terms:
- type: expression
  designation: Reciprocating (air) compressor
  normative_status: preferred
definition:
- content: A compressor designed to use the reciprocating motion of a piston in a
    cylinder. This type of compressor can produce very high pressures.
