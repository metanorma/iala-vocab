id: 6-2-255-eng
termid: 6-2-255
data:
  language_code: eng
terms:
- type: expression
  designation: Compressor unloading system
  normative_status: preferred
definition:
- content: An automatic system, associated with a compressor, that takes the compressor
    off load when the discharge pressure has reached a given level ; and that similarly
    restarts the compressing action when the pressure in the system has dropped to
    a certain level. The compressor runs continuously.
sources:
- type: authoritative
  origin:
