id: 6-2-270-eng
termid: 6-2-270
language_code: eng
terms:
- type: expression
  designation: Water and oil separator
  normative_status: preferred
definition:
- content: A device installed in the discharge pipeline from a compressor to remove
    condensed moisture or lubricating oil from the compressed air.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
