id: 6-2-280-eng
termid: 6-2-280
language_code: eng
terms:
- type: expression
  designation: Fusible plug
  normative_status: preferred
definition:
- content: A plug, containing a core of metal of low melting-point, that is fitted
    to a receiver to relieve the pressure in the event of a fire.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
