id: 6-3-045-eng
termid: 6-3-045
language_code: eng
terms:
- type: expression
  designation: Open-circuit voltage (Voc)
  normative_status: preferred
definition:
- content: |-
    The voltage across an unloaded (open) photovoltaic device at a particular temperature and irradiance.



    Note: For unregulated systems, the open-circuit voltage may be greatly in excess of the nominal voltage.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
