id: 6-3-055-eng
termid: 6-3-055
language_code: eng
terms:
- type: expression
  designation: Maximum power(Pmax)
  normative_status: preferred
definition:
- content: The power at the point on the current-voltage characteristic curve where
    the product of current and voltage is a maximum at a particular temperature and
    irradiance.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
