id: 6-3-060-eng
termid: 6-3-060
language_code: eng
terms:
- type: expression
  designation: Fill factor (FF)
  normative_status: preferred
definition:
- content: |-
    The ratio of maximum power to the product of open-circuit voltage and short-circuit current.



    FF = Pmax / (Voc*Isc)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
