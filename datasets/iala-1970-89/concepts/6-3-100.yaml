id: 6-3-100-eng
termid: 6-3-100
language_code: eng
terms:
- type: expression
  designation: Mean wind speed
  normative_status: preferred
definition:
- content: |-
    The statistical mean of the instantaneous values of the wind speed during a given period.



    Note: This period can vary from a few seconds to a year.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
