id: 6-3-210-eng
termid: 6-3-210
language_code: eng
terms:
- type: expression
  designation: Yaw
  normative_status: preferred
definition:
- content: A turning moment, in the horizontal plane, of the movable body of a wind-power
    generator in response to change in the direction of the wind.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
