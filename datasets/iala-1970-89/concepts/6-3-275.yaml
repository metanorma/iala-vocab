id: 6-3-275-eng
termid: 6-3-275
language_code: eng
terms:
- type: expression
  designation: Self-rectifying air turbine
  normative_status: preferred
definition:
- content: An air turbine of which the rotor is designed to rotate in one direction
    when driven by cyclically reversing airflows.
