id: 6-3-280-eng
termid: 6-3-280
language_code: eng
terms:
- type: expression
  designation: Guide blades
  normative_status: preferred
definition:
- content: |-
    Alternative term: Fixed blades


    Deflecting plates fitted in air passages of an air turbine to ensure a steady flow of air with minimum losses, and also to direct the air at the correct inlet angle to the rotating blades.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
