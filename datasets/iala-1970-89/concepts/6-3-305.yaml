id: 6-3-305-eng
termid: 6-3-305
language_code: eng
terms:
- type: expression
  designation: Thermocouple (2)
  normative_status: preferred
definition:
- content: A junction of dissimilar conductors arranged in a circuit so that a voltage
    is developed by the thermoelectric effect when a temperature difference exists
    between the junction and other parts of the circuit.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
