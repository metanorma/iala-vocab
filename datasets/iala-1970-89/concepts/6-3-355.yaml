terms:
- type: expression
  designation: Propane
  normative_status: preferred
definition:
- content: A colourless hydrocarbon fuel C3H8, which is a gas at ordinary temperatures
    and atmospheric pressure. It has a boiling point of - 45 degrees C at atmospheric
    pressure.
