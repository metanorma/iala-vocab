  designation: Acetylene/es
  normative_status: preferred
definition:
- content: "Acetileno\n\n\n \nCombustible de hidrocarburo, C2H2, gas incoloro y altamente
    inflamable a temperaturas  y presión atmosférica normales. Se utilizaba  como
    iluminante en señales luminosas con o sin capillo."
