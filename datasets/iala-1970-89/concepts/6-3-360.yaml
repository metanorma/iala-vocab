id: 6-3-360-eng
termid: 6-3-360
language_code: eng
terms:
- type: expression
  designation: Acetylene
  normative_status: preferred
definition:
- content: A hydrocarbon fuel, C2H2, which is a colourless, highly flammable gas at
    ordinary temperatures and atmospheric pressure. It is principally used as an illuminant
    for signal lights, either with or without a mantle.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
