id: 6-4-030-eng
termid: 6-4-030
language_code: eng
terms:
- type: expression
  designation: Commutator
  normative_status: preferred
definition:
- content: An assembly of conducting elements that are fixed around a shaft as a ring,
    and are insulated from one another, such that a brush can make electrical contact
    with each element in turn as the shaft rotates. It provides a means of regularly
    reversing the polarity of a current.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
