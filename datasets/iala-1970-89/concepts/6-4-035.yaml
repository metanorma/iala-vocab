id: 6-4-035-eng
termid: 6-4-035
data:
  language_code: eng
terms:
- type: expression
  designation: Collector ring
  normative_status: preferred
definition:
- content: A conducting ring that provides continuous electrical connection between
    the stationary and rotary parts of a machine by means of sliding contact through
    a brush.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The term slip ring is also used with this meaning.
