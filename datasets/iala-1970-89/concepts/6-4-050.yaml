id: 6-4-050-eng
termid: 6-4-050
language_code: eng
terms:
- type: expression
  designation: Shunt-wound machine
  normative_status: preferred
definition:
- content: A direct-current machine in which the field winding is connected across
    the whole or a part of the circuit that carries the main current.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
