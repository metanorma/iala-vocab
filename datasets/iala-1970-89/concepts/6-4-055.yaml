id: 6-4-055-eng
termid: 6-4-055
language_code: eng
terms:
- type: expression
  designation: Compound-wound machine
  normative_status: preferred
definition:
- content: A direct-current machine in which there are two field windings, one connected
    across the whole or part of the circuit that carries the main current and the
    other connected in series with the circuit that carries the main current.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
