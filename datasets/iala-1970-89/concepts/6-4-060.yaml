id: 6-4-060-eng
termid: 6-4-060
language_code: eng
terms:
- type: expression
  designation: Excitation (of an electric machine)
  normative_status: preferred
definition:
- content: The production of a magnetic field that is used to generate induced current
    or to provide motive power. The field may be produced by a permanent magnet or
    by a powered electromagnet.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
