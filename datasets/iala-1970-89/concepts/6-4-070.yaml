id: 6-4-070-eng
termid: 6-4-070
language_code: eng
terms:
- type: expression
  designation: Excitation winding
  normative_status: preferred
definition:
- content: |-
    A winding for the production of a magnetic field in an electric machine.


    Note: The excitation winding that produces the main magnetic field is called the field winding.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
