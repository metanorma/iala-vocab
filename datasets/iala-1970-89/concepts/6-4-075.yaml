id: 6-4-075-eng
termid: 6-4-075
language_code: eng
terms:
- type: expression
  designation: Synchronous speed (of an electric machine)
  normative_status: preferred
definition:
- content: |-
    The speed of rotation of the magnetic field produced by, or linked with, the primary winding of the machine.


    Note: The synchronous speed depends on the supply frequency and on the number of poles or projections in the machine.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
