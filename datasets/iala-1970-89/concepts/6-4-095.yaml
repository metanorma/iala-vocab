id: 6-4-095-eng
termid: 6-4-095
language_code: eng
terms:
- type: expression
  designation: Duty (of a machine or apparatus)
  normative_status: preferred
definition:
- content: |-
    duty cycle load cycle (deprecated)


    1 - A sequence of operating conditions, to which a machine or apparatus is subjected.


    2 - A statement or schedule of the loads on a machine or apparatus, including their


    durations and sequence in time.
