id: 6-4-110-eng
termid: 6-4-110
language_code: eng
terms:
- type: expression
  designation: Uninterrupted duty
  normative_status: preferred
definition:
- content: |-
    Duty with variable loads but with no interval of rest.


    Note: Sometimes also referred to as continuously-running duty.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
