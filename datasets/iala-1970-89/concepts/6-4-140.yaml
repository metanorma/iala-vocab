id: 6-4-140-eng
termid: 6-4-140
language_code: eng
terms:
- type: expression
  designation: Protected machine
  normative_status: preferred
definition:
- content: |-
    A machine designed so that the ingress of solid foreign bodies of specified sizes and the harmful ingress of water are restricted or prevented.


    Note: The different categories for protection of machines are specified in IEC 34-5. For further details of these, See Section 8.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
