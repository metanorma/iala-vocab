id: 6-4-240-eng
termid: 6-4-240
language_code: eng
terms:
- type: expression
  designation: Synchronous motor (2)
  normative_status: preferred
definition:
- content: An alternating-current motor in which the speed of rotation is constant
    (for a constant frequency of supply) irrespective of variation, within specified
    limits, of the supply voltage and load.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
