id: 6-4-245-eng
termid: 6-4-245
language_code: eng
terms:
- type: expression
  designation: Asynchronous motor
  normative_status: preferred
definition:
- content: An alternating-current motor in which the speed of rotation is not necessarily
    constant but may vary with the supply voltage and load.
