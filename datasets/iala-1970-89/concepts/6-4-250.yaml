id: 6-4-250-eng
termid: 6-4-250
language_code: eng
terms:
- type: expression
  designation: Induction motor
  normative_status: preferred
definition:
- content: An asynchronous motor in which the power supply is connected to a winding
    on either the stator or the rotor, and rotation is caused by induction.
