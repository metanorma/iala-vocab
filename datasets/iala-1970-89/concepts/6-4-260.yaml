id: 6-4-260-eng
termid: 6-4-260
data:
  language_code: eng
  terms:
  - type: expression
    designation: Squirrel-cage motor
    normative_status: preferred
  definition:
  - content: An induction motor in which a primary winding on one member, usually
      the stator, is connected to the power source, and a secondary squirrel-cage
      winding on the other member, usually the rotor, carries induced current.
  notes:
  - content: A squirrel-cage winding consists of a number of conducting bars having
      their extremities connected by metal rings or plates at each end.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  annotations:
