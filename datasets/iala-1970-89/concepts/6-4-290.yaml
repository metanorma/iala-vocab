id: 6-4-290-eng
termid: 6-4-290
language_code: eng
terms:
- type: expression
  designation: Reactor-start motor
  normative_status: preferred
definition:
- content: A split-phase motor in which a reactor is normally connected in series
    with the main primary winding, and in which the auxiliary primary winding and
    the reactor are energised only during the starting operation.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
