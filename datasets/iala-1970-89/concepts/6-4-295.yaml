id: 6-4-295-eng
termid: 6-4-295
language_code: eng
terms:
- type: expression
  designation: Capacitor motor
  normative_status: preferred
definition:
- content: |-
    A split-phase motor in which a capacitor is connected in series with the auxiliary primary winding.


    Note: The term capacitor-start motor refers to a capacitor motor in which the auxiliary primary winding is energised only during the starting operation.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
