id: 6-4-310-eng
termid: 6-4-310
language_code: eng
terms:
- type: expression
  designation: Star-delta starting (of a three-phase motor)
  normative_status: preferred
definition:
- content: The process of starting a three-phase motor with the primary winding initially
    connected as a star network, and then reconnected as a delta network for the normal
    running conditions.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
