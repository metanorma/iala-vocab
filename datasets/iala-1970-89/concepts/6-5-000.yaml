id: 6-5-000-eng
termid: 6-5-000
language_code: eng
terms:
- type: expression
  designation: Electrochemical cell
  normative_status: preferred
definition:
- content: |-
    Alternative term: Electric cell


    A device that converts chemical energy into electric energy or vice versa. It consists essentially of two different electrodes in an electrolyte. The flow of current is created by the migration of ions in the electrolyte when the electrodes are connected through an external circuit.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
