id: 6-5-005-eng
termid: 6-5-005
language_code: eng
terms:
- type: expression
  designation: Electrolyte
  normative_status: preferred
definition:
- content: The liquid or solid medium that is contained in an electrochemical cell
    in order to provide the migratory ions needed for the flow of current.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
