id: 6-5-035-eng
termid: 6-5-035
language_code: eng
terms:
- type: expression
  designation: Sealed cell
  normative_status: preferred
definition:
- content: An electrochemical cell which remains sealed providing it is operated within
    its designed specified limits but has a re-sealable valve to release gas if the
    internal pressure exceeds a pre-set value. Water and electrolyte cannot be added.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
