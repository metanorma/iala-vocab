id: 6-5-055-eng
termid: 6-5-055
language_code: eng
terms:
- type: expression
  designation: Lead-acid cell
  normative_status: preferred
definition:
- content: A secondary cell in which the electrolyte is dilute sulphuric acid, and
    the electrodes are made from lead or lead alloys or compounds.
