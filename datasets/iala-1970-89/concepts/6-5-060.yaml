id: 6-5-060-eng
termid: 6-5-060
language_code: eng
terms:
- type: expression
  designation: Nickel-cadmium cell
  normative_status: preferred
definition:
- content: A secondary cell in which the electrolyte is potassium hydroxide, the positive
    electrode is nickel oxide and the negative electrode contains cadmium.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
