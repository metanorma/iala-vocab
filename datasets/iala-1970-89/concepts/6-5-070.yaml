id: 6-5-070-eng
termid: 6-5-070
language_code: eng
terms:
- type: expression
  designation: Battery
  normative_status: preferred
definition:
- content: |-
    An assembly of electrochemical cells with a common output.



    Note: 1 In French, the term batterie usually refers to an assembly of secondary cells.



    Note: 2 In English, the term primary battery refers to an assembly of primary cells, and the terms secondary battery and storage battery refer to an assembly of secondary cells.



    Note: 3 In English, the term " disposable battery " refers to a primary battery, and the term " rechargeable battery " refers to a secondary battery, but these terms are deprecated.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
