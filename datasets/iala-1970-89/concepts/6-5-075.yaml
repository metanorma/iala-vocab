id: 6-5-075-eng
termid: 6-5-075
language_code: eng
terms:
- type: expression
  designation: Secondary battery
  normative_status: preferred
definition:
- content: |-
    A battery of secondary cells.



    Note: There are many types of secondary battery of which the following are the most common


    SLI (starting, lighting, ignition)
    Traction
    Vehicular propulsion
    Submarine
    Stationary
    Portable
sources:
- type: authoritative
  origin:
