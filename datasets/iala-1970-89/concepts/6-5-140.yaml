id: 6-5-140-eng
termid: 6-5-140
data:
  language_code: eng
terms:
- type: expression
  designation: End-of-charge voltage
  normative_status: preferred
definition:
- content: The voltage at which the charging process is normally terminated, measured
    under open-circuit conditions after an interval of several minutes from cessation
    of charge.
