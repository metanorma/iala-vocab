id: 6-5-145-eng
termid: 6-5-145
language_code: eng
terms:
- type: expression
  designation: Ampere-hour efficiency
  normative_status: preferred
definition:
- content: The ratio of the ampere-hour output supplied during discharge of a secondary
    cell or battery to the ampere-hour input required during charge, under specified
    conditions.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
