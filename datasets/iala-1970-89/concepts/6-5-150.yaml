id: 6-5-150-eng
termid: 6-5-150
language_code: eng
terms:
- type: expression
  designation: Self discharge
  normative_status: preferred
definition:
- content: |-
    The loss of otherwise usable chemical energy by spontaneous currents within an electro-chemical cell, regardless of any external connection.



    Note: For a battery in which this loss is very small, the term low-loss battery is used.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
