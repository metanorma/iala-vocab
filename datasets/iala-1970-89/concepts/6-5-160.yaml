id: 6-5-160-eng
termid: 6-5-160
language_code: eng
terms:
- type: expression
  designation: Depth of discharge
  normative_status: preferred
definition:
- content: The capacity removed from a battery during a discharge in relation to the
    initially available capacity. It may be expressed as a percentage.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
