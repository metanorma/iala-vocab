id: 6-5-190-eng
termid: 6-5-190
language_code: eng
terms:
- type: expression
  designation: Terminal (of a cell or battery)
  normative_status: preferred
definition:
- content: |-
    A part of a cell or battery to which an external circuit is connected.



    Note: It is international practice to mark the positive terminal with a plus sign or the colour red.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
