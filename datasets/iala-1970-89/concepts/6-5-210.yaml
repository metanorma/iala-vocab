id: 6-5-210-eng
termid: 6-5-210
language_code: eng
terms:
- type: expression
  designation: Separator
  normative_status: preferred
definition:
- content: A device made of insulating material that allows ions to migrate between
    electrodes of opposite polarity but totally or partially prevents the mixing of
    different substances.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
