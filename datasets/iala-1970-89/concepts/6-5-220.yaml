id: 6-5-220-eng
termid: 6-5-220
language_code: eng
terms:
- type: expression
  designation: Hydrometer
  normative_status: preferred
definition:
- content: An instrument by which the relative density of the electrolyte in a cell
    may be measured for the purpose of determining the state of charge of the cell.
