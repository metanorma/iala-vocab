id: 6-5-230-eng
termid: 6-5-230
language_code: eng
terms:
- type: expression
  designation: Trickle charge
  normative_status: preferred
definition:
- content: A continuous charge at low rate that is intended to compensate for the
    self discharge of a battery on open circuit and thus to maintain the battery in
    a fully-charged condition.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
