id: 6-6-050-eng
termid: 6-6-050
language_code: eng
terms:
- type: expression
  designation: Isolated neutral system
  normative_status: preferred
definition:
- content: |-
    A system in which the neutral conductor has no connection to earth.



    Note: Nevertheless a very high impedance connection may exist through indicating or protective devices.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
