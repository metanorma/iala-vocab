id: 6-6-055-eng
termid: 6-6-055
language_code: eng
terms:
- type: expression
  designation: Insulated cable
  normative_status: preferred
definition:
- content: |-
    (insulated) cable


    An assembly of one or more conductors, either solid or stranded, each covered with a layer of insulating material throughout its length, the whole assembly being provided with a common protective covering.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
