id: 6-6-110-eng
termid: 6-6-110
language_code: eng
terms:
- type: expression
  designation: Armour (of a cable)
  normative_status: preferred
definition:
- content: |-
    A covering, consisting of metal tapes or wires, used to provide mechanical protection to the cable.



    Note: A cable with armour is called an armoured cable.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
