id: 6-6-125-eng
termid: 6-6-125
language_code: eng
terms:
- type: expression
  designation: Screened cable
  normative_status: preferred
definition:
- content: A cable in which the cores are surrounded by conducting coverings to prevent
    electromagnetic interaction of the fields due to the conductors with each other
    or with external fields.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
