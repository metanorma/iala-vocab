id: 6-6-145-eng
termid: 6-6-145
language_code: eng
terms:
- type: expression
  designation: Cable terminal box
  normative_status: preferred
definition:
- content: A box into which cables are led so that connections can be made to other
    conductors. It is usually made in such a way as to provide protective insulation
    and also protection from air and moisture.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
