id: 6-6-160-eng
termid: 6-6-160
language_code: eng
terms:
- type: expression
  designation: Distribution cubicle
  normative_status: preferred
definition:
- content: An enclosure housing busbars, fuses and switches, etc., to enable a main
    supply to be connected to a number of individual circuits to feed machines, apparatus,
    heating and lighting, etc.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
