id: 6-6-165-eng
termid: 6-6-165
language_code: eng
terms:
- type: expression
  designation: Busbar
  normative_status: preferred
definition:
- content: A conductor, usually in the form of a solid metal bar, used in a cubicle
    or in a building to distribute heavy currents round a system, such that supplies
    and loads can be connected at convenient positions.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
