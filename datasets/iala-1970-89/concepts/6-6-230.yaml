id: 6-6-230-eng
termid: 6-6-230
language_code: eng
terms:
- type: expression
  designation: On-off switch
  normative_status: preferred
definition:
- content: A device designed to make or break an electric circuit by means of separable
    mechanical contacts having two positions of rest, one corresponding to the open-circuit
    condition and the other to the closed-circuit condition.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
