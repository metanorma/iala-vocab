id: 6-6-250-eng
termid: 6-6-250
data:
  language_code: eng
  terms:
  - type: expression
    designation: Earthing switch
    normative_status: preferred
  definition:
  - content: A mechanical switching device for earthing parts of a circuit, capable
      of withstanding for a specified time currents under abnormal conditions such
      as short-circuit, but not required to carry currents under normal circuit conditions.
