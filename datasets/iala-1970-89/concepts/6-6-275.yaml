id: 6-6-275-eng
termid: 6-6-275
language_code: eng
terms:
- type: expression
  designation: Fuse
  normative_status: preferred
definition:
- content: A device that, by the melting of one or more of its components, opens the
    circuit in which it is inserted when the current exceeds a given value for a sufficient
    time.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
