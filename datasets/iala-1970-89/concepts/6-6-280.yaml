data:
  language_code: eng
  terms:
  - type: expression
    designation: Fuse link
    normative_status: preferred
  definition:
  - content: A component of a fuse that is to be replaced after the fuse has operated.
  notes:
  - content: A small fuse link consisting of a ceramic or glass cylinder with metal
      caps at each end, connected by fusible wire, is called a.cartridge fuse.
