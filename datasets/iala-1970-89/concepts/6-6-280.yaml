id: 6-6-280-eng
termid: 6-6-280
language_code: eng
terms:
- type: expression
  designation: Fuse link
  normative_status: preferred
definition:
- content: |-
    A component of a fuse that is to be replaced after the fuse has operated.



    Note: A small fuse link consisting of a ceramic or glass cylinder with metal caps at each end, connected by fusible wire, is called a.cartridge fuse.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
