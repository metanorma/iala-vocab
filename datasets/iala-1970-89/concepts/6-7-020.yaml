id: 6-7-020-eng
termid: 6-7-020
language_code: eng
terms:
- type: expression
  designation: Screened transformer
  normative_status: preferred
definition:
- content: |-
    Alternative term: Shielded transformer


    A transformer in which an earthed screen or shield is interposed between the primary and secondary circuits, to reduce the transmission of transients by way of capacitance coupling between the windings.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
