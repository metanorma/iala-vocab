id: 6-7-060-eng
termid: 6-7-060
language_code: eng
terms:
- type: expression
  designation: Phase converter
  normative_status: preferred
definition:
- content: A device that converts electric energy in an alternating-current circuit
    with a certain number of phases into electric energy in another alternating-current
    circuit with a different number of phases.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
