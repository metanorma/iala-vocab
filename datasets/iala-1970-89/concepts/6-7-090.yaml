id: 6-7-090-eng
termid: 6-7-090
language_code: eng
terms:
- type: expression
  designation: Voltage stabiliser
  normative_status: preferred
definition:
- content: |-
    A device that automatically keeps a voltage within specified limits.



    Note: The term automatic voltage regulator (AVR) is used for a device that automatically keeps the output voltage of a generator within specified limits.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
