id: 6-8-005-eng
termid: 6-8-005
language_code: eng
terms:
- type: expression
  designation: Electric installation
  normative_status: preferred
definition:
- content: |-
    1 - An assemblage of electric apparatus and all the associated electric equipment and connections, at a given location for co-ordinated purposes.


    2 - The process of making such an assemblage.
