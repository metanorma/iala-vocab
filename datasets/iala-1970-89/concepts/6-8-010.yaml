id: 6-8-010-eng
termid: 6-8-010
language_code: eng
terms:
- type: expression
  designation: Energy consumption
  normative_status: preferred
definition:
- content: |-
    The total energy absorbed, including losses, by a device in a given time.



    Note:  The term power consumption refers to the power taken, including losses, by a device.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
