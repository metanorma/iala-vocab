id: 6-8-020-eng
termid: 6-8-020
language_code: eng
terms:
- type: expression
  designation: Rated power output
  normative_status: preferred
definition:
- content: |-
    (rated) power output


    Alternative term: Full load


    The minimum power available from a source if the normal specified operating conditions are observed.



    Note:  The term " power output " is sometimes used to mean output power, but this usage is deprecated.
sources:
- type: authoritative
  origin:
