id: 6-8-035-eng
termid: 6-8-035
language_code: eng
terms:
- type: expression
  designation: Peak load
  normative_status: preferred
definition:
- content: |-
    Alternative term: Maximum demand


    The greatest value of an average load in a given interval of time that is significantly longer than the interval used to define the average load.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
