id: 6-8-055-eng
termid: 6-8-055
language_code: eng
terms:
- type: expression
  designation: Utilisation factor
  normative_status: preferred
definition:
- content: The ratio of the total energy delivered by a source in a given interval
    of time to the total energy available from the source in the same interval of
    time.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
