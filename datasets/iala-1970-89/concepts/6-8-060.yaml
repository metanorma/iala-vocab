id: 6-8-060-eng
termid: 6-8-060
language_code: eng
terms:
- type: expression
  designation: Load factor
  normative_status: preferred
definition:
- content: The ratio of the total energy delivered by a source in a given interval
    of time to the energy that would have been delivered if the peak load had been
    maintained throughout the same interval of time.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
