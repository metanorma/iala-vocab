id: 6-8-075-eng
termid: 6-8-075
data:
  language_code: eng
  terms:
  - type: expression
    designation: Installed capacity
    normative_status: preferred
  definition:
  - content: The sum of the rated power outputs that are available from a set of sources
      of the same kind.
  notes:
  - content: In French the term puissance installee refers also to the total load
      that can be connected to a source.
