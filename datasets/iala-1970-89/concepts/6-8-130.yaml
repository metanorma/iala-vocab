id: 6-8-130-eng
termid: 6-8-130
language_code: eng
terms:
- type: expression
  designation: Air termination (of a lightning protection system)
  normative_status: preferred
definition:
- content: A conducting device mounted at or above the highest point of a building
    or structure, to provide protection by discharging atmospheric electric charges.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
