data:
  language_code: eng
terms:
- type: expression
  designation: Air termination (of a lightning protection system)
  normative_status: preferred
definition:
- content: A conducting device mounted at or above the highest point of a building
    or structure, to provide protection by discharging atmospheric electric charges.
