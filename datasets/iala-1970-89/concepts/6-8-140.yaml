id: 6-8-140-eng
termid: 6-8-140
language_code: eng
terms:
- type: expression
  designation: Overload relay
  normative_status: preferred
definition:
- content: |-
    A relay that operates at a preset value of overload.



    Note:  An overload relay is usually made to respond to current, but the response may be to power, temperature, etc.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
