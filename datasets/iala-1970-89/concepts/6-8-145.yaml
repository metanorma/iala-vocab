id: 6-8-145-eng
termid: 6-8-145
language_code: eng
terms:
- type: expression
  designation: Control gear
  normative_status: preferred
definition:
- content: A general term covering switching devices and their combination with associated
    control, measuring, protective and regulating equipment, together with their enclosures,
    supporting structures and interconnections, for the control of equipment consuming
    electric energy.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
