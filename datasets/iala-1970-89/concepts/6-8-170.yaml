id: 6-8-170-eng
termid: 6-8-170
language_code: eng
terms:
- type: expression
  designation: Variable auto-transformer
  normative_status: preferred
definition:
- content: An auto-transformer in which at least one of the external connections may
    be moved along the winding to vary the turns ratio and so to control the alternating
    supply voltage output.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
