id: 6-8-175-eng
termid: 6-8-175
language_code: eng
terms:
- type: expression
  designation: Watt-hour meter
  normative_status: preferred
definition:
- content: |-
    An instrument that measures the consumption of energy in watt-hours.



    Note:  The term kilowatt-hour meter applies when the consumption is measured in kilowatt-hours.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
