id: 6-8-190-eng
termid: 6-8-190
language_code: eng
terms:
- type: expression
  designation: Socket and plug connection
  normative_status: preferred
definition:
- content: |-
    Alternative term: Power point


    An arrangement of electrical connections that can be made between moveable conductors and permanent wiring.



    Note:  The French term prise (de courant) is often used for either of the component parts (6-8-195 and 6-8-200).
sources:
- type: authoritative
  origin:
