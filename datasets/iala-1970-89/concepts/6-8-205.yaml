id: 6-8-205-eng
termid: 6-8-205
language_code: eng
terms:
- type: expression
  designation: Alarm system
  normative_status: preferred
definition:
- content: A system of visual or audible devices to indicate that a fault has occurred
    on a machine or apparatus and that action must be taken to investigate and correct
    the fault.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
