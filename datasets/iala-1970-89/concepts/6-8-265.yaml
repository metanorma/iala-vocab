id: 6-8-265-eng
termid: 6-8-265
language_code: eng
terms:
- type: expression
  designation: Totally enclosed enclosure (or machine)
  normative_status: preferred
definition:
- content: An enclosure (or machine) designed to prevent the free flow of air to or
    from the outside, but not to be airtight.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
