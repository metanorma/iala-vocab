id: 6-8-270-eng
termid: 6-8-270
language_code: eng
terms:
- type: expression
  designation: Flame-protected enclosure (or machine)
  normative_status: preferred
definition:
- content: |-
    Alternative term: Flameproof enclosure (or machine)


    An enclosure (or machine) designed to withstand an internal explosion of a given flammable gas and to prevent an internal flame from passing outside to ignite a given flammable gas in the surrounding atmosphere.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
