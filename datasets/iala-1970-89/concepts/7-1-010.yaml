id: 7-1-010-eng
termid: 7-1-010
language_code: eng
terms:
- type: expression
  designation: Shore station
  normative_status: preferred
definition:
- content: |-
    Alternative term: Land station


    An aid to navigation station founded on or close to the coast, emitting signals that can provide navigational information to vessels in the vicinity.



    Note: The station may also be defined in terms of its principal aid to navigation, e.g. light station, fog signal station.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
