id: 7-1-035-eng
termid: 7-1-035
language_code: eng
terms:
- type: expression
  designation: Jetty
  normative_status: preferred
definition:
- content: |-
    A structure, generally in sheltered waters, extending into the water from a shore or bank, to provide landing facilities and possibly also berthing for vessels.



    Note: See 7-1-040 Note:
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
