id: 7-1-040-eng
termid: 7-1-040
language_code: eng
terms:
- type: expression
  designation: Quay (2)
  normative_status: preferred
definition:
- content: |-
    A construction of earth faced with masonry or other material along a coast or bank, to permit berthing for vessels, usually with cargo-handling facilities.



    Note: A jetty or quay with cargo handling facilities is called a wharf.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
