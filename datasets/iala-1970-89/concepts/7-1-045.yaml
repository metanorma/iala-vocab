id: 7-1-045-eng
termid: 7-1-045
language_code: eng
terms:
- type: expression
  designation: Pier (2)
  normative_status: preferred
definition:
- content: A structure with a wood or concrete deck supported on piles extending over
    open water to provide a landing place where the depth of water would otherwise
    be prohibitive.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
