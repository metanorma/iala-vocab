id: 7-1-055-eng
termid: 7-1-055
language_code: eng
terms:
- type: expression
  designation: Landing
  normative_status: preferred
definition:
- content: |-
    Any area, structure or part of a structure designated for the transfer of personnel or materials between a vessel and the shore or structure.


    Note: The French term cale denotes a gently sloping area on which a landing can be made.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
