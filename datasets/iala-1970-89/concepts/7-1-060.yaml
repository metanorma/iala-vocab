id: 7-1-060-eng
termid: 7-1-060
language_code: eng
terms:
- type: expression
  designation: Landing stage (2)
  normative_status: preferred
definition:
- content: |-
    A small platform attached to the land, used to facilitate the transference of personnel and materials between a vessel and land.



    Note: The French term estacade applies to a small platform intended to assist in handling a vessel.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
