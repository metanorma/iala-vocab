id: 7-1-090-eng
termid: 7-1-090
language_code: eng
terms:
- type: expression
  designation: Dolphin
  normative_status: preferred
definition:
- content: A construction driven into a river - or sea-bed, used either to absorb
    berthing forces of a vessel, or to provide a mooring point.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
