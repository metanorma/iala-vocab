id: 7-1-105-eng
termid: 7-1-105
language_code: eng
terms:
- type: expression
  designation: Depot
  normative_status: preferred
definition:
- content: A site at which buoys are repaired, serviced, maintained and stored when
    not on station. It also includes offices, workshops and other facilities.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
