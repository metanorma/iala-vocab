id: 7-1-175-eng
termid: 7-1-175
language_code: eng
terms:
- type: expression
  designation: Septic tank
  normative_status: preferred
definition:
- content: A settling tank in which sewage sludges are retained and undergo digestion
    by anaerobic bacteria while partially treated liquid is discharged.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
