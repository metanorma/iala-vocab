id: 7-2-040-eng
termid: 7-2-040
language_code: eng
terms:
- type: expression
  designation: Footing
  normative_status: preferred
definition:
- content: A load-bearing construction at the base of a wall or column, wider than
    the wall or column, designed to spread the load to the ground.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
