id: 7-2-125-eng
termid: 7-2-125
language_code: eng
terms:
- type: expression
  designation: Riprap
  normative_status: preferred
definition:
- content: |-
    stone pitching


    Stones used to form a protective covering to an earth embankment or river banks to prevent scour and erosion.



    Note: The French term enrochements and the German term Steinschuttung also apply to stones used to provide a protective mound or embankment.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
