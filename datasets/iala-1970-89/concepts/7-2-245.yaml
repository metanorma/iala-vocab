id: 7-2-245-eng
termid: 7-2-245
language_code: eng
terms:
- type: expression
  designation: Pile
  normative_status: preferred
definition:
- content: A structural member driven into or cast in-situ in the ground, intended
    to transmit the foundation load of a building to a load-bearing stratum.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
