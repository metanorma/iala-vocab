id: 7-2-285-eng
termid: 7-2-285
language_code: eng
terms:
- type: expression
  designation: Extruded section
  normative_status: preferred
definition:
- content: |-
    Rods, tubes or sections of intricate shape formed by forcing metal or plastic through a die shaped to the required section.


    The process may be undertaken hot or cold depending on the material.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
