id: 7-2-295-eng
termid: 7-2-295
language_code: eng
terms:
- type: expression
  designation: Flange (of a girder)
  normative_status: preferred
definition:
- content: |-
    The transverse plates of a girder, connected together by the web.



    Note: The German term Gurt is used for timber beams of I-section, and in statics. The term Flansch is used for I-section steel beams.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
