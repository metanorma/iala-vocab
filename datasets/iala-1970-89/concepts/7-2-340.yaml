id: 7-2-340-eng
termid: 7-2-340
data:
  language_code: eng
  terms:
  - type: expression
    designation: Bolt
    normative_status: preferred
  definition:
  - content: |-
      Cylindrical bar with square or hexagonal head, threaded at one end to receive a nut.

      The threaded section does not continue as far as the head. A bolt is a commonly used fixing for joining metal parts.
  notes:
  - content: The French term boulon is also used for the combination of a nut and
      bolt.
  - content: The term set screw and the French term vis calante are used when the
      threaded part continues as far as the head.
  - content: The term stud applies to a set screw without a head.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  annotations:
