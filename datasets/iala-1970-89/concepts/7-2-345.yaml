id: 7-2-345-eng
termid: 7-2-345
language_code: eng
terms:
- type: expression
  designation: HSFG bolt
  normative_status: preferred
definition:
- content: |-
    High strength friction grip bolt


    High tensile bolt tightened to a high torque to join steelwork members together purely by friction, and not in shear or bending. The bolt is a loose clearance fit into its hole.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
