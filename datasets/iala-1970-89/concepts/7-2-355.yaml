id: 7-2-355-eng
termid: 7-2-355
language_code: eng
terms:
- type: expression
  designation: Rivet
  normative_status: preferred
definition:
- content: A short metal cylinder with a head at one end, the other end being passed
    through a pre-drilled hole in two parts to be joined. The end is subsequently
    spread by the action of a compressing tool to form a rigid connection.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
