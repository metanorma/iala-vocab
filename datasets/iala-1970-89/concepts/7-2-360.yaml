id: 7-2-360-eng
termid: 7-2-360
data:
  language_code: eng
terms:
- type: expression
  designation: Screw
  normative_status: preferred
definition:
- content: A tapered metal rod enlarged at one end to form a head and with an external
    helical projection. It is intended to be driven by rotation into a material in
    which it cuts a corresponding thread.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The French term vis is also used for a bolt {{7-2-340, Bolt}}.
