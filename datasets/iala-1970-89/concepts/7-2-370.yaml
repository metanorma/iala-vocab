data:
  language_code: eng
  terms:
  - type: expression
    designation: Plug (masonry)
    normative_status: preferred
  definition:
  - content: Cylindrical or tapered plastic or fibre device inserted into drilled
      masonry, into which a screw may cut a corresponding thread, while expanding
      the plug to form a secure fixing.
