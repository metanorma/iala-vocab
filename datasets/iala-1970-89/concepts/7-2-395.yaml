id: 7-2-395-eng
termid: 7-2-395
language_code: eng
terms:
- type: expression
  designation: Dovetail
  normative_status: preferred
definition:
- content: A joint used in masonry or joinery for connecting two members together,
    one member having fan shaped tenons projecting from it which fit into a similar
    shaped rebate in the other member.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
