id: 7-2-430-eng
termid: 7-2-430
language_code: eng
terms:
- type: expression
  designation: Drip
  normative_status: preferred
definition:
- content: A groove provided beneath a cornice, coping, roof or sill, designed to
    prevent water flowing back to the building by encouraging the formation of drips.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
