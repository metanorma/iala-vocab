id: 7-2-440-eng
termid: 7-2-440
language_code: eng
terms:
- type: expression
  designation: Damp-proof membrane
  normative_status: preferred
definition:
- content: |-
    Acronym: dpm


    Impervious membrane of bituminous, plastic, or other material placed across the foundation slab of a building, or vertically on the face of a wall, to prevent damp penetration from the external ground. The membrane is connected to the damp-proof course.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
