id: 7-2-535-eng
termid: 7-2-535
language_code: eng
terms:
- type: expression
  designation: Lintel
  normative_status: preferred
definition:
- content: |-
    Alternative term: Lintol


    A beam over a wall opening, typically over a door or window, to carry the wall load.



    Note: The German term Sturz and the French term linteau can also apply to a brick arch construction used instead of a lintel.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
