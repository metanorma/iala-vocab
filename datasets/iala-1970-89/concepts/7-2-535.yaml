id: 7-2-535-eng
termid: 7-2-535
data:
  language_code: eng
  terms:
  - type: expression
    designation: Lintel
    normative_status: preferred
  - type: expression
    designation: Lintol
    normative_status: admitted
  definition:
  - content: A beam over a wall opening, typically over a door or window, to carry
      the wall load.
  notes:
  - content: The German term Sturz and the French term linteau can also apply to a
      brick arch construction used instead of a lintel.
