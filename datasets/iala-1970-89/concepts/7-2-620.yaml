id: 7-2-620-eng
termid: 7-2-620
language_code: eng
terms:
- type: expression
  designation: Land drain
  normative_status: preferred
definition:
- content: A drain specifically for removing water from the adjacent soil or ground,
    constructed of perforated or porous pipes, or a trench partially filled with coarse
    aggregate.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
