id: 7-2-640-eng
termid: 7-2-640
language_code: eng
terms:
- type: expression
  designation: Air termination
  normative_status: preferred
definition:
- content: A conducting device mounted at or above the highest point of a building
    or structure, to provide protection by discharging atmospheric electrical charges.
