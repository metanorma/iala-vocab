id: 7-2-655-eng
termid: 7-2-655
language_code: eng
terms:
- type: expression
  designation: Lantern
  normative_status: preferred
definition:
- content: The glazed enclosure, usually of cylindrical or polygonal shape, at the
    top of a lighthouse, light vessel or buoy, which surrounds and protects the optical
    apparatus.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
