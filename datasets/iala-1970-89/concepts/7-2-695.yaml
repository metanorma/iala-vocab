id: 7-2-695-eng
termid: 7-2-695
language_code: eng
terms:
- type: expression
  designation: Weight tube
  normative_status: preferred
definition:
- content: Tube running vertically through a lighthouse tower, usually centrally,
    up to the lantern level, which contains the weights for clockwork operated mechanisms.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
