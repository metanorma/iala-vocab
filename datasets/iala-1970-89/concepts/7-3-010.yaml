id: 7-3-010-eng
termid: 7-3-010
language_code: eng
terms:
- type: expression
  designation: Wrought iron
  normative_status: preferred
definition:
- content: Malleable iron formed hot by forging. It has a lower carbon content than,
    and is softer than, steel.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
