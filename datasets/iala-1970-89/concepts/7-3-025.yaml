id: 7-3-025-eng
termid: 7-3-025
language_code: eng
terms:
- type: expression
  designation: High tensile steel
  normative_status: preferred
definition:
- content: |-
    Alternative term: High yield steel


    Steel having a higher tensile strength than mild steel, containing up to 0.3 % carbon, 0.5 % copper, and 1.5 % manganese, or other metals.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
