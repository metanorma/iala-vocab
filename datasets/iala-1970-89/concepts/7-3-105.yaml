id: 7-3-105-eng
termid: 7-3-105
language_code: eng
terms:
- type: expression
  designation: Limestone
  normative_status: preferred
definition:
- content: |-
    A sedimentary rock, composed mainly of calcite deposits.



    Note: In English, limestone used for buildings is identified by the locality from which it originates, e.g. Portland stone, Purbeck stone, Bath stone.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
