id: 7-3-150-eng
termid: 7-3-150
language_code: eng
terms:
- type: expression
  designation: Shingle
  normative_status: preferred
definition:
- content: |-
    A small roofing plate made of a material other than clay.



    Note: 1 In Great Britain and Germany shingles are only of wood. In the USA wood or metal are used.



    Note: 2 The term shingle in French is used for imitations of shingles in various materials other than in wood, clay or slate.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
