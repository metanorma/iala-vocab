id: 7-3-225-eng
termid: 7-3-225
language_code: eng
terms:
- type: expression
  designation: Concrete
  normative_status: preferred
definition:
- content: |-
    A mixture of cement, aggregate, sand and water which hardens to a solid material with a high crushing strength.


    The proportions of cement, aggregate, sand and water may be adjusted to impart specific properties to the concrete.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
