id: 7-3-230-eng
termid: 7-3-230
language_code: eng
terms:
- type: expression
  designation: Fresh concrete
  normative_status: preferred
definition:
- content: |-
    Alternative term: Green concrete


    Concrete which has completed an initial set but has not properly hardened.



    Note: The German word Frischbeton applies to a workable concrete before initial set.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
