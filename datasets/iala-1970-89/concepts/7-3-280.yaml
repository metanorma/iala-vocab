id: 7-3-280-eng
termid: 7-3-280
language_code: eng
terms:
- type: expression
  designation: Starter bar
  normative_status: preferred
definition:
- content: A steel reinforcing bar projecting through a construction joint in a reinforced
    concrete construction, and used to effectively connect adjoining masses of reinforced
    concrete.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
