id: 7-3-295-eng
termid: 7-3-295
language_code: eng
terms:
- type: expression
  designation: Slaked lime
  normative_status: preferred
definition:
- content: |-
    Dry hydrated lime (calcium hydroxide) in a powder form, sometimes used as a component of mortar.



    Note: Calcium hydroxide is obtained from calcium oxide by the addition of a suitable amount of water. This process is called slaking.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
