id: 7-3-355-eng
termid: 7-3-355
language_code: eng
terms:
- type: expression
  designation: Plank
  normative_status: preferred
definition:
- content: |-
    Alternative term: Board


    A piece of square sawn timber which is broad in relation to its thickness.



    Note: A plank is thicker than a board.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
