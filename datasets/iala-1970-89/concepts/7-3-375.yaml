id: 7-3-375-eng
termid: 7-3-375
language_code: eng
terms:
- type: expression
  designation: Plywood
  normative_status: preferred
definition:
- content: Structural timber board manufactured from an odd number of sheets of veneer
    glued together, the grain of each sheet alternating at right angles in each layer,
    giving a high strength and dimensional stability.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
