id: 7-3-420-eng
termid: 7-3-420
language_code: eng
terms:
- type: expression
  designation: Metal spraying
  normative_status: preferred
definition:
- content: Application of a thin film of zinc, aluminium, or other suitable metal,
    over a metal surface (usually steel) using a special spray gun to melt and apply
    the coating metal to provide corrosion protection.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
