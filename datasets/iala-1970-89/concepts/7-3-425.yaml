id: 7-3-425-eng
termid: 7-3-425
language_code: eng
terms:
- type: expression
  designation: Hot-dip galvanising
  normative_status: preferred
definition:
- content: The application of a zinc coating by the immersion of steelwork in molten
    zinc, to provide a corrosion resistant surface.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
