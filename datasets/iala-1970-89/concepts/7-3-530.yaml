id: 7-3-530-eng
termid: 7-3-530
language_code: eng
terms:
- type: expression
  designation: Bitumen
  normative_status: preferred
definition:
- content: A black hydrocarbon mixture which occurs naturally or can be manufactured
    by distilling crude oil. It is mainly used as a waterproofing agent, and in road
    construction.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
