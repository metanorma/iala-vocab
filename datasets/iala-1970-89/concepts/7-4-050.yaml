id: 7-4-050-eng
termid: 7-4-050
language_code: eng
terms:
- type: expression
  designation: Swell (2)
  normative_status: preferred
definition:
- content: Oscillatory motion of the sea surface caused by strong winds in another
    area, or by a weather system which has since passed, which appears as a succession
    of long rolling waves.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
