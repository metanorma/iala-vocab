id: 7-4-085-eng
termid: 7-4-085
language_code: eng
terms:
- type: expression
  designation: Tidal bore
  normative_status: preferred
definition:
- content: |-
    (tidal) bore


    A fast travelling upriver wave generated in certain tidal conditions in rivers subject to a large tidal range and a rapid narrowing in width.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
