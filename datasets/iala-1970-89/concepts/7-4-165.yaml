id: 7-4-165-eng
termid: 7-4-165
language_code: eng
terms:
- type: expression
  designation: Mean sea level
  normative_status: preferred
definition:
- content: A level of the sea surface calculated as a mean of high and low water levels
    of all tides over a long period.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
