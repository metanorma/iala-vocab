id: 7-4-190-eng
termid: 7-4-190
language_code: eng
terms:
- type: expression
  designation: Silt
  normative_status: preferred
definition:
- content: |-
    A natural fine grained sediment consisting of granular and mainly siliceous products of rock weathering.



    Note: In French a distinction is made between siliceous silt (silt) and organic silt (limon).
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
