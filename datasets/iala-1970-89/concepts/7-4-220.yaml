id: 7-4-220-eng
termid: 7-4-220
language_code: eng
terms:
- type: expression
  designation: Cohesion
  normative_status: preferred
definition:
- content: The mutual attraction that exists in some soils (eg clays) between fine
    particles, tending to hold them together without the application of external forces.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
