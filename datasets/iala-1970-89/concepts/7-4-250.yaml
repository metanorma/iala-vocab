id: 7-4-250-eng
termid: 7-4-250
data:
  language_code: eng
  terms:
  - type: expression
    designation: Liquidity index
    normative_status: preferred
  definition:
  - content: |-
      The index that relates the plasticity of a soil to its natural moisture content.

      Liquidity index = (natural moisture content - plastic limit) / plasticity index
  notes:
  - content: The complement to unity of the liquidity index is called in French indice
      de consistance, and in German Konsistenzzahl.
