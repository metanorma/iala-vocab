id: 7-4-290-eng
termid: 7-4-290
language_code: eng
terms:
- type: expression
  designation: Running ground
  normative_status: preferred
definition:
- content: |-
    Soil or sand masses with a very high water content leading to fluidisation of the ground.


    The term may also be applied to very fine, dry, cohesionless soils.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
