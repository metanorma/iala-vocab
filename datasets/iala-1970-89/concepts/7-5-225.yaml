id: 7-5-225-eng
termid: 7-5-225
language_code: eng
terms:
- type: expression
  designation: Deflection
  normative_status: preferred
definition:
- content: The elastic movement of parts of a structure due to applied loadings, usually
    referring to the vertical downward displacement at the centre of a loaded beam.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
