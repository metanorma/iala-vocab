id: 7-5-390-eng
termid: 7-5-390
language_code: eng
terms:
- type: expression
  designation: Contract documents
  normative_status: preferred
definition:
- content: Those documents consisting of the specification, bills of quantities, drawings,
    conditions of contract and agreement which form a legal contract between a contractor
    and the client for undertaking building or civil engineering works.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
