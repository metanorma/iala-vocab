id: 7-5-395-eng
termid: 7-5-395
language_code: eng
terms:
- type: expression
  designation: Conditions of contract
  normative_status: preferred
definition:
- content: Those conditions, including agreement on rates of payment and time for
    completion, detailed by the client under which the contract for undertaking certain
    works is to be performed, forming a legally binding document.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
