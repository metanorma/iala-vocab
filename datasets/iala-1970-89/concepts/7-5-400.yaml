id: 7-5-400-eng
termid: 7-5-400
language_code: eng
terms:
- type: expression
  designation: Specification
  normative_status: preferred
definition:
- content: That part of the Contract Documents which details standards of workmanship,
    quality of materials, etc., and which, read in conjunction with the contract drawings,
    give a full description of the works.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
