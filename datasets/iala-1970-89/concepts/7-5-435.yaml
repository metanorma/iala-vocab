id: 7-5-435-eng
termid: 7-5-435
language_code: eng
terms:
- type: expression
  designation: Hysteresis
  normative_status: preferred
definition:
- content: |-
    Effect resulting from the irreversibility of the relation of stress to strain for a body under variation of an applied force.



    Note: The loop formed in the stress/strain curve under cyclic variation of the applied force is called the hysteresis loop.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
