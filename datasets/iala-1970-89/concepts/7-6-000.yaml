id: 7-6-000-eng
termid: 7-6-000
language_code: eng
terms:
- type: expression
  designation: Ready-mixed concrete
  normative_status: preferred
definition:
- content: |-
    Concrete which is delivered to site ready for use.



    Note: The materials are loaded into a concrete mixer on the delivery vehicle at the suppliers, and mixed during the delivery journey.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
