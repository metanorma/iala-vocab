id: 7-6-040-eng
termid: 7-6-040
language_code: eng
terms:
- type: expression
  designation: Setting (of concrete)
  normative_status: preferred
definition:
- content: 'The initial hardening phase of concrete when the material is firm but
    still low in strength. Note: Before the initial set occurs, concrete is called
    wet concrete.'
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
