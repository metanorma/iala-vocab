id: 7-6-060-eng
termid: 7-6-060
language_code: eng
terms:
- type: expression
  designation: To strike off
  normative_status: preferred
definition:
- content: To level off the free surface of concrete contained in shuttering by passing
    a board across the surface, supported each side by the top edge of the shuttering.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
