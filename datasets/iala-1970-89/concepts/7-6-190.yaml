id: 7-6-190-eng
termid: 7-6-190
language_code: eng
terms:
- type: expression
  designation: Fender pile
  normative_status: preferred
definition:
- content: An upright pile, usually free standing, used to protect berths from vessel
    impact, often provided with an additional shock absorbing system.
