id: 7-6-245-eng
termid: 7-6-245
language_code: eng
terms:
- type: expression
  designation: Caisson
  normative_status: preferred
definition:
- content: A box shaped or cylindrical structure used to keep water or soft ground
    from entering an excavation while excavating down to a bearing stratum for foundations.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
