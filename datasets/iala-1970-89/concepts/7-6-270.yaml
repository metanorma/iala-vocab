id: 7-6-270-eng
termid: 7-6-270
language_code: eng
terms:
- type: expression
  designation: Towing
  normative_status: preferred
definition:
- content: |-
    The action of pulling an object through the water by means of a rope.



    Note: In French and in German a distinction is made between remorquage, Schleppen for towing by a vessel and halage, Treideln for towing by a land-based vehicle.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
