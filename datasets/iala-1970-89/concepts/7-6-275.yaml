id: 7-6-275-eng
termid: 7-6-275
language_code: eng
terms:
- type: expression
  designation: Jack-up platform
  normative_status: preferred
definition:
- content: A working platform which may be towed to a desired position, where supports
    are extended to the seabed in order to support and raise the platform above the
    water.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
