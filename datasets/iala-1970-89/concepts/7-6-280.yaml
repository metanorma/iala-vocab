id: 7-6-280-eng
termid: 7-6-280
language_code: eng
terms:
- type: expression
  designation: Fascine
  normative_status: preferred
definition:
- content: A bundle of brushwood tied into a cylindrical shape, used as a protective
    facing to river banks or coastal regions, or to float a road over waterlogged
    soil.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
