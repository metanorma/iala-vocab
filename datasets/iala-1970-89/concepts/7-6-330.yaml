data:
  language_code: eng
  terms:
  - type: expression
    designation: Mattress
    normative_status: preferred
  definition:
  - content: A flexible layer of fascines, geotextiles, or other material used to
      reinforce a waterlogged soil, or used on a river or sea bed to prevent scour,
      overlaid with rocks and stones to retain it in position.
