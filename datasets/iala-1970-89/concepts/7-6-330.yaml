id: 7-6-330-eng
termid: 7-6-330
language_code: eng
terms:
- type: expression
  designation: Mattress
  normative_status: preferred
definition:
- content: A flexible layer of fascines, geotextiles, or other material used to reinforce
    a waterlogged soil, or used on a river or sea bed to prevent scour, overlaid with
    rocks and stones to retain it in position.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
