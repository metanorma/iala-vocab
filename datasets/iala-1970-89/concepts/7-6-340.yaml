id: 7-6-340-eng
termid: 7-6-340
language_code: eng
terms:
- type: expression
  designation: Shearlegs
  normative_status: preferred
definition:
- content: A lifting device consisting of two poles lashed together at their upper
    ends at which point a hoisting tackle is hung. The lower ends are spaced apart
    but can rotate in the plane of the lift.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
