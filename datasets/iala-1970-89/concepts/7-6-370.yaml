id: 7-6-370-eng
termid: 7-6-370
language_code: eng
terms:
- type: expression
  designation: Tower crane
  normative_status: preferred
definition:
- content: A long horizontal counter-balanced jib mounted on top of a slender tower,
    used to give total coverage of congested sites with just the one lifting device.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
