id: 7-6-380-eng
termid: 7-6-380
language_code: eng
terms:
- type: expression
  designation: Bosun's chair
  normative_status: preferred
definition:
- content: |-
    A lightly built seat suspended from a cable with tackle attached to permit access to the exterior faces of structures for painting or other maintenance work.



    Note: A similar system can be employed for the transfer of personnel or material between a vessel and an otherwise inaccessible lighthouse.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
