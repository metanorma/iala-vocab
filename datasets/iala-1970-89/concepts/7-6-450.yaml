id: 7-6-450-eng
termid: 7-6-450
language_code: eng
terms:
- type: expression
  designation: To solder
  normative_status: preferred
definition:
- content: |-
    Alternative term: To sweat


    To join together items of copper, brass or lead using a soft lead-tin alloy which is melted at a relatively low temperature at the join, then hardens and bonds forming a connection.
sources:
- type: authoritative
  origin:
