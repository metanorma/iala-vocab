    designation: Anchor bar
    normative_status: preferred
  - type: expression
    designation: Anchor bolt
    normative_status: admitted
  definition:
  - content: Steel or other metal bar or bolt projecting from, and securely fixed
      in, a masonry or concrete structure enabling a superimposed structure or machinery
      to be fixed in place.
