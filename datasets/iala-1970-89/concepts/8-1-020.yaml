data:
  language_code: eng
  terms:
  - type: expression
    designation: River tender (USA)
    normative_status: preferred
  definition:
  - content: A vessel designed for servicing aids to navigation in swiftly moving
      waters. This type of tender usually operates in close conjunction with a barge.
