id: 8-1-035-eng
termid: 8-1-035
language_code: eng
terms:
- type: expression
  designation: Depot motor launch
  normative_status: preferred
definition:
- content: "A launch used for transporting personnel and stores between a depot and
    vessels at harbour moorings. Also used as a general depot workboat.\n\n\n\nNote :
    \n\n\nAlso sometimes called a tender."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
