id: 8-1-055-eng
termid: 8-1-055
language_code: eng
terms:
- type: expression
  designation: Pontoon
  normative_status: preferred
definition:
- content: A flat-bottomed boat or other floating structure that provides a platform
    for lifting equipment and can be used for transporting construction materials
    or to accommodate working plant of various sizes.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
