id: 8-2-020-eng
termid: 8-2-020
language_code: eng
terms:
- type: expression
  designation: Light float
  normative_status: preferred
definition:
- content: An unmanned floating mark that is boat-shaped and is fitted with a signal
    light. It may carry various additional aids to navigation.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
