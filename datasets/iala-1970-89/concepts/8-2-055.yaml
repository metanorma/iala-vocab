id: 8-2-055-eng
termid: 8-2-055
language_code: eng
terms:
- type: expression
  designation: Stabilizing pendulum
  normative_status: preferred
definition:
- content: A device intended to reduce tilting of the optical system of a floating
    body such as a light vessel, light float or large navigation buoy, when the body
    moves under the action of waves or currents. The optical system is mounted on
    a pendulum inside the lantern.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
