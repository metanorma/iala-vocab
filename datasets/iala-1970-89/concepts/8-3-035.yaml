id: 8-3-035-eng
termid: 8-3-035
language_code: eng
terms:
- type: expression
  designation: Derrick
  normative_status: preferred
definition:
- content: "Alternative term: (Cargo) boom\n\n\nA spar projecting from a mast, gantry,
    tripod or other supporting structure, and fitted with topping lift, slewing guys
    and lifting tackle.\n\n\n\nNote : \n\n\nIn Germany, the term Schwergutbaum is
    used for derricks of more than 10 tons load."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
