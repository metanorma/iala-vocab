id: 8-3-060-eng
termid: 8-3-060
language_code: eng
terms:
- type: expression
  designation: Whip
  normative_status: preferred
definition:
- content: The single-wire hoisting rope, usually led from a position below the main
    hoist on a derrick, which lifts light loads at high speed.
