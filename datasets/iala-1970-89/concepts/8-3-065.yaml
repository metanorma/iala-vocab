id: 8-3-065-eng
termid: 8-3-065
language_code: eng
terms:
- type: expression
  designation: Shock absorber
  normative_status: preferred
definition:
- content: |-
    Device fitted to the main derrick lifting block to absorb shock loads.



    Note :


    In Germany, the device fitted to the main derrick lifting block incorporates the lifting hook and is called Federhaken.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
