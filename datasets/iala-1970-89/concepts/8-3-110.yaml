id: 8-3-110-eng
termid: 8-3-110
data:
  language_code: eng
terms:
- type: expression
  designation: Capstan
  normative_status: preferred
definition:
- content: A barrel mounted on a vertical shaft and used for heaving on ropes or chain
    cables. It may be power driven or operated by hand. The base of the barrel may
    be fitted with a clutched cable lifter for raising and lowering the anchor or
    handling buoy and light vessel cable.
