id: 8-3-120-eng
termid: 8-3-120
language_code: eng
terms:
- type: expression
  designation: Hawsepipe (of a vessel)
  normative_status: preferred
definition:
- content: A cylindrical or elliptical pipe made of cast steel or iron, situated near
    the stem of a vessel, through which the anchor cable runs.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
