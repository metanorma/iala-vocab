id: 8-3-140-eng
termid: 8-3-140
language_code: eng
terms:
- type: expression
  designation: Bow roller
  normative_status: preferred
definition:
- content: "A large roller incorporated into the stem head to facilitate the handling
    of chain or lines over the bow.\n\n\n\nNote : \n\n\nA ramp may be used instead
    of a roller, in which case the term bow ramp is used."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
