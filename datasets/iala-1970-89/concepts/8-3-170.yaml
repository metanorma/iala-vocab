id: 8-3-170-eng
termid: 8-3-170
language_code: eng
terms:
- type: expression
  designation: Block
  normative_status: preferred
definition:
- content: Mounting for one or more pulleys between parallel faces, intended to change
    the direction of one or more lines. The mounting is fitted with an eye for attachment.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
