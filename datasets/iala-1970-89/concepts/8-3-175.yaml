id: 8-3-175-eng
termid: 8-3-175
language_code: eng
terms:
- type: expression
  designation: Snatch block
  normative_status: preferred
definition:
- content: A single block with a hinged face which allows fibre or wire rope to be
    placed on the sheave without the delay of reeving or unreeving.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
