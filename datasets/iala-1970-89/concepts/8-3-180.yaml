id: 8-3-180-eng
termid: 8-3-180
language_code: eng
terms:
- type: expression
  designation: Lashing
  normative_status: preferred
definition:
- content: |-
    A device of rope or wire rope for securing a body to prevent motion in seaway. Lashings are usually adjustable.



    Note :


    In Great Britain, devices for securing buoys or boats, consisting of bands or chains, are called gripes.
sources:
- type: authoritative
  origin:
