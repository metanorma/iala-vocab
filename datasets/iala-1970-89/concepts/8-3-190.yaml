id: 8-3-190-eng
termid: 8-3-190
language_code: eng
terms:
- type: expression
  designation: Mooring recovery wire
  normative_status: preferred
definition:
- content: |-
    Swamp wire


    A loop of fibre or wire rope, thrown over a buoy to pick up the buoy chain when lifting.



    Note :


    In the USA, the terms lariat and lasso are applied to a loop of fibre or wire rope, or chain, thrown over an unlighted buoy when picking it up out of the water.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
