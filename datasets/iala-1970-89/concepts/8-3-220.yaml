id: 8-3-220-eng
termid: 8-3-220
language_code: eng
terms:
- type: expression
  designation: Chain sling
  normative_status: preferred
definition:
- content: Any sling made of chain, but more specifically a short length of chain
    having an elongated pear-shaped link or hook at each end, intended for the lifting
    of heavy loads.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
