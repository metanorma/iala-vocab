id: 8-4-040-eng
termid: 8-4-040
language_code: eng
terms:
- type: expression
  designation: Watch buoy
  normative_status: preferred
definition:
- content: |-
    Alternative term: Station buoy (USA)


    A buoy established in the vicinity of an aid to navigation such as a light vessel or Lanby, as a reference point in case the aid should drift off station.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
