id: 8-4-050-spa
termid: 8-4-050
language_code: spa
terms:
- type: expression
  designation: Winter buoy/es
  normative_status: preferred
definition:
- content: "Boya de invierno \n\n\n\nBoya en general ciega utilizada como sustitución
    de una boya luminosa o una boya ciega grande  en ciertas áreas durante los meses
    de invierno cuando se retiran temporalmente otras ayudas  a  la navegación.\n\n\n\nNota
    1:\n\n\nEl término boya de hielo se usa cuando la boya está diseñada para resistir
    los efectos del hielo.\n\n\n\nNota 2:\n\n\nEn alemán, el término Winterbetonnung
    significa el estado del sistema de flotación modificado durante los meses de invierno.\n\n\n\nNota
    3:\n\n\nEl término francés \"bouee d'hiver\" no se usa mucho en Francia."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
