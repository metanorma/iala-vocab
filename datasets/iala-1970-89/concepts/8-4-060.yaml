id: 8-4-060-spa
termid: 8-4-060
language_code: spa
terms:
- type: expression
  designation: ODAS buoy/es
  normative_status: preferred
definition:
- content: |-
    Boya ODAS



    Término alternativo: boya de Sistema de Adquisición de Datos Oceánicos.


    Boya  destinada a la recopilación de datos oceanográficos. Puede estar fondeada  o flotar libremente . No es una ayuda a la navegación, pero está clasificada como una boya  especial en el Sistema de Señalización Marítimo de IALA.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
