id: 8-4-060-eng
termid: 8-4-060
language_code: eng
terms:
- type: expression
  designation: ODAS buoy
  normative_status: preferred
definition:
- content: |-
    Alternative term: Ocean Data Acquisition Systems buoy


    A buoy intended for the collection of data on properties of the ocean. It may be moored or free-floating. It is not an aid to navigation but is classified as a special buoy in the IALA Maritime Buoyage System.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
