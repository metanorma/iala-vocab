id: 8-4-085-eng
termid: 8-4-085
language_code: eng
terms:
- type: expression
  designation: Buoy lantern
  normative_status: preferred
definition:
- content: |-
    The glazed enclosure near the top of a buoy, usually of cylindrical shape, that surrounds and protects the optical apparatus.



    Note:


    The term is sometimes used loosely for the buoy light
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
