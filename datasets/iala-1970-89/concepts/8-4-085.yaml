id: 8-4-085-spa
termid: 8-4-085
language_code: spa
terms:
- type: expression
  designation: Buoy lantern/es
  normative_status: preferred
definition:
- content: |-
    Linterna de boya



    Envolvente acristalada cerca de la parte superior de la boya generalmente de forma cilíndrica que rodea y protege el aparato óptico-luminoso.





    Nota:


    El término se usa a veces para la luz de la boya.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
