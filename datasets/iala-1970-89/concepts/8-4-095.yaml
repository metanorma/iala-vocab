id: 8-4-095-spa
termid: 8-4-095
language_code: spa
terms:
- type: expression
  designation: Topmark/es
  normative_status: preferred
definition:
- content: "Marca de tope \n\n\nObjeto o par de objetos de forma y color característico
    que se instalan en la parte superior de una boya como medio de identificación.\n\n\n\n\n\nNota:\n\n\nPara
    obtener información sobre los topmarks utilizados en el Sistema de flotación marítima
    de IALA, consulte el Capítulo 2 (Rev)."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
