id: 8-4-115-eng
termid: 8-4-115
language_code: eng
terms:
- type: expression
  designation: Buoy vent
  normative_status: preferred
definition:
- content: A conduit connected to the battery pocket in a buoy, open to the atmosphere,
    but usually self-sealing against ingress of water. The vent allows release of
    gas from the cells of the battery. It may also allow ingress of air.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
