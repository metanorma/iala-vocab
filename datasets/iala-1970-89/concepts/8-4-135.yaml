id: 8-4-135-eng
termid: 8-4-135
language_code: eng
terms:
- type: expression
  designation: Roll damping device
  normative_status: preferred
definition:
- content: |-
    Device fitted to a buoy or Lanby to reduce the amplitude of rolling motion.



    Note:


    Various devices used include :


    the tail tube

    the skirt

    the stabilising ring
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
