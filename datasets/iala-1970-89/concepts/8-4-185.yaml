id: 8-4-185-eng
termid: 8-4-185
language_code: eng
terms:
- type: expression
  designation: Reserve buoyancy
  normative_status: preferred
definition:
- content: The watertight volume of a vessel above the designed waterline, expressed
    as a percentage of the total buoyancy (volume). It is an indication of the seaworthiness
    of the vessel.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
