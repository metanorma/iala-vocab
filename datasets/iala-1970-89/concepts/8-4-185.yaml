id: 8-4-185-spa
termid: 8-4-185
language_code: spa
terms:
- type: expression
  designation: Reserve buoyancy/es
  normative_status: preferred
definition:
- content: "Reserva de flotabilidad \n\n\n\nVolumen hermético de un barco por encima
    de la línea de flotación diseñada , expresado como un porcentaje de la flotabilidad
    total (volumen). Es una indicación de la navegabilidad de la embarcación\n."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
