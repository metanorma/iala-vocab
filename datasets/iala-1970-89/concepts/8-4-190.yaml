id: 8-4-190-eng
termid: 8-4-190
language_code: eng
terms:
- type: expression
  designation: Cathodic protection
  normative_status: preferred
definition:
- content: Protection of submerged metal parts by the preferential corrosion of specially
    located pieces of relatively electropositive metal forming a sacrificial anode.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
