id: 8-4-195-spa
termid: 8-4-195
language_code: spa
terms:
- type: expression
  designation: Anti-fouling paint/es
  normative_status: preferred
definition:
- content: "Pintura anti-incrustante\n\n\n \nPintura utilizada en  embarcaciones y
    boyas que tiene la propiedad de reducir la tasa de crecimiento de la fauna marina
    en la superficie del casco o cuerpo protegido."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
