id: 8-4-195-eng
termid: 8-4-195
language_code: eng
terms:
- type: expression
  designation: Anti-fouling paint
  normative_status: preferred
definition:
- content: Paint used on vessels and buoys that has the property of reducing the rate
    of marine growth on the hull or body.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
