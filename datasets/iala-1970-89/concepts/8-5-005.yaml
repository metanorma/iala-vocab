id: 8-5-005-eng
termid: 8-5-005
language_code: eng
terms:
- type: expression
  designation: Bower anchor
  normative_status: preferred
definition:
- content: 'One of the anchors carried on either bow of a vessel as the main riding
    anchors. Note : They are called the port bower and the starboard bower respectively.'
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
