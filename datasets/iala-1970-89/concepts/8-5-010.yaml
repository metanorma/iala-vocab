id: 8-5-010-eng
termid: 8-5-010
language_code: eng
terms:
- type: expression
  designation: Backing
  normative_status: preferred
definition:
- content: An arrangement in which a small anchor or sinker is put out ahead of the
    main anchor or sinker, to support the latter and to prevent it from loosening
    or dragging.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
