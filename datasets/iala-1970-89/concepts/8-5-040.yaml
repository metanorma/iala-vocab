id: 8-5-040-eng
termid: 8-5-040
language_code: eng
terms:
- type: expression
  designation: Mooring
  normative_status: preferred
definition:
- content: |-
    System or process for securing a vessel or buoy to a sinker, to the shore or to a mooring buoy.



    Note:


    The term "mooring" is also commonly used to denote the position at which a vessel is anchored.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
