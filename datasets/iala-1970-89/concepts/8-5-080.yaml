id: 8-5-080-eng
termid: 8-5-080
language_code: eng
terms:
- type: expression
  designation: Bridle (chain)
  normative_status: preferred
definition:
- content: Chain taken from two or more mooring eyes of a buoy and brought together
    at a central link (e.g. a catface) connecting them to the main mooring chain through
    a swivel.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
