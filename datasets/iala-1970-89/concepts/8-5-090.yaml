id: 8-5-090-eng
termid: 8-5-090
language_code: eng
terms:
- type: expression
  designation: Tail chain
  normative_status: preferred
definition:
- content: Part of the mooring chain of a buoy or Lanby, connected to a mooring lug
    at the bottom of the buoy or brought out through the tail tube.
