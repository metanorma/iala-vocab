id: 8-5-135-eng
termid: 8-5-135
language_code: eng
terms:
- type: expression
  designation: Kenter shackle
  normative_status: preferred
definition:
- content: |-
    Alternative term: Detachable link


    A stud link in three parts that can be opened by removing a diagonal pin that runs through the stud and the other two parts of the shackle. Used for connecting chains or replacing faulty links.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
