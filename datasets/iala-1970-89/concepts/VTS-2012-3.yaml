data:
  language_code: eng
terms:
- type: expression
  designation: Aid to Navigation (2)
  normative_status: preferred
definition:
- content: Any device or system, external to a vessel, which is provided to help a
    mariner determine position and course, to warn of dangers or of obstructions,
    or to give advice about the location of a best or preferred route.
