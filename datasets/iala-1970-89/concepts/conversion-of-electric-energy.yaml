id: conversion-of-electric-energy-eng
termid: conversion-of-electric-energy
language_code: eng
terms:
- type: expression
  designation: Conversion of electric energy
  normative_status: preferred
definition:
- content: |-
    6-7-000


    Change of input electric energy of one kind into output electric energy of another kind (e.g. change of voltage, frequency, waveform or number of phases ; change of alternating current into direct current or vice versa).
