  designation: Ranging Mode (R-Mode)
  normative_status: preferred
definition:
- content: Ranging Mode (R-Mode) is a maritime positioning and timing system that
    uses radio infrastructure to transmit synchronised radio signals in frequency
    bands which are allocated to maritime usage.
