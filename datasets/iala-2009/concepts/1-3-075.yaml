    designation: Scotch mist
    normative_status: preferred
  - type: expression
    designation: Fine drizzle
    normative_status: admitted
  definition:
  - content: Fairly even precipitation of extremely numerous very small droplets of
      water, which almost appear to be suspended in the air, and which may reduce
      the meteorological visibility.
