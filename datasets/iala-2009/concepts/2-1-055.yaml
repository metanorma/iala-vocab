id: 2-1-055-eng
termid: 2-1-055
data:
  language_code: eng
  terms:
  - type: expression
    designation: Illuminance
    normative_status: preferred
  - type: expression
    designation: Illuminance (at a point of a surface)
    normative_status: admitted
  - type: symbol
    designation: stem:[E]
    normative_status: preferred
  definition:
  - content: |-
      The quotient of the luminous flux (dF) incident on an infinitesimal element of the surface containing the point under consideration, by the area (dA) of that element.

      ![Ch2_Fig3.jpg](/iala-vocab/images/iala/Ch2_Fig3.jpg)

      lumen per square metre (lm/m2)

      (Equation)

      where F is the total luminous flux incident on the surface.
