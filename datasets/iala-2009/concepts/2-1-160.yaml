id: 2-1-160-eng
termid: 2-1-160
data:
  language_code: eng
  terms:
  - type: expression
    designation: Coefficient of (Reflex) Luminous Intensity
    normative_status: preferred
  definition:
  - content: Quotient of the luminous intensity reflected in the direction considered,
      divided by the illuminance at the retro-reflector for given angles of entrance,
      observation and rotation.
  notes:
  - content: In the photometry of retro-reflectors, this coefficient is designated
      by the abbreviation C.I.L. It is usually expressed in millicandelas per lux
      (mcd/lx).
