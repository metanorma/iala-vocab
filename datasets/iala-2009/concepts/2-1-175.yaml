id: 2-1-175-eng
termid: 2-1-175
data:
  language_code: eng
  terms:
  - type: expression
    designation: Diffuse Transmission
    normative_status: preferred
  definition:
  - content: |-
      Transmission in which the light is scattered in many directions and, on the macroscopic scale, independently of the laws of refraction. (Fig. 8b)

