id: 2-1-385-eng
termid: 2-1-385
data:
  language_code: eng
  terms:
  - type: expression
    designation: Rods
    normative_status: preferred
  definition:
  - content: Special retinal receptor elements which are presumed to be primarily
      concerned with perception of light stimuli, when the eye is adapted to darkness.
  notes:
  - content: The rods probably play no part in colour stimulus discrimination (see
      "scotopic vision", 2-1-335).
