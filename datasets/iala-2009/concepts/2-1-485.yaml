id: 2-1-485-eng
termid: 2-1-485
data:
  language_code: eng
terms:
- type: expression
  designation: Chromaticity
  normative_status: preferred
definition:
- content: The colour quality of a colour stimulus definable by its chromaticity co-ordinates,
    or by its dominant (or complementary) wavelength and its purity taken together.
