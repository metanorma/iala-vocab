id: 2-1-505-eng
termid: 2-1-505
data:
  language_code: eng
terms:
- type: expression
  designation: Correlated Colour Temperature
  normative_status: preferred
definition:
- content: The colour temperature corresponding to that point on the line representing
    full radiators of different colour temperature which is nearest to the point representing
    the chromaticity of the illuminant, considered on an agreed uniform-chromaticity-scale
    diagram.
