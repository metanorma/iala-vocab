id: 2-1-550-eng
termid: 2-1-550
data:
  language_code: eng
terms:
- type: expression
  designation: Integrating Photometer
  normative_status: preferred
definition:
- content: Apparatus which enables luminous flux to be determined by a single comparison.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
notes:
- content: The most commonly used form of integrating photometer is the Ulbricht sphere
    with associated photometric equipment.
- content: In Britain, the term Photometric Integrator is also sometimes employed
    with the same meaning.
