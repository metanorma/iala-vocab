id: 2-2-150-eng
termid: 2-2-150
data:
  language_code: eng
terms:
- type: expression
  designation: Equi-Angular Lens
  normative_status: preferred
definition:
- content: A prismatic lens obtained by the rotation of an equi-angular profile about
    the optical axis of the lens. In such a lens, the bullseye and rings usually present
    a continuous convex surface towards the source.
