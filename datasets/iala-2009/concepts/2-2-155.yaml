data:
  language_code: eng
terms:
- type: expression
  designation: Focusing
  normative_status: preferred
definition:
- content: The operation of placing a point object at the focus of an optical apparatus.
- content: The operation of placing a light source about or near the focus of an optical
    apparatus in such a way as to produce a desired light distribution.
