id: 2-2-245-eng
termid: 2-2-245
data:
  language_code: eng
terms:
- type: expression
  designation: Ground and Polished Glass
  normative_status: preferred
- type: expression
  designation: Cut Glass
  normative_status: admitted
definition:
- content: Glass formed, after solidification, into the shape required for optical
    purposes by cutting roughly to shape initially and subsequently shaping accurately
    by grinding and polishing, using abrasive powders at first coarse and becoming
    successively finer.
