id: 2-3-090-eng
termid: 2-3-090
data:
  language_code: eng
  terms:
  - type: expression
    designation: Filament
    normative_status: preferred
  definition:
  - content: |-
      A threadlike conductor, usually of tungsten (or of carbon), which is heated to incandescence by the passage of an electric current.

      ![Ch2_Fig22.jpg](/iala-vocab/images/iala/Ch2_Fig22.jpg)
  sources:
