data:
  language_code: eng
  terms:
  - type: expression
    designation: Photoluminescence
    normative_status: preferred
  definition:
  - content: Luminescence caused by visible, infra-red or ultra-violet radiation.
      The emitted radiation is of longer wavelength than the exciting radiation.
