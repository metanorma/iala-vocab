id: 2-3-300-eng
termid: 2-3-300
data:
  language_code: eng
terms:
- type: expression
  designation: Fluorescence
  normative_status: preferred
definition:
- content: Photoluminescence which persists for an extremely short time after excitation.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E. (extract)
notes:
- content: This time is generally less than about 10-8 second.
- content: 'from Guideline G1134: Referring to surface colours, G1134 provides the
    following further explanation of fluorscence. Fluorescence is the process by which
    electromagnetic radiation of one wavelength is absorbed and re-radiated at another
    wavelength.  Sometimes a fluorescent material will absorb non-visible light and
    emit it as visible light.  Fluorescence and ordinary reflectance of radiation
    take place simultaneously and at the same wavelengths.'
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Fluorescence
