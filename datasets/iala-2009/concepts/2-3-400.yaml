  terms:
  - type: expression
    designation: Carbon Arc Lamp
    normative_status: preferred
  definition:
  - content: A low current density arc lamp with carbon electrodes not containing
      any other material.
  notes:
  - content: In Germany, the term Kohlebogenlampe covers all arc lamps with carbon
      electrodes of any composition.
