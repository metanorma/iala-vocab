terms:
- type: expression
  designation: Daylight Control
  normative_status: preferred
- type: expression
  designation: Sun Relay, Sun Switch
  normative_status: admitted
definition:
- content: A device, operated by daylight, that automatically lights and extinguishes
    an electric light, usually lighting it at or about sunset and extinguishing it
    at or about sunrise.
