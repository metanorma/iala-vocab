id: 2-5-235-eng
termid: 2-5-235
data:
  language_code: eng
  terms:
  - type: expression
    designation: Direction Light
    normative_status: preferred
  definition:
  - content: |-
      a light illuminating a very narrow sector, used to mark a direction to be followed. This sector may be flanked by sectors of greatly reduced intensity or by sectors of different colour or character.

      ![Direction_light_2.png](/iala-vocab/images/iala/Direction_light_2.png)
