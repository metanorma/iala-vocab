id: 2-6-220-eng
termid: 2-6-220
data:
  language_code: eng
terms:
- type: expression
  designation: Bake buoy
  normative_status: preferred
definition:
- content: |-
    A buoy having a superstructure in the shape described by the German term "Bake" {{2-6-035, Easily recognizable structure}}.

    This term includes lighted buoys, whistle buoys and bell buoys.

