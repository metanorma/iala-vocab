data:
  language_code: eng
  terms:
  - type: expression
    designation: Relative gain of an antenna
    normative_status: preferred
  - type: symbol
    designation: stem:[Gd]
    normative_status: preferred
  definition:
  - content: The gain of an antenna in a given direction when the reference antenna
      is a half-wave loss-free dipole isolated in space, the equatorial plane of which
      contains the given direction.
