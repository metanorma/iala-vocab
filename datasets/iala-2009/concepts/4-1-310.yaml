id: 4-1-310-eng
termid: 4-1-310
data:
  language_code: eng
terms:
- type: expression
  designation: Fresnel region
  normative_status: preferred
definition:
- content: For a transmitting antenna system, the region near the antenna system where
    the wavelets arriving from the various parts of the system cannot be considered
    to follow parallel paths.
