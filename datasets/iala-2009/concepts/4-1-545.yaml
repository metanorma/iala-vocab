id: 4-1-545-eng
termid: 4-1-545
data:
  language_code: eng
terms:
- type: expression
  designation: Voltage standing-wave ratio
  normative_status: preferred
definition:
- content: |-
    Acronym: V.S.W.R.

    In a transmission line or waveguide, the ratio of the amplitude of the transverse electric field at a plane of minimum strength to the amplitude at a corresponding point in an adjacent plane of maximum field strength.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: B.S
  modification: modified from source
notes:
- content: In some countries other than Britain, the reciprocal of this ratio is preferred.
