id: 4-1-980-eng
termid: 4-1-980
data:
  language_code: eng
terms:
- type: expression
  designation: Ground wave
  normative_status: preferred
definition:
- content: A wave that is propagated over the earth and is ordinarily affected by
    the presence of the ground and the troposphere. The ground wave includes all components
    of a radio wave over the earth except ionospheric and tropospheric waves.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: I.R.E
notes:
- content: The ground wave is refracted because of variations in the dielectric constant
    of the troposphere including the condition known as the surface duct.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Ground_wave
