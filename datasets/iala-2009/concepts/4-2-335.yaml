id: 4-2-335-eng
termid: 4-2-335
data:
  language_code: eng
  terms:
  - type: expression
    designation: Re-radiation error
    normative_status: preferred
  definition:
  - content: A form of site error caused by re-radiation from adjacent conducting
      objects and from loops formed by those objects.
  notes:
  - content: This error is allowed for in calibration, provided the calibration takes
      account of frequency.
