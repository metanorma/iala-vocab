id: 5-1-030-eng
termid: 5-1-030
data:
  language_code: eng
  terms:
  - type: expression
    designation: Availability (quantitative)
    normative_status: preferred
  definition:
  - content: The probability that a system will be available for operation at an arbitrarily
      chosen instant in the future. It may be expressed as the ratio MTBF/(MTBF +
      MTTR).
