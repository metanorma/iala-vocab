id: 5-1-085-eng
termid: 5-1-085
data:
  language_code: eng
  terms:
  - type: expression
    designation: Redundancy
    normative_status: preferred
  definition:
  - content: The existence of more than one means for accomplishing a given function.
      The various means of accomplishing the function need not necessarily be identical.
      The concept is such that a complete failure can occur only when all means have
      failed.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
