  - type: expression
    designation: Idealized system
    normative_status: preferred
  definition:
  - content: |-
      An imaginary system in which the ultimately controlled variable and the specified command have the relationship which was stipulated.

      ![Ch5_Fig2.jpg](/iala-vocab/images/iala/Ch5_Fig2.jpg)

      Figure 2 - Block diagram of automatic control system (5-2-045) incorporating a closed loop {{5-2-080, Closed Loop}}
