data:
  language_code: eng
  terms:
  - type: expression
    designation: Frequency division multiplex (FDM)
    normative_status: preferred
  definition:
  - content: A system in which the band of frequencies which may be transmitted on
      a common transmission path is divided into narrower bands, each used for a separate
      channel.
