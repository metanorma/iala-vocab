id: 5-3-310-eng
termid: 5-3-310
data:
  language_code: eng
terms:
- type: expression
  designation: Companding
  normative_status: preferred
definition:
- content: The combination of a compression process and an expansion process carried
    out successively on the same signal at two different points of a transmission
    path.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: I.E.C
  modification: modified from source
notes:
- content: Companding is often used for noise reduction in which case the compression
    is the part applied before the noise.
