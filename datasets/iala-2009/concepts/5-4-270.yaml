terms:
- type: expression
  designation: Crossbar switch
  normative_status: preferred
definition:
- content: A switch having a plurality of vertical paths, a plurality of horizontal
    paths, and an electromagnetically operated means of interconnecting any one of
    the vertical paths with any one of the horizontal paths.
