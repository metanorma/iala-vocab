data:
  language_code: eng
  terms:
  - type: expression
    designation: Octane number (of petrol)
    normative_status: preferred
  definition:
  - content: A number indicating the capacity of petrol to avoid knocking. Petrol
      intended for use in an engine of high compression ratio must have a high octane
      number.
