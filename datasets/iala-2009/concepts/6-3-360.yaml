id: 6-3-360-eng
termid: 6-3-360
data:
  language_code: eng
  terms:
  - type: expression
    designation: Acetylene
    normative_status: preferred
  definition:
  - content: A hydrocarbon fuel, C2H2, which is a colourless, highly flammable gas
      at ordinary temperatures and atmospheric pressure. It is principally used as
      an illuminant for signal lights, either with or without a mantle.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  annotations:
  - content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Acetylene
