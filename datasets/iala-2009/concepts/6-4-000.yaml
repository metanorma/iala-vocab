data:
  language_code: eng
  terms:
  - type: expression
    designation: Rotary electric machine
    normative_status: preferred
  definition:
  - content: |-
      (rotary) electric machine

      An apparatus having component parts capable of relative rotary motion, that utilizes the phenomenon of electromagnetic induction to provide conversion from electric energy to mechanical energy or vice-versa.
