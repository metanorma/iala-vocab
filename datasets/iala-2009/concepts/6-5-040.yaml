id: 6-5-040-eng
termid: 6-5-040
data:
  language_code: eng
terms:
- type: expression
  designation: Polarisation (of an electrochemical cell)
  normative_status: preferred
definition:
- content: An effect at an electrode surface that diminishes the potential difference
    between the electrode and the electrolyte when a current is flowing.
