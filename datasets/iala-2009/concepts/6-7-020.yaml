id: 6-7-020-eng
termid: 6-7-020
data:
  language_code: eng
terms:
- type: expression
  designation: Screened transformer
  normative_status: preferred
- type: expression
  designation: Shielded transformer
  normative_status: admitted
definition:
- content: A transformer in which an earthed screen or shield is interposed between
    the primary and secondary circuits, to reduce the transmission of transients by
    way of capacitance coupling between the windings.
