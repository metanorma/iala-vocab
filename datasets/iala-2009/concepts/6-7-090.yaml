    designation: Voltage stabiliser
    normative_status: preferred
  definition:
  - content: A device that automatically keeps a voltage within specified limits.
  notes:
  - content: The term automatic voltage regulator (AVR) is used for a device that
      automatically keeps the output voltage of a generator within specified limits.
