data:
  language_code: eng
terms:
- type: expression
  designation: Alarm system
  normative_status: preferred
definition:
- content: A system of visual or audible devices to indicate that a fault has occurred
    on a machine or apparatus and that action must be taken to investigate and correct
    the fault.
