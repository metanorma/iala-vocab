data:
  language_code: eng
  terms:
  - type: expression
    designation: Flange (of a girder)
    normative_status: preferred
  definition:
  - content: The transverse plates of a girder, connected together by the web.
  notes:
  - content: The German term Gurt is used for timber beams of I-section, and in statics.
      The term Flansch is used for I-section steel beams.
