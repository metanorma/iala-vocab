data:
  language_code: eng
  terms:
  - type: expression
    designation: Dowel
    normative_status: preferred
  definition:
  - content: |-
      Alternative terms: Trenail, Treenail

      A cylindrical metal or wood rod or pin used for connections in stonework or timber.
  notes:
  - content: '" Trenail " and the French term cheville apply specifically to a hardwood
      pin.'
  - content: The French term goujon is used only when the pin is of metal.
