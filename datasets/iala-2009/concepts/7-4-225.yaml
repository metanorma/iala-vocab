id: 7-4-225-eng
termid: 7-4-225
data:
  language_code: eng
terms:
- type: expression
  designation: Angle of internal friction
  normative_status: preferred
- type: expression
  designation: Angle of shearing resistance
  normative_status: admitted
definition:
- content: The limiting value of the angle between the reaction on a plane within
    a soil mass at which shearing may occur and the normal to that plane.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The tangent of the angle of internal friction is the coefficient of friction
    for the soil.
