id: 7-6-340-eng
termid: 7-6-340
data:
  language_code: eng
terms:
- type: expression
  designation: Shearlegs
  normative_status: preferred
definition:
- content: A lifting device consisting of two poles lashed together at their upper
    ends at which point a hoisting tackle is hung. The lower ends are spaced apart
    but can rotate in the plane of the lift.
