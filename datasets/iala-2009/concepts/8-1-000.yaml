id: 8-1-000-eng
termid: 8-1-000
data:
  language_code: eng
  terms:
  - type: expression
    designation: Service Vessels
    normative_status: preferred
  definition:
  - content: |-
      A general term for all types of vessel used by lighthouse services.

      Note :

      The German term Seezeichenfahrzeug is a general term for all vessels that mainly attend aids to navigation in order to service them.

      The English term servicing vessel is often used with this meaning.
