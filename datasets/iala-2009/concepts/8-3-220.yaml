data:
  language_code: eng
terms:
- type: expression
  designation: Chain sling
  normative_status: preferred
definition:
- content: Any sling made of chain, but more specifically a short length of chain
    having an elongated pear-shaped link or hook at each end, intended for the lifting
    of heavy loads.
