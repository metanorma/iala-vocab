id: alert-limit-or-threshold-value--eng
termid: alert-limit-or-threshold-value-
data:
  language_code: eng
  terms:
  - type: expression
    designation: Alert limit (or threshold value)
    normative_status: preferred
  definition:
  - content: |-
      The maximum allowable error in the measured position – during integrity monitoring – before an alarm is triggered.

      Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
