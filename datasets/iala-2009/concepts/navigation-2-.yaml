id: navigation-2--eng
termid: navigation-2-
data:
  language_code: eng
  terms:
  - type: expression
    designation: Navigation (2)
    normative_status: preferred
  definition:
  - content: |-
      The process of planning, recording and controlling the movement of a craft from one place to another.

      Navigation system error (NSE). The combined error of the GNSS position estimate and the chart error. The maximum NSE can be described by:

      NSEmax = Chart error + GNSS error + other navigation errors

      Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
