id: protection-eng
termid: protection
data:
  language_code: eng
terms:
- type: expression
  designation: Protection
  normative_status: preferred
definition:
- content: |-
    The provision of legal restraints or controls on the destruction or damaging of buildings or artefacts, natural features, systems, sites, areas or other things of acknowledged value, with a view to their survival or preservation for the future.

    (This definition was noted at the IALA Seminar on the Practical Aspects of Lighthouse Preservation in Gothenburg 2005)
