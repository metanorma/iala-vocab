definition:
- content: |-
    Using the heritage in a way which meets the needs of today without compromising the ability of future generations to understand, appreciate and benefit from the historic environment.

    (This definition was noted at the IALA Seminar on the Practical Aspects of Lighthouse Preservation in Gothenburg 2005)
