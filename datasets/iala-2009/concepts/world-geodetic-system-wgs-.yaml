id: world-geodetic-system-wgs--eng
termid: world-geodetic-system-wgs-
data:
  language_code: eng
terms:
- type: expression
  designation: World geodetic system (WGS)
  normative_status: preferred
definition:
- content: |-
    A consistent set of parameters describing the size and shape of the Earth, positions of a network of points with respect to the centre of mass of the Earth, transformations from major geodetic datums and the potential of the Earth.

    WGS 84. The coordinate system used by GPS.

    Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
