  modification: modified from source
notes:
- content: If the radiant flux Fe may be considered uniformly distributed over a finite
    plane surface of area A, the irradiance on this surface is given by ?? where Fe
    is the total radiant flux incident on the surface.
annotations:
- content: Unit watt per square metre (W/m2)
