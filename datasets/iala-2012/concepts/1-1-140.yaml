terms:
- type: expression
  designation: Irradiance
  normative_status: preferred
- type: expression
  designation: Irradiance (at a point of a surface)
  normative_status: admitted
- type: symbol
  designation: stem:[Ee]
  normative_status: preferred
definition:
- content: The quotient of the radiant flux (dOe) incident on an element of the surface
    containing the point, by the area (dA) of that element.
