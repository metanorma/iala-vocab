id: 1-2-010-eng
termid: 1-2-010
data:
  language_code: eng
  terms:
  - type: expression
    designation: Piloting
    normative_status: preferred
  definition:
  - content: The directing of ships in navigable water where knowledge of local landmarks,
      depths of water etc. is necessary to ensure safe navigation.
  - content: More generally, navigation involving frequent or continuous determination
      of position or a line of position relative to geographical points to a high
      order of accuracy.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
