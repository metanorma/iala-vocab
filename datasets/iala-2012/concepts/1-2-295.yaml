id: 1-2-295-eng
termid: 1-2-295
data:
  language_code: eng
terms:
- type: expression
  designation: Wet Dock
  normative_status: preferred
definition:
- content: |-
    (Wet) Dock

    Harbour or basin which is closed against the tidal range and which provides cargo-handling facilities for ships.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: In the U.S.A. the space between two piers which is not closed against the
    tidal range is also called a dock.
