id: 2-1-060-eng
termid: 2-1-060
data:
  language_code: eng
terms:
- type: expression
  designation: Lux
  normative_status: preferred
- type: symbol
  designation: stem:[lx,]
  normative_status: preferred
definition:
- content: |-
    Lumen per Square Metre

    The SI

    lm/m2 1 lx = 1 lm/m2

    Other metric

    Non-metric units footcandle (fc)

    sea-mile candela (s.m.c.)

    1 fc = 1 lumen per square foot (lm/ft2)

    1 s.m.c. = 1 lumen per square sea-mile

    1 lx = 10-4 phot = footcandle

    = 3.43 x 106 sea-mile candela

    C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
annotations:
- content: Unit of illuminance. The illuminance produced by a luminous flux of one
    lumen uniformly distributed over a surface of area one square metre.
- content: Unit phot (ph)
