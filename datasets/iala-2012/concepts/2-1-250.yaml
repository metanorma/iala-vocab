- type: expression
  designation: Luminous Range (of a light)
  normative_status: admitted
definition:
- content: The maximum distance at which a light can be seen, as determined by the
    luminous intensity of the light, the atmospheric transmission factor and the threshold
    of illuminance on the eye of the observer {{2-1-390, Threshold of Illuminance}}.
