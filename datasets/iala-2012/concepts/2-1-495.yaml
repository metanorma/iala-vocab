id: 2-1-495-eng
termid: 2-1-495
data:
  language_code: eng
terms:
- type: expression
  designation: Distribution Temperature
  normative_status: preferred
definition:
- content: The temperature of the full radiator for which the ordinates of the spectral
    distribution curve of its radiance are proportional, or approximately so, in the
    visible region, to those of the distribution curve of the radiation considered.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
notes:
- content: Both radiations will necessarily have the same, or nearly the same, chromaticity.
annotations:
- content: Unit kelvin (K)
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Distribution_Temperature
