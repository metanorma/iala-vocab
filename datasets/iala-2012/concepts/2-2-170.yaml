id: 2-2-170-eng
termid: 2-2-170
data:
  language_code: eng
terms:
- type: expression
  designation: Focal Plane (of a light)
  normative_status: preferred
definition:
- content: |-
    The horizontal plane through the focus of the optical apparatus of the light.

    ![Ch2_Fig10.jpg](/iala-vocab/images/iala/Ch2_Fig10.jpg)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: In lighthouse practice in some countries the term "focal plane" is used
    with the above meaning, although this is quite a different meaning from that of
    2-2-165.
