id: 2-2-175-eng
termid: 2-2-175
data:
  language_code: eng
terms:
- type: expression
  designation: Optical Panel
  normative_status: preferred
- type: expression
  designation: Flash Panel (U.S.A.)
  normative_status: admitted
definition:
- content: |-
    A prismatic lens which may be of dioptric elements only, or may include both dioptric and catadioptric elements, all mounted in one rigid supporting frame. Such a panel may be symmetrical or asymmetrical according to requirements. One or more panels form an optic.

    (Figs. 10 and 17)

