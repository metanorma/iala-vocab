data:
  language_code: eng
  terms:
  - type: expression
    designation: Cruciform Filament
    normative_status: preferred
  definition:
  - content: |-
      A filament composed of two grid filaments at the same light-centre-length, intersecting symmetrically at right angles along the axis of the lamp.

