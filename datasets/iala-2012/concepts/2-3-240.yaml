termid: 2-3-240
data:
  language_code: eng
terms:
- type: expression
  designation: Metallised Lamp
  normative_status: preferred
definition:
- content: A lamp in which part of the bulb is coated internally or externally with
    a metallic film to form a reflecting surface so that the light is sent in particular
    directions.
