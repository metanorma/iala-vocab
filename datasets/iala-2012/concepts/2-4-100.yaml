id: 2-4-100-eng
termid: 2-4-100
data:
  language_code: eng
  terms:
  - type: expression
    designation: Flasher
    normative_status: preferred
  definition:
  - content: A device which, in a rhythmic light, interrupts the supply of energy
      (in the form of fuel or electric current) to a light source, according to the
      character of the light.
  notes:
  - content: A flasher is a form of coder.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  annotations:
  - content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Flasher
