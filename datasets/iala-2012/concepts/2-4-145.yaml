id: 2-4-145-eng
termid: 2-4-145
data:
  language_code: eng
terms:
- type: expression
  designation: Light controller
  normative_status: preferred
definition:
- content: An automatic apparatus which lights and extinguishes a light as required.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: Several types of apparatus for this purpose exist. See for examples 2-4-150,
    2-4-155, 2-4-160.
- content: The French term Economiseur is used for such apparatus when the light is
    a gas or vapour burner.
