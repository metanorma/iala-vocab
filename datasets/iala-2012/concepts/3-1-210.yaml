id: 3-1-210-eng
termid: 3-1-210
data:
  language_code: eng
terms:
- type: expression
  designation: Aural masking
  normative_status: preferred
definition:
- content: The process by which the threshold of audibility for one sound is raised
    by the presence of another (masking) sound.
- content: The amount by which the threshold of audibility of a sound is raised by
    the presence of another (masking) sound. The unit customarily used is the decibel.
