data:
  language_code: eng
  terms:
  - type: expression
    designation: Reflector
    normative_status: preferred
  definition:
  - content: A secondary radiator, or an array of secondary radiators, or a reflecting
      surface placed behind a primary radiator, an array of primary radiators, or
      a feed, in order to increase forward and reduce backward radiation from the
      antenna.
