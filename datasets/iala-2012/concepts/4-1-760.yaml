id: 4-1-760-eng
termid: 4-1-760
data:
  language_code: eng
terms:
- type: expression
  designation: Muting
  normative_status: preferred
- type: expression
  designation: Squelch (U.S.A.)
  normative_status: admitted
definition:
- content: The process of inhibiting, by an automatic device incorporated in a receiver,
    any response (usually acoustic) to an excitation of less than some predetermined
    magnitude or any response with a signal-to-noise ratio below some predetermined
    value.
- content: Automatically making a receiver insensitive when a neighbouring transmitter
    is working.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: B.S
notes:
- content: The term Noise suppression for this process is deprecated.
- content: This process is often termed Desensitising.
