id: 4-1-860-eng
termid: 4-1-860
data:
  language_code: eng
terms:
- type: expression
  designation: Elliptically polarized wave
  normative_status: preferred
definition:
- content: A wave which can be resolved into two plane polarized waves which are perpendicular
    to each other and propagate in the same direction. The amplitudes of the waves
    may be equal or un-equal and of arbitrary time-phase. The tip of the component
    of the electric field vector in the plane normal to the direction of propagation
    describes an ellipse.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
