terms:
- type: expression
  designation: Search coil
  normative_status: preferred
- type: expression
  designation: Search coil (in an inductive radiogoniometer)
  normative_status: admitted
definition:
- content: A rotatable coil forming the essential moving part of the radiogoniometer
    and coupled to the field coils which induce voltages in it. The search coil is
    normally connected to a receiver.
