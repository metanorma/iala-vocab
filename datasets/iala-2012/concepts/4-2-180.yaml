id: 4-2-180-eng
termid: 4-2-180
data:
  language_code: eng
terms:
- type: expression
  designation: Antenna effect
  normative_status: preferred
definition:
- content: |-
    Alternative terms: Vertical (deprecated), Vertical effect (deprecated)

    The impairment in the definition of the observed bearings, or the error therein, or both, due to the imperfection of electrical symmetry in a receiving system which is designed to be electrically symmetrical (e.g. a loop antenna direction finder).
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The antenna effect is usually limited to the vertical antenna effect in
    loop antennas.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Antenna_effect
