id: 4-3-255-eng
termid: 4-3-255
data:
  language_code: eng
  terms:
  - type: expression
    designation: Distance resolution
    normative_status: preferred
  - type: expression
    designation: Range resolution
    normative_status: admitted
  definition:
  - content: The ability of a radar to differentiate targets solely by distance measurement.
      Distance resolution is generally expressed as the minimum radial distance by
      which targets must be spaced to be separately distinguishable.
