id: 4-3-310-eng
termid: 4-3-310
data:
  language_code: eng
terms:
- type: expression
  designation: Anti-clutter gain control
  normative_status: preferred
- type: expression
  designation: Swept gain, Gain time control (G.T.C.) (deprecated), Anti-clutter sea,
    Sensitivity time control (S.T.C.) (U.S.A.)
  normative_status: admitted
definition:
- content: A device which automatically, and in a predetermined manner, increases
    the gain of a radar set from a low level to the maximum, within a certain period
    after each transmitter pulse, so that short-range echoes which may be unwanted
    are amplified less than long-range echoes.
