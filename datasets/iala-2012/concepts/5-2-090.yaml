id: 5-2-090-eng
termid: 5-2-090
data:
  language_code: eng
terms:
- type: expression
  designation: Step control system
  normative_status: preferred
definition:
- content: A system in which the manipulated variable assumes discrete predetermined
    values.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: ANSI
notes:
- content: 'Note:: The condition for change from one predetermined value to another
    is often a function of the value of the actuating signal. When the number of values
    of the manipulated variable is two it is called a two-step control system, when
    more than two, a multi-step control system.'
