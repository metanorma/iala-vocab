id: 5-3-110-eng
termid: 5-3-110
data:
  language_code: eng
  terms:
  - type: expression
    designation: Pulse duty factor
    normative_status: preferred
  definition:
  - content: The ratio of the average pulse duration to the average pulse spacing.
  notes:
  - content: This is equivalent to the product of the average pulse duration and the
      pulse repetition rate.
  - content: In French the definition of the term "facteur de duree" is more restrictive
      than the definition of pulse duty factor.
