id: 5-3-265-eng
termid: 5-3-265
data:
  language_code: eng
terms:
- type: expression
  designation: Parasitic radiation
  normative_status: preferred
definition:
- content: Spurious radiation accidentally generated at frequencies which are independent
    both of the carrier or characteristic frequencies of an emission and of frequencies
    of oscillations appearing in the course of generation of the oscillation at carrier
    or characteristic frequencies.
