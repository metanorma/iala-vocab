id: 5-3-290-eng
termid: 5-3-290
data:
  language_code: eng
terms:
- type: expression
  designation: Pre-emphasis
  normative_status: preferred
definition:
- content: A modification of the gain-frequency characteristic of a channel normally
    resulting in an increase of the relative amplitude of higher frequency signal
    components which is used in conjunction with a separate, but corresponding, inverse
    process of de-emphasis to improve the signal-to-noise ratio.
