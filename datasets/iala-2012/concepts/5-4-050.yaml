id: 5-4-050-eng
termid: 5-4-050
data:
  language_code: eng
  terms:
  - type: expression
    designation: Gate
    normative_status: preferred
  definition:
  - content: A device having one output channel and one or more input channels, such
      that the output channel state is completely determined by the contemporaneous
      input channel states, except during switching transients.
  notes:
  - content: An and gate is a device in which the output channel is in its one state
      if and only if each input channel is in a one state.
  - content: An exclusive or gate is a device in which the output channel is in a
      one state if one or the other, but not both, of the input channels is in the
      one state.
  - content: A nand gate, or not and gate, is a device in which the output channel
      is the logical complement of the and gate.
  - content: A nor gate is a device in which the output channel is the logical complement
      of the or gate.
  - content: An or gate is a device in which the output channel is in a one state
      if any one or more of the input channels is in a one state.
  sources:
