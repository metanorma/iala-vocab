id: 5-4-355-eng
termid: 5-4-355
data:
  language_code: eng
  terms:
  - type: expression
    designation: Fog-bank detector
    normative_status: preferred
  definition:
  - content: A device which detects the presence of a region of severely reduced visibility
      at a distance from the device and can be used to control aids to navigation
      when the nearer boundary of the region is within a prescribed distance from
      the detector and within a sector wherein navigation may be affected.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
