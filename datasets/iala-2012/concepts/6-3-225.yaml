id: 6-3-225-spa
termid: 6-3-225
data:
  language_code: spa
  terms:
  - type: expression
    designation: Cut-out wind speed (of a wind-power generator)/es
    normative_status: preferred
  definition:
  - content: |-
      Velocidad de corte del viento (de un generador eólico)

      Velocidad máxima del viento a la cual el generador está diseñado para producir energía utilizable

      Nota: A una velocidad más alta, el funcionamiento del sistema se interrumpe para evitar daños.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
