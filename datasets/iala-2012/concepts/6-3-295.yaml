id: 6-3-295-eng
termid: 6-3-295
data:
  language_code: eng
terms:
- type: expression
  designation: Tide-actuated generator
  normative_status: preferred
definition:
- content: A generator that produces electric energy from the motion of the tidal
    current.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: Such generators may be actuated by the pressure of a head of water built
    up behind a barrage, or by direct conversion of the energy of tidal flow. In the
    latter case, the term tidal stream rotor is also used.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Tide-actuated_generator
