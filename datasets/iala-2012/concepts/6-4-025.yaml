id: 6-4-025-eng
termid: 6-4-025
data:
  language_code: eng
  terms:
  - type: expression
    designation: Armature
    normative_status: preferred
  definition:
  - content: The part of a rotary electric machine in which an alternating voltage
      is generated and the load current is carried, or which, when a current is passed
      through the coils wound on it, provides motive power.
  notes:
  - content: In Great Britain, the term is used only if the part is on the rotor of
      the machine, and then it refers to the complete rotor.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  annotations:
