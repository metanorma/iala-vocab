id: 6-4-100-eng
termid: 6-4-100
data:
  language_code: eng
  terms:
  - type: expression
    designation: Duty factor (of a machine or apparatus)
    normative_status: preferred
  definition:
  - content: The ratio or percentage of the duration of working under load to the
      duration of the complete cycle of operations specified.
  notes:
  - content: The term " duty cycle " is sometimes used in Great Britain with this
      meaning, but this usage is deprecated.
