id: 6-4-305-eng
termid: 6-4-305
data:
  language_code: eng
  terms:
  - type: expression
    designation: Auto-transformer starting (of an a.c. motor)
    normative_status: preferred
  definition:
  - content: The process of starting an alternating-current motor with the primary
      winding initially connected to an auto-transformer, and then reconnected directly
      to the supply for the normal running conditions.
