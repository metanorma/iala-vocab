id: 6-5-015-eng
termid: 6-5-015
data:
  language_code: eng
  terms:
  - type: expression
    designation: Primary cell
    normative_status: preferred
  definition:
  - content: An electrochemical cell in which the chemical reaction is irreversible.
  notes:
  - content: The cell is not re-usable after the charge is exhausted.
  - content: There are many types of primary cells, of which the most common are zinccarbon
      (Leclanche), alkaline-manganese and lithium.
