id: 6-5-085-eng
termid: 6-5-085
data:
  language_code: eng
terms:
- type: expression
  designation: Emergency battery
  normative_status: preferred
definition:
- content: A battery used to maintain the essential services on the failure of principal
    power supply at a station.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The term can also be used for a battery that provides power to emergency
    apparatus that has been brought into service.
