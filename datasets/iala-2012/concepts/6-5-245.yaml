id: 6-5-245-eng
termid: 6-5-245
data:
  language_code: eng
  terms:
  - type: expression
    designation: Battery connected to a power source
    normative_status: preferred
  definition:
  - content: A battery connected to a power source so that at times of peak demand
      its ouput is added to that of the source, while at times of low demand the energy
      available from the source is sufficient to recharge the battery.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
