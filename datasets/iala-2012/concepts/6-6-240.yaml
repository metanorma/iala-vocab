id: 6-6-240-eng
termid: 6-6-240
data:
  language_code: eng
  terms:
  - type: expression
    designation: Circuit breaker
    normative_status: preferred
  definition:
  - content: A switch in which the open-circuit state is produced automatically under
      given conditions.
  notes:
  - content: The device may also be used for manual operation under normal conditions.
  - content: If the open-circuit state is produced sufficiently quickly to prevent
      the short-circuit current from attaining its full value, the term high-speed
      circuit breaker is applied.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
