id: 8-1-040-eng
termid: 8-1-040
data:
  language_code: eng
terms:
- type: expression
  designation: Service motor boat
  normative_status: preferred
definition:
- content: |-
    A launch carried by a lighthouse tender or buoy tender.

    These boats are strongly built and are often certified as approved lifeboats, with a capacity to suit the crew of the tender. Their service duty is the transportation of personnel, stores or working equipment to and from the tender.
