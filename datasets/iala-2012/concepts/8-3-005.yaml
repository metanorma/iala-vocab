id: 8-3-005-eng
termid: 8-3-005
data:
  language_code: eng
terms:
- type: expression
  designation: Rigging
  normative_status: preferred
definition:
- content: |-
    General term covering masts, yards, booms and gaffs and all ropes, chains and gear used for operating these.

    Note :

    There are two types of rigging : standing rigging and running rigging.
