id: 8-4-165-eng
termid: 8-4-165
data:
  language_code: eng
terms:
- type: expression
  designation: Centre of gravity (of a buoy)
  normative_status: preferred
definition:
- content: The point about which the net moment of all the gravitational forces acting
    on the buoy is zero for all positions of the buoy. The total weight of the buoy
    may be considered as a downward force through this point.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
