id: 8-5-135-eng
termid: 8-5-135
data:
  language_code: eng
terms:
- type: expression
  designation: Kenter shackle
  normative_status: preferred
- type: expression
  designation: Detachable link
  normative_status: admitted
definition:
- content: A stud link in three parts that can be opened by removing a diagonal pin
    that runs through the stud and the other two parts of the shackle. Used for connecting
    chains or replacing faulty links.
