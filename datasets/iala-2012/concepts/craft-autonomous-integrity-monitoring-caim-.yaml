id: craft-autonomous-integrity-monitoring-caim--eng
termid: craft-autonomous-integrity-monitoring-caim-
data:
  language_code: eng
terms:
- type: expression
  designation: Craft autonomous integrity monitoring (CAIM)
  normative_status: preferred
definition:
- content: A technique whereby a variety of navigation sensor information available
    on the craft is autonomously processed to monitor the integrity of the navigation
    signals. (See also receiver autonomous integrity monitoring.)
