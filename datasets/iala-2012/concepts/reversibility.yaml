id: reversibility-eng
termid: reversibility
data:
  language_code: eng
  terms:
  - type: expression
    designation: Reversibility
    normative_status: preferred
  definition:
  - content: |-
      Concept of work to a building, part of a building or artefact being carried out in such a way that it can be reversed at some future time, without any significant damage having been done.

      (This definition was noted at the IALA Seminar on the Practical Aspects of Lighthouse Preservation in Gothenburg 2005)
