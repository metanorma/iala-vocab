id: 1-1-035-eng
termid: 1-1-035
data:
  language_code: eng
terms:
- type: expression
  designation: Lateral system of marking
  normative_status: preferred
- type: expression
  designation: Lateral system of marking (or buoyage)
  normative_status: admitted
definition:
- content: An agreed system of visual aids to navigation generally used to indicate
    the course of a navigable waterway.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The sides of the navigable waterway are indicated by aids to navigation
    of defined shape, colour or light characteristic in relation to the direction
    taken by the mariner from seaward or to the direction determined by the competent
    authority.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Lateral_system_of_marking
