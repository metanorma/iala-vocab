data:
  language_code: eng
  terms:
  - type: expression
    designation: Free oscillation
    normative_status: preferred
  definition:
  - content: The oscillation of a system in the absence of any exterior force.
  notes:
  - content: Free oscillations of a mechanical system are usually called natural vibrations
      of the system.
