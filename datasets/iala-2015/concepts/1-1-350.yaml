id: 1-1-350-eng
termid: 1-1-350
data:
  language_code: eng
  terms:
  - type: expression
    designation: Beat
    normative_status: preferred
  definition:
  - content: Oscillation is produced by the superimposition of two oscillations of
      slightly different frequencies. The amplitude of this oscillation varies periodically
      with a frequency that is the difference of the frequencies of the two oscillations.
