  terms:
  - type: expression
    designation: Light Exposure
    normative_status: preferred
  - type: symbol
    designation: stem:[H]
    normative_status: preferred
  definition:
  - content: |-
      The product of an illuminance (E) and its duration (dt).

      H = ?E.dt
  notes:
  - content: Formerly Quantity of Illumination and, in French, Quantite d'Eclairement.
  - content: Equivalent definition Surface density of the quantity of light received.
