id: 2-1-290-eng
termid: 2-1-290
data:
  language_code: eng
  terms:
  - type: expression
    designation: Meteorological Optical Range
    normative_status: preferred
  - type: symbol
    designation: stem:[MOR]
    normative_status: preferred
  definition:
  - content: The length of path in the atmosphere required to reduce the luminous
      flux in a collimated beam from an incandescent lamp at a colour temperature
      of 2 700 K to 0.05 of its original value, the luminous flux being evaluated
      by means of the curve of spectral luminous efficiencies for photopic vision
      given by the International Commission on Illumination (C.I.E.) {{2-1-015, Spectral
      Luminous Efficiency}}.
  notes:
  - content: The quantity so defined above approximately corresponds to the distance
      in the atmosphere required to reduce the contrast of an object against its background
      to five per cent of the value it would have at zero distance, for daytime observation.
      The evidence of most experimental results at present indicates that, for practical
      purposes, it is also the same as the "meteorological visibility", and that the
      earlier use of the "meteorological range" (2-1-280, Note 2:) was rather optimistic
      for practical applications.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  - type: authoritative
    origin:
      ref:
        source: W.M.O
