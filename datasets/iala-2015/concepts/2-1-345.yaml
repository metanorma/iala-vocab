id: 2-1-345-eng
termid: 2-1-345
data:
  language_code: eng
terms:
- type: expression
  designation: Purkinje Phenomenon
  normative_status: preferred
definition:
- content: The reduction in the luminosity of a red light relative to that of a blue
    light when the luminances are reduced in the same proportion without changing
    the respective spectral distributions.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
notes:
- content: In passing from photopic to scotopic vision, the spectral luminous efficiencies
    change, the wavelength of maximum efficiency being displaced towards the shorter
    wavelengths.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Purkinje_Phenomenon
