id: 2-2-085-eng
termid: 2-2-085
data:
  language_code: eng
  terms:
  - type: expression
    designation: Prismatic Lens
    normative_status: preferred
  definition:
  - content: |-
      An assembly consisting of a bullseye together with concentric dioptric and (sometimes) catadioptric rings, the foci of which are coincident with, or lie within the boundaries of, the source, when correctly focused (in sense 2 of 2-2-155).

      ![Ch2_Fig10.jpg](/iala-vocab/images/iala/Ch2_Fig10.jpg)
