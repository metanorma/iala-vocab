id: 2-2-140-eng
termid: 2-2-140
data:
  language_code: eng
  terms:
  - type: expression
    designation: Fresnel Lens
    normative_status: preferred
  definition:
  - content: |-
      A prismatic lens obtained by the rotation of a Fresnel profile about the optical axis of the lens (Fresnel Panel), or about a vertical axis (Fresnel Drum Lens).

