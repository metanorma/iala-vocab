termid: 2-3-065
data:
  language_code: eng
terms:
- type: expression
  designation: Chimney
  normative_status: preferred
definition:
- content: |-
    A glass envelope surrounding the flame of an oil lamp, and having special shape, in order to improve the luminous efficacy and to avoid flickering of the flame.

