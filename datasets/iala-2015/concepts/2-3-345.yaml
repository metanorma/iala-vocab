id: 2-3-345-eng
termid: 2-3-345
data:
  language_code: eng
  terms:
  - type: expression
    designation: Gaseous Discharge Lamp
    normative_status: preferred
  definition:
  - content: A discharge lamp in which the discharge takes place in a gas. Examples
      are Xenon Lamp, Neon Lamp.
  notes:
  - content: The term Neon Tube is sometimes wrongly used to denote any such tubular
      discharge lamp.
