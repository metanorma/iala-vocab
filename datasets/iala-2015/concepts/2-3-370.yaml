id: 2-3-370-eng
termid: 2-3-370
data:
  language_code: eng
terms:
- type: expression
  designation: High Pressure Mercury (Vapour) Lamp
  normative_status: preferred
definition:
- content: A mercury vapour lamp, with or without a coating of phosphor, in which
    during operation the partial pressure of the vapour is of the order of 105 newtons
    per square metre (1 atmosphere) or more.
