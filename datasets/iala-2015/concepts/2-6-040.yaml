id: 2-6-040-eng
termid: 2-6-040
data:
  language_code: eng
  terms:
  - type: expression
    designation: Pole Beacon
    normative_status: preferred
  definition:
  - content: |-
      A vertical spar fixed in the ground or in the sea-bed or a river bed to show as a navigation mark.

      ![Ch2_Fig49.jpg](/iala-vocab/images/iala/Ch2_Fig49.jpg)
  notes:
  - content: Sometimes called a Spindle or a Single-Pile Beacon in the U.S.A.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
