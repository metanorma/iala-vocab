id: 2-6-265-eng
termid: 2-6-265
data:
  language_code: eng
terms:
- type: expression
  designation: Stripes
  normative_status: preferred
definition:
- content: |-
    A number of areas of contrasting colour separated from one another by straight lines, and used as a distinguishing characteristic for navigation marks. (Fig.67b)

    (Fig. 67c)

    ![Ch2_Fig67.jpg](/iala-vocab/images/iala/Ch2_Fig67.jpg)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The stripes may be vertical, horizontal or oblique.
- content: Horizontal stripes are usually called Bands in English and Bander in German.
