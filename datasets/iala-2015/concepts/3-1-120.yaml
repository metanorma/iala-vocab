  - type: expression
    designation: Acoustic impedance
    normative_status: preferred
  definition:
  - content: The complex quotient of the sound pressure and the volume velocity through
      the surface.
  notes:
  - content: This definition is valid only for sinusoidal vibrations in the steady
      state.
