id: 4-1-1000-eng
termid: 4-1-1000
data:
  language_code: eng
terms:
- type: expression
  designation: Tropospheric radio duct
  normative_status: preferred
definition:
- content: A quasi-horizontal layer in the troposphere between the boundaries of which
    radio energy of a sufficiently high frequency is substantially confined and propagated
    with abnormally low attenuation.
