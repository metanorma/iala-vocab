id: 4-1-120-eng
termid: 4-1-120
data:
  language_code: eng
  terms:
  - type: expression
    designation: Gain referred to a short vertical antenna
    normative_status: preferred
  - type: symbol
    designation: stem:[Gv]
    normative_status: preferred
  definition:
  - content: The gain of an antenna in a given direction when the reference antenna
      is a perfect vertical antenna, much shorter than one quarter of the wavelength,
      placed on the surface of a perfectly conducting plane earth.
