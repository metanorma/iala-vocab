id: 4-1-250-eng
termid: 4-1-250
data:
  language_code: eng
terms:
- type: expression
  designation: Effective height (U.S.A.)
  normative_status: preferred
definition:
- content: |-
    Effective height (U.S.A.)

    The height of the antenna centre of radiation above the effective ground level.

    For an antenna with asymmetrical current distribution the centre of radiation is the centre of current moments when viewed from directions near the direction of maximum radiation.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: I.R.E
notes:
- content: For an antenna with symmetrical current distribution the centre of radiation
    is the centre of distribution.
