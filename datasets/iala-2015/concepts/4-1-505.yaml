id: 4-1-505-eng
termid: 4-1-505
data:
  language_code: eng
  terms:
  - type: expression
    designation: End fire array
    normative_status: preferred
  definition:
  - content: A linear array of elements whose centres lie on a straight line and whose
      principal direction of radiation or reception is along this line. An end fire
      array is often composed of a number of parallel dipoles or monopoles which are
      coplanar and equally spaced.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
