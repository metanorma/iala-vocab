id: 4-1-695-eng
termid: 4-1-695
data:
  language_code: eng
terms:
- type: expression
  designation: Beat oscillator
  normative_status: preferred
definition:
- content: An oscillator which generates the local oscillations for beat reception.
    Its frequency is offset from the signal frequency by the frequency of the audio
    tone desired.
