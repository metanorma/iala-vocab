id: 4-1-755-eng
termid: 4-1-755
data:
  language_code: eng
  terms:
  - type: expression
    designation: Signal-to-noise ratio
    normative_status: preferred
  - type: expression
    designation: Signal-to-noise ratio (at a specified point in a receiver)
    normative_status: admitted
  definition:
  - content: For given conditions of adjustment and signal input, the ratio of the
      magnitude of some specified feature of the wanted response to the magnitude
      of the appropriate feature of the co-existent noise.
  notes:
  - content: The co-existent noise may differ from the noise when the receiver input
      is reduced to zero.
  - content: In practice it is usually the ratio of the signal plus noise to noise
      which is measured but this ratio is usually called the signal-to-noise ratio
      when the signal magnitude is several times greater than that of the noise.
  - content: The ratio is often expressed in decibels.
