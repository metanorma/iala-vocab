id: 4-2-045-eng
termid: 4-2-045
data:
  language_code: eng
terms:
- type: expression
  designation: Radio beacon - Dual carrier
  normative_status: preferred
definition:
- content: |-
    Dual carrier radio beacon

    A continuous carrier radio beacon in which identification is accomplished by means of a keyed second carrier. The frequency difference between the two carriers is made equal to the desired audio frequency.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The object of the system is to reduce the bandwidth of the transmission.
