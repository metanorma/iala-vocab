id: 4-2-115-eng
termid: 4-2-115
data:
  language_code: eng
terms:
- type: expression
  designation: Wide aperture direction finder
  normative_status: preferred
definition:
- content: A direction finder in which the arriving wave front is received simultaneously
    (or nearly so) by an array of antennas, extending over a distance comparable to,
    or greater than, one wave length.
