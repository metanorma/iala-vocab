    designation: Angular resolution
    normative_status: preferred
  - type: expression
    designation: Bearing resolution
    normative_status: admitted
  definition:
  - content: The ability of a radar to distinguish between two targets solely by the
      measurement of angles. It is generally expressed in terms of the minimum angle
      by which targets must be spaced to be separately distinguishable.
