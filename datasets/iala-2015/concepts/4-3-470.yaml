data:
  language_code: eng
  terms:
  - type: expression
    designation: Transponder dead time
    normative_status: preferred
  definition:
  - content: |-
      Dead time (of a transponder)

      The minimum interval of time following an interrogating pulse during which a transponder is incapable of further response.
