id: 4-4-000-eng
termid: 4-4-000
data:
  language_code: eng
terms:
- type: expression
  designation: Base line
  normative_status: preferred
definition:
- content: The line joining the two points between which electrical phase or time
    is compared in determining navigational co-ordinates. (For two ground stations
    this will be the line joining the two stations.)
