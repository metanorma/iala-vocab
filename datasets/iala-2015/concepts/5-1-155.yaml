id: 5-1-155-eng
termid: 5-1-155
data:
  language_code: eng
terms:
- type: expression
  designation: Go-no-go testing
  normative_status: preferred
definition:
- content: A testing technique which indicates if a system is or is not functioning
    within acceptable tolerances. No measure of performance is given and no degradation
    of operating characteristics can be measured.
