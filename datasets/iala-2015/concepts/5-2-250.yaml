id: 5-2-250-eng
termid: 5-2-250
data:
  language_code: eng
terms:
- type: expression
  designation: Dead zone
  normative_status: preferred
- type: expression
  designation: Dead band
  normative_status: admitted
definition:
- content: The range of values within which an input variable can be varied without
    initiating any noticeable change in the output variable. A dead zone may not be
    intentional. It may, for example, result from backlash or hysteresis.
