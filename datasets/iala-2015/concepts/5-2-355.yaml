  - type: expression
    designation: Block diagram
    normative_status: preferred
  definition:
  - content: A simplified form of drawing intended to show the basic functioning of
      a system; it represents by means of symbols or simplified illustrations an installation
      or part thereof together with the relationship between its components without
      necessarily representing all physical links.
