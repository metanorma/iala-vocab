id: 5-3-270-eng
termid: 5-3-270
data:
  language_code: eng
  terms:
  - type: expression
    designation: Intermodulation products
    normative_status: preferred
  definition:
  - content: Spurious radiation at frequencies resulting from intermodulation between
      the oscillation and the carrier, characteristic or harmonic frequencies of an
      emission, or the oscillations which appear when this carrier or characteristic
      oscillations are produced, and oscillations of the same nature of the same or
      several other emissions originating from the same or different transmitting
      systems.
