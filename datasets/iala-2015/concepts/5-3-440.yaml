id: 5-3-440-eng
termid: 5-3-440
data:
  language_code: eng
terms:
- type: expression
  designation: Error-correcting code
  normative_status: preferred
definition:
- content: A code in which each data signal conforms to specific rules of construction
    so that departures from this construction in the received signals can be automatically
    detected, permitting the automatic correction, at the receiving terminal, of some
    or all of the errors.
