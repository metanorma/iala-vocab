id: 5-4-070-eng
termid: 5-4-070
data:
  language_code: eng
  terms:
  - type: expression
    designation: Counter
    normative_status: preferred
  definition:
  - content: A device, capable of changing from one to the next of a sequence of distinguishable
      states upon receipt of an input signal.
  notes:
  - content: One specific type is a circuit that produces one output pulse each time
      it receives some predetermined number of input pulses.
