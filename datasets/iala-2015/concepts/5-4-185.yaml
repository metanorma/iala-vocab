id: 5-4-185-eng
termid: 5-4-185
data:
  language_code: eng
terms:
- type: expression
  designation: Latching relay
  normative_status: preferred
definition:
- content: A relay which locks mechanically when operated and remains operated although
    the control current is removed. A separate operation is required to release the
    relay.
