id: 6-2-190-eng
termid: 6-2-190
data:
  language_code: eng
terms:
- type: expression
  designation: Lubrication system
  normative_status: preferred
definition:
- content: System designed to lubricate the moving parts of an engine.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: It usually consists of a pump that draws oil from a reservoir called the
    sump and passes it through a filter before distributing it under pressure to the
    various working surfaces. The oil usually returns to the sump by gravity.
