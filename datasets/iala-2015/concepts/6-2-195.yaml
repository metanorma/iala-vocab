id: 6-2-195-eng
termid: 6-2-195
data:
  language_code: eng
  terms:
  - type: expression
    designation: Fuel system
    normative_status: preferred
  definition:
  - content: System supplying liquid fuel from a tank to an engine, either by gravity
      feed or by pumping.
  notes:
  - content: In lighthouse practice the fuel may be supplied directly by gravity feed
      or via a day-tank that can be refilled by hand pumping or by an automatically-controlled
      electric pump.
