id: 6-2-210-eng
termid: 6-2-210
data:
  language_code: eng
terms:
- type: expression
  designation: Compression ratio
  normative_status: preferred
definition:
- content: The ratio (greater than unity) of the volumes of the spaces within a cylinder
    enclosed by the extreme positions of the piston.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The closed extreme position of the piston is called top dead centre.
- content: A higher compression ratio produces a larger power output for a given fuel
    consumption.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Compression_ratio
