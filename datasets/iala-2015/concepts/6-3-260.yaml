id: 6-3-260-eng
termid: 6-3-260
data:
  language_code: eng
  terms:
  - type: expression
    designation: Wave-actuated generator
    normative_status: preferred
  definition:
  - content: A generator that produces electric energy from the energy of wave motion.
      Usually the wave motion is used to compress a fluid to supply a turbine coupled
      to an electrical generator.
