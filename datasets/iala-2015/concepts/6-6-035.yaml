id: 6-6-035-eng
termid: 6-6-035
data:
  language_code: eng
  terms:
  - type: expression
    designation: Neutral conductor
    normative_status: preferred
  definition:
  - content: One of a set of conductors that is connected to an electric source at
      a point at which there is the least voltage.
  notes:
  - content: The set of conductors may commonly be in the form of a cable.
  - content: In a balanced system the neutral conductor carries no significant current
      and may be connected to earth or omitted altogether.
  - content: The point of connection of the neutral conductor at the source is called
      the neutral point. In a star-connected system it is also called the star point.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  annotations:
  - content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Neutral_conductor
