id: 7-1-060-eng
termid: 7-1-060
data:
  language_code: eng
terms:
- type: expression
  designation: Landing stage (2)
  normative_status: preferred
definition:
- content: A small platform attached to the land, used to facilitate the transference
    of personnel and materials between a vessel and land.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The French term estacade applies to a small platform intended to assist
    in handling a vessel.
