id: 7-3-140-eng
termid: 7-3-140
data:
  language_code: eng
  terms:
  - type: expression
    designation: Slate
    normative_status: preferred
  definition:
  - content: A roofing material which is obtained by quarrying a metamorphic stratified
      rock of the same name. The quarried blocks may be cleaved along the joint planes
      into individual slates of a desired thickness.
