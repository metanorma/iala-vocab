data:
  language_code: eng
  terms:
  - type: expression
    designation: Silt
    normative_status: preferred
  definition:
  - content: A natural fine grained sediment consisting of granular and mainly siliceous
      products of rock weathering.
  notes:
  - content: In French a distinction is made between siliceous silt (silt) and organic
      silt (limon).
