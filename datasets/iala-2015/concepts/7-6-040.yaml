id: 7-6-040-eng
termid: 7-6-040
data:
  language_code: eng
terms:
- type: expression
  designation: Setting (of concrete)
  normative_status: preferred
definition:
- content: The initial hardening phase of concrete when the material is firm but still
    low in strength.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: Before the initial set occurs, concrete is called wet concrete.
