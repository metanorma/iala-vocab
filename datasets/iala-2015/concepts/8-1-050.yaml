id: 8-1-050-eng
termid: 8-1-050
data:
  language_code: eng
  terms:
  - type: expression
    designation: Barge
    normative_status: preferred
  definition:
  - content: A cargo transporter vessel with open or closed hold, with or without
      self-propulsion. On lighthouse service, used to transport water, oil and other
      stores, or construction materials.
