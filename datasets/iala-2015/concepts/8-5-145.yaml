data:
  language_code: eng
  terms:
  - type: expression
    designation: Lewis (GB)
    normative_status: preferred
  - type: expression
    designation: Sinker bail (USA)
    normative_status: admitted
  definition:
  - content: |-
      Lug made of iron or steel, embedded in a sinker, to which a mooring chain is shackled.

      The term "anchor ring" is also loosely used in Great Britain with this meaning.
