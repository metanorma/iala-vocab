    designation: Additional Secondary Factors (ASF)
    normative_status: preferred
  definition:
  - content: |-
      The effects on Loran signals of passing over land – can be used to correct errors in ranges and position caused by these landpath effects.

      Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
