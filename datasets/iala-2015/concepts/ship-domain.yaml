  definition:
  - content: |-
      VTS-2012-30

      An operational zone around, above or below a vessel within which an incursion by another fixed or moving object, or another domain, may trigger reactions or processes.

      Source: VTS Manual (2008)

      (VTS33/output/8 refers)
