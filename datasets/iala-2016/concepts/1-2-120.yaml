id: 1-2-120-eng
termid: 1-2-120
data:
  language_code: eng
  terms:
  - type: expression
    designation: Zenith
    normative_status: preferred
  definition:
  - content: |-
      (Observer's) Zenith

      The point at which a straight line joining the centre of the earth to the observer's position meets the celestial sphere. To a particular observer it is the highest point of the celestial sphere.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
