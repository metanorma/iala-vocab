id: 1-2-270-eng
termid: 1-2-270
data:
  language_code: eng
terms:
- type: expression
  designation: Pier
  normative_status: preferred
- type: expression
  designation: Jetty
  normative_status: admitted
definition:
- content: A structure extending into the water approximately perpendicular to a shore
    or a bank and providing berthing for ships, and which may also provide cargo-handling
    facilities.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: A pier or jetty providing cargo-handling facilities may also be called
    a wharf.
- content: In French the term mole is also sometimes used in place of the term "brise-lames",
    for a breakwater {{1-2-250, Breakwater}} when it protects the entrance of a harbour.
