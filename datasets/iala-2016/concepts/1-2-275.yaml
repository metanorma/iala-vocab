id: 1-2-275-eng
termid: 1-2-275
data:
  language_code: eng
  terms:
  - type: expression
    designation: Mole
    normative_status: preferred
  definition:
  - content: A structure, usually massive, on the seaward side of a harbour for its
      protection against current and wave action, drift ice, sanding up, wind etc.
      It may be possible to walk or drive along the mole. It may also sometimes be
      suitable for berthing of ships.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
