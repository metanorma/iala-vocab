id: 2-1-185-eng
termid: 2-1-185
data:
  language_code: eng
  terms:
  - type: expression
    designation: Transmittance
    normative_status: preferred
  - type: expression
    designation: Transmission Factor
    normative_status: admitted
  - type: symbol
    designation: stem:[T]
    normative_status: preferred
  definition:
  - content: |-
      The ratio of the transmitted luminous flux (Ft) to the incident flux (Fo).

      T = T r+ Td
  notes:
  - content: Where mixed transmission occurs, the (total) transmittance may be divided
      into two parts, Regular Transmittance (T r) and Diffuse Transmittance (Td),corresponding
      respectively to the  two  modes of  transmission  referred to in  2-1-170  and  2-1-175.
