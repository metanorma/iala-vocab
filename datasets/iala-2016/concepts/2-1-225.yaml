id: 2-1-225-eng
termid: 2-1-225
data:
  language_code: eng
terms:
- type: expression
  designation: Uniform Diffuser
  normative_status: preferred
definition:
- content: |-
    A diffuser for which the luminance is the same in all directions irrespective of the direction of incidence of the light.

    Transmission L = E T/p

    Reflection L = E p/p
