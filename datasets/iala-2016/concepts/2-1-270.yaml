  definition:
  - content: |-
      Atmospheric Transmission Factor (for

      A quantity characterising the transparency of the atmosphere. It is the ratio of the luminous flux transmitted without change of direction by the atmosphere over

      In Britain and the U.S.A. the most important factor is the Atmospheric Extinction Coefficient s (not to be confused with s as used in

      T = e XXXX s

      where e is the base of natural logarithms.

      In France, geophysicists use the Optical Density (for a thickness of 1 kilometre).

      In Germany, according to the DIN standard, the factor Schwachungskoeffizient z is used. This is similar to the atmospheric extinction coefficient but is identical with it only if the

      q = e-z

      = e-1.852s

      where e is the base of natural logarithms.
  notes:
  - content: 'In Germany, according to the DIN standard, in place of the "atmospheric
      transmission factor" T, two terms are used, Transmissionsfaktor q, used when
      the Unit: of distance chosen is the kilometre, and Sichtwert s (not to be confused
      with s used as Symbol: for "diffusion factor" 2-1-230), used when the Unit:
      of distance chosen is the sea-mile.'
  - content: It is also possible to use other related factors and practice in this
      respect has differed in various countries.
  - content: nor with s as used in 2-1-230). It is related to the "atmospheric transmission
