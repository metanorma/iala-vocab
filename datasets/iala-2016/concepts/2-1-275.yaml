id: 2-1-275-eng
termid: 2-1-275
data:
  language_code: eng
  terms:
  - type: expression
    designation: Visibility
    normative_status: preferred
  definition:
  - content: That property of the atmosphere which determines the ability of an observer
      to see and identify prominent objects by day, or lights or lighted objects by
      night.
  - content: A measure of this property of the atmosphere expressed in units of distance.
  - content: Commonly used for "meteorological visibility".
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
