    designation: Luminosity
    normative_status: preferred
  - type: expression
    designation: Brightness (U.S.A.)
    normative_status: admitted
  definition:
  - content: The attribute of visual sensation according to which an area appears
      to emit more or less light.
  notes:
  - content: This attribute is the psychosensorial correlate (or nearly so) of the
      photometric quantity "luminance".
