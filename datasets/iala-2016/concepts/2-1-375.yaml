id: 2-1-375-eng
termid: 2-1-375
data:
  language_code: eng
  terms:
  - type: expression
    designation: Retina
    normative_status: preferred
  definition:
  - content: A membrane at the back of the eye which is sensitive to light stimuli
      and composed of photoreceptors, properly so called (cones and rods), and of
      nerve cells which transmit to the optic nerve the stimulation of the receptor
      elements.
