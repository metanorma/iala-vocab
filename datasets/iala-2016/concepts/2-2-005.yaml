id: 2-2-005-eng
termid: 2-2-005
data:
  language_code: eng
terms:
- type: expression
  designation: Projector
  normative_status: preferred
definition:
- content: |-
    An optical apparatus consisting of a light source and optically refracting or reflecting elements (or both) designed to concentrate light into one or more pencil beams or fan beams (or both), so that, within a limited solid angle, higher values of luminous intensity are produced than by the light source alone.

    A projector may be intended to be viewed directly, to illuminate an object to be viewed, or to project an image.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: In German a distinction is made between the three functions of projectors
    mentioned. A projector to be viewed directly is called Signal-Scheinwerfer; a
    projector to illuminate an object is called Beleuchtungs-Scheinwerfer; a projector
    to project an image is called Bildwerfer or Projektor.
