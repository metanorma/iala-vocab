id: 2-2-215-eng
termid: 2-2-215
data:
  language_code: eng
  terms:
  - type: expression
    designation: Converged Beam
    normative_status: preferred
  definition:
  - content: |-
      A form of fan beam {{2-1-090, Luminous fan beam}} in which the angle of divergence is decreased by diverting a part of the light laterally to increase the intensity in a desired direction.

      ![Ch2_Fig18.jpg](/iala-vocab/images/iala/Ch2_Fig18.jpg)
  notes:
  - content: The Directional Drum Lens is used in the United States and is an example
      of an optic which produces a converged beam.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
