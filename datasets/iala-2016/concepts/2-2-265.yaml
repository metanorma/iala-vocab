id: 2-2-265-eng
termid: 2-2-265
data:
  language_code: eng
terms:
- type: expression
  designation: Stray Light
  normative_status: preferred
definition:
- content: Light issuing from a source or optical apparatus in undesired directions.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: In the particular case when light is reflected by the lantern glazing (panes),
    the light is said to produce False Flashes.
