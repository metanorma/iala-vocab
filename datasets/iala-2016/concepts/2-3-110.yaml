data:
  language_code: eng
terms:
- type: expression
  designation: Cap(G.B.)
  normative_status: preferred
- type: expression
  designation: Base (U.S.A.)
  normative_status: admitted
definition:
- content: |-
    That part of a lamp which holds it in a lamp holder and usually provides a connection to the electric supply.

    ![Ch2_Fig22.jpg](/iala-vocab/images/iala/Ch2_Fig22.jpg)

    For more information, see I.E.C. Recommendations Publication No.61 "Lamp caps and holders together with gauges for the control of interchangeability and safety".
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
  modification: modified from source
notes:
- content: The cap (base) of a lamp and its corresponding holder (socket) are generally
    identified by one or more letters followed by a number which indicates approximately
    the principal dimension (generally the diameter) of the cap in millimetres.
