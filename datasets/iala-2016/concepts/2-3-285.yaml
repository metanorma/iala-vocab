id: 2-3-285-eng
termid: 2-3-285
data:
  language_code: eng
terms:
- type: expression
  designation: Luminescence
  normative_status: preferred
definition:
- content: Phenomenon of the emission, by matter, of electromagnetic radiation which
    for certain wavelengths or restricted regions of the spectrum is in excess of
    that due to the thermal radiation from the material at the same temperature. The
    radiation is characteristic of the particular material.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
notes:
- content: In lighting this term is generally restricted to the emission of radiation
    in the visible or near visible spectrum.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Luminescence
