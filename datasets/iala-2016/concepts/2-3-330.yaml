id: 2-3-330-eng
termid: 2-3-330
data:
  language_code: eng
  terms:
  - type: expression
    designation: Ballast
    normative_status: preferred
  definition:
  - content: Equipment used with discharge lamps for stabilizing the discharge.
  notes:
  - content: A ballast may be resistive, inductive, capacitive, or a combination of
      these.
  - content: The ballast may also be used, either alone or in combination with a starter,
      to light the lamp. The starter may be incorporated in the ballast.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  - type: authoritative
    origin:
      ref:
        source: C.I.E
  annotations:
  - content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Ballast
