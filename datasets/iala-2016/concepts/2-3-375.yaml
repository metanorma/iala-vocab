id: 2-3-375-eng
termid: 2-3-375
data:
  language_code: eng
terms:
- type: expression
  designation: Extra High Pressure Mercury (Vapour) Lamp
  normative_status: preferred
definition:
- content: A mercury vapour lamp in which, during operation, the partial pressure
    of the vapour reaches a very high value, of the order of 106 newtons per square
    metre (10 atmospheres) or more.
