id: 2-3-430-eng
termid: 2-3-430
data:
  language_code: eng
  terms:
  - type: expression
    designation: Halide Lamp
    normative_status: preferred
  definition:
  - content: A discharge lamp in which light is produced by the radiation from a mixture
      of a metallic vapour (for example, mercury) and the products of the dissociation
      of halides (for example, halides of thallium, indium or sodium).
