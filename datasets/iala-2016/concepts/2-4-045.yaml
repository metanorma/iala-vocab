data:
  language_code: eng
  terms:
  - type: expression
    designation: Mercury Bath
    normative_status: preferred
  definition:
  - content: |-
      Alternative ter: Mercury Trough

      An annular trough containing mercury on which the optic of a revolving light floats, usually under the guidance of rollers.

