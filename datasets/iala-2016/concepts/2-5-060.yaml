id: 2-5-060-eng
termid: 2-5-060
data:
  language_code: eng
  terms:
  - type: expression
    designation: Channel Light
    normative_status: preferred
  definition:
  - content: A light either on a fixed support or on a buoy, marking the limit of
      a navigable channel.
  notes:
  - content: In French, the term Feu de Rive is commonly used for a channel light
      on a fixed support.
