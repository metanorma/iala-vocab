id: 2-6-000-eng
termid: 2-6-000
data:
  language_code: eng
  terms:
  - type: expression
    designation: Navigation Mark
    normative_status: preferred
  - type: expression
    designation: "(Visual) Aid (to navigation), Seamark"
    normative_status: admitted
  definition:
  - content: |-
      (Navigation) Mark

      An artificial or natural object of easily recognisable shape or colour, or both, situated in such a position that it may be identified on a chart or related to a known navigational instruction (e.g. taken from a List of Lights, etc.).
  notes:
  - content: This term includes buoys.
  - content: A fixed artificial navigation mark is often called a Beacon. This may
      be lighted {{2-5-005, Light (4)}} or unlighted {{2-6-030, Daymark}}. The French
      term Balise is generally used to describe an unlighted beacon.
  - content: In French, the term Amer Remarquable is applied to a navigation mark
      which is particularly easily seen, by virtue of its form, size or colour.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  annotations:
