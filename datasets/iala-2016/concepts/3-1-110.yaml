termid: 3-1-110
data:
  language_code: eng
terms:
- type: expression
  designation: Sound power level
  normative_status: preferred
- type: expression
  designation: Sound power level (of a sound source, in decibels)
  normative_status: admitted
definition:
- content: Ten times the logarithm to the base 10 of the ratio of the sound power
    radiated by the source to the reference sound power (1 picowatt or 10-12 watt).
