id: 4-1-965-eng
termid: 4-1-965
data:
  language_code: eng
terms:
- type: expression
  designation: Ionosphere
  normative_status: preferred
definition:
- content: The part of the earth's outer atmosphere where free electrons, arising
    from ionization, are normally present in quantities sufficient to modify the propagation
    characteristics of radio waves traversing it.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: B.S
notes:
- content: For purposes of reference, the ionosphere is divided into three regions
    whose boundaries are approximately spherical and concentric with the surface of
    the earth.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Ionosphere
