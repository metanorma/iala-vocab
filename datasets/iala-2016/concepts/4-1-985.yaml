id: 4-1-985-eng
termid: 4-1-985
data:
  language_code: eng
terms:
- type: expression
  designation: Tropospheric wave
  normative_status: preferred
definition:
- content: A wave which travels between points on or near the surface of the earth
    by a path or paths lying wholly within the troposphere, and the propagation of
    which is determined primarily by the distribution of refractive index in the troposphere.
