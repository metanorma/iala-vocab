id: 4-2-235-eng
termid: 4-2-235
data:
  language_code: eng
  terms:
  - type: expression
    designation: Bearing correction
    normative_status: preferred
  definition:
  - content: The angle which one adds algebraically to the observed bearing to reduce
      or eliminate the error of the installation.
  notes:
  - content: The installation error is the algebraic total of the instrument error
      and the site error {{4-2-270, Installation error}}.
