id: 4-3-030-eng
termid: 4-3-030
data:
  language_code: eng
terms:
- type: expression
  designation: Frequency-modulated radar
  normative_status: preferred
- type: expression
  designation: F.M. radar
  normative_status: admitted
definition:
- content: A form of radar in which the radiated wave is frequency modulated, and
    the frequency of an echo is compared with the frequency of the transmitted wave
    at the instant of reception, thus enabling range to be measured.
