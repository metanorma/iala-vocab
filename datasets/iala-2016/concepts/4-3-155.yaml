    designation: Shadow region
    normative_status: preferred
  - type: expression
    designation: Blind sector
    normative_status: admitted
  definition:
  - content: The region from which, under normal propagation conditions, the received
      field strength is so reduced by some obstruction that effective radar detection
      of objects in this region is improbable.
