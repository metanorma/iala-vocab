id: 4-3-315-eng
termid: 4-3-315
data:
  language_code: eng
terms:
- type: expression
  designation: Instantaneous" automatic gain control
  normative_status: preferred
- type: expression
  designation: Instantaneous" automatic gain control (I.A.G.C.)
  normative_status: admitted
definition:
- content: In radar, a quick acting automatic gain control which does not respond
    to single echoes, but which responds to variations of mean clutter level, so that
    clutter is reduced. Return to high sensitivity is also accomplished quickly for
    reception of weak signals.
