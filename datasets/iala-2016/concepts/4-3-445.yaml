id: 4-3-445-eng
termid: 4-3-445
data:
  language_code: eng
terms:
- type: expression
  designation: Racon
  normative_status: preferred
definition:
- content: A transponder beacon designed to give an indication on the radar screen
    of both bearing and distance, its characteristic paint usually beginning at and
    extending outward from a point a few hundred yards beyond the echo of the object
    on which it is mounted.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: Although racon is an acronym, it is treated as a noun in normal usage.
    It is therefore written as racon except at the beginning of a sentence or in a
    title when Racon is used
