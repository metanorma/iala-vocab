id: 4-3-540-eng
termid: 4-3-540
data:
  language_code: eng
terms:
- type: expression
  designation: Dihedral reflector
  normative_status: preferred
- type: expression
  designation: Right angle reflector
  normative_status: admitted
definition:
- content: A reflector consisting of two flat surfaces intersecting mutually at right
    angles. Incident waves entering the aperture so formed with a direction of incidence
    perpendicular to the edge, are returned parallel to their direction of incidence.
