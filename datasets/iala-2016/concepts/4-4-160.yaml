id: 4-4-160-eng
termid: 4-4-160
data:
  language_code: eng
  terms:
  - type: expression
    designation: Secondary phase error
    normative_status: preferred
  - type: expression
    designation: Secondary phase error (in Loran C)
    normative_status: admitted
  - type: expression
    designation: Fixed errors (in Decca)
    normative_status: admitted
  definition:
  - content: |-
      Those errors in the lattice as charted, due to different phase velocities over regions of different earth conductivity and dielectric constant.

      These errors are defined for a given site, and are listed for each system correction for the errors can therefore be made.
