id: 5-2-120-eng
termid: 5-2-120
data:
  language_code: eng
  terms:
  - type: expression
    designation: Command
    normative_status: preferred
  definition:
  - content: |-
      An input variable established by means external to and independent of the automatic control system which is intended to determine the value of the controlled variable.

      ![Ch5_Fig2.jpg](/iala-vocab/images/iala/Ch5_Fig2.jpg)

      Figure 2 - Block diagram of automatic control system (5-2-045) incorporating a closed loop {{5-2-080, Closed Loop}}
  notes:
  - content: 'Note:: The French word "commande" is generally used to mean control.'
