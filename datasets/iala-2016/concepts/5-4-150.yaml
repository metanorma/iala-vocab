id: 5-4-150-eng
termid: 5-4-150
data:
  language_code: eng
terms:
- type: expression
  designation: Commutated-capacitor tachometer
  normative_status: preferred
definition:
- content: A rotary switch which alternately charges a fixed capacitor from a constant
    d.c. voltage source and discharges it through a fixed resistor. The average current
    through the resistor is proportional to the speed of rotation of the switch.
