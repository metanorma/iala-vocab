id: 6-2-210-eng
termid: 6-2-210
data:
  language_code: eng
  terms:
  - type: expression
    designation: Compression ratio
    normative_status: preferred
  definition:
  - content: The ratio (greater than unity) of the volumes of the spaces within a
      cylinder enclosed by the extreme positions of the piston.
  notes:
  - content: The closed extreme position of the piston is called top dead centre.
  - content: A higher compression ratio produces a larger power output for a given
      fuel consumption.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
