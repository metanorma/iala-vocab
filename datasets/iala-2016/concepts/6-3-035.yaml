id: 6-3-035-eng
termid: 6-3-035
data:
  language_code: eng
terms:
- type: expression
  designation: Air-mass
  normative_status: preferred
definition:
- content: The length of path through the earth's atmosphere traversed by the direct
    solar beam, expressed as a multiple of the path traversed to a point at sea-level
    with the sun directly overhead.
