id: 6-3-105-eng
termid: 6-3-105
data:
  language_code: eng
terms:
- type: expression
  designation: Method of bins
  normative_status: preferred
definition:
- content: |-
    A data reduction procedure by which test data are grouped into wind speed intervals (bins).

    For each bin, the number of samples and sum of parameter samples are recorded.

    The average parameter value within each wind speed bin can then be evaluated.

    (This is a general technique applicable to a variety of parameters).
