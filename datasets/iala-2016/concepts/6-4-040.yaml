id: 6-4-040-eng
termid: 6-4-040
data:
  language_code: eng
  terms:
  - type: expression
    designation: Brush
    normative_status: preferred
  definition:
  - content: A conducting element that provides electrical connection through sliding
      contact with another conducting element moving relative to it.
  notes:
  - content: The term carbon (brush) is commonly used if the brush is made of carbon.
