id: 6-4-125-eng
termid: 6-4-125
data:
  language_code: eng
  terms:
  - type: expression
    designation: Rating (of a machine or apparatus)
    normative_status: preferred
  definition:
  - content: The set of electrical and mechanical quantities assigned to a machine
      or apparatus by the manufacturer, to define the performance under specified
      conditions. Values are often stated on a rating plate.
