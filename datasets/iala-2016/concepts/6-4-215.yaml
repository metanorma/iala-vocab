id: 6-4-215-eng
termid: 6-4-215
data:
  language_code: eng
  terms:
  - type: expression
    designation: Parallelling
    normative_status: preferred
  definition:
  - content: The process of making a suitable electrical connection between the outputs
      of two generators, or between a generator and another power source.
  notes:
  - content: The use of the term with regard to synchronous generators is deprecated.
