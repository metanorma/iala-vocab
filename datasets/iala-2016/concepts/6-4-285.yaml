id: 6-4-285-eng
termid: 6-4-285
data:
  language_code: eng
terms:
- type: expression
  designation: Resistance-start motor
  normative_status: preferred
definition:
- content: A split-phase motor in which the auxiliary winding is energised only during
    the starting operation and either is connected in series with a resistor or has
    sufficient inherent resistance not to require an additional resistor.
