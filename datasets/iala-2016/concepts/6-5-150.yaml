id: 6-5-150-eng
termid: 6-5-150
data:
  language_code: eng
terms:
- type: expression
  designation: Self discharge
  normative_status: preferred
definition:
- content: The loss of otherwise usable chemical energy by spontaneous currents within
    an electro-chemical cell, regardless of any external connection.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: For a battery in which this loss is very small, the term low-loss battery
    is used.
