id: 6-6-065-eng
termid: 6-6-065
data:
  language_code: eng
terms:
- type: expression
  designation: Overhead (power) line
  normative_status: preferred
- type: expression
  designation: Overhead (power) cable
  normative_status: admitted
definition:
- content: A power (line) (cable) supported high above the ground.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The term catenary aerial cable refers to an overhead cable suspended at
    short intervals from a supporting hawser.
- content: The term transmission line generally refers to an overhead power line designed
    for high voltage.
