id: 6-7-035-eng
termid: 6-7-035
data:
  language_code: eng
  terms:
  - type: expression
    designation: Constant-current transformer
    normative_status: preferred
  definition:
  - content: A transformer designed to maintain the current in the secondary circuit
      within narrowly defined limits, whatever may be the variations of the impedance
      of the secondary circuit or the variations of the voltage applied to the primary
      circuit.
