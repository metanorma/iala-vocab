id: 6-8-020-eng
termid: 6-8-020
data:
  language_code: eng
  terms:
  - type: expression
    designation: Rated power output
    normative_status: preferred
  - type: expression
    designation: Full load
    normative_status: admitted
  definition:
  - content: |-
      (rated) power output

      The minimum power available from a source if the normal specified operating conditions are observed.
  notes:
  - content: The term " power output " is sometimes used to mean output power, but
      this usage is deprecated.
