id: 6-8-270-eng
termid: 6-8-270
data:
  language_code: eng
  terms:
  - type: expression
    designation: Flame-protected enclosure (or machine)
    normative_status: preferred
  - type: expression
    designation: Flameproof enclosure (or machine)
    normative_status: admitted
  definition:
  - content: An enclosure (or machine) designed to withstand an internal explosion
      of a given flammable gas and to prevent an internal flame from passing outside
      to ignite a given flammable gas in the surrounding atmosphere.
