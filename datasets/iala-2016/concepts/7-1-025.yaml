id: 7-1-025-eng
termid: 7-1-025
data:
  language_code: eng
  terms:
  - type: expression
    designation: Tower rock light
    normative_status: preferred
  definition:
  - content: |-
      tower rock station pillar rock light pillar rock station

      A station having a light as the principal aid to navigation, founded on an isolated rock pinnacle or group of rocks. In recent years the terms have been extended to offshore structures, founded on the seabed, used to support aids to navigation.
