id: 7-2-125-eng
termid: 7-2-125
data:
  language_code: eng
terms:
- type: expression
  designation: Riprap
  normative_status: preferred
definition:
- content: |-
    stone pitching

    Stones used to form a protective covering to an earth embankment or river banks to prevent scour and erosion.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The French term enrochements and the German term Steinschuttung also apply
    to stones used to provide a protective mound or embankment.
