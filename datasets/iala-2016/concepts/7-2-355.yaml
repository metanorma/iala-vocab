id: 7-2-355-eng
termid: 7-2-355
data:
  language_code: eng
terms:
- type: expression
  designation: Rivet
  normative_status: preferred
definition:
- content: A short metal cylinder with a head at one end, the other end being passed
    through a pre-drilled hole in two parts to be joined. The end is subsequently
    spread by the action of a compressing tool to form a rigid connection.
