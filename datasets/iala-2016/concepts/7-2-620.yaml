data:
  language_code: eng
  terms:
  - type: expression
    designation: Land drain
    normative_status: preferred
  definition:
  - content: A drain specifically for removing water from the adjacent soil or ground,
      constructed of perforated or porous pipes, or a trench partially filled with
      coarse aggregate.
