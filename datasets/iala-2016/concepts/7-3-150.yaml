id: 7-3-150-eng
termid: 7-3-150
data:
  language_code: eng
terms:
- type: expression
  designation: Shingle
  normative_status: preferred
definition:
- content: A small roofing plate made of a material other than clay.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: In Great Britain and Germany shingles are only of wood. In the USA wood
    or metal are used.
- content: The term shingle in French is used for imitations of shingles in various
    materials other than in wood, clay or slate.
