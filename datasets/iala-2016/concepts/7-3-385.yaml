id: 7-3-385-eng
termid: 7-3-385
data:
  language_code: eng
  terms:
  - type: expression
    designation: Sterling board
    normative_status: preferred
  definition:
  - content: A structural board manufactured from large thin flakes of waste wood
      bonded together with synthetic resin under pressure to give a strong board of
      good dimensional stability, comparable to, but more economic than, plywood.
