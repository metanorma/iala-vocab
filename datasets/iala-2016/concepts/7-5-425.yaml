id: 7-5-425-eng
termid: 7-5-425
data:
  language_code: eng
terms:
- type: expression
  designation: Resonance (2)
  normative_status: preferred
definition:
- content: The phenomenon of coincidence between an induced vibration in an object
    and a natural frequency of the object, generally leading to an enhanced amplitude
    of vibration. In the absence of damping the induced vibration may increase until
    catastrophic failure occurs.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The natural frequency is called the resonant frequency.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Resonance_(2)
