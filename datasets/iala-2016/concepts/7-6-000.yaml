    designation: Ready-mixed concrete
    normative_status: preferred
  definition:
  - content: Concrete which is delivered to site ready for use.
  notes:
  - content: The materials are loaded into a concrete mixer on the delivery vehicle
      at the suppliers, and mixed during the delivery journey.
