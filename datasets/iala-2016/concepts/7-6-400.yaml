id: 7-6-400-eng
termid: 7-6-400
data:
  language_code: eng
terms:
- type: expression
  designation: Tremie hopper
  normative_status: preferred
definition:
- content: The upper part of a system used to place concrete underwater without segregation.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The lowest part of the hopper connects to a tremie pipe or spout leading
    beneath the water to the desired location. The complete system is called a tremie.
