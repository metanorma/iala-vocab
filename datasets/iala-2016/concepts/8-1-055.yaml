data:
  language_code: eng
terms:
- type: expression
  designation: Pontoon
  normative_status: preferred
definition:
- content: A flat-bottomed boat or other floating structure that provides a platform
    for lifting equipment and can be used for transporting construction materials
    or to accommodate working plant of various sizes.
