data:
  language_code: eng
  terms:
  - type: expression
    designation: Buoy working gangway (GB)
    normative_status: preferred
  - type: expression
    designation: Buoy port (USA)
    normative_status: admitted
  definition:
  - content: Opening in the ship's bulwarks through which buoy chain is led and the
      buoys and sinkers are embarked. The steelwork in the area is reinforced and
      a ramp or roller is fitted.
