id: 8-4-035-eng
termid: 8-4-035
data:
  language_code: eng
terms:
- type: expression
  designation: Service buoy
  normative_status: preferred
definition:
- content: |-
    A buoy located at a designated geographical position to serve as a navigation mark.

    The term new buoy refers to a buoy placed at a newly designated geographical position.

    The term clean buoy refers to a buoy in good condition that is used as a replacement.
