id: 8-4-045-eng
termid: 8-4-045
data:
  language_code: eng
  terms:
  - type: expression
    designation: Dan buoy
    normative_status: preferred
  - type: expression
    designation: Dahn buoy
    normative_status: admitted
  definition:
  - content: A buoy which is fixed at the upper end of the buoy mooring chain to prevent
      its loss during the time the buoy is out of position. It is not an aid to navigation.
