id: 8-4-095-eng
termid: 8-4-095
data:
  language_code: eng
  terms:
  - type: expression
    designation: Topmark
    normative_status: preferred
  definition:
  - content: |-
      An object, or pair of objects, of characteristic shape and colour, that is carried on top of a buoy as a means of identification.

      For details of topmarks used in the IALA Maritime Buoyage System, see Chapter 2 (Rev).
  notes:
  - content: 'Note:'
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  annotations:
  - content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Topmark
