id: differential-system-eng
termid: differential-system
data:
  language_code: eng
terms:
- type: expression
  designation: Differential system
  normative_status: preferred
definition:
- content: |-
    An augmentation system whereby radio-navigation signals are monitored at a known position and the corrections so determined are transmitted to users in the coverage area.

    DGPS: Differential Global Positioning System
    DR-Mode: Differential Ranging Mode
