    designation: Repeatability
    normative_status: preferred
  definition:
  - content: |-
      The accuracy of a positioning system, taking into account only the random errors. Repeatability is normally expressed in a 95% probability circle.

      Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
