id: total-system-error-tse--eng
termid: total-system-error-tse-
data:
  language_code: eng
  terms:
  - type: expression
    designation: Total System Error (TSE)
    normative_status: preferred
  definition:
  - content: |-
      The overall navigation performance can be described by the TSE. Assuming the contributions to TSE from NSE and VTE are random, the TSE can be described as: TSE2 = NSE2 + VTE2

      Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
