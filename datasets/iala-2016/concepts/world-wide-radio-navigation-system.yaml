  definition:
  - content: |-
      An IMO process whereby navigation system providers submit their systems for recognition. The requirements and procedures for acceptance are set out in IMO Resolution A.953(23).

      Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
