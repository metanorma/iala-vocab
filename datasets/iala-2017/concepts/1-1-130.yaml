id: 1-1-130-eng
termid: 1-1-130
data:
  language_code: eng
  terms:
  - type: expression
    designation: Radiant intensity
    normative_status: preferred
  - type: expression
    designation: Radiant intensity (of a source, in a given direction)
    normative_status: admitted
  - type: symbol
    designation: stem:[Ie]
    normative_status: preferred
  definition:
  - content: Quotient of the radiant flux (dFe) leaving the source, propagated in
      an element of solid angle (dO) containing the given direction, by the element
      of solid angle.
  notes:
  - content: If within a finite solid angle O the radiant flux may be considered uniformly
      distributed, then the radiant intensity is given by ?? where Fe is the total
      radiant flux emitted within the solid angle.
  - content: The above definition strictly applies only to a point source. For a source
      which is not a point source see C.I.E.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  - type: authoritative
    origin:
      ref:
        source: C.I.E
    modification: modified from source
  annotations:
  - content: Unit watt per steradian (W/sr)
  - content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Radiant_intensity
