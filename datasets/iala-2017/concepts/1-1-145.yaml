id: 1-1-145-eng
termid: 1-1-145
data:
  language_code: eng
  terms:
  - type: expression
    designation: Radiant exposure
    normative_status: preferred
  - type: expression
    designation: Radiant exposure (at a point of a surface)
    normative_status: admitted
  - type: symbol
    designation: stem:[He]
    normative_status: preferred
  definition:
  - content: |-
      The product of an irradiance (Ee) and its duration (dt).

      He = ?Ee.dt
  notes:
  - content: Equivalent definition Surface density of the radiant energy received.
  - content: Formerly irradiation in English and irradiation in French.
  - content: For further definitions see C.I.E.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  - type: authoritative
    origin:
      ref:
        source: C.I.E
    modification: modified from source
  annotations:
  - content: Unit joule per square metre (J/m2)
