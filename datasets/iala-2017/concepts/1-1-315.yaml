data:
  language_code: eng
  terms:
  - type: expression
    designation: Total amplitude of oscillation
    normative_status: preferred
  - type: expression
    designation: Total amplitude of oscillation (of a periodic quantity)
    normative_status: admitted
  definition:
  - content: The difference between the maximum and the minimum value of the quantity
      during one period.
  notes:
  - content: In the case of sinusoidal oscillation usually called double amplitude.
