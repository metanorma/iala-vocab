terms:
- type: expression
  designation: Perception
  normative_status: preferred
definition:
- content: Complex appearing in the field of consciousness and made of sense impressions
    supplemented by the memory. Visual perceptions, in particular, contribute towards
    the formation of our concepts of the existence, form and position of objects.
