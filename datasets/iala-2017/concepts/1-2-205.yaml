id: 1-2-205-eng
termid: 1-2-205
data:
  language_code: eng
  terms:
  - type: expression
    designation: Wreck
    normative_status: preferred
  definition:
  - content: Any vessel or substantial parts thereof which is sunk or stranded or
      is no longer under control.
  notes:
  - content: For lighthouse services the term is extended also to accidental obstructions
      to navigation which normally are marked as an indication of danger.
