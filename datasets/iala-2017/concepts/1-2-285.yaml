id: 1-2-285-eng
termid: 1-2-285
data:
  language_code: eng
terms:
- type: expression
  designation: Landing stage
  normative_status: preferred
definition:
- content: Platform attached to the land to permit passage of passengers and freight
    traffic to and from a ship. In some cases the outer end of the landing stage is
    floating on a pontoon.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: In German the term Anleger is also used for a landing stage.
