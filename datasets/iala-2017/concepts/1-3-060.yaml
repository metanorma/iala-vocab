id: 1-3-060-eng
termid: 1-3-060
data:
  language_code: eng
terms:
- type: expression
  designation: Swell
  normative_status: preferred
definition:
- content: Oscillatory movement of the sea caused generally by winds at a distance
    or by winds that existed before the time of observation.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: In French an oscillation of the swell is called a lame.
