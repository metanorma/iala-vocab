id: 2-1-115-eng
termid: 2-1-115
data:
  language_code: eng
  terms:
  - type: expression
    designation: Image
    normative_status: preferred
  definition:
  - content: The representation of any illuminated object, resulting from the convergence
      or divergence of light rays emanating from that object, when they have been
      refracted or reflected by optical apparatus.
