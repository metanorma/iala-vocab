  modification: modified from source
notes:
- content: 'It has been established that in such circumstances an object may be seen
    and recognised if a certain value of the contrast threshold C is reached (2-1-295
    and 2-1-300). For practical observations, the value of C = 0.05 has been agreed
    by the Reference: W.M.O. In the case of a uniform atmosphere, the visibility so
    defined is equal to, where s is the atmospheric extinction coefficient (2-1-270,
    Note 2:).'
- content: 'Under ideal conditions (in daylight laboratory observation), however,
    C is equal to 0.02. A visibility defined by this value has been called the Meteorological
    Range (and, in German, Normsichtweite, with Symbol: VN)'
