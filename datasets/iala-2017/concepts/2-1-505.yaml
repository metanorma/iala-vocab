id: 2-1-505-eng
termid: 2-1-505
data:
  language_code: eng
  terms:
  - type: expression
    designation: Correlated Colour Temperature
    normative_status: preferred
  definition:
  - content: The colour temperature corresponding to that point on the line representing
      full radiators of different colour temperature which is nearest to the point
      representing the chromaticity of the illuminant, considered on an agreed uniform-chromaticity-scale
      diagram.
  notes:
  - content: 'For further information on the agreed uniform-chromaticity-scale diagram,
      see Reference: C.I.E.'
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  - type: authoritative
    origin:
      ref:
        source: C.I.E
    modification: modified from source
  annotations:
  - content: Unit kelvin (K)
