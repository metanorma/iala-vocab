id: 2-2-045-eng
termid: 2-2-045
data:
  language_code: eng
  terms:
  - type: expression
    designation: Spherical Reflector
    normative_status: preferred
  - type: expression
    designation: Spherical Mirror
    normative_status: admitted
  definition:
  - content: |-
      A type of mirror the reflecting surface of which is a portion of a sphere. Light rays emitted by a point source placed at the centre of the sphere are returned through the centre. Such mirrors are usually used as reinforcing mirrors.

      ![Ch2_Fig13.jpg](/iala-vocab/images/iala/Ch2_Fig13.jpg)
