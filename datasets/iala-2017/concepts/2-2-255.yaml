id: 2-2-255-eng
termid: 2-2-255
data:
  language_code: eng
  terms:
  - type: expression
    designation: Flashed Glass
    normative_status: preferred
  definition:
  - content: Glass composed of at least two different layers, generally one of transparent
      glass and one of opal, opalescent or coloured glass.
  notes:
  - content: In lighthouse practice, the use of flashed glass is confined to coloured
      glass.
