data:
  language_code: eng
  terms:
  - type: expression
    designation: Oil Lamp
    normative_status: preferred
  definition:
  - content: |-
      An assembly consisting of a reservoir containing liquid fuel (usually paraffin oil) and a wick producing a flame.

