id: 2-3-220-eng
termid: 2-3-220
data:
  language_code: eng
terms:
- type: expression
  designation: Bunch Filament (G.B.)
  normative_status: preferred
definition:
- content: |-
    A filament (usually of multi-vee formation) in the form of a segment of a hollow truncated cone or hollow cylinder, generated around the axis of the lamp and embracing an arc of a circle greater than 180 degrees but not fully closed.

    ![Ch2_Fig31.jpg](/iala-vocab/images/iala/Ch2_Fig31.jpg)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
