id: 2-3-280-eng
termid: 2-3-280
data:
  language_code: eng
terms:
- type: expression
  designation: Nigrescence Time (of a lamp)
  normative_status: preferred
definition:
- content: The time elapsing between the cessation of the supply of power to the lamp
    and the decrease of luminous intensity or luminous flux of the lamp to a specified
    percentage of the nominal value at the given power level.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
