id: 2-3-365-eng
termid: 2-3-365
data:
  language_code: eng
  terms:
  - type: expression
    designation: Low Pressure Mercury (Vapour) Lamp
    normative_status: preferred
  definition:
  - content: A mercury vapour lamp, with or without a coating of phosphor, in which
      during operation the partial pressure of the vapour does not exceed 100 newtons
      per square metre (10-3atmosphere).
