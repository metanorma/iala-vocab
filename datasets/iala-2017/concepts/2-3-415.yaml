id: 2-3-415-eng
termid: 2-3-415
data:
  language_code: eng
terms:
- type: expression
  designation: High Pressure Arc Discharge Lamp
  normative_status: preferred
definition:
- content: An arc lamp in which the discharge takes place in a gas or vapour at a
    pressure above atmospheric. Almost all the emitted light originates from the arc
    itself.
