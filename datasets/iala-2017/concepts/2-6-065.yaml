id: 2-6-065-eng
termid: 2-6-065
data:
  language_code: eng
  terms:
  - type: expression
    designation: Port Hand Mark (or Buoy)
    normative_status: preferred
  definition:
  - content: A mark (or buoy) which is to be left to the port hand when approaching
      from the open sea or in general proceeding in the direction of the main stream
      of flood tide, or in the direction established by the appropriate authority.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
