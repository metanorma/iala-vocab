id: 2-6-210-eng
termid: 2-6-210
data:
  language_code: eng
  terms:
  - type: expression
    designation: Superstructure (of a buoy, usually lighted)
    normative_status: preferred
  - type: expression
    designation: Cage (U.S.A.)
    normative_status: admitted
  definition:
  - content: |-
      That part of the buoy built on top of the body of the buoy and used as a daymark or part thereof and usually to support the light or a topmark or a radar reflector, or a combination of these.

