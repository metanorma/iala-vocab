id: 3-1-190-eng
termid: 3-1-190
data:
  language_code: eng
  terms:
  - type: expression
    designation: Loudness level
    normative_status: preferred
  - type: expression
    designation: Equivalent loudness
    normative_status: admitted
  definition:
  - content: The loudness level of a sound is the sound pressure level of a standard
      pure tone (1000 Hz) which, according to the median value of judgements of normal
      observers, is assessed as being equally loud with the sound.
  notes:
  - content: The unit of loudness level is the Phon.
