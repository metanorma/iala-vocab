id: 3-1-200-eng
termid: 3-1-200
data:
  language_code: eng
terms:
- type: expression
  designation: Threshold of hearing
  normative_status: preferred
- type: expression
  designation: Threshold of audibility
  normative_status: admitted
definition:
- content: The minimum r.m.s. sound pressure level of a pure sound which excites the
    sensation of hearing under specified conditions and at a specified frequency.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.E.F
notes:
- content: 'The term "Threshold of hearing" is also used to deNote: the level of the
    least r.m.s. value of the sound pressure of a complex sound which excites the
    sensation of hearing.'
- content: This threshold is usually determined under conditions of negligible ambient
    noise, but may be determined under other specified conditions.
