id: 4-1-095-eng
termid: 4-1-095
data:
  language_code: eng
terms:
- type: expression
  designation: Carrier power
  normative_status: preferred
- type: expression
  designation: Carrier power (of a radio transmitter)
  normative_status: admitted
definition:
- content: The average power supplied to the antenna transmission line by a transmitter
    during one radio frequency cycle under conditions of no modulation. This definition
    does not apply to pulse modulated emissions.
