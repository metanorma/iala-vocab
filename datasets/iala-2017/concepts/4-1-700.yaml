id: 4-1-700-eng
termid: 4-1-700
data:
  language_code: eng
terms:
- type: expression
  designation: Superheterodyne reception
  normative_status: preferred
definition:
- content: A method of reception in which the signal carrier-frequency is changed
    to another, generally lower, radio frequency by a heterodyne process. There may
    be more than one such change of radio frequency.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: B.S
notes:
- content: This method was originally called "supersonic heterodyne reception".
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Superheterodyne_reception
