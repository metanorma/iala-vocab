id: 4-1-750-eng
termid: 4-1-750
data:
  language_code: eng
  terms:
  - type: expression
    designation: Noise figure
    normative_status: preferred
  - type: expression
    designation: Noise factor
    normative_status: admitted
  definition:
  - content: The ratio of the total mean square output-noise e.m.f. of a receiver
      (when connected to a suitable passive network source at a specific temperature)
      to that part of it which is due to the thermal noise generated by the source.
  notes:
  - content: The definition applies only to a receiver, or to that part of a receiver,
      in which the processes of amplification or frequency changing, or both, are
      substantially linear.
