id: 4-2-245-eng
termid: 4-2-245
data:
  language_code: eng
terms:
- type: expression
  designation: Error curve
  normative_status: preferred
- type: expression
  designation: Error curve (of a direction finder)
  normative_status: admitted
definition:
- content: A curve applicable to a particular direction finder and which shows the
    installation errors as a function of some specified variable.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: Use is commonly made of a family of such error curves as a function of
    true bearing with frequency as the parameter.
