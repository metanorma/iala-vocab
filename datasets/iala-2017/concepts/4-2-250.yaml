  - type: expression
    designation: Correction curve (of a direction finder)
    normative_status: admitted
  definition:
  - content: A curve applicable to a particular direction finder and which shows the
      correction required to      the observed bearings, as a function of that bearing
      and the frequency to eliminate the systematic installation errors.
