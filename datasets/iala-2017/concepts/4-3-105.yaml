id: 4-3-105-eng
termid: 4-3-105
data:
  language_code: eng
  terms:
  - type: expression
    designation: Plan position indicator
    normative_status: preferred
  - type: expression
    designation: P.P.I. display
    normative_status: admitted
  definition:
  - content: |-
      An intensity-modulated radar display in which a radial scan rotates on the cathode ray tube in synchronism with the rotating antenna.

      The display indicates, as on a map, the positions of echo-producing objects, and is generally one of two main types, relative display or true motion display.
