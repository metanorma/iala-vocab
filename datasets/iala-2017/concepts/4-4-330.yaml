id: 4-4-330-eng
termid: 4-4-330
data:
  language_code: eng
terms:
- type: expression
  designation: Shoran Variable delay network
  normative_status: preferred
definition:
- content: |-
    Variable delay network (in Shoran)

    A device, employed in the Shoran shore station, to adjust the overall delay between the time of reception of the signal from the vessel and the time at which the triggered pulse is transmitted, to a standard value. This figure is an integral part of the overall system calibration.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The delay in the broadband receiver on the vessel is small and stable.
    It is measured by laboratory methods and therefore taken into account.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Shoran_Variable_delay_network
