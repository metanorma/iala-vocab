id: 5-3-255-eng
termid: 5-3-255
data:
  language_code: eng
terms:
- type: expression
  designation: Spurious radiation
  normative_status: preferred
definition:
- content: Radiation at a frequency or at frequencies outside the necessary band,
    the level of which may be reduced without affecting the corresponding transmission
    of information. Spurious radiation includes harmonic radiation, parasitic radiation,
    and unwanted intermodulation products which are remote from the necessary band.
