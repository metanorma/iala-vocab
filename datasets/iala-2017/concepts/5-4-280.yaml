id: 5-4-280-eng
termid: 5-4-280
data:
  language_code: eng
  terms:
  - type: expression
    designation: Transmission bridge
    normative_status: preferred
  definition:
  - content: In telephony, a device primarily intended to permit the through transmission
      of audio frequency currents whilst preventing the through transmission of d.c.
      signals.
  notes:
  - content: The bridge may have other functions such as the control of the holding,
      supervision and release of a connection. It may also feed microphone current
      to the telephone instrument.
