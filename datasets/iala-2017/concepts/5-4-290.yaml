id: 5-4-290-eng
termid: 5-4-290
data:
  language_code: eng
  terms:
  - type: expression
    designation: Hybrid transformer
    normative_status: preferred
  - type: expression
    designation: Hybrid coil
    normative_status: admitted
  definition:
  - content: A differential transformer having effectively three windings and four
      pairs of terminals so arranged that, provided the impedances connected to two
      of the pairs of the terminals fulfil certain conditions, the application of
      a voltage to the third pair of terminals produces no potential difference between
      the fourth pair of terminals.
