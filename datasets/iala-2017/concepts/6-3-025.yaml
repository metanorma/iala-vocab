id: 6-3-025-eng
termid: 6-3-025
data:
  language_code: eng
terms:
- type: expression
  designation: Solar irradiance
  normative_status: preferred
definition:
- content: Radiant power incident from the sun upon unit area of a receptor (e.g.
    a solar cell).
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: Solar irradiance may be direct irradiance or diffuse irradiance.
- content: The solar irradiance depends on the geographical latitude, the season of
    the year and the time of the day, also on the intensity of solar emission and
    the transmission properties of the atmosphere, the value of air-mass and the inclination
    of the surface of the receptor.
annotations:
