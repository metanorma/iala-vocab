id: 6-3-320-eng
termid: 6-3-320
data:
  language_code: eng
terms:
- type: expression
  designation: Fuel cell
  normative_status: preferred
definition:
- content: A device used to produce electricity directly from the reaction between
    a fuel and an oxidant at electrode surfaces which are in contact with an electrolyte.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The most important reaction for power generation is produced by the combination
    of hydrogen with air or oxygen.
