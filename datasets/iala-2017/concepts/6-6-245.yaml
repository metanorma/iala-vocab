data:
  language_code: eng
terms:
- type: expression
  designation: Disconnector
  normative_status: preferred
- type: expression
  designation: Isolator
  normative_status: admitted
definition:
- content: A mechanical switching device that provides, in the open position, an isolating
    distance between the contacts in accordance with specified requirements. It is
    also capable of carrying currents under normal circuit conditions.
