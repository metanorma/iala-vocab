id: 6-6-260-eng
termid: 6-6-260
data:
  language_code: eng
  terms:
  - type: expression
    designation: Push-button (switch)
    normative_status: preferred
  definition:
  - content: A switch in which the moving parts have only one position of rest, usually
      operated by the force of the finger or palm of the hand, and having stored energy
      (e.g. spring) return.
  notes:
  - content: Recently developed devices called touch-buttons employ various processes
      (mechanical, electric, etc) to operate a switch by simple finger contact without
      significant force.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
