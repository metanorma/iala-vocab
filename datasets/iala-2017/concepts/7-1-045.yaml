data:
  language_code: eng
  terms:
  - type: expression
    designation: Pier (2)
    normative_status: preferred
  definition:
  - content: A structure with a wood or concrete deck supported on piles extending
      over open water to provide a landing place where the depth of water would otherwise
      be prohibitive.
