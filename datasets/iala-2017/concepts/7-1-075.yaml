id: 7-1-075-eng
termid: 7-1-075
data:
  language_code: eng
  terms:
  - type: expression
    designation: Breakwater (2)
    normative_status: preferred
  definition:
  - content: A construction made to provide an area of calm water for shipping or
      for the protection of a coast or harbour against the effects of wave action.
  notes:
  - content: The term mole is also used for a breakwater of solid construction. It
      may be possible to drive along the top of a mole, and also to berth vessels
      alongside.
