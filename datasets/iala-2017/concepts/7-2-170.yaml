id: 7-2-170-eng
termid: 7-2-170
data:
  language_code: eng
terms:
- type: expression
  designation: Strut
  normative_status: preferred
definition:
- content: A structural member intended to resist compression, especially used to
    describe short or non-vertical members.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The French term entretoise means more specifically a short member placed
    between two beams to maintain their separation.
