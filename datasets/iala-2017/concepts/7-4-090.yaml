id: 7-4-090-eng
termid: 7-4-090
data:
  language_code: eng
  terms:
  - type: expression
    designation: Tidal cycle
    normative_status: preferred
  - type: expression
    designation: Tidal wave (USA)
    normative_status: admitted
  definition:
  - content: Predictable variation in the height of the sea level due to the effects
      of the moon, and to a lesser extent the sun, influenced by the rotation of the
      earth.
  notes:
  - content: A rising tide is called a flood tide and a falling tide an ebb tide.
