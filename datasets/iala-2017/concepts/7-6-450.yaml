id: 7-6-450-eng
termid: 7-6-450
data:
  language_code: eng
  terms:
  - type: expression
    designation: To solder
    normative_status: preferred
  - type: expression
    designation: To sweat
    normative_status: admitted
  definition:
  - content: To join together items of copper, brass or lead using a soft lead-tin
      alloy which is melted at a relatively low temperature at the join, then hardens
      and bonds forming a connection.
