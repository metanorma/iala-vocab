id: 8-1-035-eng
termid: 8-1-035
data:
  language_code: eng
terms:
- type: expression
  designation: Depot motor launch
  normative_status: preferred
definition:
- content: |-
    A launch used for transporting personnel and stores between a depot and vessels at harbour moorings. Also used as a general depot workboat.

    Note :

    Also sometimes called a tender.
