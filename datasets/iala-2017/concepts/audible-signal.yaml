id: audible-signal-spa
termid: audible-signal
data:
  language_code: spa
terms:
- type: expression
  designation: Señal audible
  normative_status: preferred
definition:
- content: |-
    (Señal Sonora)

    Señal audible destinada a advertir o guiar a los buques en situaciones de baja visibilidad.

    También llamada Señal de Niebla o Señal Sonora.

    Source: IALA Guideline G1090 on The Use of Audible Signals Edition 1 December 2012.
