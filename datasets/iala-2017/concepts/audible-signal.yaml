id: audible-signal-eng
termid: audible-signal
data:
  language_code: eng
terms:
- type: expression
  designation: Audible Signal
  normative_status: preferred
definition:
- content: |-
    An audible signal intended to warn or guide ships in low visibility.

    Also called Fog Signal or Sound Signal.

    Source: IALA Guideline G1090 on The Use of Audible Signals Edition 1 December 2012.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
