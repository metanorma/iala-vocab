definition:
- content: |-
    VTS-2012-10

    That course which a vessel makes good over ground, as a result of the effect of currents, tidal streams, and leeway caused by wind and sea.

    Source: IALA Guideline 1068 (2009)

    (VTS33/output/8 refers)
