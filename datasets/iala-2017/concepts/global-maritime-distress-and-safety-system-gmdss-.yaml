id: global-maritime-distress-and-safety-system-gmdss--eng
termid: global-maritime-distress-and-safety-system-gmdss-
data:
  language_code: eng
  terms:
  - type: expression
    designation: Global Maritime Distress and Safety System (GMDSS)
    normative_status: preferred
  definition:
  - content: |-
      An internationally agreed system for automatically alerting ships and authorities ashore to a distress situation and enabling coordination of Search and Rescue operations.

      Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
