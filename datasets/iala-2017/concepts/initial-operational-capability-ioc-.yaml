id: initial-operational-capability-ioc--eng
termid: initial-operational-capability-ioc-
data:
  language_code: eng
  terms:
  - type: expression
    designation: Initial Operational Capability (IOC)
    normative_status: preferred
  definition:
  - content: |-
      Operational status of a GNSS or other radio-navigation system declared by the providing authority, when the system is considered usable, but before validation has been fully completed.

      Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
