id: mean-time-between-failures-eng
termid: mean-time-between-failures
data:
  language_code: eng
  terms:
  - type: expression
    designation: Mean time between failures
    normative_status: preferred
  definition:
  - content: |-
      Mean time between failures 5-1-040

      Acronym: MTBF

      The total measured operating time of a population of repairable equipments divided by the total number of failures within this population. MTBF is generally determined during the constant-failure-rate period.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
