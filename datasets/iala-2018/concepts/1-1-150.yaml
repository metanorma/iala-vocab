id: 1-1-150-eng
termid: 1-1-150
data:
  language_code: eng
  terms:
  - type: expression
    designation: Radiant exitance
    normative_status: preferred
  - type: expression
    designation: Radiant exitance (at a point of a surface)
    normative_status: admitted
  - type: symbol
    designation: stem:[Me]
    normative_status: preferred
  definition:
  - content: Quotient of the radiant flux(dFe) leaving an element of the surface containing
      the point, by the area of that element (dA). by ???
  notes:
  - content: If the radiant flux Fe may be considered uniformly emitted by a finite
      plane surface of area A, the radiant exitance of this surface is given by ??
  - content: Formerly known in English as radiant emittance and in French as emittance
      energetique.
  - content: For further definitions see C.I.E.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  - type: authoritative
    origin:
      ref:
        source: C.I.E
    modification: modified from source
  annotations:
  - content: Unit watt per square metre (W/m2)
