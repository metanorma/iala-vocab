id: 1-1-305-eng
termid: 1-1-305
data:
  language_code: eng
  terms:
  - type: expression
    designation: Amplitude
    normative_status: preferred
  - type: expression
    designation: Amplitude (of a symmetrical periodic quantity)
    normative_status: admitted
  definition:
  - content: The maximum magnitude of a symmetrical periodic quantity within one period
      of the oscillation.
  notes:
  - content: In German the term "amplitude" applies to the maximum instantaneous value
      of a sinusoidal oscillatory quantity. In the case of a non-sinusoidal quantity
      the term Scheitelwert is used.
  - content: Not to be confused with "Amplitude (of an observed heavenly body)" {{1-2-125,
      Amplitude of an observed heavenly body}}.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
