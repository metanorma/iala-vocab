id: 2-1-150-eng
termid: 2-1-150
data:
  language_code: eng
terms:
- type: expression
  designation: Reflectance
  normative_status: preferred
- type: expression
  designation: Reflection Factor
  normative_status: admitted
definition:
- content: |-
    The ratio of the reflected luminous flux (Fr) to the incident flux (Fo).

    Symbol: ?

    ? = ?r + ?d
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
  modification: modified from source
notes:
- content: Where mixed reflection occurs, the (total) reflectance may be divided into
    two parts, Specular Reflectance (?r) and Diffuse Reflectance (?d), corresponding
    respectively to the two modes of reflection referred to in 2-1-135 and 2-1-140.
