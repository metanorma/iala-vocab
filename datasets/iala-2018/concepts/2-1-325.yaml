id: 2-1-325-eng
termid: 2-1-325
data:
  language_code: eng
terms:
- type: expression
  designation: Adaptation
  normative_status: preferred
definition:
- content: The process taking place as the eye becomes accustomed to the luminance
    or the colour of the field of view.
- content: The final state of the process. In particular, the terms Light Adaptation
    and Dark Adaptation are used, according as the luminance is of the order of at
    least several candelas per square metre or less than some hundredths of a candela
    per square metre.
