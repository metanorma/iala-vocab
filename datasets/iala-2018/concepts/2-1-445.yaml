id: 2-1-445-eng
termid: 2-1-445
data:
  language_code: eng
terms:
- type: expression
  designation: Dominant Wavelength
  normative_status: preferred
- type: expression
  designation: Dominant Wavelength (of a colour stimulus, not purple)
  normative_status: admitted
- type: symbol
  designation: stem:[?d]
  normative_status: preferred
definition:
- content: The wavelength of the monochromatic light stimulus that, when combined
    in suitable proportions with the specified achromatic light stimulus, yields a
    match with the colour stimulus considered.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
notes:
- content: When the dominant wavelength cannot be given (this applies to purples)
    its place is taken by the complementary wavelength.
- content: 'For the definitions of Achromatic and Specified Achromatic Light Stimulus,
    see Reference: C.I.E. In particular, for surface colours, the light source serving
    as illuminant is taken as achromatic.'
annotations:
