id: 2-1-475-eng
termid: 2-1-475
data:
  language_code: eng
  terms:
  - type: expression
    designation: Tristimulus Values
    normative_status: preferred
  - type: expression
    designation: Tristimulus Values (of a colour stimulus)
    normative_status: admitted
  - type: symbol
    designation: stem:[(Reference:]
    normative_status: preferred
  definition:
  - content: |-
      The amounts of the three reference or matching stimuli required to give a match with the colour stimulus considered, in a given trichromatic system.

      C.I.E. 1931) X, Y, Z.
  notes:
  - content: 'The quantities X, Y, Z refer to a field of vision of about 2 degrees.
      In 1964, quantities were defined by the Reference: C.I.E. to refer to a field
      of vision of about 10 degrees. These are denoted by the symbols X10, Y10, Z10.'
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
