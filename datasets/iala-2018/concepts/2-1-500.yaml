id: 2-1-500-eng
termid: 2-1-500
data:
  language_code: eng
  terms:
  - type: expression
    designation: Colour Temperature
    normative_status: preferred
  definition:
  - content: The temperature of the full radiator which emits radiation of the same
      chromaticity as the radiation considered.
  notes:
  - content: The corresponding relative spectral distribution curves need not be similar
      provided that the radiations give rise to identical colour sensations.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
