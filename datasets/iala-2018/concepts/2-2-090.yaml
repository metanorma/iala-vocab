id: 2-2-090-eng
termid: 2-2-090
data:
  language_code: eng
  terms:
  - type: expression
    designation: Fixed Lens
    normative_status: preferred
  definition:
  - content: |-
      A lens (in sense 2 of 2-2-010) made up of a belt of lenticular section and a series of rings of prismatic section above and below it.

      The axes of revolution of the belt and rings form the same vertical straight line.

      The rings are contiguous or nearly so.

      ![Ch2_Fig16a.jpg](/iala-vocab/images/iala/Ch2_Fig16a.jpg)

      ![Ch2_Fig16b.jpg](/iala-vocab/images/iala/Ch2_Fig16b.jpg)
  notes:
  - content: A fixed lens need not extend through 360 degrees, but may be limited
      to a sector.
  - content: The light issuing from a fixed lens is in the form of a fan beam {{2-1-090,
      Luminous fan beam}}.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  annotations:
