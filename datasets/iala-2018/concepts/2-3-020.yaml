terms:
- type: expression
  designation: Burner
  normative_status: preferred
definition:
- content: An apparatus in which a gas or vapour burns to produce a flame used directly
    or with a mantle as a source of light.
- content: That part of the apparatus where the flame is produced. (Figs. 20 and 21)
