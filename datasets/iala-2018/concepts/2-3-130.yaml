id: 2-3-130-eng
termid: 2-3-130
data:
  language_code: eng
  terms:
  - type: expression
    designation: Pre-Focus Cap
    normative_status: preferred
  definition:
  - content: |-
      A cap (type P) which enables the luminous element to be brought into a specified position relative to the cap during manufacture of the lamp.

      By this means, reproducible positioning can be assured when the lamp is inserted in a suitable lampholder.

      ![Ch2_Fig26.jpg](/iala-vocab/images/iala/Ch2_Fig26.jpg)
  notes:
  - content: A Flanged Cap (Culot a Ailettes in French; Flanschsockel in German) is
      a particular type of pre-focus cap.
