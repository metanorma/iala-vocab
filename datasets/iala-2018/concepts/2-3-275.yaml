id: 2-3-275-eng
termid: 2-3-275
data:
  language_code: eng
  terms:
  - type: expression
    designation: Incandescence Time (of a lamp)
    normative_status: preferred
  definition:
  - content: The time elapsing between the commencement of the supply of power to
      the lamp and the attainment of a specified percentage of the nominal luminous
      intensity or luminous flux of the lamp at the given power level.
