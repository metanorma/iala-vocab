id: 2-3-340-eng
termid: 2-3-340
data:
  language_code: eng
  terms:
  - type: expression
    designation: Fluorescent Lamp
    normative_status: preferred
  - type: expression
    designation: Fluorescent Tube
    normative_status: admitted
  definition:
  - content: A discharge lamp in which most of the light is emitted by a layer of
      fluorescent material excited by the ultraviolet radiation from the discharge.
  notes:
  - content: The terms Tube Fluorescent in French, and, in German, Leuchtstoffsroehre
      and Fluoreszenzroehre are also used, particularly in the case of cold cathode
      fluorescent lamps.
