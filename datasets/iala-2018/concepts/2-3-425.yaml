id: 2-3-425-eng
termid: 2-3-425
data:
  language_code: eng
  terms:
  - type: expression
    designation: Long-Arc Lamp
    normative_status: preferred
  definition:
  - content: A discharge lamp in which the distance between the electrodes is large.
  notes:
  - content: This type of lamp (xenon, for example) is generally of extra high pressure.
      The arc fills the discharge tube and is therefore stabilized.
