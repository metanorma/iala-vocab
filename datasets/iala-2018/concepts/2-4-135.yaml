id: 2-4-135-eng
termid: 2-4-135
data:
  language_code: eng
terms:
- type: expression
  designation: Cut screen
  normative_status: preferred
definition:
- content: An opaque screen located at the optic and intended to reduce the luminous
    intensity of the beam, and also, in the case of revolving optics, to reduce the
    angle of uncertainty
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: In the second case, this is a form of "cut screen".
