id: 2-5-220-eng
termid: 2-5-220
data:
  language_code: eng
terms:
- type: expression
  designation: Sector (of a sector light)
  normative_status: preferred
definition:
- content: |-
    The space bounded by two vertical planes passing through the luminous source of the sector light and within which a light of a given character is visible. (Fig.45)

