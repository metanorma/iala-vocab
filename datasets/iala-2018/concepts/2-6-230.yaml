id: 2-6-230-eng
termid: 2-6-230
data:
  language_code: eng
  terms:
  - type: expression
    designation: Conical Buoy (G.B.)
    normative_status: preferred
  definition:
  - content: |-
      Nun Buoy (U.S.A.)

      A buoy of which the upper part of the body (above the waterline), or the larger part of the superstructure, has approximately the shape of a cone with vertex upwards.

      ![Ch2_Fig62.jpg](/iala-vocab/images/iala/Ch2_Fig62.jpg)
  notes:
  - content: In France, a conical buoy of which the lower part of the body (mainly
      below the waterline) is of spherical shape is also known as a Bouee Sphero-Conique.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  annotations:
