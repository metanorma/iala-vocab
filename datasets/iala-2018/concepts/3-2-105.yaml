data:
  language_code: eng
  terms:
  - type: expression
    designation: Horn
    normative_status: preferred
  - type: expression
    designation: Trumpet
    normative_status: admitted
  definition:
  - content: A flared tube designed to match the acoustic impedance to the impedance
      of the atmosphere; it can behave as a resonator and can influence the directivity;
      the narrow end is called the throat and the large end the mouth.
