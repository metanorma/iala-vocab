id: 4-1-070-eng
termid: 4-1-070
data:
  language_code: eng
  terms:
  - type: expression
    designation: Spurious emission
    normative_status: preferred
  definition:
  - content: Emission on a frequency or frequencies which are outside the necessary
      band, and the level of which may be reduced without affecting the corresponding
      transmission of information. Spurious emissions include harmonic emissions,
      parasitic emissions and intermodulation products, but exclude emissions in the
      immediate vicinity of the necessary band, which are a result of the modulation
      process for the transmission of information.
