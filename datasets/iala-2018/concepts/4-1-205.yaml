id: 4-1-205-eng
termid: 4-1-205
data:
  language_code: eng
terms:
- type: expression
  designation: Pulse rise time
  normative_status: preferred
definition:
- content: The interval between the instants at which the instantaneous amplitude
    of a pulse first reaches specified lower and upper limits, namely 10% and 90%
    of the peak pulse amplitude unless otherwise stated.
