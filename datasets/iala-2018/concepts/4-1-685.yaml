id: 4-1-685-eng
termid: 4-1-685
data:
  language_code: eng
terms:
- type: expression
  designation: Sideband
  normative_status: preferred
definition:
- content: A range of frequencies occupied by the spectral components resulting from
    the modulation of a carrier wave by a signal.
- content: A discrete frequency in a sideband (properly called a side frequency).
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: B.S
notes:
- content: The terms upper sideband and lower sideband are used to denote the ranges
    higher than or lower than the carrier frequency respectively.
