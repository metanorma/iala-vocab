id: 4-1-725-eng
termid: 4-1-725
data:
  language_code: eng
terms:
- type: expression
  designation: Diversity reception
  normative_status: preferred
definition:
- content: A method of reception in which a single output signal is derived from a
    combination of, or selection from, a plurality of transmission channels or paths.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The methods of reception employed may include space diversity, polarization
    diversity, or frequency (channel) diversity.
