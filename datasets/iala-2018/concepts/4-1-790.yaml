id: 4-1-790-eng
termid: 4-1-790
data:
  language_code: eng
  terms:
  - type: expression
    designation: Detection
    normative_status: preferred
  definition:
  - content: The process of extracting information from an electromagnetic wave.
  notes:
  - content: Often a non-linear conducting device is used.
  - content: The use of the term for the action of a mixer is deprecated.
  - content: Where there was no original modulating signal the use of the term Demodulation
      as an alternative for "detection" is deprecated.
