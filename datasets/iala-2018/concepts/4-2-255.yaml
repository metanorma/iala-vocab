id: 4-2-255-eng
termid: 4-2-255
data:
  language_code: eng
terms:
- type: expression
  designation: Swing - angle
  normative_status: preferred
- type: expression
  designation: Null width
  normative_status: admitted
definition:
- content: The angle containing the direction of a bearing observation and bounded
    by limits within which the variation of the intensity of the signal is too slight
    to be detected.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The magnitude of the swing may alternatively be expressed as plus and minus
    half the angle defined above.
