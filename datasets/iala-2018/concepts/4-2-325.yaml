id: 4-2-325-eng
termid: 4-2-325
data:
  language_code: eng
terms:
- type: expression
  designation: Polarization error
  normative_status: preferred
- type: expression
  designation: Polarization error (in bearing)
  normative_status: admitted
definition:
- content: An error, in an observed bearing, which varies with the state of polarization
    of the received waves relative to the designed plane of polarization.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: B.S
  modification: modified from source
notes:
- content: Some types of polarization error may be attributable to specific features
    of the site (e.g. inclined conductors) and, as such, are also site errors.
