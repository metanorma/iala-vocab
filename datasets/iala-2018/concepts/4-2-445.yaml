id: 4-2-445-eng
termid: 4-2-445
data:
  language_code: eng
terms:
- type: expression
  designation: Radiation monitor
  normative_status: preferred
definition:
- content: A form of radio receiver generally used in the remote (radiated) field
    of the transmitter, which is used to give a warning in the event of a significant
    change in radiated power.
