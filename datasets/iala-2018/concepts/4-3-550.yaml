id: 4-3-550-eng
termid: 4-3-550
data:
  language_code: eng
terms:
- type: expression
  designation: Octahedral cluster
  normative_status: preferred
definition:
- content: An arrangement of eight corner reflectors with common faces designed to
    give a substantially uniform response in all directions. The octahedral cluster
    is formed by mounting three rectangular plates mutually at right angles, the geometric
    centres of the plates being coincident.
