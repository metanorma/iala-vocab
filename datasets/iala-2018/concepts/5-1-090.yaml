data:
  language_code: eng
terms:
- type: expression
  designation: Parallel redundancy
  normative_status: preferred
- type: expression
  designation: Active redundancy
  normative_status: admitted
definition:
- content: Redundancy in which the different means work together to perform the task,
    one of the means being capable of producing the results alone if the other fails.
