data:
  language_code: eng
  terms:
  - type: expression
    designation: Compensation (2)
    normative_status: preferred
  definition:
  - content: Modifying or supplementary action (also, the effect of such action) intended
      to improve performances with respect to some specified characteristics.
  notes:
  - content: 'Note:: Usually the addition of some form of damping, which involves
      the addition of an oscillation damper, to change the apparent characteristics
      of the load.'
