id: 5-2-375-eng
termid: 5-2-375
data:
  language_code: eng
  terms:
  - type: expression
    designation: Stability
    normative_status: preferred
  definition:
  - content: The property of a feedback control system or element such that its output
      is asymptotic, i.e., the output will ultimately attain a steady state within
      the linear range and without continuing external stimuli.
