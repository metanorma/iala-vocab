id: 5-3-230-eng
termid: 5-3-230
data:
  language_code: eng
terms:
- type: expression
  designation: Mean power (2)
  normative_status: preferred
definition:
- content: The mean power supplied to the antenna transmission line by a transmitter
    during normal operation averaged over a time sufficiently long compared with the
    period of the lowest frequency encountered in the modulation.
