id: 6-1-005-eng
termid: 6-1-005
data:
  language_code: eng
  terms:
  - type: expression
    designation: Mains supply
    normative_status: preferred
  definition:
  - content: An electric supply obtained from a central generating system provided
      by a national or regional organisation. The supply is distributed over a large
      area to many points of utilisation.
