id: 6-2-220-eng
termid: 6-2-220
data:
  language_code: eng
  terms:
  - type: expression
    designation: Pre-ignition
    normative_status: preferred
  definition:
  - content: Undesirable self-ignition of the mixture inside the cylinder of an engine
      before the occurrence of the spark. This may be due to excessive temperatures
      of parts of the surface of the combustion chamber or the exhaust valve head,
      or of carbon deposits within the chamber.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  annotations:
  - content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Pre-ignition
