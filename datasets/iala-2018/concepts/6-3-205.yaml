termid: 6-3-205
data:
  language_code: eng
  terms:
  - type: expression
    designation: Tail vane
    normative_status: preferred
  definition:
  - content: A device of rigid construction, sometimes a flat plate, which is attached
      at the rear of the movable body of a wind-power generator as the means of making
      the wind turn the rotor into the wind.
