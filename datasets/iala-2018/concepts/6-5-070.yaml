id: 6-5-070-eng
termid: 6-5-070
data:
  language_code: eng
terms:
- type: expression
  designation: Battery
  normative_status: preferred
definition:
- content: An assembly of electrochemical cells with a common output.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: In French, the term batterie usually refers to an assembly of secondary
    cells.
- content: In English, the term primary battery refers to an assembly of primary cells,
    and the terms secondary battery and storage battery refer to an assembly of secondary
    cells.
- content: In English, the term " disposable battery " refers to a primary battery,
    and the term " rechargeable battery " refers to a secondary battery, but these
    terms are deprecated.
