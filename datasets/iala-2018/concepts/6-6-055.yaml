id: 6-6-055-eng
termid: 6-6-055
data:
  language_code: eng
terms:
- type: expression
  designation: Insulated cable
  normative_status: preferred
definition:
- content: |-
    (insulated) cable

    An assembly of one or more conductors, either solid or stranded, each covered with a layer of insulating material throughout its length, the whole assembly being provided with a common protective covering.
