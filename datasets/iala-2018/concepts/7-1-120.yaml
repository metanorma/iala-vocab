id: 7-1-120-eng
termid: 7-1-120
data:
  language_code: eng
terms:
- type: expression
  designation: Engine room
  normative_status: preferred
definition:
- content: A building or part of a building designed to house operational engines
    (alternator sets, motors, compressors, etc.).
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: In German the term Maschinenhaus is used when a separate building is used
    for this purpose.
