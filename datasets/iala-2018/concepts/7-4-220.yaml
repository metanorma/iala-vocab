id: 7-4-220-eng
termid: 7-4-220
data:
  language_code: eng
  terms:
  - type: expression
    designation: Cohesion
    normative_status: preferred
  definition:
  - content: The mutual attraction that exists in some soils (eg clays) between fine
      particles, tending to hold them together without the application of external
      forces.
