id: 8-5-000-eng
termid: 8-5-000
data:
  language_code: eng
terms:
- type: expression
  designation: Anchor
  normative_status: preferred
definition:
- content: A heavy device of iron or steel used to secure a vessel or buoy at a desired
    location. It comprises a shank with, at one end, a shackle or ring to which the
    mooring line of the vessel or buoy is attached and, at the other end, flukes that
    can grip the sea bottom. A crosspiece called the stock may be fitted transversely
    to the shank, to cant the anchor when the mooring line is tensioned.
sources:
