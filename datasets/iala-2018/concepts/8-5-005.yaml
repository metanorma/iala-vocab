data:
  language_code: eng
  terms:
  - type: expression
    designation: Bower anchor
    normative_status: preferred
  definition:
  - content: 'One of the anchors carried on either bow of a vessel as the main riding
      anchors. Note : They are called the port bower and the starboard bower respectively.'
