data:
  language_code: eng
  terms:
  - type: expression
    designation: Design
    normative_status: preferred
  definition:
  - content: |-
      Abstract concept of a building or artefact. It can exist in the mind or on paper and if realised, it can be represented in the building or artefact itself.

      (This definition was noted at the IALA Seminar on the Practical Aspects of Lighthouse Preservation in Gothenburg 2005)
