  designation: Full Operational Capability (FOC)
  normative_status: preferred
definition:
- content: |-
    Operational status of a GNSS or other radio-navigation system declared by the providing authority when commissioning and validation are considered to have been completed satisfactorily.

    Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
