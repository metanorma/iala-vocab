id: integrated-navigation-system-eng
termid: integrated-navigation-system
data:
  language_code: eng
  terms:
  - type: expression
    designation: Integrated navigation system
    normative_status: preferred
  definition:
  - content: |-
      A system in which the information from two or more navigation aids is combined in a symbiotic manner to provide an output that is superior to any one of the component aids.

      Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
