id: marine-aid-to-navigation-eng
termid: marine-aid-to-navigation
data:
  language_code: eng
terms:
- type: expression
  designation: Marine Aid to Navigation
  normative_status: preferred
definition:
- content: |-
    means a device, system or service, external to a vessel, designed and operated to enhance safe and efficient navigation of individual vessels and vessel traffic. For the purpose of the Organization (IALA) this definition includes Vessel Traffic Services

    Other forms: Aids to Navigation (plural), AtoN

    This definition of the term Aid to Navigation is in accordance with the IALA Constitution.
    The use of the definition from the original IALA Dictionary has been discontinued.
