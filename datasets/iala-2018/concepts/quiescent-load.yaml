id: quiescent-load-eng
termid: quiescent-load
data:
  language_code: eng
terms:
- type: expression
  designation: Quiescent Load
  normative_status: preferred
definition:
- content: |-
    Quiescent load is the power requirement of a piece of equipment which is idle, listening or monitoring.

    Transceivers generally have different load profiles when transmitting and when listening.  Charge controllers typically consume more power during the day when the power electronics are energised, than at night or when the battery is fully charged.

    Source: ENG7, Guideline G1067-1 (2017)
