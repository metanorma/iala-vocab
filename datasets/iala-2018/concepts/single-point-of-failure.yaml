id: single-point-of-failure-eng
termid: single-point-of-failure
data:
  language_code: eng
terms:
- type: expression
  designation: Single point of failure
  normative_status: preferred
definition:
- content: |-
    That part of a navigation system that lacks redundancy, so that a failure in that part would result in a failure of the whole system.

    Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
sources:
- type: authoritative
  origin:
