id: 1-1-040-eng
termid: 1-1-040
data:
  language_code: eng
  terms:
  - type: expression
    designation: Cardinal system of marking
    normative_status: preferred
  - type: expression
    designation: Cardinal system of marking (or buoyage)
    normative_status: admitted
  definition:
  - content: An agreed system of visual aids to navigation used to indicate the relative
      position of an obstruction (e.g. shoal, wreck) on the compass scale (cardinal
      points).
  notes:
  - content: The relative position of the obstruction on the compass scale is indicated
      by aids to navigation of defined shape, colour or light characteristics.
