id: 1-2-000-eng
termid: 1-2-000
data:
  language_code: eng
  terms:
  - type: expression
    designation: Navigation
    normative_status: preferred
  definition:
  - content: The art or science of determining position and course of a ship or aircraft
      by means of observations on board, whereby difficulties and dangers are avoided
      and a desired destination is reached as quickly and safely as possible.
  - content: The practice of passing on water of ships, whether inland or on the sea.
