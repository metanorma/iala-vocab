id: 1-2-035-eng
termid: 1-2-035
data:
  language_code: eng
terms:
- type: expression
  designation: Bearing
  normative_status: preferred
- type: expression
  designation: Azimuth
  normative_status: admitted
definition:
- content: |-
    Angle measured between the plane of the meridian through the point of observation and the vertical plane passing through that point and an observed object. It is measured from true North in a clockwise sense from 0 to 360 degrees.

    The term relevement in French is used mainly when the point of observation is on a floating or moored vessel, and the position of this is being determined in relation to a fixed observed object.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The term "azimuth" is generally used when the observed object is a heavenly
    body.
- content: The term azimut in French is used when the point of observation is a fixed
    point and the position of the observed object is to be determined.
