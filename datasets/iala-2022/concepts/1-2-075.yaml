terms:
- type: expression
  designation: Position line
  normative_status: preferred
- type: expression
  designation: Line of position
  normative_status: admitted
definition:
- content: A line (geometrical locus), defined by a constant measured value, on which
    a vessel may be identified on the basis of a measurement.
sources:
