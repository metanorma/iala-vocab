id: 1-2-145-eng
termid: 1-2-145
data:
  language_code: eng
  terms:
  - type: expression
    designation: Bifurcation
    normative_status: preferred
  definition:
  - content: The point at which a channel divides into two when viewed from a vessel
      approaching from the open sea or in the same direction as the main stream of
      flood tide or in the direction established by the appropriate authority.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
