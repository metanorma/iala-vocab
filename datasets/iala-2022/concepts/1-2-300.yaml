id: 1-2-300-eng
termid: 1-2-300
data:
  language_code: eng
  terms:
  - type: expression
    designation: Dry Dock
    normative_status: preferred
  definition:
  - content: |-
      (Dry) Dock

      A structure providing support for a vessel and means for removing the water so that the bottom of the vessel can be exposed.
  notes:
  - content: When the structure is floating it is usually called in English a floating
      dock and in German a Schwimmdock.
  - content: In French when the structure is fixed it is called a forme de radoub;
      when the structure is floating it is called a dock flottant.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  annotations:
  - content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Dry_Dock
