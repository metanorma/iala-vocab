id: 2-1-330-eng
termid: 2-1-330
data:
  language_code: eng
  terms:
  - type: expression
    designation: Photopic Vision
    normative_status: preferred
  definition:
  - content: Vision by the normal eye when adapted to levels of luminance of at least
      several candelas per square metre.
  notes:
  - content: The cone receptors of the retina are considered to be the principal active
      elements under these conditions, and the spectrum appears coloured.
