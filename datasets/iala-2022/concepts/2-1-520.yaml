id: 2-1-520-eng
termid: 2-1-520
data:
  language_code: eng
terms:
- type: expression
  designation: Full Radiator
  normative_status: preferred
- type: expression
  designation: Black Body, Planckian Radiator
  normative_status: admitted
definition:
- content: The thermal radiator which absorbs completely all incident radiation, whatever
    the wavelength, the direction of incidence or the polarisation. This radiator
    has, for any wavelength, the maximum spectral concentration of radiant exitance
    at a given temperature.
