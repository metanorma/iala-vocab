id: 2-2-105-eng
termid: 2-2-105
data:
  language_code: eng
  terms:
  - type: expression
    designation: Focus (of a fixed lens)
    normative_status: preferred
  definition:
  - content: |-
      The point of intersection of the axis of the lens {{2-2-115, Axis (of a fixed lens)}} and the median horizontal plane through the belt. A ray of light emitted by a point source situated at this point is re-directed by an element of the lens into a direction normal to the axis of the lens. (Figs. 16b and 18)

      ![Ch2_Fig16b.jpg](/iala-vocab/images/iala/Ch2_Fig16b.jpg)

      ![Ch2_Fig18.jpg](/iala-vocab/images/iala/Ch2_Fig18.jpg)
  notes:
  - content: The term "focus" in its more general and correct sense is given in 2-1-125.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
