data:
  language_code: eng
  terms:
  - type: expression
    designation: Lampholder
    normative_status: preferred
  - type: expression
    designation: Socket
    normative_status: admitted
  definition:
  - content: A device into which the cap of a lamp is inserted, for holding it in
      position and usually connecting it with the electric supply.
  notes:
  - content: In English, when the context is clear, the abbreviation Holder is commonly
      used.
  - content: 'See Note: to 2-3-110.'
