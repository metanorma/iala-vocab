data:
  language_code: eng
  terms:
  - type: expression
    designation: Fluorescent Mercury Discharge Lamp
    normative_status: preferred
  definition:
  - content: A high pressure mercury lamp in which the light is produced partly by
      the mercury vapour and partly by a layer of fluorescent material excited by
      the ultra-violet radiation of the discharge .
