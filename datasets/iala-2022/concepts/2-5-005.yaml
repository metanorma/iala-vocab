id: 2-5-005-eng
termid: 2-5-005
data:
  language_code: eng
  terms:
  - type: expression
    designation: Light (4)
    normative_status: preferred
  - type: expression
    designation: "(Light) Beacon, Lighthouse"
    normative_status: admitted
  definition:
  - content: The assembly consisting of a light {{2-5-000, Light (3)}} and its support
      and subsidiary structures, designed to give light {{2-1-005, Light (2)}} of
      a distinctive character and to mark a known geographical location,  in order
      to assist navigation.
  notes:
  - content: When the light is of major importance and has one or more resident lighthouse-keepers,
      the terms Lighthouse and, in French, Phare are usually employed.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
