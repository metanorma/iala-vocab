id: 2-6-270-eng
termid: 2-6-270
data:
  language_code: eng
  terms:
  - type: expression
    designation: Retro-Reflector
    normative_status: preferred
  - type: expression
    designation: Reflex Reflector
    normative_status: admitted
  definition:
  - content: |-
      A device intended to produce reflex reflection {{2-1-155, Retro-Reflection}}, at least for a limited range of angles of incidence of a light beam.

      It may comprise one or more retro-reflecting optical units, for example, corner reflectors or special lens units of glass or plastic. Such devices may be installed generally on unlighted buoys or other navigational aids to increase the range at which they may be seen at night.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
