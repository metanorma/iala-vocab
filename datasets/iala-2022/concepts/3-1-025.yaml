id: 3-1-025-eng
termid: 3-1-025
data:
  language_code: eng
terms:
- type: expression
  designation: Sound signal
  normative_status: preferred
definition:
- content: a devise which transmits sound, intended to provide information to mariners
    during periods of restricted visibility.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The term "Sound signal" is frequently used to describe the apparatus generating
    the sound. This use is deprecated.
