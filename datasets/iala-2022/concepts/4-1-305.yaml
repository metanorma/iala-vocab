id: 4-1-305-eng
termid: 4-1-305
data:
  language_code: eng
terms:
- type: expression
  designation: Fraunhofer region
  normative_status: preferred
definition:
- content: For a transmitting antenna system, the region which is sufficiently remote
    from the antenna system for the wavelets arriving from the various parts of the
    system to be considered to follow parallel paths.
