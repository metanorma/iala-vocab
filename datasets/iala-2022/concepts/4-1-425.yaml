id: 4-1-425-eng
termid: 4-1-425
data:
  language_code: eng
terms:
- type: expression
  designation: Folded dipole
  normative_status: preferred
definition:
- content: An antenna consisting of interconnected parallel dipoles separated by a
    small fraction of the wavelength of operation, connected together at their outer
    ends, and fed at the centre of one of the dipoles.
