id: 4-1-565-eng
termid: 4-1-565
data:
  language_code: eng
  terms:
  - type: expression
    designation: Cheese antenna
    normative_status: preferred
  definition:
  - content: An antenna consisting of a mirror in the shape of part of a parabolic
      cylinder bounded by two parallel plates normal to the cylinder axis, and of
      an antenna feed placed on or near the focal line.
