termid: 4-1-945
data:
  language_code: eng
terms:
- type: expression
  designation: Radio horizon
  normative_status: preferred
definition:
- content: The locus of points at which direct rays from the antenna become tangential
    to the earth's surface, taking into account the curvature due to refraction.
