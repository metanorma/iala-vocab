data:
  language_code: eng
  terms:
  - type: expression
    designation: Identification signal
    normative_status: preferred
  definition:
  - content: A letter or group of letters in morse code or some other combination
      of dots or dashes or both introduced into the transmission to identify the beacon.
      In some cases two tones are employed.
