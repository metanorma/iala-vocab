data:
  language_code: eng
terms:
- type: expression
  designation: Echo box
  normative_status: preferred
- type: expression
  designation: Phantom target (U.S.A.)
  normative_status: admitted
definition:
- content: A resonant cavity, with small damping, energised by part of the transmitted
    pulse power. The train of damped oscillations, immediately following the transmitted
    pulse, is fed into the radar receiver to provide an overall test of the radar
    set.
