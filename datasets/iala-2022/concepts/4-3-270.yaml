id: 4-3-270-eng
termid: 4-3-270
data:
  language_code: eng
terms:
- type: expression
  designation: Blip scan ratio
  normative_status: preferred
definition:
- content: The ratio of the number of paints from a target to the maximum possible
    number of paints for a given number of revolutions of the radar aerial.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The maximum number of paints is usually equivalent to the number of revolutions
    of the aerial. This is generally taken as 10.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Blip_scan_ratio
