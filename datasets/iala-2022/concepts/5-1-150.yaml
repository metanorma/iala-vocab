id: 5-1-150-eng
termid: 5-1-150
data:
  language_code: eng
  terms:
  - type: expression
    designation: Confidence limits
    normative_status: preferred
  definition:
  - content: The extremes of a confidence interval.
  notes:
  - content: In reliability the upper limit is 100% and therefore only the lower limit
      of confidence is usually stated. For example a stated 90% reliabiltiy with confidence
      level 60% means there is a 60% probability that the actual reliability is at
      least 90%.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
