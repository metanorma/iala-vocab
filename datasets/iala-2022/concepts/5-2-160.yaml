termid: 5-2-160
data:
  language_code: eng
terms:
- type: expression
  designation: Indirectly controlled variable
  normative_status: preferred
definition:
- content: |-
    A variable which does not originate a feedback signal, but which is related to, and influenced by, the directly controlled variable.

    ![Ch5_Fig2.jpg](/iala-vocab/images/iala/Ch5_Fig2.jpg)

