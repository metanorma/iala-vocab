data:
  language_code: eng
terms:
- type: expression
  designation: Peak pulse power (carrier frequency)
  normative_status: preferred
definition:
- content: The power averaged over that carrier frequency cycle which occurs at the
    maximum of the pulse of power (usually one-half of the maximum instantaneous power).
