id: 5-3-275-eng
termid: 5-3-275
data:
  language_code: eng
  terms:
  - type: expression
    designation: Rise time (of a pulse)
    normative_status: preferred
  definition:
  - content: The interval between the instants at which the instantaneous value of
      a pulse or of its envelope (if a carrier frequency pulse is concerned) first
      reaches specified lower and upper limits, namely 10% and 90% of the peak value
      unless otherwise stated.
