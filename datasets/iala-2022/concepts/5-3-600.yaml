id: 5-3-600-eng
termid: 5-3-600
data:
  language_code: eng
  terms:
  - type: expression
    designation: Telemetry
    normative_status: preferred
  - type: expression
    designation: Telemetering
    normative_status: admitted
  definition:
  - content: Measurement with the aid of intermediate means which permit the measurement
      to be interpreted at a distance from the primary detector.
  notes:
  - content: The distinctive feature of telemetering is the nature of the translating
      means, which includes the provisions for converting the quantity to be measured
      into a representative quantity of another kind that can be transmitted conveniently
      for measurement at a distance.
  - content: In normal French usage "telemetrie" means remote measurement of length.
