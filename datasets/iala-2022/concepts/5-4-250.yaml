terms:
- type: expression
  designation: Four-wire repeater
  normative_status: preferred
definition:
- content: A repeater for use in a four-wire or four-wire type circuit in which there
    are two amplifiers, one amplifying the signals in one channel and the other amplifying
    the signals in the other channel of the circuit.
