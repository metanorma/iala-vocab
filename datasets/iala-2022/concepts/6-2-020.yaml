id: 6-2-020-eng
termid: 6-2-020
data:
  language_code: eng
  terms:
  - type: expression
    designation: Petrol engine
    normative_status: preferred
  definition:
  - content: An internal combustion engine in which a mixture of air and petrol is
      admitted into the cylinder and ignited by a spark. The mixture may be provided
      by the use of a carburettor or by fuel injection. Ignition is produced by a
      spark plug.
