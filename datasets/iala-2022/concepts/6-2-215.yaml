    designation: Knocking (in a petrol engine)
    normative_status: preferred
  - type: expression
    designation: Detonation
    normative_status: admitted
  definition:
  - content: The spontaneous combustion of part of the fuel-air mixture in the combustion-chamber.
      This effect produces a knocking noise.
