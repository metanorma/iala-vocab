id: 6-5-090-eng
termid: 6-5-090
data:
  language_code: eng
  terms:
  - type: expression
    designation: Stationary battery
    normative_status: preferred
  definition:
  - content: A battery that is designed to be put at a fixed site and is not intended
      to be moved habitually from place to place during its life.
  notes:
  - content: It is usually of large size and capacity and so designed as to be economical
      in construction and maintenance, and to have a long life.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  annotations:
