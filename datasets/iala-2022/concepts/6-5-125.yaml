id: 6-5-125-eng
termid: 6-5-125
data:
  language_code: eng
  terms:
  - type: expression
    designation: Capacity (of a cell or battery)
    normative_status: preferred
  definition:
  - content: |-
      The quantity of electricity that may be removed from a cell or battery at a given rate of discharge under specified conditions of voltage and temperature.

      It is usually measured in ampere-hours.
  notes:
  - content: The term rating (of a battery) refers to the ampere-hour capacity as
      specified under given conditions of discharge.
