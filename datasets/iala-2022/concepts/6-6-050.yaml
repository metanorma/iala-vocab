data:
  language_code: eng
terms:
- type: expression
  designation: Isolated neutral system
  normative_status: preferred
definition:
- content: A system in which the neutral conductor has no connection to earth.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: Nevertheless a very high impedance connection may exist through indicating
    or protective devices.
