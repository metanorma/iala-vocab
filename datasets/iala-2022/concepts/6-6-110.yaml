termid: 6-6-110
data:
  language_code: eng
  terms:
  - type: expression
    designation: Armour (of a cable)
    normative_status: preferred
  definition:
  - content: A covering, consisting of metal tapes or wires, used to provide mechanical
      protection to the cable.
  notes:
  - content: A cable with armour is called an armoured cable.
