id: 7-1-085-eng
termid: 7-1-085
data:
  language_code: eng
terms:
- type: expression
  designation: Groyne
  normative_status: preferred
- type: expression
  designation: Groin
  normative_status: admitted
definition:
- content: A structure extending into the sea from a beach or bank, designed to prevent
    littoral drift.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The French term epi and the German term Buhne are also used for structures
    extending into rivers or estuaries, designed to restrict the cross-sectional area
    of the water flow.
