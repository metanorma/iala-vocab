id: 7-2-510-eng
termid: 7-2-510
data:
  language_code: eng
  terms:
  - type: expression
    designation: Duckboards
    normative_status: preferred
  definition:
  - content: Timber boarding used to provide a walkway.
  notes:
  - content: Such a walkway may be provided over an area subject to damp or flooding,
      for the convenience of pedestrians, or across soft ground to provide access.
      Duckboards may also be used to provide access across fragile roofing.
