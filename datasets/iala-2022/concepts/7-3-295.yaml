id: 7-3-295-eng
termid: 7-3-295
data:
  language_code: eng
terms:
- type: expression
  designation: Slaked lime
  normative_status: preferred
definition:
- content: Dry hydrated lime (calcium hydroxide) in a powder form, sometimes used
    as a component of mortar.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: Calcium hydroxide is obtained from calcium oxide by the addition of a suitable
    amount of water. This process is called slaking.
