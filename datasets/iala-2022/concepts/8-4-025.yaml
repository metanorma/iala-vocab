id: 8-4-025-eng
termid: 8-4-025
data:
  language_code: eng
terms:
- type: expression
  designation: Surface-following discus buoy
  normative_status: preferred
definition:
- content: A buoy of which the body is a shallow disk, usually surmounted by a pillar
    or tower superstructure. The buoy has a large cross-section at the water-level,
    so that it follows the surface of the sea under the influences of swell and waves.
sources:
- type: authoritative
  origin:
