id: 8-5-085-eng
termid: 8-5-085
data:
  language_code: eng
  terms:
  - type: expression
    designation: Multi-point mooring
    normative_status: preferred
  - type: expression
    designation: Multi-leg mooring
    normative_status: admitted
  definition:
  - content: |-
      A mooring in which lines are taken to a number of points (anchors or sinkers) at the sea bed.

      Other related self-explanatory terms are single-point or single-leg mooring, three-point or three-leg mooring, etc...
