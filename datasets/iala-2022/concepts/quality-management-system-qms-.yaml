id: quality-management-system-qms--eng
termid: quality-management-system-qms-
data:
  language_code: eng
terms:
- type: expression
  designation: Quality Management System (QMS)
  normative_status: preferred
definition:
- content: "VTS-2012-27\n\nQuality Management System (QMS)\tis a documented process
    of the organisation that comprises a set of policies, processes and procedures
    required for planning and implementing the training of VTS personnel.  QMS enables
    organisations to identify measure, control and improve the various training processes
    that will ultimately lead to improved performance.\n\nSource: IALA Guideline 1014
    (2009)\n\n(VTS33/output/8 refers)"
