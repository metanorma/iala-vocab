id: stakeholder-s--eng
termid: stakeholder-s-
data:
  language_code: eng
  terms:
  - type: expression
    designation: Stakeholder(s)
    normative_status: preferred
  definition:
  - content: |-
      VTS-2012-33

      Any individual, group, or organization able to affect, be affected by or believe it might be affected by a decision or activity.

      The decision maker(s) is a stakeholder.

      (VTS33/output/8 refers)
