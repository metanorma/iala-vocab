id: vts-operator-certificate-eng
termid: vts-operator-certificate
data:
  language_code: eng
  terms:
  - type: expression
    designation: VTS Operator Certificate
    normative_status: preferred
  definition:
  - content: |-
      VTS-2012-46

      VTS Operator Certificate is a certificate of competence awarded by a Competent Authority after the candidate VTSO has successfully completed both the V-103/1 training and V-103/3 OJT at the specific VTS centre where the VTSO is employed, as well as meeting any specific requirements of the Competent Authority.

      The VTS Operator certificate entitles the authorised holder to serve as a VTS Operator and perform the functions which endorsements have been made.

      Source: IALA Recommendation V-103 (2009)

      (VTS33/output/8 refers)
