definition:
- content: |-
    VTS-2012-49

    VTS sailing plan is a plan which is mutually agreed between a VTS Authority and the master of a vessel concerning the movement of the vessel in a VTS area.

    Source: IMO A.857(20)

    (VTS33/output/8 refers)
