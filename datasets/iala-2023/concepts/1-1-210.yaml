id: 1-1-210-eng
termid: 1-1-210
language_code: eng
terms:
- type: expression
  designation: Angle of reflection
  normative_status: preferred
definition:
- content: The angle that the direction of reflected energy makes with the normal
    to the reflecting surface. This angle is only well defined in the case of specular
    reflection.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
