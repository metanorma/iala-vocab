id: 1-1-350-eng
termid: 1-1-350
language_code: eng
terms:
- type: expression
  designation: Beat
  normative_status: preferred
definition:
- content: Oscillation is produced by the superimposition of two oscillations of slightly
    different frequencies. The amplitude of this oscillation varies periodically with
    a frequency that is the difference of the frequencies of the two oscillations.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
