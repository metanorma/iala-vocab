id: 1-1-430-eng
termid: 1-1-430
data:
  language_code: eng
terms:
- type: expression
  designation: Code wheel
  normative_status: preferred
definition:
- content: A disc (forming part of a coder) on which a character is defined. This
    is transmitted by mechanical or other means to another apparatus (e.g. a light,
    radio emitter or sound signal).
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: When the character is transmitted mechanically by action of a toothed or
    recessed disc on a lever, the term cam (properly applicable to the teeth) is sometimes
    used loosely for the code wheel.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Code_wheel
