id: 1-2-105-eng
termid: 1-2-105
data:
  language_code: eng
terms:
- type: expression
  designation: Celestial horizon
  normative_status: preferred
- type: expression
  designation: Rational horizon
  normative_status: admitted
definition:
- content: The great circle on the celestial sphere, every point of which is 90 degrees
    from the observer's zenith. This circle encloses the horizontal plane through
    the observer and divides the celestial sphere into two hemispheres.
