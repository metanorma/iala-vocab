id: 1-2-205-eng
termid: 1-2-205
language_code: eng
terms:
- type: expression
  designation: Wreck
  normative_status: preferred
definition:
- content: |-
    Any vessel or substantial parts thereof which is sunk or stranded or is no longer under control.



    Note: For lighthouse services the term is extended also to accidental obstructions to navigation which normally are marked as an indication of danger.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
