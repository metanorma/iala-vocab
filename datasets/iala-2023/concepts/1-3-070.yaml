id: 1-3-070-eng
termid: 1-3-070
data:
  language_code: eng
terms:
- type: expression
  designation: Fog
  normative_status: preferred
definition:
- content: |-
    Alternative terms: Mist, Haze

    States of the atmosphere in which the meteorological visibility is influenced owing to scattering (and in some cases to absorption or both) of light by a large number of minute water droplets or other particles suspended in the atmosphere. In the case of fog the meteorological visibility is usually more reduced than in the case of mist or haze.
