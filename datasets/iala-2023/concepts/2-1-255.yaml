  - type: expression
    designation: Nominal Range (of a light)
    normative_status: admitted
  definition:
  - content: The nominal range of a light used as an aid to marine navigation is its
      luminous range in a homogeneous atmosphere in which the meteorological visibility
      {{2-1-280, Meteorological Visibility}} is 10 sea-miles.
