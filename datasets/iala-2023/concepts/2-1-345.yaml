id: 2-1-345-eng
termid: 2-1-345
language_code: eng
terms:
- type: expression
  designation: Purkinje Phenomenon
  normative_status: preferred
definition:
- content: |-
    The reduction in the luminosity of a red light relative to that of a blue light when the luminances are reduced in the same proportion without changing the respective spectral distributions.



    Note: In passing from photopic to scotopic vision, the spectral luminous efficiencies change, the wavelength of maximum efficiency being displaced towards the shorter wavelengths.


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
