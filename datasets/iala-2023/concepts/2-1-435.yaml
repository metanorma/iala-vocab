id: 2-1-435-eng
termid: 2-1-435
language_code: eng
terms:
- type: expression
  designation: Colour (G.B.)
  normative_status: preferred
definition:
- content: |-
    Alternative term: Color (U.S.A.)


    1. Perceived colour Aspect of visual perception by which an observer may distinguish differences between two fields of view of the same size, shape and structure, such as may be caused by differences in the spectral composition of the radiation concerned in the observation.


    2. Psychophysical colour Characteristic of a visible radiation by which an observer may distinguish differences between two fields of view of the same size, shape and structure, such as may be caused by differences in the spectral composition of the radiation concerned in the observation.


    Reference: C.I.E. (extract)
sources:
- type: authoritative
  origin:
