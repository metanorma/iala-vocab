id: 2-1-440-eng
termid: 2-1-440
data:
  language_code: eng
terms:
- type: expression
  designation: Hue
  normative_status: preferred
definition:
- content: The attribute of visual sensation which has given rise to colour names,
    such as blue, green, yellow, red, purple etc.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
notes:
- content: This attribute is the psychosensorial correlate, or nearly so, of the colorimetric
    quantity "dominant wavelength".
