id: 2-1-450-eng
termid: 2-1-450
data:
  language_code: eng
terms:
- type: expression
  designation: Illuminant
  normative_status: preferred
definition:
- content: Radiant energy with a relative spectral distribution defined over the wavelength
    range that influences object colour perception.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
notes:
- content: In English, this term is not restricted to this sense, but is a general
    term used for any kind of light falling on a body or scene, and is also used to
    refer to the light source itself, including its filters if any.
