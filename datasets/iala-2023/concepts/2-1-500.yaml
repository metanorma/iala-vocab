id: 2-1-500-eng
termid: 2-1-500
language_code: eng
terms:
- type: expression
  designation: Colour Temperature
  normative_status: preferred
definition:
- content: |-
    The temperature of the full radiator which emits radiation of the same chromaticity as the radiation considered.


    Unit: kelvin (K)



    Note: The corresponding relative spectral distribution curves need not be similar provided that the radiations give rise to identical colour sensations.


    Reference: C.I.E. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
