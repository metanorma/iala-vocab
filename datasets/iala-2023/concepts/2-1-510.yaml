id: 2-1-510-eng
termid: 2-1-510
data:
  language_code: eng
terms:
- type: expression
  designation: Thermal Radiation
  normative_status: preferred
definition:
- content: Process of emission in which the radiant energy originates in the thermal
    agitation of the particles of matter (atoms, molecules, ions).
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
notes:
- content: The terms "thermal radiation" and, in German Temperaturstrahlung apply
    not only to the process of emission, but also to the radiation itself.
