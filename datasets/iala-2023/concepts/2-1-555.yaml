id: 2-1-555-eng
termid: 2-1-555
language_code: eng
terms:
- type: expression
  designation: Flicker Photometer
  normative_status: preferred
definition:
- content: |-
    A visual photometer in which the eye sees an undivided field illuminated alternately by two sources to be compared, the frequency of alternation being conveniently chosen so that it is above the fusion frequency for colours but below the fusion frequency for luminosities.


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
