id: 2-2-030-eng
termid: 2-2-030
data:
  language_code: eng
terms:
- type: expression
  designation: Mirror
  normative_status: preferred
definition:
- content: A reflector, usually of polished or plated metal or silvered glass, having
    the property that most of the luminous flux incident on it is deflected into new
    directions by regular reflection.
