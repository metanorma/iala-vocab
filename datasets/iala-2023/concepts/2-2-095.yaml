id: 2-2-095-eng
termid: 2-2-095
language_code: eng
terms:
- type: expression
  designation: Belt (of a fixed lens)
  normative_status: preferred
definition:
- content: The optically central portion of a fixed lens, consisting of a refracting
    element of annular shape and lenticular cross-section.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
