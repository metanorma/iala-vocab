id: 2-2-170-eng
termid: 2-2-170
language_code: eng
terms:
- type: expression
  designation: Focal Plane (of a light)
  normative_status: preferred
definition:
- content: |-
    The horizontal plane through the focus of the optical apparatus of the light.






    Note: In lighthouse practice in some countries the term "focal plane" is used with the above meaning, although this is quite a different meaning from that of 2-2-165.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
