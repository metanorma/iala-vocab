id: 2-2-190-eng
termid: 2-2-190
data:
  language_code: eng
  terms:
  - type: expression
    designation: Subtense Angle
    normative_status: preferred
  definition:
  - content: |-
      The angle, with vertex at the focus, subtended by the edges of a lens or reflector, usually measured in a horizontal or vertical plane. (Figs. 10 and 16b)

      ![Ch2_Fig10.jpg](/iala-vocab/images/iala/Ch2_Fig10.jpg)

      ![Ch2_Fig16b.jpg](/iala-vocab/images/iala/Ch2_Fig16b.jpg)

      In Germany, the subtense angle of a fixed lens or of an optical panel, measured in the horizontal plane, is called Spannwinkel.

      See also Total Subtense
  notes:
  - content: In France, the subtense angle of an optical panel, measured in the horizontal
      plane, is called Ouverture.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
