id: 2-3-020-eng
termid: 2-3-020
language_code: eng
terms:
- type: expression
  designation: Burner
  normative_status: preferred
definition:
- content: |-
    1. An apparatus in which a gas or vapour burns to produce a flame used directly or with a mantle as a source of light.


    2. That part of the apparatus where the flame is produced. (Figs. 20 and 21)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
