id: 2-3-025-eng
termid: 2-3-025
language_code: eng
terms:
- type: expression
  designation: Mantle
  normative_status: preferred
definition:
- content: |-
    (Incandescent) Mantle


    A loosely woven fabric, of natural or synthetic fibre, impregnated with a solution of Thorium and Cerium nitrates, which is raised to incandescence by a flame and used as a luminous source.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
