id: 2-3-030-eng
termid: 2-3-030
language_code: eng
terms:
- type: expression
  designation: Mantle Burner
  normative_status: preferred
definition:
- content: |-
    A burner provided with a mantle.



    Note: In lighthouse service, the principal fuels used in mantle burners are paraffin vapour, propane, butane or acetylene.
