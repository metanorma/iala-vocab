id: 2-3-250-eng
termid: 2-3-250
language_code: eng
terms:
- type: expression
  designation: Projector Lamp (G.B.)
  normative_status: preferred
definition:
- content: |-
    Alternative term: Projection Lamp (U.S.A.)


    A lamp in which the luminous element is so mounted that the lamp may be used with an optical system projecting the light in chosen directions.



    Note: The terms Lampe de Projection in French and Projection Lamp (U.S.A.) refer more specifically to a lamp intended for use in equipment for the projection of either still or motion pictures on a screen.


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
