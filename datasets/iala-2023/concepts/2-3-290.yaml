id: 2-3-290-eng
termid: 2-3-290
data:
  language_code: eng
terms:
- type: expression
  designation: Electroluminescence
  normative_status: preferred
definition:
- content: Luminescence of certain substances, generally solid, under the action of
    an electric field.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: C.I.E
notes:
- content: Formerly this term has been used chiefly for the luminescence of a gas
    under the action of an electric discharge.
