id: 2-3-310-eng
termid: 2-3-310
language_code: eng
terms:
- type: expression
  designation: Discharge Lamp
  normative_status: preferred
definition:
- content: |-
    A lamp in which the light is produced by an electric discharge through a gas, a metal vapour, or a mixture of several gases or vapours.


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
