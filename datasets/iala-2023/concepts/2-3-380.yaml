id: 2-3-380-eng
termid: 2-3-380
language_code: eng
terms:
- type: expression
  designation: Fluorescent Mercury Discharge Lamp
  normative_status: preferred
definition:
- content: |-
    A high pressure mercury lamp in which the light is produced partly by the mercury vapour and partly by a layer of fluorescent material excited by the ultra-violet radiation of the discharge .


    Reference: C.I.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
