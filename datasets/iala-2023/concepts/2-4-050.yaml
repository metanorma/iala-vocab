id: 2-4-050-eng
termid: 2-4-050
data:
  language_code: eng
terms:
- type: expression
  designation: Focusing Device
  normative_status: preferred
- type: expression
  designation: Focuser (G.B.)
  normative_status: admitted
definition:
- content: An optical device used for focusing {{2-2-155, Focusing}}, for example,
    a short telescope with cross-wire, fixed to the frame of the optic.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: In France and Germany, the type of focusing device mainly used projects,
    by means of lenses and prisms, an image of the luminous element of the light source
    on a screen fitted with a cross-wire and usually also with concentric rings.
