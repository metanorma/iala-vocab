id: 2-4-135-eng
termid: 2-4-135
language_code: eng
terms:
- type: expression
  designation: Cut screen
  normative_status: preferred
definition:
- content: |-
    No English Term


    An opaque screen located at the optic and intended to reduce the luminous intensity of the beam, and also, in the case of revolving optics, to reduce the angle of uncertainty



    Note: In the second case, this is a form of "cut screen".
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
