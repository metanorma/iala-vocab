id: 2-5-050-eng
termid: 2-5-050
language_code: eng
terms:
- type: expression
  designation: Landfall Light
  normative_status: preferred
definition:
- content: |-
    The first light to be seen by an observer approaching the coast from the open sea.


    It is so situated and has luminous range and geographical range so great that it can be identified at a great distance.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
