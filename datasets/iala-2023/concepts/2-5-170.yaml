id: 2-5-170-eng
termid: 2-5-170
language_code: eng
terms:
- type: expression
  designation: Occulting Light
  normative_status: preferred
definition:
- content: |-
    1. A light in which the total duration of light in each period is clearly longer than the total duration of darkness and in which the intervals of darkness (occultations) are all of equal duration.





    Reference: N.L.



    2. Commonly used for a single-occulting light.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
