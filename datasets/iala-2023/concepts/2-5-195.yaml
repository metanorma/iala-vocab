id: 2-5-195-eng
termid: 2-5-195
language_code: eng
terms:
- type: expression
  designation: Interrupted Quick-Flashing Light
  normative_status: preferred
definition:
- content: |-
    Quick-flashing light (in sense 1 of 2-5-190) in which the rapid alternations are interrupted at regular intervals by eclipses of long duration. (Fig.43b)


    Reference: N.L.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
