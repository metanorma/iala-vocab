id: 2-5-260-eng
termid: 2-5-260
language_code: eng
terms:
- type: expression
  designation: Intermediate Light(s)
  normative_status: preferred
definition:
- content: A light or lights which, of three or more lights forming a leading line,
    is situated between the front and rear lights. (Fig.47)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
