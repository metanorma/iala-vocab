id: 2-6-060-eng
termid: 2-6-060
language_code: eng
terms:
- type: expression
  designation: Buoy (3)
  normative_status: preferred
definition:
- content: A floating object of defined size, shape and colour, usually made of metal
    or plastic, which is anchored at a given position and serves as an aid to navigation.
    It may carry a light or an acoustical or other device.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
