id: 2-6-070-eng
termid: 2-6-070
language_code: eng
terms:
- type: expression
  designation: Starboard Hand Mark (or Buoy)
  normative_status: preferred
definition:
- content: A mark (or buoy) which is to be left to the starboard hand when approaching
    from the open sea or in general proceeding in the direction of the main stream
    of flood tide, or in the direction established by the appropriate authority.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
