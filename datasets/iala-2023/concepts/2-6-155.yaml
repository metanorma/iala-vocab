id: 2-6-155-eng
termid: 2-6-155
language_code: eng
terms:
- type: expression
  designation: Daylight Signal Light
  normative_status: preferred
definition:
- content: |-
    A signal light exhibited by day and also, usually with reduced intensity, by night.


    This reduction of intensity is made in order to avoid glare.


    Daylight signals indicate, for example, whether the entrance to a lock is free or not.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
