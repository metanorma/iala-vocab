id: 2-6-200-eng
termid: 2-6-200
language_code: eng
terms:
- type: expression
  designation: Winter Buoy (U.S.A.)
  normative_status: preferred
definition:
- content: An unlighted buoy which is maintained in certain areas during winter months
    when other navigational aids are temporarily removed or extinguished.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
