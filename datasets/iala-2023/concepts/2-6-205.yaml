termid: 2-6-205
data:
  language_code: eng
  terms:
  - type: expression
    designation: Watch Buoy (2)
    normative_status: preferred
  - type: expression
    designation: Station Buoy (U.S.A.)
    normative_status: admitted
  definition:
  - content: An unlighted buoy established in the vicinity of a lightship (or, in
      the U.S.A. and Germany, of an important lighted buoy) as a reference point in
      case the lightship or buoy should be dragged off station.
