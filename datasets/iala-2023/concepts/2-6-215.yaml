id: 2-6-215-eng
termid: 2-6-215
language_code: eng
terms:
- type: expression
  designation: Spherical Buoy
  normative_status: preferred
definition:
- content: A buoy of which the upper part of the body (above the waterline), or the
    larger part of the superstructure, is spherical.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
