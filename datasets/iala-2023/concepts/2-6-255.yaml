id: 2-6-255-eng
termid: 2-6-255
data:
  language_code: eng
  terms:
  - type: expression
    designation: Topmark (2)
    normative_status: preferred
  definition:
  - content: |-
      One or more relatively small objects of characteristic shape or colour (or both), placed on top of a navigation mark (or buoy) to identify it. (Figs. 65 and 66)

      a. Simple
      b. Composite, viz. made up of two or three individual topmarks.

      Cone
      Can
      Sphere
      Diamond
      St. George's Cross
      "T"
      Broom

      A broom topmark has the appearance of a circular broomhead and has two forms "Broom, point upwards" (in German, "mit Besen abwarts") and "Broom, point downwards" (in German, "mit Besen aufwarts").

      Two cones, point upwards
      Two cones, point downwards
      Two cones, point to point
      Two cones, base to base

      ![Ch2_Fig65.jpg](/iala-vocab/images/iala/Ch2_Fig65.jpg)

      ![Ch2_Fig66.jpg](/iala-vocab/images/iala/Ch2_Fig66.jpg)
  notes:
  - content: A topmark may be
  - content: 'The following characteristic apparent shapes of topmarks are internationally
      recognised for the lateral system of marking (or buoyage):'
  - content: 'The following characteristic apparent shapes of topmarks are internationally
      recognised for the cardinal system of marking (or buoyage):'
  - content: Other forms (e.g. St. Andrew's Cross) are used, for example, as landfall
      marks.
  - content: In the U.S.A. the word Daymark is often used for a topmark.
