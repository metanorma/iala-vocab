id: 2-6-275-eng
termid: 2-6-275
language_code: eng
terms:
- type: expression
  designation: Retro-Reflecting Material
  normative_status: preferred
definition:
- content: |-
    A material which produces reflex reflection (2-1-155) over a wide range of angles of incidence of a light beam, by the use of a large number of very small reflecting and refracting elements, usually very small beads.


    The applications are the same as those of retro-reflectors (2-6-270).


    (Fig. 7d)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
