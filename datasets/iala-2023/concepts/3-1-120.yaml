id: 3-1-120-eng
termid: 3-1-120
language_code: eng
terms:
- type: expression
  designation: Acoustic impedance
  normative_status: preferred
definition:
- content: "The complex quotient of the sound pressure and the volume velocity through
    the surface. \n\n\n\nNote: This definition is valid only for sinusoidal vibrations
    in the steady state.\n\n\n\nReference: I.E.C. (modified)"
