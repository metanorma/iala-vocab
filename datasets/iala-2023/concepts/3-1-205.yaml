id: 3-1-205-eng
termid: 3-1-205
data:
  language_code: eng
terms:
- type: expression
  designation: Normal threshold of hearing
  normative_status: preferred
definition:
- content: The modal value of the thresholds of hearing at a specified frequency of
    an adequately large number of otologically normal subjects within the age limits
    of 18 to 25 inclusive.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: Measured sound pressures should be converted to the corresponding sound
    pressure levels in decibels before the modal value is taken.
- content: An otologically normal subject is a person in a normal state of health
    who is free from all signs or symptoms of ear disease and from wax in the auditory
    canal.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Normal_threshold_of_hearing
