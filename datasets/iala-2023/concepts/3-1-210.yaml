id: 3-1-210-eng
termid: 3-1-210
language_code: eng
terms:
- type: expression
  designation: Aural masking
  normative_status: preferred
definition:
- content: |-
    1. The process by which the threshold of audibility for one sound is raised by the presence of another (masking) sound.


    2. The amount by which the threshold of audibility of a sound is raised by the presence of another (masking) sound. The unit customarily used is the decibel.


    Reference: ANSI
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
