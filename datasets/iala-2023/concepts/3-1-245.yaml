id: 3-1-245-eng
termid: 3-1-245
language_code: eng
terms:
- type: expression
  designation: Actual range of a sound signal
  normative_status: preferred
definition:
- content: The maximum distance, measured from the point of emission, at which it
    is possible to understand the information contained in the signal under the existing
    conditions of propagation and listening.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
