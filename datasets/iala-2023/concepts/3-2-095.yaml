id: 3-2-095-eng
termid: 3-2-095
data:
  language_code: eng
  terms:
  - type: expression
    designation: Rotor of a siren
    normative_status: preferred
  definition:
  - content: |-
      Rotor (of a siren)

      The moving part of the modulator containing apertures or "ports" corresponding to those of the stator. The relative displacement between the two sets of ports interrupts the flow of compressed air thereby producing a modulated output.
