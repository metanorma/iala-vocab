id: 4-1-055-eng
termid: 4-1-055
data:
  language_code: eng
  terms:
  - type: expression
    designation: Assigned frequency band
    normative_status: preferred
  definition:
  - content: The frequency band the centre of which coincides with the frequency assigned
      to the station and the width of which equals the necessary bandwidth plus twice
      the absolute value of the frequency tolerance.
