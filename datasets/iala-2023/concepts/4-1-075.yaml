id: 4-1-075-eng
termid: 4-1-075
language_code: eng
terms:
- type: expression
  designation: Harmful interference
  normative_status: preferred
definition:
- content: |-
    Any emission, radiation or induction which endangers the functioning of a radio-navigation service or of other safety services or seriously degrades, obstructs or repeatedly interrupts a radio-communication service operating in accordance with the Reference: I.T.U. Regulations.


    Reference: I.T.U.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
