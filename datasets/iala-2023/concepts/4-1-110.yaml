language_code: eng
terms:
- type: expression
  designation: Isotropic or absolute gain of an antenna
  normative_status: preferred
definition:
- content: |-
    The gain of an antenna in a given direction when the reference antenna is an isotropic antenna isolated in space.


    Symbol: Gis


    Reference: I.T.U.
