id: 4-1-200-eng
termid: 4-1-200
language_code: eng
terms:
- type: expression
  designation: Pulse
  normative_status: preferred
definition:
- content: An electrical disturbance whose duration is short in relation to the time
    scale of interest and whose initial and final values are the same.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
