id: 4-1-250-eng
termid: 4-1-250
language_code: eng
terms:
- type: expression
  designation: Effective height (U.S.A.)
  normative_status: preferred
definition:
- content: "Effective height (U.S.A.)\n\n\nThe height of the antenna centre of radiation
    above the effective ground level.\n\n\n\nNote: For an antenna with symmetrical
    current distribution the centre of radiation is the centre of distribution. \n\n\nFor
    an antenna with asymmetrical current distribution the centre of radiation is the
    centre of current moments when viewed from directions near the direction of maximum
    radiation.\n\n\nReference: I.R.E."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
