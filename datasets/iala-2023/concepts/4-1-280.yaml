id: 4-1-280-eng
termid: 4-1-280
data:
  language_code: eng
terms:
- type: expression
  designation: Induction field
  normative_status: preferred
definition:
- content: That part of the field of an antenna which is associated with a pulsation
    of energy to and fro between the antenna and the medium.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
- type: authoritative
  origin:
    ref: B.S
notes:
- content: The induction field extends theoretically over the whole of space, but
    is negligible compared with the radiation field except in the neighbourhood of
    the antenna.
