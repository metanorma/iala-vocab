id: 4-1-445-eng
termid: 4-1-445
language_code: eng
terms:
- type: expression
  designation: Quarter wave skirt dipole
  normative_status: preferred
definition:
- content: |-
    Alternative term: Sleeve dipole Coaxial antenna (U.S.A.)


    A dipole formed from a coaxial line by folding back on itself a quarter wavelength of the outer conductor leaving a quarter wavelength of the inner conductor exposed.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
