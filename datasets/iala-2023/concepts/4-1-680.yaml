id: 4-1-680-eng
termid: 4-1-680
data:
  language_code: eng
  terms:
  - type: expression
    designation: Bandwidth characteristic
    normative_status: preferred
  - type: expression
    designation: Bandwidth characteristic (of the whole or part of a radio transmitter)
    normative_status: admitted
  definition:
  - content: The variation of the output power with respect to frequency, the transmitter
      having been adjusted for operation on a specified frequency, and the frequency
      variation normally being only a small percentage of the specified frequency.
