id: 4-1-740-eng
termid: 4-1-740
language_code: eng
terms:
- type: expression
  designation: Receiver radiation
  normative_status: preferred
definition:
- content: |-
    Electromagnetic radiation from a receiver or any conductors coupled thereto, or from both, arising from a source or sources of electric oscillation in the receiver.


    Reference: B.S. (modified)
