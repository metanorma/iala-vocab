id: 4-1-905-eng
termid: 4-1-905
data:
  language_code: eng
terms:
- type: expression
  designation: Standard refractive modulus gradient
  normative_status: preferred
- type: expression
  designation: Standard M gradient
  normative_status: admitted
definition:
- content: That uniform variation of refractive modulus with height above the earth's
    surface which is regarded as a standard for comparison. The gradient considered
    as normal has a value of 0.12 M units per metre (3.6 M units per hundred feet).
