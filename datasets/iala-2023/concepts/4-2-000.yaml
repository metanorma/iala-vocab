id: 4-2-000-eng
termid: 4-2-000
language_code: eng
terms:
- type: expression
  designation: Radio beacon station
  normative_status: preferred
definition:
- content: |-
    A station in the radionavigation service, the emissions of which are intended to enable a mobile station to determine its bearing or direction in relation to the radio beacon station.


    Reference: I.T.U.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
