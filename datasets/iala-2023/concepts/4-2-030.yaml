id: 4-2-030-eng
termid: 4-2-030
language_code: eng
terms:
- type: expression
  designation: Radio leading line
  normative_status: preferred
definition:
- content: A radio beacon station some or all of whose emissions are directional so
    that the signal characteristic changes according to the ship's bearing from the
    station.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
