id: 4-2-035-eng
termid: 4-2-035
language_code: eng
terms:
- type: expression
  designation: Radio beacon - Non-Directional
  normative_status: preferred
definition:
- content: |-
    (Non-directional) Radio beacon


    A radio beacon station with a fixed omni-directional antenna the bearing of which can only be determined by a craft equipped for direction finding.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
