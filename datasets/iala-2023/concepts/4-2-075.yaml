id: 4-2-075-eng
termid: 4-2-075
language_code: eng
terms:
- type: expression
  designation: Automatic direction finder
  normative_status: preferred
definition:
- content: |-
    A direction finder in which the bearing, with or without sense, is determined automatically.



    Note: The automatic radio compass is an example of an automatic direction finder.


    Reference: B.S. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
