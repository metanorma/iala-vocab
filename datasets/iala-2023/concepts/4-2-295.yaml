data:
  language_code: eng
  terms:
  - type: expression
    designation: Field alignment error
    normative_status: preferred
  definition:
  - content: A form of site error caused by the direction finder antenna system not
      being mounted on the fore and aft line of the ship or caused by asymmetry in
      the structure of the vessel.
