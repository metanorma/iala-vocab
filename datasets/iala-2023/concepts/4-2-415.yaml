id: 4-2-415-eng
termid: 4-2-415
data:
  language_code: eng
  terms:
  - type: expression
    designation: Matching unit
    normative_status: preferred
  definition:
  - content: A unit, comprising a reactive network, used to match the complex impedance
      appearing at the feeder to the output impedance of a transmitter or the input
      impedance of a receiver.
