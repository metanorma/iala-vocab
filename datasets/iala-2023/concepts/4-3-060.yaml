id: 4-3-060-eng
termid: 4-3-060
language_code: eng
terms:
- type: expression
  designation: Electrical scanning
  normative_status: preferred
definition:
- content: |-
    Scanning in which the required variations in beam direction are produced by variations in phase or amplitude (or both) of the currents in the elementary antennas.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
