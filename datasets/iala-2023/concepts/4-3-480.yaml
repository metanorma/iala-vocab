id: 4-3-480-eng
termid: 4-3-480
language_code: eng
terms:
- type: expression
  designation: Over-interrogation
  normative_status: preferred
definition:
- content: Interrogation of a transponder more times per second (not necessarily by
    only one interrogator) than it is able to reply.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
