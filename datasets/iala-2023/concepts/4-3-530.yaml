  designation: Corner reflector
  normative_status: preferred
- type: expression
  designation: Trihedral reflector
  normative_status: admitted
definition:
- content: A reflector, consisting of three flat conducting surfaces intersecting
    mutually at right angles, which reflects the greater part of the incident waves
    parallel to their direction of incidence.
