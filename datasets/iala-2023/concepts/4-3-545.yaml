id: 4-3-545-eng
termid: 4-3-545
language_code: eng
terms:
- type: expression
  designation: Luneberg lens
  normative_status: preferred
definition:
- content: |-
    Luneberg reflector


    A reflector making use of a number of concentric dielectric spheres of varying refractive index, capable of focusing incident energy onto a reflecting surface. The energy is eventually re-radiated along the incident path.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
