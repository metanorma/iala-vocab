terms:
- type: expression
  designation: Position line (2)
  normative_status: preferred
- type: expression
  designation: Line of position
  normative_status: admitted
definition:
- content: A line (geometrical locus), defined by a constant measured value, on which
    a vessel may be identified on the basis of a measurement.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: There are terrestrial, astronomical and radio position lines.
- content: Also defined in 1-2-075
