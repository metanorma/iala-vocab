id: 4-4-150-eng
termid: 4-4-150
language_code: eng
terms:
- type: expression
  designation: Decometer
  normative_status: preferred
definition:
- content: |-
    A phase-meter used for the display of Decca position-line information within a pattern.


    The readings of a decometer and the lane identification meter together determine the line of position on which the craft lies.


    Reference: B.S. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
