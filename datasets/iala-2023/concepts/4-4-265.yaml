id: 4-4-265-eng
termid: 4-4-265
language_code: eng
terms:
- type: expression
  designation: Omega Antipodal effects
  normative_status: preferred
definition:
- content: |-
    Antipodal effects (in Omega)


    Errors introduced due to the reception of a signal from both directions round the earth.



    Note: Due to the long range characteristic of the system, however, signals from other stations, suitably paired, should be available.
sources:
- type: authoritative
  origin:
