id: 4-4-310-eng
termid: 4-4-310
data:
  language_code: eng
  terms:
  - type: expression
    designation: Shoran Time base
    normative_status: preferred
  definition:
  - content: |-
      Time base (in Shoran)

      The basic calibration waveform generated by a stable adjustable crystal oscillator on the vessel.

      The shore station is equipped with an extremely accurate and stable crystal oscillator with which the oscillator on the vessel is adjusted to agree in frequency.
