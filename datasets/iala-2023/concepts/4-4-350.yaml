  designation: Toran Compensating receiver
  normative_status: preferred
definition:
- content: |-
    Compensating receiver (in Toran)

    A fixed receiver which receives the transmissions of the two confocal transmitters; the low frequency beat note obtained from the output of the receiver constitutes a phase reference.
