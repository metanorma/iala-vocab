id: 5-1-125-eng
termid: 5-1-125
language_code: eng
terms:
- type: expression
  designation: Down time
  normative_status: preferred
definition:
- content: |-
    The period during which a system or device is not operating due to internal failures, scheduled shutdown, or servicing.


    Reference: I.E.E.E.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
