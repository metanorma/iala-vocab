id: 5-1-145-eng
termid: 5-1-145
data:
  language_code: eng
  terms:
  - type: expression
    designation: Confidence level
    normative_status: preferred
  definition:
  - content: The probability that a given statement is correct or the probability
      that a stated confidence interval (numerical range) includes an unknown.
  notes:
  - content: 'Note:: When this probability is expressed as a percentage, it is called
      confidence factor.'
