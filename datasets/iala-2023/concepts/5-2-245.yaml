termid: 5-2-245
data:
  language_code: eng
terms:
- type: expression
  designation: Corrective action
  normative_status: preferred
definition:
- content: The change in the correcting variable which is produced by the controlling
    equipment with a view to reducing the deviation resulting from a change in one
    or more actuating variables.
