id: 5-2-320-eng
termid: 5-2-320
language_code: eng
terms:
- type: expression
  designation: Effective range
  normative_status: preferred
definition:
- content: |-
    For a measuring unit, the interval between the extreme values of the measured quantity for which measurements can be made with the required accuracy,


    Reference: I.E.C.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
