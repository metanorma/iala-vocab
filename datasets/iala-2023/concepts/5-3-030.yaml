id: 5-3-030-eng
termid: 5-3-030
data:
  language_code: eng
  terms:
  - type: expression
    designation: Frequency modulation (FM)
    normative_status: preferred
  definition:
  - content: Angle modulation of a sine-wave carrier in which the instantaneous frequency
      of the modulated wave differs from the carrier frequency by an amount proportional
      to the instantaneous value of the modulating wave.
