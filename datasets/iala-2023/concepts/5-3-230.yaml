id: 5-3-230-eng
termid: 5-3-230
language_code: eng
terms:
- type: expression
  designation: Mean power (2)
  normative_status: preferred
definition:
- content: |-
    The mean power supplied to the antenna transmission line by a transmitter during normal operation averaged over a time sufficiently long compared with the period of the lowest frequency encountered in the modulation.


    Reference: C.C.I.R. (modified)
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
