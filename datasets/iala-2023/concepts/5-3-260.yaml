terms:
- type: expression
  designation: Harmonic radiation
  normative_status: preferred
definition:
- content: |-
    Spurious radiation at frequencies which are whole multiples of those contained in the frequency band occupied by an emission.


    Reference: C.C.I.R. (modified)
