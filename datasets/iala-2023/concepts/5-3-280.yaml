id: 5-3-280-eng
termid: 5-3-280
language_code: eng
terms:
- type: expression
  designation: Decay time (of a pulse)
  normative_status: preferred
definition:
- content: |-
    The interval between the instants at which the instantaneous value of a pulse or of its envelope (if a carrier frequency pulse is concerned) reaches specified upper and lower limits, namely 90% and 10% of the peak value unless otherwise stated.


    Reference: I.E.C.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
