id: 5-3-420-eng
termid: 5-3-420
language_code: eng
terms:
- type: expression
  designation: Executive pulse
  normative_status: preferred
definition:
- content: The last signal pulse which is used in a remote control system to execute
    a command and which is withheld until prescribed identifying signals have been
    received from a distant point.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
