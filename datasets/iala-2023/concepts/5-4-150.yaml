id: 5-4-150-eng
termid: 5-4-150
language_code: eng
terms:
- type: expression
  designation: Commutated-capacitor tachometer
  normative_status: preferred
definition:
- content: |-
    A rotary switch which alternately charges a fixed capacitor from a constant d.c. voltage source and discharges it through a fixed resistor. The average current through the resistor is proportional to the speed of rotation of the switch.


    Reference: B.S.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
