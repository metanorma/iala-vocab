id: 5-4-305-eng
termid: 5-4-305
data:
  language_code: eng
  terms:
  - type: expression
    designation: Dashpot
    normative_status: preferred
  definition:
  - content: A device consisting of two elements, normally a piston and a cylinder,
      the relative motion of which is opposed by fluidic friction and which is used
      for damping or to provide forces proportional to the rate of movement of the
      piston.
