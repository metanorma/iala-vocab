id: 6-2-070-eng
termid: 6-2-070
data:
  language_code: eng
terms:
- type: expression
  designation: Cylinder (of a reciprocating engine)
  normative_status: preferred
definition:
- content: A cavity or enclosure of cylindrical shape within which a piston of circular
    cross-section moves and in which a gas or vapour is expanded or ignited to provide
    motive power to the piston.
