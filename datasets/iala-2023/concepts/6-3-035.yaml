id: 6-3-035-eng
termid: 6-3-035
language_code: eng
terms:
- type: expression
  designation: Air-mass
  normative_status: preferred
definition:
- content: The length of path through the earth's atmosphere traversed by the direct
    solar beam, expressed as a multiple of the path traversed to a point at sea-level
    with the sun directly overhead.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
