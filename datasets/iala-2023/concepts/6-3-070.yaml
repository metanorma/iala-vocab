id: 6-3-070-eng
termid: 6-3-070
data:
  language_code: eng
terms:
- type: expression
  designation: Shadowing (of a solar cell)
  normative_status: preferred
definition:
- content: The partial interception of light, that would otherwise be incidental on
    a solar cell, due to neighbouring objects or structural elements. This can cause
    the cell to operate in the reverse bias mode, in which it acts as a heat-dissipating
    resistive element.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
