id: 6-3-225-eng
termid: 6-3-225
language_code: eng
terms:
- type: expression
  designation: Cut-out wind speed (of a wind-power generator)
  normative_status: preferred
definition:
- content: |-
    The maximum wind speed at which the generator is designed to produce usable power.



    Note: At a higher speed, the operation of the system is discontinued to prevent damage.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
