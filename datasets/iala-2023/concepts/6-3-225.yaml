id: 6-3-225-eng
termid: 6-3-225
data:
  language_code: eng
terms:
- type: expression
  designation: Cut-out wind speed (of a wind-power generator)
  normative_status: preferred
definition:
- content: The maximum wind speed at which the generator is designed to produce usable
    power.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: At a higher speed, the operation of the system is discontinued to prevent
    damage.
annotations:
- content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Cut-out_wind_speed_(of_a_wind-power_generator)
