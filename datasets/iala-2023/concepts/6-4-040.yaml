id: 6-4-040-eng
termid: 6-4-040
language_code: eng
terms:
- type: expression
  designation: Brush
  normative_status: preferred
definition:
- content: |-
    A conducting element that provides electrical connection through sliding contact with another conducting element moving relative to it.


    Note: The term carbon (brush) is commonly used if the brush is made of carbon.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
