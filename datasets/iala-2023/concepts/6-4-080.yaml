id: 6-4-080-eng
termid: 6-4-080
data:
  language_code: eng
terms:
- type: expression
  designation: Slip (of an asynchronous machine)
  normative_status: preferred
definition:
- content: A measure of the amount by which the actual speed of rotation of the field
    is less than the synchronous speed. It may be expressed as the difference of the
    speeds, or as the ratio of this difference to the synchronous speed.
sources:
- type: authoritative
  origin:
