id: 6-4-115-eng
termid: 6-4-115
language_code: eng
terms:
- type: expression
  designation: Intermittent duty
  normative_status: preferred
definition:
- content: Duty in which the load may be constant or variable but in which the on-load
    periods alternate with intervals of rest, either regularly or irregularly.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
