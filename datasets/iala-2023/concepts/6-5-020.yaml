id: 6-5-020-eng
termid: 6-5-020
data:
  language_code: eng
  terms:
  - type: expression
    designation: Secondary cell
    normative_status: preferred
  definition:
  - content: |-
      An electrochemical cell in which the chemical reaction is intended to be reversed by the application of an external potential difference to the electrodes.

      Lead-acid
      Nickel-cadmium
      Nickel-iron
      Nickel-zinc
  notes:
  - content: The charge on the cell may be renewed, after exhaustion, many times.
  - content: There are various different types of secondary cell, of which the following
      are the most common
