id: 6-6-030-eng
termid: 6-6-030
data:
  language_code: eng
  terms:
  - type: expression
    designation: Line conductor
    normative_status: preferred
  definition:
  - content: One of a set of conductors that is connected to an electric source at
      a point at which there is the greatest voltage.
  notes:
  - content: The set of conductors may commonly be in the form of a cable.
