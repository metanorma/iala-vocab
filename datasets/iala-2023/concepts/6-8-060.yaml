id: 6-8-060-eng
termid: 6-8-060
data:
  language_code: eng
  terms:
  - type: expression
    designation: Load factor
    normative_status: preferred
  definition:
  - content: The ratio of the total energy delivered by a source in a given interval
      of time to the energy that would have been delivered if the peak load had been
      maintained throughout the same interval of time.
