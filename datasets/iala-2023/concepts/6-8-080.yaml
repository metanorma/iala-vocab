id: 6-8-080-eng
termid: 6-8-080
data:
  language_code: eng
  terms:
  - type: expression
    designation: Diversity factor
    normative_status: preferred
  definition:
  - content: The ratio of the sum of the loads of two or more devices simultaneously
      operated in a given interval of time to the peak load due to their operation
      in the same interval of time.
  notes:
  - content: The diversity factor is the reciprocal of the coincidence factor.
