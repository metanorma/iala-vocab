id: 6-8-085-eng
termid: 6-8-085
language_code: eng
terms:
- type: expression
  designation: Coincidence factor
  normative_status: preferred
definition:
- content: |-
    The ratio of the peak load due to the simultaneous operation of two or more devices in a given interval of time to the sum of the individual loads of the devices in the same interval of time.



    Note:  The coincidence factor is the reciprocal of the diversity factor.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
