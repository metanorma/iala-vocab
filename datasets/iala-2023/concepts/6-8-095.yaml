id: 6-8-095-eng
termid: 6-8-095
language_code: eng
terms:
- type: expression
  designation: Equipotential bonding
  normative_status: preferred
definition:
- content: An electrical connection to ensure that various exposed or other parts
    of an apparatus or installation are at nearly equal potential.
