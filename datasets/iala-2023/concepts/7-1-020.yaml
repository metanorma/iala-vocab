id: 7-1-020-eng
termid: 7-1-020
language_code: eng
terms:
- type: expression
  designation: Island station
  normative_status: preferred
definition:
- content: |-
    An aid to navigation station founded on or close to the coast of a small or sparsely populated island.



    Note: The term island light is used for an island station having a light as its principal aid to navigation.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
