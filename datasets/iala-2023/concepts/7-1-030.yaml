id: 7-1-030-eng
termid: 7-1-030
data:
  language_code: eng
terms:
- type: expression
  designation: Dike (2)
  normative_status: preferred
- type: expression
  designation: Dyke levee (USA)
  normative_status: admitted
definition:
- content: An embankment along a coast, river or lake, to provide low lying land with
    protection against flooding.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: The term sea-wall refers to a dike on the sea coast.
- content: A " dike " can also be a ditch or natural or artificial drainage channel.
- content: The French term digue is also very often used for a mole, when this protects
    an area of water within a harbour.
