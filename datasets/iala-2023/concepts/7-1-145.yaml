id: 7-1-145-eng
termid: 7-1-145
language_code: eng
terms:
- type: expression
  designation: Lantern deck
  normative_status: preferred
definition:
- content: |-
    Alternative term: Lantern level


    The level in a lighthouse at which the lantern is installed, and by which access may be gained to the optical system and to the inside and outside of the lantern glazing.
