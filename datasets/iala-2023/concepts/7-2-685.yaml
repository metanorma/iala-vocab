id: 7-2-685-eng
termid: 7-2-685
language_code: eng
terms:
- type: expression
  designation: Lantern handhold
  normative_status: preferred
definition:
- content: U or D shaped handhold made from metal rod, fixed to an astragal to provide
    additional security for personnel when using a ladder outside the lantern.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
