data:
  language_code: eng
  terms:
  - type: expression
    designation: Breaking (of waves)
    normative_status: preferred
  definition:
  - content: The destruction of the normal form of a wave. This can occur for example
      when it meets a solid object in its path, or arrives in shallow water.
