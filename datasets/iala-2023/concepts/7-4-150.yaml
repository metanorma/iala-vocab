id: 7-4-150-eng
termid: 7-4-150
language_code: eng
terms:
- type: expression
  designation: Backwash
  normative_status: preferred
definition:
- content: Waves reflected from obstacles, such as cliffs or breakwaters, and running
    seaward, combining with incoming waves to form a steep sea.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
