data:
  language_code: eng
  terms:
  - type: expression
    designation: Conditions of contract
    normative_status: preferred
  definition:
  - content: Those conditions, including agreement on rates of payment and time for
      completion, detailed by the client under which the contract for undertaking
      certain works is to be performed, forming a legally binding document.
