  - type: expression
    designation: Indeterminate redundant
    normative_status: admitted
  definition:
  - content: A term applied to a structure which is provided with a redundant number
      of nodes so that bending moments and reactions need to be determined not only
      from the laws of equilibrium but taking calculated deflection into account.
