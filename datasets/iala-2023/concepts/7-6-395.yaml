id: 7-6-395-eng
termid: 7-6-395
data:
  language_code: eng
terms:
- type: expression
  designation: Jack
  normative_status: preferred
definition:
- content: A device used for exerting a force, operating either by a screw action
    or using a hydraulic ram.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- content: In French a distinction is made between cric, a screw jack, and verin,
    a hydraulic jack.
