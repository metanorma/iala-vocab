id: 8-2-015-eng
termid: 8-2-015
language_code: eng
terms:
- type: expression
  designation: Automatic light vessel
  normative_status: preferred
definition:
- content: A light vessel that fulfils all its required functions without the need
    to carry a crew. The regular operation of the light and all other aids to navigation
    and essential equipment on the vessel is automatic. A radio link is provided to
    a shore station for the remote monitoring of important functions, and possibly
    also for some remote control.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
