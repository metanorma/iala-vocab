id: 8-3-105-eng
termid: 8-3-105
data:
  language_code: eng
terms:
- type: expression
  designation: Towing winch
  normative_status: preferred
definition:
- content: A winch with a large single barrel on which the towing line is reeled.
    It is usually fitted with an automatic control system that allows the line to
    run out or heave in according to weather and load conditions while towing.
