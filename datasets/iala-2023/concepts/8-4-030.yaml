id: 8-4-030-eng
termid: 8-4-030
language_code: eng
terms:
- type: expression
  designation: Large navigation(al) buoy
  normative_status: preferred
definition:
- content: "Lanby\n\n\nLNB (USA)\n\n\nA buoy, commonly a discus buoy, designed to
    carry a light, usually of high luminous intensity and at a height in excess of
    10 metres above the water level, as an aid to navigation. The principal dimension
    of the buoy in the water plane is more than 8 metres and usually more than 10
    metres. Such buoys may also carry radio equipment and power generation equipment
    such as diesel-alternator sets.\n\n\n\nNote 1 :\n\n\nThe term \"Lanby\" is derived
    from Large Automatic Navigation Buoy.\n\n\n\nNote 2 : \n\n\nThe term superbuoy
    is applied to buoys of similarly large dimensions that are not principally used
    as aids to navigation, such as super mooring buoys and the largest ODAS buoys.
    Hydrographic authorities may incude Lanbys in the general class of superbuoy for
    the purpose of symbolic notation on charts.\n\n\n\nNote 3 :\n\n\nAnother form
    of large navigational buoy is the semi-submersible buoy, usually in the shape
    of a platform, partially submerged and anchored to the sea-bed by tensioned chains.\n\n\n\nNote
    4 :\n\n\nThe French term bouee-phare is sometimes used but it is not recommended."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
