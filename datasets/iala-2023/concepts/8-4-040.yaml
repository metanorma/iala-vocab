data:
  language_code: eng
terms:
- type: expression
  designation: Watch buoy
  normative_status: preferred
- type: expression
  designation: Station buoy (USA)
  normative_status: admitted
definition:
- content: A buoy established in the vicinity of an aid to navigation such as a light
    vessel or Lanby, as a reference point in case the aid should drift off station.
