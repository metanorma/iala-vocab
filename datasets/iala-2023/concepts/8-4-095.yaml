id: 8-4-095-eng
termid: 8-4-095
language_code: eng
terms:
- type: expression
  designation: Topmark
  normative_status: preferred
definition:
- content: |-
    An object, or pair of objects, of characteristic shape and colour, that is carried on top of a buoy as a means of identification.



    Note:


    For details of topmarks used in the IALA Maritime Buoyage System, see Chapter 2 (Rev).
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
