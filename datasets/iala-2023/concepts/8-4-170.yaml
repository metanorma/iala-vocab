id: 8-4-170-eng
termid: 8-4-170
language_code: eng
terms:
- type: expression
  designation: Centre of buoyancy (of a buoy)
  normative_status: preferred
definition:
- content: The centre of gravity of the water displaced by the buoy. The total buoyancy
    thrust may be considered as an upward force through this point.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
notes:
- Please note that this is the term as it stands in the original IALA Dictionary edition
  (1970-1989)
