id: 8-4-185-eng
termid: 8-4-185
data:
  language_code: eng
  terms:
  - type: expression
    designation: Reserve buoyancy
    normative_status: preferred
  definition:
  - content: The watertight volume of a vessel above the designed waterline, expressed
      as a percentage of the total buoyancy (volume). It is an indication of the seaworthiness
      of the vessel.
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  annotations:
  - content: Sourced from https://www.iala.int/wiki/dictionary/index.php/Reserve_buoyancy
