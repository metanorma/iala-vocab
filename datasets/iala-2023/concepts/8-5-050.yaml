id: 8-5-050-eng
termid: 8-5-050
language_code: eng
terms:
- type: expression
  designation: Mooring line
  normative_status: preferred
definition:
- content: |-
    Chain, cable, hawser, etc..by which a vessel or buoy is secured to an anchor, sinker, or mooring.



    Note:


    When chain is used, the term mooring chain applies.
