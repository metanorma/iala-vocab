terms:
- type: expression
  designation: Adaptation training
  normative_status: preferred
definition:
- content: "urn:mrn:iala:dic:0901102e\n\n\nAdaptation training is carried out whenever
    significant changes are expected or when changes have been made, concerning equipment,
    regulations, operational procedures or any other matter which is relevant to the
    performance of VTS personnel.\n\n\nSource: \nIALA Guideline G1156 Recruitment,
    training and assessment of VTS Personnel (20202022)\nIALA Model Course V‐103/5
    - Revalidation Process for VTS Qualification and Certification"
