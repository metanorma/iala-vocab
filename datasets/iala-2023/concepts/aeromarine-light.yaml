id: aeromarine-light-eng
termid: aeromarine-light
data:
  language_code: eng
  terms:
  - type: expression
    designation: Aeromarine Light
    normative_status: preferred
  definition:
  - content: a marine light in which the beam has been deflected at an angle of 10°
      - 15° above the horizon, so that the light is usable for aircraft navigation.
