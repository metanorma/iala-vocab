id: bearing-angle--eng
termid: bearing-angle-
language_code: eng
terms:
- type: expression
  designation: Bearing (angle)
  normative_status: preferred
definition:
- content: Bearing (angle) – is the limits of light sectors and areas of visibility
    of lights, and alignments of leading lights and directional lights, are given
    as bearings from seaward. The bearings of sectors are given in clockwise order.
