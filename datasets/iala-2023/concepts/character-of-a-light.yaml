id: character-of-a-light-eng
termid: character-of-a-light
language_code: eng
terms:
- type: expression
  designation: Character of a light
  normative_status: preferred
definition:
- content: "Character of a light – is the distinctive combination of various aspects
    of a light (i.e. when lit, extinguished, coloured or white) which appear regularly
    or rhythmically allowing it to be identified (for example, fixed, flashing, group
    flashing, alternating).  \nLights with the same character exist, but should be
    separated in distance, so that they are outside each nominal light range, and
    not adjacent, to avoid confusion."
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
