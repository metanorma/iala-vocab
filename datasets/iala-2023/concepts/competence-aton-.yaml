id: competence-aton--eng
termid: competence-aton-
language_code: eng
terms:
- type: expression
  designation: Competence (AtoN)
  normative_status: preferred
definition:
- content: |-
    Competence (AtoN) is having the knowledge, skills, attitude and personal attributes necessary to safely, effectively and efficiently carry out the functions or sub-functions assigned to a specific AtoN position.





    Source: ENG7, Recommendation R0141
