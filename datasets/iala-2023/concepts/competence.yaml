  definition:
  - content: |-
      urn:mrn:iala:dic:0901007e

      Competence is having the knowledge, skills, attitude and personal attributes necessary to safely, effectively and efficiently carry out the functions or sub-functions assigned to a specific VTS position.

      Source:
      IALA Guideline G1156 Recruitment, training and assessment of VTS Personnel
