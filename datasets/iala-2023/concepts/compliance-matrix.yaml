  definition:
  - content: |-
      urn:mrn:iala:dic:0901104e

      A document designed to measure the effectiveness of how the requirements are being met.  The document aims to assist a training organization in the preparation prior to the audit, and for auditors during the audit.

      Source:
      IALA Guideline G1014 Accreditation of VTS training organizations and approval to deliver IALA VTS model courses
