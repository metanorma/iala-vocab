definition:
- content: "urn:mrn:iala:dic:0901104e\n\n\nA document designed to measure the effectiveness
    of how the requirements are being met.  The document aims to assist a training
    organization in the preparation prior to the audit, and for auditors during the
    audit. \n\n\nSource: \nIALA Guideline G1014 Accreditation of VTS training organizations
    and approval to deliver IALA VTS model courses"
