definition:
- content: "Action to secure the survival or preservation of buildings, cultural artefacts,
    natural resources, energy or anything of acknowledged value to the future.\n\n\n\nReference:
    Stirlingcharter \n\n\n(This definition was noted at the IALA Seminar on the Practical
    Aspects of Lighthouse Preservation in Gothenburg 2005)"
