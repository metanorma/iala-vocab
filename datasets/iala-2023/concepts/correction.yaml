id: correction-eng
termid: correction
language_code: eng
terms:
- type: expression
  designation: Correction
  normative_status: preferred
definition:
- content: The numerical value of a correction is the best estimate that can be made
    of the difference between the true and the measured value of a parameter. The
    sign is such that a correction that is to be added to an observed reading is taken
    as positive.
