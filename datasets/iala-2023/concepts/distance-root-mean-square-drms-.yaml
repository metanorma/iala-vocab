language_code: eng
terms:
- type: expression
  designation: Distance root mean square (dRMS)
  normative_status: preferred
definition:
- content: |-
    The root mean square of the radial distances from the true position to the observed positions obtained from a number of trials.



    Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
