id: educational-organizations-management-system-eoms--eng
termid: educational-organizations-management-system-eoms-
language_code: eng
terms:
- type: expression
  designation: Educational organizations management system (EOMS)
  normative_status: preferred
definition:
- content: "urn:mrn:iala:dic:0901111e\n\n\nEducational organizations management system
    (EOMS) is a quality management system for an educational organization. The International
    Organization for Standardization (ISO) has issued ISO Standard 21001:2018 on Educational
    organizations – management systems for educational organizations – requirements
    with guidance for use.\n\n\nSource: \nIALA Guideline G1014 Accreditation of VTS
    training organizations and approval to deliver IALA VTS model courses, section
    3.1."
sources:
- type: authoritative
  origin:
