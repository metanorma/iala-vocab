id: elevation-of-light-eng
termid: elevation-of-light
language_code: eng
terms:
- type: expression
  designation: Elevation of Light
  normative_status: preferred
definition:
- content: Elevation of Light – is the vertical distance from the focal point of the
    light and mean sea level (when the tide is not appreciable on the near shore)
    or (elsewhere) MHW (Mean High Water) or other appropriate high water reference
    level.
