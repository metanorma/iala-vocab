  designation: Fix
  normative_status: preferred
definition:
- content: |-
    A position determined by processing information from a number of navigation observations.


    Fix rate. The number of fixes per unit time.


    Fix interval (seconds). The maximum time in seconds between fixes.



    Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
