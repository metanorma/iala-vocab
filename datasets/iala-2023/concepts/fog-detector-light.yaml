    designation: Fog Detector Light
    normative_status: preferred
  definition:
  - content: Fog Detector Light – is a light able to detect fog automatically. There
      are various types; some are visible only over a narrow arc; some exhibit a blueish-white
      flash lasting approximately one second; others sweep back and forth.
