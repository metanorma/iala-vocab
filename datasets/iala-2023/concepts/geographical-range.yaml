id: geographical-range-eng
termid: geographical-range
language_code: eng
terms:
- type: expression
  designation: Geographical Range
  normative_status: preferred
definition:
- content: The greatest distance at which an object or a light source can be seen
    under conditions of perfect visibility, as limited only by the curvature of the
    earth, by refraction of the atmosphere, and by the elevation of the observer and
    the object or light.
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
