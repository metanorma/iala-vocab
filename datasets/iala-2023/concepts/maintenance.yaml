id: maintenance-eng
termid: maintenance
data:
  language_code: eng
  terms:
  - type: expression
    designation: Maintenance
    normative_status: preferred
  definition:
  - content: |-
      Routine work necessary to keep the fabric of a building, the moving parts of machinery, grounds, gardens or any other artefact, in good order.

      (This definition was noted at the IALA Seminar on the Practical Aspects of Lighthouse Preservation in Gothenburg 2005)
