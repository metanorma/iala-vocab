definition:
- content: "Routine work necessary to keep the fabric of a building, the moving parts
    of machinery, grounds, gardens or any other artefact, in good order.\n\n\n\nReference:
    Stirlingcharter \n\n\n(This definition was noted at the IALA Seminar on the Practical
    Aspects of Lighthouse Preservation in Gothenburg 2005)"
