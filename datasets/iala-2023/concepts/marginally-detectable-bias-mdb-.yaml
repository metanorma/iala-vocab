id: marginally-detectable-bias-mdb--eng
termid: marginally-detectable-bias-mdb-
language_code: eng
terms:
- type: expression
  designation: Marginally detectable bias (MDB)
  normative_status: preferred
definition:
- content: The minimum size of gross error in an observation that may be detected
    with given probabilities of type 1 and type 2 errors. A type 1 error occurs when
    an observation without a gross error is wrongly rejected, and a type 2 error occurs
    when an observation with a gross error is wrongly accepted.
sources:
- type: authoritative
  origin:
