id: participating-vessel-eng
termid: participating-vessel
language_code: eng
terms:
- type: expression
  designation: Participating Vessel
  normative_status: preferred
definition:
- content: "VTS-2012-24\n\n\nVessels navigating in an area where vessel traffic services
    are provided should make use of these services.\n\n\nDepending upon governing
    rules and regulations, participation in a VTS may be either voluntary or mandatory.
    \n\n\nVessels should be allowed to use a VTS where mandatory participation is
    not required.\n\n\n\nSource: IALA Guideline 1068 (2009)\n\n\n(VTS33/output/8 refers)"
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
