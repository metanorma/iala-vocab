definition:
- content: "State of survival of a building or artefact, whether by historical accident
    or through a combination of protection and active conservation.\n\n\n\nReference:
    Stirlingcharter \n\n\n(This definition was noted at the IALA Seminar on the Practical
    Aspects of Lighthouse Preservation in Gothenburg 2005)"
