  designation: Rebuilding
  normative_status: preferred
definition:
- content: "Remaking, on the basis of a recorded or reconstructed design, a building
    or part of a building or artefact which has been irretrievably damaged or destroyed.\n\n\n\nReference:
    Stirlingcharter \n\n\n(This definition was noted at the IALA Seminar on the Practical
    Aspects of Lighthouse Preservation in Gothenburg 2005)"
