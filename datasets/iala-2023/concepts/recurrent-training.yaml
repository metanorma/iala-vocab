terms:
- type: expression
  designation: Recurrent training
  normative_status: preferred
definition:
- content: "urn:mrn:iala:dic:0901108e\n\n\nRecurrent training is the training that
    should be carried out at regular intervals and is part of a structured training
    programme thereby enabling continual professional development and resulting in
    the maintenance of the VTS qualification. \n\n\nSource: \nIALA Guideline G1156
    Recruitment, training and assessment of VTS Personnel\nIALA Model Course V‐103/5
    - Revalidation Process for VTS Qualification and Certification"
