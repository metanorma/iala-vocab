id: refurbishment-eng
termid: refurbishment
language_code: eng
terms:
- type: expression
  designation: Refurbishment
  normative_status: preferred
definition:
- content: "Alternative terms: Renovation, Restoration\n\n\nTo make a building look
    new and bright again; to rebuild or replenish with all new material; to restore
    to original (or better) working order and appearance. \n\n\n\n(This definition
    was noted at the IALA Seminar on the Practical Aspects of Lighthouse Preservation
    in Gothenburg 2005)"
