id: reliability-of-a-position-fix--eng
termid: reliability-of-a-position-fix-
language_code: eng
terms:
- type: expression
  designation: Reliability (of a position fix)
  normative_status: preferred
definition:
- content: "A measure of the propagation of a non-detected gross error in an observation
    to the position fix. \n\n\nThis \"external\" reliability is usually expressed
    in terms of marginally detectable error (MDE).\n\n\n\n\n\nSource: Nick Ward, Vicechair,
    IALA e-Nav Committee, March 2009"
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
