id: reliability-of-an-observation--eng
termid: reliability-of-an-observation-
language_code: eng
terms:
- type: expression
  designation: Reliability (of an observation)
  normative_status: preferred
definition:
- content: |-
    A measure of the effectiveness with which gross errors may be detected.


    This internal reliability is usually expressed in terms of marginally detectable bias (MDB).



    Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
