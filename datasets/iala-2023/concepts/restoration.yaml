id: restoration-eng
termid: restoration
language_code: eng
terms:
- type: expression
  designation: Restoration
  normative_status: preferred
definition:
- content: "Alteration of a building or artefact which has decayed, been lost or damaged,
    or is thought to have been inappropriately repaired or altered in the past, the
    objective of which is to make it conform again to its design or appearance at
    a previous date.\n\n\n\nReference: Stirlingcharter \n\n\n(This definition was
    noted at the IALA Seminar on the Practical Aspects of Lighthouse Preservation
    in Gothenburg 2005)"
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
