id: risk-control-eng
termid: risk-control
language_code: eng
terms:
- type: expression
  designation: Risk Control
  normative_status: preferred
definition:
- content: "Risk control means taking action to eliminate health and safety risks
    so far as is reasonably practicable, and if that is not possible, minimising the
    risks so far as is reasonably practicable.  \n\n\nEffective risk control involves
    establishing and maintaining systems that give opportunity for regular evaluation
    and review procedures.\n\n\n\n\n\nSource: ENG7, Guideline 1092 (2017)"
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
