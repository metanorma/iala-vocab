id: risk-eng
termid: risk
data:
  language_code: eng
  terms:
  - type: expression
    designation: Risk
    normative_status: preferred
  definition:
  - content: |-
      The possibility that harm (death, injury or illness) might occur when exposed to a hazard.  The severity of the hazard, duration and frequency of exposure will determine the level of risk.

      Source: ENG7, Guideline 1092 (2017)
