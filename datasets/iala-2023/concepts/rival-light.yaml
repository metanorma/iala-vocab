language_code: eng
terms:
- type: expression
  designation: Rival Light
  normative_status: preferred
definition:
- content: |-
    Rival lights can be considered as individual point sources of light that mask or obscure an AtoN light and prevent easy detection or recognition of the AtoN.






    Source: ENG7, Guideline G1073
