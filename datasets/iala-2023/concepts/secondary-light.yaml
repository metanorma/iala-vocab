language_code: eng
terms:
- type: expression
  designation: Secondary Light
  normative_status: preferred
definition:
- content: Secondary Light – is a light placed on or near to a main light’s support
    and having a special navigational function, for example a passing light on a leading
    light structure or a single sector light.
