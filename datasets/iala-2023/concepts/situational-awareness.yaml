id: situational-awareness-eng
termid: situational-awareness
language_code: eng
terms:
- type: expression
  designation: Situational Awareness
  normative_status: preferred
definition:
- content: "Situational awareness refers to the ability to identify, process, and
    comprehend the critical elements of information about what is happening in the
    surrounding environment at any given time. \nIt involves being aware of what is
    happening around you and understanding how that information, events, and your
    own actions will impact your goals and objectives, both immediately and in the
    near future.\n\n\nSource: VTS54 Task 1.1.3(a) - Develop guidance on the Implications
    of Maritime Autonomous Surface Ships (MASS) from a VTS Perspective"
sources:
- type: authoritative
  origin:
