id: surface-colour-eng
termid: surface-colour
language_code: eng
terms:
- type: expression
  designation: Surface Colour
  normative_status: preferred
definition:
- content: "A surface colour is a colour perceived to belong to a surface.  \n\n\nThe
    colour of an ordinary surface, such as an ordinary paint or an opaque plastic
    material, is the most common kind of surface colour and is known as an ordinary
    colour.  \n\n\nOther kinds of colours include fluorescent (or luminescent) colours,
    transilluminated colours (for example, the colours of internally illuminated panels)
    and the colours of retro-reflecting materials.\n\n\n\n\n\n\n\n\nSource: ENG7,
    Guideline G1134 (2017)"
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
