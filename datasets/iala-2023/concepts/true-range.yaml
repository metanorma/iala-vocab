language_code: eng
terms:
- type: expression
  designation: True Range
  normative_status: preferred
definition:
- content: True Range – is the maximum distance, measured from the place of emission
    to positions, at which the information carried by the signal can be understood,
    in existing transmission of light, sound and motion conditions.
