id: updating-training-eng
termid: updating-training
language_code: eng
terms:
- type: expression
  designation: Updating training
  normative_status: preferred
definition:
- content: "urn:mrn:iala:dic:0901112e\n\n\nUpdating training is tailor made training
    following a training needs analysis indicating that member(s) of VTS Personnel
    need additional training. Updating training may be required after a break in service,
    unsatisfactory operational performance or other circumstances leading to a reduced
    level of competence.\n\n\nSource: \nIALA Guideline G1156 Recruitment, training
    and assessment of VTS Personnel\nIALA Model Course V‐103/5 - Revalidation Process
    for VTS Qualification and Certification"
sources:
- type: authoritative
  origin:
    ref: IALA Dictionary
