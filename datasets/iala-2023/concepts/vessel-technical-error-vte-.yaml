id: vessel-technical-error-vte--eng
termid: vessel-technical-error-vte-
data:
  language_code: eng
terms:
- type: expression
  designation: Vessel Technical Error (VTE)
  normative_status: preferred
definition:
- content: |-
    The difference between the indicated craft position and the indicated command or desired position. It is a measure of the accuracy with which the craft is controlled.

    Source: Nick Ward, Vicechair, IALA e-Nav Committee, March 2009
sources:
- type: authoritative
  origin:
