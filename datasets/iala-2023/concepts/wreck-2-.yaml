id: wreck-2--spa
termid: wreck-2-
data:
  language_code: spa
  terms:
  - type: expression
    designation: Naufragio
    normative_status: preferred
  definition:
  - content: "Naufragio, tras un siniestro marítimo, significa:\n\na)\tun barco hundido
      o varado; o\nb)\tcualquier parte de un barco hundido o varado, incluido cualquier
      objeto que esté o haya estado a bordo de dicho barco; o\nc)\tcualquier objeto
      perdido en el mar por un barco y que esté varado, hundido o a la deriva en el
      mar; o\nd)\tun barco que esté a punto, o pueda esperarse razonablemente que
      se hunda o vare, donde todavía no se estén tomando medidas efectivas  para ayudar
      al barco o cualquier propiedad en peligro.\n\nFuente: Convenio de Nairobi 2017,
      proporcionado por el Comité ARM de IALA en el documento ARM7-12.1.14 en 2017.\n\nEsto
      reemplaza la definición número 1-2-205 en la edición original del Diccionario
      IALA (1970-1989)."
  sources:
  - type: authoritative
    origin:
      ref:
        source: IALA Dictionary
  annotations:
